const TP={2:88,3:25,4:10,5:6,6:4,7:4,8:4,9:6,10:10,11:25,12:88};

const HIST0=[{r:"P",s:9},{r:"P",s:7},{r:"P",s:9},{r:"P",s:9},{r:"B",s:11},{r:"P",s:8},{r:"T",s:10},{r:"P",s:12},{r:"P",s:7},{r:"P",s:9},{r:"B",s:11},{r:"P",s:9},{r:"P",s:12},{r:"B",s:6},{r:"P",s:9},{r:"T",s:9},{r:"P",s:8},{r:"B",s:10},{r:"P",s:9},{r:"P",s:8},{r:"B",s:7},{r:"P",s:6},{r:"B",s:8},{r:"P",s:10},{r:"B",s:7},{r:"P",s:8},{r:"T",s:7},{r:"P",s:8},{r:"B",s:10},{r:"T",s:11},{r:"P",s:10},{r:"B",s:9},{r:"P",s:9},{r:"P",s:6},{r:"B",s:9},{r:"B",s:7},{r:"P",s:9},{r:"T",s:6},{r:"B",s:9},{r:"P",s:7},{r:"P",s:10},{r:"P",s:7},{r:"P",s:11},{r:"P",s:7},{r:"P",s:11},{r:"P",s:4},{r:"B",s:10},{r:"T",s:10},{r:"P",s:10},{r:"P",s:9},{r:"B",s:4},{r:"P",s:7},{r:"P",s:11},{r:"B",s:7},{r:"B",s:9},{r:"B",s:8},{r:"B",s:10},{r:"B",s:7},{r:"P",s:6},{r:"B",s:8},{r:"P",s:8},{r:"T",s:5},{r:"B",s:10},{r:"P",s:9},{r:"P",s:6},{r:"T",s:8},{r:"B",s:9},{r:"P",s:5},{r:"T",s:7},{r:"P",s:8},{r:"B",s:7},{r:"B",s:7},{r:"B",s:6},{r:"B",s:10},{r:"P",s:10},{r:"B",s:9},{r:"P",s:7},{r:"P",s:8},{r:"B",s:8},{r:"P",s:8},{r:"T",s:4},{r:"P",s:4},{r:"P",s:6},{r:"B",s:11},{r:"P",s:11},{r:"P",s:9},{r:"P",s:6},{r:"B",s:7},{r:"P",s:10},{r:"P",s:10},{r:"B",s:7},{r:"P",s:12},{r:"B",s:3},{r:"B",s:8},{r:"B",s:7},{r:"B",s:4},{r:"P",s:7},{r:"B",s:12},{r:"P",s:11},{r:"B",s:7},{r:"P",s:4},{r:"B",s:7},{r:"P",s:9},{r:"B",s:12},{r:"P",s:12},{r:"B",s:11},{r:"P",s:7},{r:"B",s:4},{r:"B",s:8},{r:"P",s:9},{r:"B",s:10},{r:"P",s:7},{r:"B",s:9},{r:"P",s:6},{r:"B",s:8},{r:"T",s:5},{r:"P",s:8},{r:"B",s:10},{r:"P",s:7},{r:"B",s:6},{r:"P",s:9},{r:"B",s:7},{r:"P",s:8},{r:"B",s:8},{r:"T",s:9},{r:"P",s:8},{r:"B",s:9},{r:"P",s:8},{r:"B",s:5},{r:"P",s:9},{r:"B",s:10},{r:"P",s:9},{r:"B",s:6},{r:"P",s:8},{r:"B",s:6},{r:"P",s:5},{r:"B",s:9},{r:"P",s:7},{r:"B",s:9},{r:"P",s:11},{r:"B",s:9},{r:"P",s:8},{r:"B",s:8},{r:"P",s:9},{r:"T",s:6},{r:"B",s:9},{r:"P",s:11},{r:"B",s:8},{r:"P",s:9},{r:"B",s:9},{r:"P",s:6},{r:"B",s:9},{r:"P",s:4},{r:"B",s:5},{r:"T",s:6},{r:"P",s:7},{r:"T",s:8},{r:"B",s:9},{r:"B",s:9},{r:"P",s:10},{r:"B",s:11},{r:"P",s:8},{r:"B",s:8},{r:"P",s:6},{r:"P",s:8},{r:"P",s:4},{r:"B",s:8},{r:"P",s:7},{r:"P",s:6},{r:"B",s:7},{r:"P",s:9},{r:"T",s:6},{r:"B",s:10},{r:"T",s:6},{r:"B",s:8},{r:"B",s:10},{r:"B",s:12},{r:"B",s:7},{r:"T",s:4},{r:"P",s:7},{r:"B",s:11},{r:"P",s:11},{r:"B",s:8},{r:"P",s:8},{r:"B",s:10},{r:"B",s:7},{r:"P",s:4},{r:"B",s:8},{r:"P",s:9},{r:"B",s:12},{r:"B",s:6},{r:"T",s:4},{r:"T",s:4},{r:"B",s:9},{r:"P",s:11},{r:"B",s:7},{r:"B",s:8},{r:"P",s:8},{r:"B",s:10},{r:"T",s:8},{r:"B",s:7},{r:"P",s:8},{r:"B",s:6},{r:"P",s:8},{r:"T",s:11},{r:"B",s:8},{r:"P",s:7},{r:"B",s:8},{r:"P",s:8},{r:"B",s:9},{r:"P",s:9},{r:"B",s:8},{r:"P",s:9},{r:"B",s:6},{r:"P",s:7},{r:"B",s:11},{r:"P",s:9},{r:"B",s:10},{r:"P",s:8}];

// Estado global
let ST = {

};

// ══ MOTOR ════════════════════════════════════════════════════════════════════
function analisarMesa(H){
  const ult=H.slice(-15),C=ult.filter(h=>h.r!=="T");
  if(C.length<8)return{label:"⚪ MESA: ANALISANDO",cor:"#64748b",cautela:false,detalhe:""};
  let trocas=0,stMax=1,st=1;
  for(let i=1;i<C.length;i++){if(C[i].r!==C[i-1].r){trocas++;st=1;}else{st++;if(st>stMax)stMax=st;}}
  const tx=trocas/(C.length-1);
  const somas=ult.map(h=>h.s).filter(Boolean);
  const avg=somas.reduce((a,b)=>a+b,0)/somas.length;
  const vol=somas.reduce((a,s)=>a+Math.abs(s-avg),0)/somas.length;
  const ties=ult.filter(h=>h.r==="T").length/ult.length;
  const sc=[(tx>0.75&&vol>2),(stMax>=4&&tx>0.5),(ties>0.25),(tx>0.65&&tx<0.85&&vol>1.8)].filter(Boolean).length;
  if(sc>=2)return{label:"🔴 MESA EM COLETA — manipulação detectada",cor:"#ef4444",cautela:true,detalhe:`Alt ${Math.round(tx*100)}% · vol ${vol.toFixed(1)} · T ${Math.round(ties*100)}% — reduzir valor ou aguardar`};
  if(sc===1)return{label:"🟡 MESA INSTÁVEL — cautela",cor:"#f59e0b",cautela:true,detalhe:`Alt ${Math.round(tx*100)}% · vol ${vol.toFixed(1)} — entrar só com conf >80%`};
  if(tx>=0.45&&tx<=0.65&&vol<1.8)return{label:"🟢 MESA PAGANTE — padrão limpo",cor:"#22c55e",cautela:false,detalhe:`Alt ${Math.round(tx*100)}% · vol ${vol.toFixed(1)} — boa janela`};
  return{label:"⚪ MESA NEUTRA — observando",cor:"#64748b",cautela:false,detalhe:`Alt ${Math.round(tx*100)}% · vol ${vol.toFixed(1)}`};
}

function motor(H,cautela){
  const C=H.filter(h=>h.r!=="T");
  if(C.length<4)return{sinal:null,conf:0,razao:"Aguardando histórico",tg:false,tp:4,dt:99};
  const r5=C.slice(-5).map(h=>h.r),r8=C.slice(-8);
  const s6=H.slice(-6).map(h=>h.s).filter(Boolean);
  const avg=s6.length?s6.reduce((a,b)=>a+b,0)/s6.length:8.5;
  const est=s6.length>=4&&s6.reduce((a,s)=>a+Math.abs(s-avg),0)/s6.length<1.5;
  const hi=avg>=9.5;
  const tc=H.slice(-12).filter(h=>h.r==="T").length;
  const td=tc/12,mp=td>=0.12;
  const ri=[...H].reverse().findIndex(h=>h.r==="T");
  const dt=ri===-1?99:ri;
  const ls=H[H.length-1]?.s;
  const tg=(td>=0.12&&dt>=4)||dt>=7||(!!ls&&(ls<=4||ls>=10)&&dt>=3);
  const tp=ls?TP[ls]||4:4;
  const mn=cautela?0.78:0.62;
  function bc(b){let v=b;if(est)v+=.07;if(hi)v+=.05;if(mp)v+=.06;return Math.min(v,.95);}
  const pC=r8.filter(h=>h.r==="P").length,bC=r8.filter(h=>h.r==="B").length;
  const p5=r5.length>=5&&r5.every((r,i)=>i===0||r!==r5[i-1]);
  const p4=r5.length>=4&&r5.slice(-4).every((r,i)=>i===0||r!==r5.slice(-4)[i-1]);
  if(p5||p4){const nx=r5[r5.length-1]==="P"?"B":"P";const c=bc(p5?.84:.72);if(c>=mn)return{sinal:nx,conf:Math.round(c*100),razao:`Ping-pong ${p5?"5":"4"} ciclos`,tg,tp,dt};}
  if(r5.length>=4){const a=r5.slice(-4);
    if(a[0]===a[1]&&a[2]===a[3]&&a[0]!==a[2]){const nx=a[3]==="P"?"B":"P";const c=bc(.78);if(c>=mn)return{sinal:nx,conf:Math.round(c*100),razao:"Bloco 2×2 — troca",tg,tp,dt};}
    if(a[2]===a[3]&&a[1]!==a[2]){const c=bc(.72);if(c>=mn)return{sinal:a[3],conf:Math.round(c*100),razao:"Bloco 2×2 — continuar",tg,tp,dt};}
  }
  let s=1;const ss=C[C.length-1]?.r;
  for(let i=C.length-2;i>=0;i--){if(C[i].r===ss)s++;else break;}
  if(s>=5)return{sinal:null,conf:0,razao:`Streak ${s}×${ss} — aguarda`,tg,tp,dt};
  if(s>=3){const sv=H.slice(-s).map(h=>h.s).filter(Boolean);const vl=sv.length>=2?Math.max(...sv)-Math.min(...sv):0;
    if(vl>=3){const nx=ss==="P"?"B":"P";const c=bc(.77);if(c>=mn)return{sinal:nx,conf:Math.round(c*100),razao:`Streak ${s}×${ss} — quebra`,tg,tp,dt};}
    else{const c=bc(.64);if(c>=mn)return{sinal:ss,conf:Math.round(c*100),razao:`Streak ${s}×${ss} — continuar`,tg,tp,dt};}
  }
  if(pC>=6){const c=bc(.85);if(c>=mn)return{sinal:"B",conf:Math.round(c*100),razao:`Reequilíbrio B (P${pC}/8)`,tg,tp,dt};}
  if(bC>=6){const c=bc(.62);if(c>=mn)return{sinal:"P",conf:Math.round(c*100),razao:`Reequilíbrio P (B${bC}/8)`,tg,tp,dt};}
  // GATILHO EMPATE — sempre verifica independente de cautela
  if(tg){const c=Math.min(.68+(mp?.08:0)+(dt>=7?.08:0),.86);if(c>=0.62)return{sinal:"T",conf:Math.round(c*100),razao:`Gatilho Empate · ${dt} rod. sem Tie · ${tp}x`,tg:true,tp,dt};}
  return{sinal:null,conf:0,razao:cautela?"Mesa instável — aguardando padrão":"Aguardando convergência",tg,tp,dt};
}

function calcGale(H,sigOrig,cautela){
  const C=H.filter(h=>h.r!=="T"),l2=C.slice(-2).map(h=>h.r),an=motor(H,cautela);
  if(!an.sinal||an.conf<(cautela?75:58)||an.razao.includes("aguarda"))return{modo:"AGUARDAR",lado:sigOrig};
  if(l2.length===2&&l2[0]!==l2[1]&&an.sinal!=="T"&&an.sinal!==sigOrig)return{modo:"INVERTER",lado:an.sinal};
  return{modo:"REPETIR",lado:sigOrig};
}

// ══ SYNC FIREBASE ════════════════════════════════════════════════════════════
function push(newSt){
  // Atualiza local imediatamente
  const s = {...newSt};
  delete s.aviso; // aviso é local apenas
  db.ref(ROOM).set({
    H: s.H,
    verde: s.verde,
    verm: s.verm,
    ciclo: s.ciclo,
    sig: s.sig || null,
    galeInfo: s.galeInfo || null,
    recupLado: s.recupLado || null,
    tgAtivo: s.tgAtivo || false,
    _ts: Date.now()
  });
}

function showAviso(txt, dur=3000){
  ST.aviso = txt;
  render();
  if(avisoTimer) clearTimeout(avisoTimer);
  avisoTimer = setTimeout(()=>{ ST.aviso=""; render(); }, dur);
}

function GREEN(txt){ ST.verde++; showAviso("✅ GREEN — "+txt); }
function RED(){ ST.verm++; showAviso("❌ RED — entrada + gale falharam"); }
function resetCiclo(){ ST.ciclo="idle"; ST.sig=null; ST.galeInfo=null; ST.recupLado=null; ST.tgAtivo=false; }

// ══ LÓGICA PRINCIPAL ═════════════════════════════════════════════════════════
function confirmar(){
  const mesa = analisarMesa(ST.H);
  const an = motor(ST.H, mesa.cautela);
  if(!an.sinal||an.sinal==="T") return;
  ST.sig = an.sinal;
  ST.tgAtivo = an.tg;
  ST.ciclo = "entrada";
  push(ST);
  showAviso(`${an.sinal==="P"?"🔵":"🔴"} Entrada confirmada — clique o resultado real`);
}

function reg(r){
  const s = parseInt(somaInput)||( r==="T"?7:8);
  const tp = TP[s]||4;
  ST.H = [...ST.H, {r,s}];
  somaInput = "";

  // ── RECUPERAÇÃO
  if(ST.ciclo==="recup"){
    if(r==="T"||r===ST.recupLado){ GREEN(r==="T"?`Empate ${tp}x na recuperação`:"Recuperação acertou!"); }
    else{ showAviso("⚠️ Recuperação falhou — ciclo encerrado"); }
    resetCiclo(); push(ST); return;
  }

  // ── GALE ATIVO
  if(ST.ciclo==="gale"&&ST.galeInfo){
    if(r==="T"){
      // REGRA: qualquer empate com ciclo ativo = GREEN
      GREEN(`Empate ${tp}x no Gale`);
      if(tp<=6){ ST.recupLado=ST.galeInfo.lado; ST.galeInfo=null; ST.sig=null; ST.ciclo="recup"; }
      else resetCiclo();
      push(ST); return;
    }
    if(r===ST.galeInfo.lado){ GREEN("Gale acertou!"); resetCiclo(); }
    else{ RED(); resetCiclo(); }
    push(ST); return;
  }

  // ── ENTRADA ATIVA
  if(ST.ciclo==="entrada"&&ST.sig){
    if(r==="T"){
      // REGRA: qualquer empate com entrada ativa = GREEN
      GREEN(`Empate ${tp}x na entrada`);
      if(tp<=6){ ST.recupLado=ST.sig; ST.sig=null; ST.ciclo="recup"; }
      else resetCiclo();
      push(ST); return;
    }
    if(r===ST.sig){ GREEN("Acertou de primeira!"); resetCiclo(); push(ST); return; }
    // Não bateu → gale
    const mesa = analisarMesa(ST.H);
    const g = calcGale(ST.H, ST.sig, mesa.cautela);
    ST.galeInfo = g; ST.ciclo = "gale";
    push(ST);
    showAviso(g.modo==="AGUARDAR"?"⏳ GALE 1 — AGUARDAR: motor instável":
      g.modo==="INVERTER"?`🔄 GALE 1 — INVERTER: ${g.lado==="P"?"AZUL":"VERMELHO"}`:
      `⚡ GALE 1 — REPETIR: ${g.lado==="P"?"AZUL":"VERMELHO"}`);
    return;
  }

  // ── IDLE
  if(r==="T"){
    if(ST.tgAtivo){
      // REGRA: gatilho ativo + empate bate = GREEN
      GREEN(`Empate ${tp}x no Gatilho!`);
      ST.tgAtivo=false; push(ST);
    } else {
      // Sem gatilho ativo: neutro
      showAviso("○ Empate — sem gatilho ativo (neutro)");
      push(ST);
    }
    return;
  }
  // Sem sinal — só registra
  push(ST);
  showAviso("○ Registrado");
}

function aplicarJson(){
  try{
    const d=JSON.parse(injText);
    if(Array.isArray(d.history)&&d.history.length>0) ST.H=d.history.map(h=>({r:h.r||h.result,s:h.s||h.sum||8}));
    if(typeof d.greens==="number") ST.verde=d.greens;
    if(typeof d.reds==="number") ST.verm=d.reds;
    resetCiclo(); push(ST);
    injText=""; injOpen=false;
    showAviso("✅ JSON aplicado!");
  }catch{ showAviso("❌ JSON inválido"); }
}

function copiar(){
  const d=JSON.stringify({history:ST.H,greens:ST.verde,reds:ST.verm,rate:ST.verde+ST.verm?Math.round(ST.verde/(ST.verde+ST.verm)*100):0,timestamp:new Date().toISOString()},null,2);
  if(navigator.clipboard?.writeText)navigator.clipboard.writeText(d).then(()=>showAviso("📋 Copiado!")).catch(()=>{ jsnVis=true; render(); });
  else{try{const t=document.createElement("textarea");t.value=d;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);showAviso("📋 Copiado!");}catch{jsnVis=true;render();}}
}

// ══ RENDER ═══════════════════════════════════════════════════════════════════
function render(){
  const mesa = analisarMesa(ST.H);
  const an = motor(ST.H, mesa.cautela);
  const tot=ST.verde+ST.verm, taxa=tot?Math.round(ST.verde/tot*100):0;
  const rcor=taxa>=60?"#22c55e":taxa>=45?"#f59e0b":"#ef4444";
  const pP=Math.round(ST.H.filter(h=>h.r==="P").length/Math.max(ST.H.length,1)*100);
  const tP=Math.round(ST.H.filter(h=>h.r==="T").length/Math.max(ST.H.length,1)*100);
  const bP=Math.round(ST.H.filter(h=>h.r==="B").length/Math.max(ST.H.length,1)*100);

  // Card
  let cCor="#475569",cBg="rgba(0,0,0,0.3)",cBrd="rgba(255,255,255,0.08)",cTit="⏳ AGUARDA",cSub=an.razao,showBtn=false;
  if(ST.ciclo==="recup"){{cCor="#f59e0b";cBg="rgba(80,50,0,0.35)";cBrd="#f59e0baa";cTit=`⚠️ RECUPERAÇÃO — ${ST.recupLado==="P"?"AZUL":"VERMELHO"}`;cSub="Clique o resultado da entrada de recuperação";}}
  else if(ST.ciclo==="gale"&&ST.galeInfo){const gc=ST.galeInfo.lado==="P"?"#60a5fa":"#f87171";if(ST.galeInfo.modo==="AGUARDAR"){cCor="#f59e0b";cBg="rgba(80,50,0,0.3)";cBrd="#f59e0b88";cTit="⏳ GALE 1 — AGUARDAR";cSub="Motor instável — registre mais rodadas";}else{cCor=gc;cBg="rgba(60,0,80,0.25)";cBrd=`${gc}88`;cTit=ST.galeInfo.modo==="INVERTER"?`🔄 GALE 1 — INVERTER: ${ST.galeInfo.lado==="P"?"AZUL":"VERMELHO"}`:`⚡ GALE 1 — REPETIR: ${ST.galeInfo.lado==="P"?"AZUL":"VERMELHO"}`;cSub="Clique o resultado real do Gale";}}
  else if(ST.ciclo==="entrada"&&ST.sig){const ac=ST.sig==="P"?"#60a5fa":"#f87171";cCor=ac;cBg=ST.sig==="P"?"rgba(0,30,120,0.25)":"rgba(100,0,0,0.25)";cBrd=`${ac}88`;cTit=`${ST.sig==="P"?"🔵":"🔴"} ENTRADA ATIVA — ${ST.sig==="P"?"AZUL":"VERMELHO"}`;cSub="Clique o resultado real da mesa";}
  else if(an.sinal==="T"){cCor="#f59e0b";cBg="rgba(100,70,0,0.2)";cBrd="#f59e0b88";cTit=`🔥 GATILHO EMPATE · ${an.tp}x · ${an.dt} rod. sem Tie`;cSub=an.razao;}
  else if(an.sinal==="P"){cCor="#60a5fa";cBg="rgba(0,30,120,0.2)";cBrd="#3b82f688";cTit=`🔵 SINAL: AZUL · ${an.conf}%`;cSub=an.razao;showBtn=true;}
  else if(an.sinal==="B"){cCor="#f87171";cBg="rgba(100,0,0,0.2)";cBrd="#ef444488";cTit=`🔴 SINAL: VERMELHO · ${an.conf}%`;cSub=an.razao;showBtn=true;}

  const instrucao=ST.ciclo==="entrada"?"🎯 ENTRADA ATIVA — clique o resultado real da mesa":

  const jsonStr=JSON.stringify({history:ST.H,greens:ST.verde,reds:ST.verm,rate:taxa,timestamp:new Date().toISOString()},null,2);

  document.getElementById("app").innerHTML=`

      ${[{l:"P",v:`${pP}%`,c:"#3b82f6"},{l:"T",v:`${tP}%`,c:"#f59e0b"},{l:"B",v:`${bP}%`,c:"#ef4444"},{l:"#",v:ST.H.length,c:"#475569"}].map(x=>`<div style="padding:3px 11px;border-radius:20px;border:1px solid ${x.c}33;background:${x.c}0d;font-size:11px;color:${x.c}"><span style="color:#334155">${x.l} </span>${x.v}</div>`).join("")}

    </div>

    <!-- AVISO -->
    ${ST.aviso?`<div style="margin-bottom:10px;padding:12px 16px;border-radius:10px;background:${ST.aviso.startsWith("✅")?"rgba(20,80,40,0.5)":ST.aviso.startsWith("❌")?"rgba(80,20,20,0.5)":"rgba(0,0,0,0.4)"};border:1px solid ${ST.aviso.startsWith("✅")?"#22c55e":ST.aviso.startsWith("❌")?"#ef4444":"#475569"}88;font-size:15px;font-weight:900;color:${ST.aviso.startsWith("✅")?"#22c55e":ST.aviso.startsWith("❌")?"#ef4444":"#94a3b8"};text-align:center;font-family:sans-serif">${ST.aviso}</div>`:""}

      ${cSub?`<div style="font-size:11px;color:#475569">${cSub}</div>`:""}
      ${showBtn&&ST.ciclo==="idle"?`<button onclick="confirmar()" style="width:100%;margin-top:12px;padding:13px 0;background:${cCor}22;border:2px solid ${cCor};border-radius:10px;color:${cCor};font-size:15px;font-weight:900;cursor:pointer;letter-spacing:1px;font-family:sans-serif">▶ CONFIRMAR ENTRADA — ${an.sinal==="P"?"AZUL":"VERMELHO"}${mesa.cautela?`<span style="font-size:11px;opacity:.7;display:block;margin-top:2px">⚠️ Mesa instável — alto risco</span>`:""}

      ${an.tg&&ST.ciclo==="idle"?`<div style="margin-top:10px;padding:8px 12px;border-radius:8px;background:rgba(245,158,11,0.08);border:1px solid #f59e0b44;font-size:11px;color:#f59e0b">🔥 Gatilho Empate · ${an.dt} rod. sem Tie · ${an.tp}x<br><span style="color:#78400a;font-size:10px">Bater = GREEN ✅ · Não bater = neutro</span></div>`:""}

    <!-- INSTRUÇÃO -->
    ${instrucao?`<div style="margin-bottom:10px;padding:10px 14px;border-radius:10px;background:rgba(168,85,247,.1);border:1px solid #a855f755;font-size:13px;color:#c084fc;font-weight:bold;text-align:center">${instrucao}</div>`:""}

    <!-- BOTÕES RESULTADO -->

        <button onclick="reg('P')" style="flex:1;height:58px;background:linear-gradient(135deg,#1e3a8a,#2563eb);border:2px solid #3b82f6;border-radius:12px;color:#fff;cursor:pointer;font-size:15px;font-weight:900;letter-spacing:1px;font-family:sans-serif">AZUL</button>
        <button onclick="reg('B')" style="flex:1;height:58px;background:linear-gradient(135deg,#7f1d1d,#dc2626);border:2px solid #ef4444;border-radius:12px;color:#fff;cursor:pointer;font-size:15px;font-weight:900;letter-spacing:1px;font-family:sans-serif">VERM.</button>
        <button onclick="reg('T')" style="flex:1;height:58px;background:linear-gradient(135deg,#451a03,#b45309);border:2px solid #f59e0b;border-radius:12px;color:#fff;cursor:pointer;font-size:15px;font-weight:900;letter-spacing:1px;font-family:sans-serif">EMPATE</button>

      <button onclick="ST.verde=0;ST.verm=0;resetCiclo();push(ST);render()" style="width:100%;padding:11px 0;background:linear-gradient(135deg,#14532d,#16a34a);border:1px solid #22c55e;border-radius:10px;color:#fff;cursor:pointer;font-size:13px;font-weight:bold;letter-spacing:1px">🏁 FINALIZAR SESSÃO</button>

    </div>
    <div style="height:4px;background:rgba(255,255,255,.05);border-radius:2px;margin-bottom:14px;overflow:hidden"><div style="height:100%;width:${taxa}%;background:linear-gradient(90deg,${rcor}88,${rcor});border-radius:2px;transition:width .6s ease"></div></div>

    <!-- BEAD ROAD -->
    <div style="background:rgba(4,8,20,.85);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:12px;margin-bottom:10px">

    </div>

    <!-- ÚLTIMAS 10 -->

      <div style="display:flex;gap:4px;flex-wrap:wrap">${last10}</div>
    </div>

    <!-- JSON -->
    <div style="background:rgba(4,8,20,.85);border:1px solid rgba(255,255,255,.07);border-radius:12px;margin-bottom:14px;overflow:hidden">
      <div onclick="injOpen=!injOpen;render()" style="padding:12px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:${injOpen?"1px solid rgba(255,255,255,.07)":"none"}">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:30px;height:30px;border-radius:8px;background:rgba(59,130,246,.12);border:1px solid #3b82f633;display:flex;align-items:center;justify-content:center;font-size:16px;color:#60a5fa">↑</div>
          <div><div style="font-size:13px;color:#5090b0;font-weight:bold">INJETAR JSON</div><div style="font-size:10px;color:#1e3a5f">Calibragem · histórico</div></div>
        </div>
        <span style="color:#1e3a5f">${injOpen?"▲":"▼"}</span>
      </div>
      ${injOpen?`<div style="padding:0 14px 14px"><textarea id="injta" oninput="injText=this.value" placeholder="Cole o JSON aqui..." style="width:100%;height:80px;background:rgba(0,0,0,.65);border:1px solid #1e3a5f;border-radius:8px;color:#3a6080;font-size:10px;font-family:monospace;padding:8px;resize:none;outline:none;margin-bottom:8px;line-height:1.5;margin-top:8px">${injText}</textarea><button onclick="aplicarJson()" style="width:100%;padding:10px 0;background:rgba(59,130,246,.12);border:1px solid #3b82f644;border-radius:8px;color:#60a5fa;font-size:13px;letter-spacing:2px;cursor:pointer;font-family:monospace;font-weight:bold">↑ APLICAR</button></div>`:""}
      <div style="height:1px;background:linear-gradient(90deg,transparent,#1e3a5f44,transparent)"></div>
      <div style="display:flex">
        <button onclick="copiar()" style="flex:1;padding:12px 16px;display:flex;align-items:center;gap:10px;background:transparent;border:none;cursor:pointer;text-align:left">
          <div style="width:30px;height:30px;border-radius:8px;background:rgba(34,197,94,.08);border:1px solid #22c55e22;display:flex;align-items:center;justify-content:center;font-size:16px;color:#22c55e">↓</div>
          <div><div style="font-size:13px;color:#3a6a4a;font-weight:bold">COPIAR JSON</div><div style="font-size:10px;color:#0d1e30">Exportar calibragem</div></div>
        </button>
        <button onclick="jsnVis=!jsnVis;render()" style="padding:0 14px;background:transparent;border:none;cursor:pointer;font-size:11px;color:#334155">👁 VER</button>
      </div>
      ${jsnVis?`<div style="padding:0 14px 14px"><textarea readonly onclick="this.select();try{document.execCommand('copy');showAviso('📋 Copiado!');}catch{}" style="width:100%;height:160px;background:rgba(0,0,0,.6);border:1px solid #1e3a5f;border-radius:8px;color:#3a9060;font-size:9px;font-family:monospace;padding:8px;resize:none;outline:none;line-height:1.4;cursor:text">${jsonStr.replace(/</g,"&lt;")}</textarea><div style="font-size:10px;color:#334155;margin-top:4px">Clique para selecionar e copiar</div></div>`:""}
    </div>

    <!-- RODAPÉ -->
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button onclick="if(ST.H.length>0){ST.H=ST.H.slice(0,-1);}resetCiclo();push(ST);render()" style="flex:1;padding:11px 0;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:9px;color:#2d4a6a;font-size:12px;letter-spacing:2px;cursor:pointer;font-family:monospace">↩ DESFAZER</button>
      <button onclick="ST.H=HIST0;ST.verde=0;ST.verm=0;resetCiclo();push(ST);render()" style="flex:1;padding:11px 0;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:9px;color:#2d4a6a;font-size:12px;letter-spacing:2px;cursor:pointer;font-family:monospace">◌ ZERAR</button>
    </div>
    <div style="text-align:center;font-size:9px;color:#0a1828;letter-spacing:4px;margin-top:12px">APP BAC BRU · v4.6 · FIREBASE SYNC · PLACAR AUTOMÁTICO</div>
  </div>
</div>`;
}

// ══ FIREBASE LISTENER — sync em tempo real ═══════════════════════════════════
db.ref(ROOM).on("value", snap => {
  const val = snap.val();
  if(val && val._ts){
    ST.H = val.H || ST.H;
    ST.verde = typeof val.verde==="number" ? val.verde : ST.verde;
    ST.verm = typeof val.verm==="number" ? val.verm : ST.verm;
    ST.ciclo = val.ciclo || "idle";
    ST.sig = val.sig || null;
    ST.galeInfo = val.galeInfo || null;
    ST.recupLado = val.recupLado || null;
    ST.tgAtivo = val.tgAtivo || false;
    render();
  } else {
    render();
  }
});

// Input de soma persiste no render
document.addEventListener("input", e => {
  if(e.target.id==="soma") somaInput = e.target.value;
  if(e.target.id==="injta") injText = e.target.value;
});
</script>
