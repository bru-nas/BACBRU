<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>

<title>BAC BRU v12.5 · MÁQUINA DE GREEN</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#030712;--bg2:#0a1220;--bg3:#0f1828;
  --txt:#e2e8f0;--txt2:#94a3b8;--txt3:#475569;--txt4:#1e293b;
  --blue:#3b82f6;--blue2:#60a5fa;--blue3:rgba(59,130,246,.08);
  --red:#ef4444;--red2:#f87171;--red3:rgba(239,68,68,.08);
  --green:#22c55e;--green2:#4ade80;--green3:rgba(34,197,94,.08);
  --gold:#f59e0b;--gold2:#fbbf24;--gold3:rgba(245,158,11,.08);
  --cyan:#22d3ee;--purple:#a78bfa;
  --border:rgba(255,255,255,.05);--mono:'JetBrains Mono','Courier New',monospace
}
html,body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overscroll-behavior:none;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
button,.card,.stat-v,.cell-b,.cell-r{transition:transform .15s ease,box-shadow .2s ease,background .2s ease,opacity .2s ease}
button:active{transform:scale(.97)}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1a2540;border-radius:2px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(34,197,94,.3)}50%{box-shadow:0 0 16px rgba(34,197,94,.6)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes flashIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pagaPop{0%{transform:scale(.3);opacity:0}40%{transform:scale(1.15);opacity:1}60%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
@keyframes pagaPopBig{0%{transform:scale(.2) rotate(-8deg);opacity:0}35%{transform:scale(1.35) rotate(4deg);opacity:1}55%{transform:scale(.9) rotate(-2deg)}75%{transform:scale(1.08) rotate(1deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes fireGlow{0%,100%{text-shadow:0 0 20px #f59e0b,0 0 40px #ef4444}50%{text-shadow:0 0 40px #fbbf24,0 0 80px #f59e0b}}
@keyframes fireGlowMax{0%,100%{text-shadow:0 0 30px #fbbf24,0 0 60px #f59e0b,0 0 90px #ef4444}50%{text-shadow:0 0 60px #fff,0 0 120px #fbbf24,0 0 180px #f59e0b}}
@keyframes bgPulse{0%,100%{background:radial-gradient(circle at center,rgba(245,158,11,.22),rgba(0,0,0,.93))}50%{background:radial-gradient(circle at center,rgba(245,158,11,.4),rgba(0,0,0,.9))}}
@keyframes bgPulseMax{0%,100%{background:radial-gradient(circle at center,rgba(245,158,11,.35),rgba(0,0,0,.92))}50%{background:radial-gradient(circle at center,rgba(251,191,36,.6),rgba(120,30,10,.9))}}
@keyframes confettiFall{0%{transform:translateY(-110vh) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:.2}}
@keyframes ringBurst{0%{transform:scale(.2);opacity:.9}100%{transform:scale(2.6);opacity:0}}
.paga-overlay{position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;background:radial-gradient(circle at center,rgba(245,158,11,.25),rgba(0,0,0,.92))}
.paga-overlay.lvl1{animation:slideIn .2s}
.paga-overlay.lvl2{animation:slideIn .2s,bgPulse 1s ease infinite}
.paga-overlay.lvl3{animation:slideIn .2s,bgPulseMax .8s ease infinite}
.paga-big{font-size:54px;font-weight:900;font-family:var(--mono);color:#fbbf24;animation:pagaPop .5s ease,fireGlow 1.2s ease infinite;letter-spacing:4px;z-index:2}
.paga-overlay.lvl3 .paga-big{font-size:62px;animation:pagaPopBig .6s ease,fireGlowMax .9s ease infinite}
.paga-x{font-weight:900;font-family:var(--mono);background:linear-gradient(135deg,#fbbf24,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-top:8px;z-index:2}
.paga-overlay.lvl1 .paga-x{font-size:72px;animation:pagaPop .6s ease}
.paga-overlay.lvl2 .paga-x{font-size:96px;animation:pagaPop .6s ease,fireGlow 1.2s ease infinite}
.paga-overlay.lvl3 .paga-x{font-size:120px;animation:pagaPopBig .7s ease,fireGlowMax .9s ease infinite}
.paga-sub{font-size:14px;color:#fbbf24;font-family:var(--mono);letter-spacing:3px;margin-top:14px;animation:slideIn .8s;z-index:2}
.paga-ring{position:absolute;width:200px;height:200px;border:3px solid #fbbf24;border-radius:50%;animation:ringBurst 1s ease-out infinite}
.paga-ring.r2{animation-delay:.35s}
.paga-ring.r3{animation-delay:.7s}
.confetti{position:absolute;top:0;width:10px;height:14px;border-radius:2px;animation:confettiFall linear infinite}
.tg{background:linear-gradient(270deg,#22c55e,#22d3ee,#a78bfa,#22c55e);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 6s ease infinite;font-weight:800;letter-spacing:3px}
.app{max-width:520px;margin:0 auto;padding:14px 12px 80px;min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%,rgba(59,130,246,.05),transparent 60%)}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:0 4px}
.hdr-l{font-size:17px;font-family:var(--mono);font-weight:700;letter-spacing:.5px}
.hdr-r{font-size:9px;color:var(--txt3);font-family:var(--mono);letter-spacing:2px}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;margin-right:5px;vertical-align:middle}
.card{background:linear-gradient(155deg,var(--bg2) 0%,var(--bg3) 100%);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px;animation:slideIn .3s ease;box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 8px 24px -12px rgba(0,0,0,.6);position:relative}
.card::before{content:"";position:absolute;inset:0;border-radius:16px;padding:1px;background:linear-gradient(155deg,rgba(255,255,255,.06),transparent 40%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.sec-lbl{font-size:9px;color:var(--txt3);letter-spacing:3px;font-family:var(--mono);margin-bottom:8px;padding:0 2px}
.input-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:8px}
.btn{padding:13px 0;border:1px solid var(--border);border-radius:10px;font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .15s;color:var(--txt);background:transparent}
.btn:active{transform:scale(.97)}
.btn-p{background:linear-gradient(135deg,rgba(59,130,246,.15),rgba(59,130,246,.05));border-color:rgba(59,130,246,.3);color:var(--blue2)}
.btn-b{background:linear-gradient(135deg,rgba(239,68,68,.15),rgba(239,68,68,.05));border-color:rgba(239,68,68,.3);color:var(--red2)}
.btn-t{background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(245,158,11,.05));border-color:rgba(245,158,11,.3);color:var(--gold2)}
.sum-row{display:flex;gap:7px;margin-top:6px}
.sum-inp{flex:1;padding:11px 13px;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:10px;color:var(--txt);font-family:var(--mono);font-size:13px;outline:none}
.sum-inp:focus{border-color:rgba(34,211,238,.4)}
.sum-lbl{padding:11px 14px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:10px;font-family:var(--mono);font-size:11px;color:var(--txt3);letter-spacing:1px}
/* SIGNAL */
.signal-card{position:relative;overflow:hidden}
.sig-status{font-size:9px;color:var(--txt3);font-family:var(--mono);letter-spacing:3px;margin-bottom:6px}
.sig-main{font-size:32px;font-weight:900;letter-spacing:1px;margin:4px 0;line-height:1.1}
.sig-main.p{color:var(--blue2);text-shadow:0 0 24px rgba(59,130,246,.4)}
.sig-main.b{color:var(--red2);text-shadow:0 0 24px rgba(239,68,68,.4)}
.sig-main.t{color:var(--gold2);text-shadow:0 0 24px rgba(245,158,11,.4)}
.sig-main.w{color:var(--txt3);font-size:24px}
.sig-reason{font-size:11px;color:var(--txt2);font-family:var(--mono);margin-top:8px;line-height:1.5}
.conf-bar{margin-top:12px;height:6px;background:rgba(0,0,0,.4);border-radius:3px;overflow:hidden}
.conf-fill{height:100%;border-radius:3px;transition:width .4s ease}
.conf-txt{display:flex;justify-content:space-between;font-size:10px;color:var(--txt3);font-family:var(--mono);margin-top:6px;letter-spacing:1px}
/* SCORE */
.score-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.score-cell{padding:11px 8px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:9px;text-align:center}
.score-val{font-size:22px;font-weight:800;font-family:var(--mono)}
.score-val.g{color:var(--green2)}.score-val.r{color:var(--red2)}.score-val.y{color:var(--cyan)}
.score-lbl{font-size:8px;color:var(--txt3);letter-spacing:2px;font-family:var(--mono);margin-top:3px}
/* ROADS */
.roads-grid{display:grid;gap:8px}
.road{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:10px;padding:10px;overflow-x:auto}
.road-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.road-name{font-size:10px;color:var(--txt2);font-family:var(--mono);letter-spacing:2px;font-weight:700}
.road-trend{font-size:9px;font-family:var(--mono);padding:2px 7px;border-radius:8px;letter-spacing:1px}
.road-trend.p{color:var(--blue2);background:rgba(59,130,246,.1)}
.road-trend.b{color:var(--red2);background:rgba(239,68,68,.1)}
.road-trend.n{color:var(--txt3);background:rgba(255,255,255,.03)}
.road-board{display:grid;grid-template-rows:repeat(6,12px);grid-auto-flow:column;grid-auto-columns:12px;gap:2px;min-width:max-content}
.cell{width:12px;height:12px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.cell.p{background:radial-gradient(circle at 30% 30%,#60a5fa,#1e40af);box-shadow:0 0 4px rgba(59,130,246,.4)}
.cell.b{background:radial-gradient(circle at 30% 30%,#f87171,#991b1b);box-shadow:0 0 4px rgba(239,68,68,.4)}
.cell.t{background:radial-gradient(circle at 30% 30%,#fcd34d,#92400e);box-shadow:0 0 4px rgba(245,158,11,.4)}
.cell-r{width:12px;height:12px;border-radius:50%;border:2px solid var(--red2)}
.cell-b{width:12px;height:12px;border-radius:50%;border:2px solid var(--blue2)}
.cell-empty{width:12px;height:12px}
/* BEAD ROAD NUMÉRICO */
.bead-grid{display:grid;grid-template-rows:repeat(6,22px);grid-auto-flow:column;grid-auto-columns:22px;gap:2px;min-width:max-content}
.bead{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;line-height:1;font-weight:800;font-family:var(--mono);color:#fff;flex:0 0 auto}
.bead.p{background:radial-gradient(circle at 30% 30%,#60a5fa,#1e40af)}
.bead.b{background:radial-gradient(circle at 30% 30%,#f87171,#991b1b)}
.bead.t{background:radial-gradient(circle at 30% 30%,#fcd34d,#92400e)}
/* PATTERNS BREAKDOWN */
.pat-list{display:grid;gap:6px}
.pat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 11px;background:rgba(0,0,0,.3);border-radius:8px;border-left:3px solid var(--txt4)}
.pat-row.act{border-left-color:var(--green);background:rgba(34,197,94,.05)}
.pat-row.high{border-left-color:var(--cyan);background:rgba(34,211,238,.05)}
.pat-name{font-size:10px;color:var(--txt2);font-family:var(--mono);letter-spacing:1px}
.pat-name.act{color:var(--green2)}
.pat-name.high{color:var(--cyan)}
.pat-conf{font-size:11px;font-family:var(--mono);color:var(--txt2);font-weight:700}
/* TIE */
.tie-card{background:linear-gradient(135deg,rgba(245,158,11,.05),rgba(245,158,11,.02));border-color:rgba(245,158,11,.15)}
.tie-status{font-size:11px;font-family:var(--mono);letter-spacing:1px;margin-bottom:8px}
.tie-status.act{color:var(--gold2)}
.tie-status.idle{color:var(--txt3)}
.tie-pays{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:8px}
.pay-cell{padding:6px 0;text-align:center;background:rgba(0,0,0,.3);border-radius:6px;font-family:var(--mono)}
.pay-num{font-size:10px;color:var(--txt2);font-weight:700}
.pay-pct{font-size:9px;color:var(--txt3);margin-top:1px}
.pay-cell.hot{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3)}
.pay-cell.hot .pay-num{color:var(--gold2)}
/* JSON */
.json-panel{margin-top:10px}
.json-hdr{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:6px 4px}
.json-ttl{font-size:11px;color:var(--txt2);font-family:var(--mono);letter-spacing:2px}
.json-arr{font-size:11px;color:var(--txt3);transition:transform .2s}
.json-body{margin-top:8px}
.json-ta{width:100%;height:140px;padding:10px;background:rgba(0,0,0,.5);border:1px solid var(--border);border-radius:9px;color:#5a9970;font-family:var(--mono);font-size:9px;resize:none;outline:none;line-height:1.4}
.json-ta.view{height:160px;color:#3a9060;cursor:pointer}
.json-btns{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}
.json-btn{padding:11px 0;background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.2);border-radius:9px;color:var(--green2);font-family:var(--mono);font-size:11px;letter-spacing:2px;cursor:pointer;font-weight:700}
.json-btn:active{transform:scale(.97)}
.json-btn.blue{background:rgba(59,130,246,.06);border-color:rgba(59,130,246,.2);color:var(--blue2)}
/* FOOTER */
.foot-btns{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px}
.util-btn{padding:11px 0;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:9px;color:var(--txt3);font-family:var(--mono);font-size:11px;letter-spacing:2px;cursor:pointer}
.util-btn:active{transform:scale(.97)}
.credit{text-align:center;font-size:9px;color:#0a1828;letter-spacing:4px;margin-top:14px;font-family:var(--mono)}
/* CONVERGENCE BADGE */
.conv-badge{display:inline-block;padding:3px 8px;background:linear-gradient(135deg,rgba(167,139,250,.15),rgba(34,211,238,.15));border:1px solid rgba(167,139,250,.3);border-radius:6px;font-size:9px;color:var(--purple);font-family:var(--mono);letter-spacing:1px;margin-left:6px}
/* ENTRY ACTION */
.entry-card{margin-top:8px;padding:11px 13px;background:linear-gradient(135deg,rgba(34,197,94,.08),rgba(34,211,238,.04));border:1px solid rgba(34,197,94,.3);border-radius:10px}
.entry-ttl{font-size:9px;color:var(--green);letter-spacing:2px;font-family:var(--mono);margin-bottom:4px}
.entry-act{font-size:13px;color:var(--txt);font-family:var(--mono);font-weight:700}
.wait-card{margin-top:8px;padding:11px 13px;background:rgba(0,0,0,.3);border:1px dashed var(--border);border-radius:10px;text-align:center}
.wait-act{font-size:11px;color:var(--txt3);font-family:var(--mono);letter-spacing:2px}
/* STATS BAR */
.stats-bar{display:flex;justify-content:space-between;padding:8px 12px;background:linear-gradient(155deg,rgba(10,18,32,.6),rgba(3,7,18,.4));border:1px solid var(--border);border-radius:14px;margin-bottom:10px;box-shadow:0 1px 0 rgba(255,255,255,.05) inset,0 6px 20px -14px rgba(0,0,0,.7)}
.stat{text-align:center;flex:1}
.stat-v{font-size:14px;font-weight:800;font-family:var(--mono);text-shadow:0 0 16px currentColor;letter-spacing:.5px;filter:saturate(1.1)}
.stat-l{font-size:8px;color:var(--txt3);font-family:var(--mono);letter-spacing:2px;margin-top:2px;letter-spacing:1.5px;text-transform:uppercase;opacity:.85}
.stat-v.g{color:var(--green2)}
.stat-v.r{color:var(--red2)}
.stat-v.y{color:var(--cyan)}
</style>

<body>
<div id="root"></div>
<script>
"use strict";

// ════════════════════════════════════════════════════════════════════════════
// FIREBASE · SINCRONIZAÇÃO MULTI-DISPOSITIVO
// ════════════════════════════════════════════════════════════════════════════
firebase.initializeApp({
  apiKey: "AIzaSyBiyeiTk8Kt1ndNOcNxI4b6mcpenZ3KL6A",
  authDomain: "bac-bru.firebaseapp.com",
  databaseURL: "https://bac-bru-default-rtdb.firebaseio.com",
  projectId: "bac-bru",
  storageBucket: "bac-bru.firebasestorage.app",
  messagingSenderId: "469841612189",
  appId: "1:469841612189:web:0b2ba85cde45a7d17c3374"
});
const db = firebase.database();
const ROOM = "bac-bru-sala-1";
const ROOM_REF = db.ref("rooms/" + ROOM);
let SYNC_STATUS = "OFFLINE"; // OFFLINE | CONNECTING | LIVE
let SUPPRESS_PUSH = false;
let _heatPushTimer = null;

// ════════════════════════════════════════════════════════════════════════════
// CONFIG · PESOS APRENDIDOS DA SESSÃO ANTERIOR (rate 84%)
// ════════════════════════════════════════════════════════════════════════════
const DEFAULT_WEIGHTS = {
  PP5: 0.87, PP4: 0.79,
  B22T: 0.81, B22C: 0.76, B31: 0.75,
  C21: 0.62,  // confirmador: sozinho abaixo do min_conf, reforça convergência quando aparece com outros
  SK4Q: 0.81, SK4C: 0.73, SK3Q: 0.80, SK3C: 0.71, SK5C: 0.80,
  RE8: 0.87, RE7: 0.82, RE6: 0.78,
  DOM12: 0.85, ZZ3: 0.75, TIE: 0.70,
  boost_est: 0.07, boost_hi: 0.05, boost_mp: 0.06, boost_dom: 0.04,
  boost_conv2: 0.06, boost_conv3: 0.10, boost_road_align: 0.05,
  min_conf: 0.65, min_conf_cautela: 0.80,
  bias_P: 0, bias_B: 0, stability: 0.92
};

// ════════════════════════════════════════════════════════════════════════════
// ESTADO
// ════════════════════════════════════════════════════════════════════════════
const ST = {
  H: [],
  greens: 0, reds: 0, bonus: 0,
  // PLACAR DETALHADO (categorias separadas):
  pSG: 0,        // green seco · bateu a cor na 1ª entrada
  pG1: 0,        // green no gale · bateu a cor no G1
  pEmp: 0,       // green por empate coberto na entrada (entrada cobre o empate)
  pEmpG1: 0,     // green por empate alto que cobriu durante aguarda_gale
  pEmpDetalhe: {},  // contagem por multiplicador: {"4x":2,"10x":1,...}
  logEntradas: [],  // log de leitura entrada por entrada: {n, padrao, cor, conf, res, via}
  coberturaEmpate: false, // botão admin: quando ligado, empate (qualquer) conta GREEN
  flash: null, // resultado sincronizado p/ assinante: {tipo:'GREEN'|'RED'|'BONUS', txt, t}
  weights: {...DEFAULT_WEIGHTS},
  deltaAcum: {}, countAcum: {},
  sessoes: 0,
  somaIn: "",
  ciclo: "idle", // idle | entrada | gale | recup
  ciclo_lado: null,
  ciclo_sinal: null,
  ciclo_conf: 0,
  ciclo_razao: "",
  ciclo_patterns: [],
  esperaSessao: 0,
  jsonOpen: false, publicado: false, viewOpen: false, injTxt: "",
  toast: "",
  toastT: 0
};

// load from localStorage as fallback first
try{
  const sv = localStorage.getItem("bacbru_v6");
  if(sv){
    const d = JSON.parse(sv);
    Object.assign(ST, d); ST.avisoVisto = true;
  }
}catch(e){}

function save(){
  try{
    const {toast,toastT,jsonOpen,viewOpen,injTxt,somaIn,undoStack,avisoVisto,metaAviso,...keep} = ST;
    localStorage.setItem("bacbru_v6", JSON.stringify(keep));
  }catch(e){}
  // push to Firebase
  pushToFirebase();
}

function pushToFirebase(){
  if(SUPPRESS_PUSH) return;
  const payload = {
    H: ST.H,
    greens: ST.greens,
    reds: ST.reds,
    bonus: ST.bonus || 0,
    coberturaEmpate: !!ST.coberturaEmpate,
    weights: ST.weights,
    deltaAcum: ST.deltaAcum,
    countAcum: ST.countAcum,

function initFirebaseSync(){
  SYNC_STATUS = "CONNECTING";
  // Connection state monitor
  db.ref(".info/connected").on("value", snap => {
    if(snap.val() === true){
      SYNC_STATUS = "LIVE";
    } else {
      SYNC_STATUS = "OFFLINE";
    }
    renderRouter();
  });
  // Real-time listener
  ROOM_REF.on("value", snap => {
    const data = snap.val();
    if(!data) return;
    SUPPRESS_PUSH = true;
    if(Array.isArray(data.H)) ST.H = data.H;
    if(typeof data.greens === "number") ST.greens = data.greens;
    if(typeof data.reds === "number") ST.reds = data.reds;
    if(typeof data.bonus === "number") ST.bonus = data.bonus;
    ST.coberturaEmpate = !!data.coberturaEmpate;
    if(data.weights) ST.weights = {...DEFAULT_WEIGHTS, ...data.weights};
    if(data.deltaAcum) ST.deltaAcum = data.deltaAcum;
    if(data.countAcum) ST.countAcum = data.countAcum;
    if(data.tieAcum) ST.tieAcum = data.tieAcum;
    if(data.modoAcum) ST.modoAcum = data.modoAcum;
    if(typeof data.sessoes === "number") ST.sessoes = data.sessoes;
    if(typeof data.ciclo === "string") ST.ciclo = data.ciclo;
    ST.ciclo_sinal = data.ciclo_sinal || null;
    ST.ciclo_conf = data.ciclo_conf || 0;
    ST.ciclo_razao = data.ciclo_razao || "";
    ST.ciclo_patterns = data.ciclo_patterns || [];
    ST.ciclo_tie = data.ciclo_tie || null;
    ST.ciclo_gale_sinal = data.ciclo_gale_sinal || null;
    ST.ciclo_gale_dec = data.ciclo_gale_dec || null;
    ST.ciclo_gale_tie = data.ciclo_gale_tie || null;
    ST.ciclo_aguarda_count = data.ciclo_aguarda_count || 0;
    ST.sessaoAtiva = !!data.sessaoAtiva;
    ST.esperaSessao = data.esperaSessao || 0;
    // Celebração de empate alto sincronizada: se chegou uma celebração nova, dispara no assinante.
    const novaCelebra = data.celebra || null;
    if(novaCelebra && novaCelebra !== ST.celebra){
      ST.celebra = novaCelebra;
      setTimeout(()=>{ ST.celebra = null; renderRouter(); }, 4500);
    } else if(!novaCelebra){
      ST.celebra = null;
    }
    // Flash de resultado (GREEN/RED/BÔNUS) sincronizado: assinante vê o mesmo que o admin.
    const novoFlash = data.flash || null;
    if(novoFlash && (!ST.flash || novoFlash.t !== ST.flash.t)){
      ST.flash = novoFlash;
      setTimeout(()=>{ ST.flash = null; renderRouter(); }, 1100);
    } else if(!novoFlash){
      ST.flash = null;
    }
    // Aviso de meta/stop sincronizado: se mudou o aviso recebido, reapresenta.
    const novoAviso = data.metaAviso || null;
    const msgAntiga = ST.metaAviso ? ST.metaAviso.msg : null;
    const msgNova = novoAviso ? novoAviso.msg : null;
    if(msgNova !== msgAntiga){
      ST.metaAviso = novoAviso;
      ST.metaAvisoVisto = !!data.metaAvisoVisto;
    }
    SUPPRESS_PUSH = false;
    // Recalcular e publicar heat/hunter se estado mudou (qualquer tela do admin)
    if(isAdmin() || AUTH.view === 'app' || AUTH.view === 'admin'){
      const _a = analyze();
      if(_a.heat) ST._heat = { state: _a.heat.state, score: _a.heat.score };
      if(_a.hunter) ST._hunter = _a.hunter;
      const _hk = (ST._heat?ST._heat.state:'') + '|' + (ST._hunter?ST._hunter.status:'');
      if(_hk !== ST._lastHeatKey){
        ST._lastHeatKey = _hk;
        if(_heatPushTimer) clearTimeout(_heatPushTimer);
        _heatPushTimer = setTimeout(()=>{ pushToFirebase(); }, 300);
      }
    }
    renderRouter();
  }, err => {
    SYNC_STATUS = "OFFLINE";
    renderRouter();
  });
}

// ════════════════════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════════════════════
const coloridas = arr => arr.filter(x=>x.r!=="T");
const last = (arr,n) => arr.slice(-n);
const opos = c => c==="P"?"B":"P";
const lbl = c => c==="P"?"AZUL":c==="B"?"VERMELHO":c==="T"?"EMPATE":"AGUARDA";

function streak(arr){
  if(arr.length===0) return {len:0,side:null};
  let s = arr[arr.length-1].r, c = 1;
  for(let i=arr.length-2;i>=0;i--){
    if(arr[i].r===s) c++;
    else break;
  }
  return {len:c, side:s};
}

function volSoma(arr){
  if(arr.length<2) return 0;
  const ss = arr.map(x=>x.s||0).filter(x=>x>0);
  if(ss.length<2) return 0;
  return Math.max(...ss) - Math.min(...ss);
}

function avgSum(arr){
  const ss = arr.map(x=>x.s||0).filter(x=>x>0);
  if(ss.length===0) return 0;
  return ss.reduce((a,b)=>a+b,0)/ss.length;
}

function deltaSum(arr){
  if(arr.length<2) return 0;
  const ss = arr.map(x=>x.s||0).filter(x=>x>0);
  let d = 0;
  for(let i=1;i<ss.length;i++) d += Math.abs(ss[i]-ss[i-1]);
  return d/(ss.length-1);
}

// ════════════════════════════════════════════════════════════════════════════
// BIG ROAD · derivação de colunas
// ════════════════════════════════════════════════════════════════════════════
function bigRoad(hist){
  const col = [], cur = coloridas(hist);
  let c = -1, r = -1, lastR = null;
  for(const x of cur){
    if(x.r !== lastR){
      c++; r = 0;
      col[c] = [];
    } else {
      if(r < 5){ r++; }
      else { c++; r=0; col[c]=[]; } // dragão > 6 vira coluna nova
    }
    if(!col[c]) col[c] = [];
    col[c][r] = x.r;
    lastR = x.r;
  }
  return col;
}

// BIG EYE BOY · compara coluna atual com 1 anterior
// SMALL ROAD · compara com 2 anteriores
// COCKROACH PIG · compara com 3 anteriores
function derivedRoad(big, offset){
  if(big.length < offset+1) return [];
  const res = [];
  for(let i=offset+1;i<big.length;i++){
    const cur = big[i];
    if(!cur || cur.length===0) continue;
    const prev = big[i-offset];
    if(!prev) continue;
    for(let j=0;j<cur.length;j++){
      // R (red) = padrão estável; B (blue) = padrão muda
      if(j===0){
        // primeira bola da coluna: comparar comprimento da coluna anterior com a coluna-offset anterior
        const colPrev = big[i-1];
        const colPrevOff = big[i-1-offset];
        if(!colPrev || !colPrevOff) continue;
        res.push(colPrev.length === colPrevOff.length ? "R" : "B");
      } else {
        // próximas bolas: tem bola na coluna comparada?
        res.push((prev[j] !== undefined) ? "R" : "B");
      }
    }
  }
  return res;
}

function trendRoad(rd){
  if(rd.length < 3) return {trend:"N", strength:0};
  const last5 = rd.slice(-5);
  const R = last5.filter(x=>x==="R").length;
  const B = last5.length - R;
  if(R >= 4) return {trend:"STABLE", strength:R/last5.length};
  if(B >= 4) return {trend:"VOLATILE", strength:B/last5.length};
  return {trend:"MIX", strength:0.5};
}

// ════════════════════════════════════════════════════════════════════════════
// PERFIS HISTÓRICOS · anti-armadilha (medem QUANDO a mesa costuma quebrar)
// ════════════════════════════════════════════════════════════════════════════
// Mede o histórico de ALTERNÂNCIAS (xadrez P-B-P-B) para saber QUANDO costuma quebrar
// — análogo ao streakProfile, mas para o regime de alternância em vez de repetição.
function altProfile(col){
  if(col.length < 8) return null;
  // mede comprimento de cada sequência de alternância (quantas trocas seguidas)
  const altRuns = [];
  let cur = 1;
  for(let i=1;i<col.length;i++){
    if(col[i].r !== col[i-1].r) cur++;         // alternou → estende a corrente de xadrez
    else { altRuns.push(cur); cur = 1; }        // repetiu → quebrou o xadrez
  }
  altRuns.push(cur);
  const closed = altRuns.slice(0,-1).filter(r=>r>=2); // só correntes de alternância reais
  if(closed.length < 4) return null;
  const sorted=[...closed].sort((a,b)=>a-b);
  const max=Math.max(...closed);
  const avg=closed.reduce((a,b)=>a+b,0)/closed.length;
  const p=q=>sorted[Math.min(sorted.length-1,Math.floor(sorted.length*q))];
  function breakProbAt(L){
    const reached=closed.filter(r=>r>=L).length;
    const broke=closed.filter(r=>r===L).length;
    if(reached===0)return 0.5;
    return broke/reached;
  }
  return { runs:closed, avg, max, p50:p(0.50), p75:p(0.75), p90:p(0.90), count:closed.length, breakProbAt };
}

function streakProfile(col){
  if(col.length < 8) return null;
  const runs = [];
  let cur = 1;
  for(let i=1;i<col.length;i++){
    if(col[i].r === col[i-1].r) cur++;
    else { runs.push(cur); cur = 1; }
  }
  runs.push(cur); // último run em aberto
  const closed = runs.slice(0, -1); // runs finalizados (sabemos onde quebraram)
  if(closed.length < 4) return null;
  const sorted = [...closed].sort((a,b)=>a-b);
  const avg = closed.reduce((a,b)=>a+b,0)/closed.length;
  const max = Math.max(...closed);
  const p = q => sorted[Math.min(sorted.length-1, Math.floor(sorted.length*q))];
  // Distribuição de sobrevivência: dado streak chegou a L, qual % continuou?
  // P(quebra | comprimento atual = L) = (runs que terminaram em L) / (runs que chegaram a L)
  function breakProbAt(L){
    const reached = closed.filter(r=>r>=L).length;
    const broke = closed.filter(r=>r===L).length;
    if(reached === 0) return 0.5;
    return broke / reached;
  }
  return {
    runs: closed, avg, max,
    p50: p(0.50), p75: p(0.75), p90: p(0.90),
    count: closed.length, breakProbAt
  };
}

// Fadiga de padrão: conta quantas vezes seguidas o MESMO regime se repetiu
// (ex.: alternância pura prolongada, ou blocos 2x2 repetidos)
function patternFatigue(col){
  if(col.length < 6) return {regime:"N", repeats:0, fatigued:false};
  const lastN = last(col, 12).map(x=>x.r);
  // detectar regime de alternância
  let altRun = 1;
  for(let i=lastN.length-1;i>0;i--){
    if(lastN[i] !== lastN[i-1]) altRun++;
    else break;
  }
  // detectar regime de blocos 2x2
  let blockRun = 0;
  const r = lastN;
  for(let i=r.length-1;i>=3;i-=2){
    if(r[i]===r[i-1] && r[i-2]===r[i-3] && r[i]!==r[i-2]) blockRun++;
    else break;
  }
  if(altRun >= 8) return {regime:"ALTERNANCIA", repeats:altRun, fatigued:altRun >= 11};
  if(blockRun >= 4) return {regime:"BLOCOS_2x2", repeats:blockRun, fatigued:blockRun >= 6};
  return {regime:"MISTO", repeats:0, fatigued:false};
}

// ════════════════════════════════════════════════════════════════════════════
// LEITURA DO MOMENTO DA MESA · classifica o modo atual e a saúde do padrão.
// NÃO substitui o aprendizado acumulado (deltaAcum/countAcum) — é uma camada
// que afina QUANDO usar cada padrão. Mesa muda → leitura muda.
// ════════════════════════════════════════════════════════════════════════════
function blocosRecentes(col){
  // tamanhos dos blocos de cor (sem tie), ex: BB-PPP-B → [2,3,1]
  const c = col.map(x=>x.r);
  const b=[]; let n=1;
  for(let i=1;i<c.length;i++){ if(c[i]===c[i-1]) n++; else { b.push(n); n=1; } }
  b.push(n); return b;
}
function _modoBruto(col){
  if(col.length < 6) return "DADOS";
  const c = col.map(x=>x.r);
  // streak atual
  let s=1; for(let i=c.length-2;i>=0;i--){ if(c[i]===c[c.length-1]) s++; else break; }
  if(s>=4) return "SURF";
  const b = blocosRecentes(col); const rec = b.slice(-4);
  const r3 = rec.slice(-3), r4 = rec.slice(-4);
  const eq=(a,v)=>a.length>=v.length && JSON.stringify(a.slice(-v.length))===JSON.stringify(v);
  if(r3.length>=3 && r3.every(x=>x===2)) return "2-2";
  if(r3.length>=3 && r3.every(x=>x===3)) return "3-3";
  if(eq(r4,[3,1,3,1])||eq(r4,[1,3,1,3])) return "3-1";
  if(eq(r4,[2,1,2,1])||eq(r4,[1,2,1,2])) return "2-1";
  if(r3.length>=3 && (r3[0]<r3[1]&&r3[1]<r3[2] || r3[0]>r3[1]&&r3[1]>r3[2])) return "ESCADA";
  const w=c.slice(-8); let tr=0; for(let i=1;i<w.length;i++) if(w[i]!==w[i-1]) tr++;
  if(tr>=6) return "PICOTE";
  if(tr<=2) return "SURF";
  return "BAGUNCA";
}
// classificador estável (histerese): só troca de modo após 2 confirmações.
// EXCEÇÃO: SURF entra na hora — um streak de 4+ é inconfundível e perder o
// começo do surf é a maior fonte de oportunidade perdida. Não espera confirmar.
function modoMesa(){
  const col = ST.H.filter(x=>x.r!=='T');
  if(col.length < 6) return {modo:"DADOS", virouAgora:false};
  if(!ST._modoEstado) ST._modoEstado = {modo:"DADOS", pend:null, pc:0};
  const e = ST._modoEstado;
  const mb = _modoBruto(col);
  let virou=false;
  // streak atual (lado dominante da coluna em curso)
  let s=1; for(let i=col.length-2;i>=0;i--){ if(col[i].r===col[col.length-1].r) s++; else break; }
  if(mb === "SURF" && s >= 4 && e.modo !== "SURF"){
    // surf confirmado de imediato — sem histerese
    e.modoAnterior = e.modo; e.modo = "SURF"; e.pend=null; e.pc=0; virou=true;
  } else if(mb===e.modo){ e.pend=null; e.pc=0; }
  else {
    if(mb===e.pend) e.pc++; else { e.pend=mb; e.pc=1; }
    if(e.pc>=2){ e.modoAnterior=e.modo; e.modo=mb; e.pend=null; e.pc=0; virou=true; }
  }
  return {modo:e.modo, virouAgora:virou, anterior:e.modoAnterior||null, streak:s};
}
// LEITURA DO GRÁFICO · mede a ALTURA das colunas recentes da Big Road.
//  · GRÁFICO ALTO = colunas longas (mesa repetindo cor) → critério: SEGUE a cor.
//  · GRÁFICO BAIXO = colunas curtas (mesa picando) → critério: joga a ALTERNÂNCIA.
// É leitura do presente (o que a mesa está fazendo AGORA), não previsão.
function graficoMesa(){
  const big = bigRoad(ST.H);
  if(big.length < 3) return {nivel:"DADOS", alturaMedia:0, colAtual:0};
  // altura das últimas 4 colunas FECHADAS (ignora a coluna em curso para medir tendência)
  const fechadas = big.slice(-5, -1).map(c=>c.length).filter(n=>n>0);
  const alturaMedia = fechadas.length ? fechadas.reduce((a,b)=>a+b,0)/fechadas.length : 0;
  const colAtual = big[big.length-1] ? big[big.length-1].length : 0;
  let nivel;
  if(alturaMedia >= 2.6) nivel = "ALTO";       // colunas longas → mesa repete
  else if(alturaMedia <= 1.6) nivel = "BAIXO"; // colunas curtas → mesa pica
  else nivel = "MEDIO";
  return {nivel, alturaMedia:+alturaMedia.toFixed(1), colAtual};
}

// saúde do padrão dominante: firme / enfraquecendo (somas caindo ou bloco sujo)
function saudePadrao(){
  const col = ST.H.filter(x=>x.r!=='T');
  if(col.length < 6) return {saude:"?", motivo:""};
  const ult = col.slice(-6);
  const somas = ult.map(x=>x.s||0).filter(x=>x>0);
  const m1 = somas.slice(0,3).reduce((a,b)=>a+b,0)/Math.max(1,somas.slice(0,3).length);
  const m2 = somas.slice(-3).reduce((a,b)=>a+b,0)/Math.max(1,somas.slice(-3).length);
  // somas caindo forte = padrão perdendo força
  if(m1-m2 >= 2.5) return {saude:"ENFRAQUECENDO", motivo:"somas caindo ("+m1.toFixed(1)+"→"+m2.toFixed(1)+")"};
  return {saude:"FIRME", motivo:""};
}

// ════════════════════════════════════════════════════════════════════════════
// FAREJADOR DE EMPATES · estuda TODO o histórico de ties
// Detecta janela de empate ABERTA / QUENTE / FECHADA / PASSOU
// ════════════════════════════════════════════════════════════════════════════
function payoutDaSoma(s){
  if(s===2||s===12) return "88x";
  if(s===3||s===11) return "25x";
  if(s===4||s===10) return "10x";
  if(s===5||s===9) return "6x";
  return "4x"; // 6,7,8
}

function tieHunter(H, heatScore){
  const res = {
    status:"DADOS", conf:0, msg:"Coletando histórico...",
    dist:0, avgGap:0, maxGap:0, ties15:0, ties30:0,
    payoutProvavel:null, ultimosPay:[], cluster:false, atrasado:false,
    echo:false, echoRate:0, echoMsg:""
  };
  if(H.length < 12) return res;

  // índices de todos os empates
  const tieIdx = [];
  H.forEach((x,i)=>{ if(x.r==="T") tieIdx.push(i); });

  // gaps entre empates
  const gaps = [];
  for(let i=1;i<tieIdx.length;i++) gaps.push(tieIdx[i]-tieIdx[i-1]);
  res.avgGap = gaps.length ? gaps.reduce((a,b)=>a+b,0)/gaps.length : 12;
  res.maxGap = gaps.length ? Math.max(...gaps) : 0;

  // ── PADRÃO DE ECO · empates que vêm na quina um do outro ──
  // Quantos % dos empates vieram a ≤3 rodadas do empate anterior?
  // Classificações: DUPLO (gap=1) · SANDWICH (gap=2) · QUINA (gap=3)
  res.echoTipos = { duplo:0, sandwich:0, quina:0 };
  if(gaps.length >= 2){
    res.echoTipos.duplo = gaps.filter(g=>g===1).length;
    res.echoTipos.sandwich = gaps.filter(g=>g===2).length;
    res.echoTipos.quina = gaps.filter(g=>g===3).length;
    const echoGaps = res.echoTipos.duplo + res.echoTipos.sandwich + res.echoTipos.quina;
    res.echoRate = echoGaps / gaps.length;
    res.echo = res.echoRate >= 0.30;
    // tipo predominante
    const tipos = res.echoTipos;
    res.echoTipoPredom = tipos.duplo >= tipos.sandwich && tipos.duplo >= tipos.quina ? "DUPLO"
                       : tipos.sandwich >= tipos.quina ? "SANDWICH" : "QUINA";
  }

  // distância desde o último empate
  const lastTie = tieIdx.length ? tieIdx[tieIdx.length-1] : -1;
  res.dist = lastTie >= 0 ? (H.length - 1 - lastTie) : H.length;

  // densidades
  res.ties15 = last(H,15).filter(x=>x.r==="T").length;
  res.ties30 = last(H,30).filter(x=>x.r==="T").length;
  const ties5 = last(H,5).filter(x=>x.r==="T").length;
  const ties8 = last(H,8).filter(x=>x.r==="T").length;

  // payouts dos últimos empates
  res.ultimosPay = tieIdx.slice(-5).map(i=>({s:H[i].s, pay:payoutDaSoma(H[i].s)}));

  // ── Previsão de payout pela soma recente ──
  const col = H.filter(x=>x.r!=="T");
  const last6sum = last(col,6).map(x=>x.s||0).filter(x=>x>0);
  const avg6 = last6sum.length ? last6sum.reduce((a,b)=>a+b,0)/last6sum.length : 7;
  const extremos = last6sum.filter(s=>s<=4 || s>=10).length;
  if(extremos >= 3){
    res.payoutProvavel = avg6 <= 4.5 || avg6 >= 10.5 ? "25x-88x" : "10x";
  } else if(avg6 <= 5.5 || avg6 >= 9.5){
    res.payoutProvavel = "6x-10x";
  } else {
    res.payoutProvavel = "4x";
  }

  res.cluster = ties5 >= 2 || ties8 >= 3;
  res.atrasado = res.dist >= res.avgGap;
  const mesaFria = heatScore !== undefined && heatScore < 48;

  // ── ECO ATIVO: empate há 1-3 rodadas + mesa que ecoa → outro empate na quina ──
  if(res.echo && res.dist >= 1 && res.dist <= 3 && ties5 < 3){
    res.status = "ECO";
    const tipo = res.echoTipoPredom || "QUINA";
    res.echoMsg = `Mesa de eco · ${(res.echoRate*100).toFixed(0)}% dos empates vêm coladinhos · padrão predominante: ${tipo}`;
    const ondePos = res.dist === 1 ? "DUPLO (back-to-back)" : res.dist === 2 ? "SANDWICH (cor entre dois empates)" : "na QUINA (próximo)";
    res.msg = `Empate há ${res.dist} rodada(s) · outro pode vir ${ondePos}`;
    res.conf = Math.min(0.85, 0.55 + res.echoRate*0.4 + (res.dist === 1 ? 0.05 : 0));
    // REFORÇO P/ QUEM COBRE: se as somas recentes apontam empate ALTO (10x+),
    // a cobertura vale muito mais → sobe a confiança e marca como alvo bom.
    if(res.payoutProvavel && (res.payoutProvavel.indexOf("25x") >= 0 || res.payoutProvavel.indexOf("88x") >= 0)){
      res.conf = Math.min(0.92, res.conf + 0.07);
      res.altoValor = true;
      res.msg += ` · 💰 payout provável ${res.payoutProvavel} (cobertura vale mais)`;
    } else if(res.payoutProvavel && res.payoutProvavel.indexOf("10x") >= 0){
      res.conf = Math.min(0.90, res.conf + 0.04);
      res.altoValor = true;
    }
    return res;
  }

  // ── Estados normais ──
  // REFINAMENTO (baseado em medição real): o farejador só acende onde há edge
  // de verdade — ECO (acima) e CLUSTER recente (~13-14% de acerto vs 10% do acaso).
  // Estados por ATRASO (antes QUENTE/ABERTA) previam 8-11% — igual ou abaixo do
  // acaso — então NÃO acendem mais: viram FECHADA. Empate é quase puro acaso;
  // prometer "iminente" por atraso seria enganar. Melhor ficar quieto.
  if(res.cluster){
    // cluster recente é o único "atrasado" com leve edge → acende como ABERTA leve
    res.status = "ABERTA";
    res.msg = `Cluster de empates (${ties8}/8 rodadas) · mesa ecoando empate · leve tendência`;
    res.conf = 0.55;
    // mesa carregada de empate = oportunidade de cobertura; se payout provável alto, reforça
    if(res.payoutProvavel && (res.payoutProvavel.indexOf("25x")>=0 || res.payoutProvavel.indexOf("88x")>=0)){
      res.conf = Math.min(0.88, res.conf + 0.07); res.altoValor = true;
      res.msg += ` · 💰 ${res.payoutProvavel}`;
    } else if(res.payoutProvavel && res.payoutProvavel.indexOf("10x")>=0){
      res.conf = Math.min(0.85, res.conf + 0.04); res.altoValor = true;
    }
  } else if(mesaFria && res.ties15 >= 3){
    // mesa muito fria com vários empates recentes → leve zona de eco
    res.status = "ABERTA";
    res.msg = `Mesa fria + ${res.ties15} empates/15 · zona de eco`;
    res.conf = 0.52;
  } else {
    // todo o resto (inclusive atraso) → FECHADA. Sem edge real, não acende.
    res.status = "FECHADA";
    res.msg = `Sem padrão de empate confiável agora · ${res.dist} rodada(s) desde o último`;
    res.conf = 0;
  }

  return res;
}

// ════════════════════════════════════════════════════════════════════════════
// MOTOR NEURAL · análise completa
// ════════════════════════════════════════════════════════════════════════════


// ════════════════════════════════════════════════════════════════════════
// LEITURA POR REGIME · o motor identifica o momento da mesa e usa os padrões
// que funcionam NAQUELE regime. Mesa muda → leitura muda (surfa junto).
// Mapa padrão|regime construído das sessões (validado leave-one-out: +76 líquido,
// entradas extras 83% green). Refina conforme novas sessões acumulam.
// ════════════════════════════════════════════════════════════════════════
const _MAPA_REGIME = {"ESC|TEND": 68, "ESC|MISTA": 82, "PP4|MISTA": 78, "PP4|PICOTE": 83, "RE6|MISTA": 100, "B22C|MISTA": 85, "B22T|MISTA": 71, "P22|MISTA": 82, "ESCD|MISTA": 75, "DOM12|MISTA": 75, "B22T|TEND": 100, "SK3Q|MISTA": 80};
function regimeAtual(){
  // lê o momento da mesa pelas últimas 8 cores (sem tie): tendência/mista/picote
  const col = ST.H.filter(x=>x.r!=='T');
  if(col.length < 8) return 'MISTA';
  const u = col.slice(-8);
  let trocas=0; for(let i=1;i<u.length;i++) if(u[i].r!==u[i-1].r) trocas++;
  return trocas<=2 ? 'TEND' : trocas>=6 ? 'PICOTE' : 'MISTA';
}
function padraoForteNoRegime(patterns, regime){
  // retorna {sig, name, taxa} do padrão candidato que é forte (>=68%) no regime atual
  if(!patterns) return null;
  const cands = patterns.filter(p=>p.sig==='P'||p.sig==='B');
  let melhor=null;
  for(const c of cands){
    const taxa = _MAPA_REGIME[c.name+'|'+regime];
    if(taxa!==undefined && taxa>=68){
      if(!melhor || taxa>melhor.taxa) melhor={sig:c.sig, name:c.name, taxa};
    }
  }
  return melhor;
}

function analyze(){
  const W = ST.weights;
  const col = coloridas(ST.H);
  const out = {
    signal:null, conf:0, reason:"Aguardando dados", patterns:[],
    convergence:0, derivedAlign:0, tie:{active:false,payout:null,dt:null,mp:false,probs:{}},
    distrib:{P:0,B:0,T:0}, sumAvg:0, sumDelta:0, dominancia:"N", padrao:""
  };

  if(ST.H.length < 4){ return out; }

  // Distribuição
  const tot = ST.H.length;
  ST.H.forEach(x=>{out.distrib[x.r]++;});
  out.distrib.P = Math.round(100*out.distrib.P/tot);
  out.distrib.B = Math.round(100*out.distrib.B/tot);
  out.distrib.T = Math.round(100*out.distrib.T/tot);

  // Soma stats
  const last15c = last(col, 15);
  out.sumAvg = avgSum(last15c);
  out.sumDelta = deltaSum(last(col,6));

  // Dominância
  const last20 = last(col,20);
  const P20 = last20.filter(x=>x.r==="P").length;
  const B20 = last20.filter(x=>x.r==="B").length;
  if(P20/last20.length >= 0.65) out.dominancia = "PLAYER";
  else if(B20/last20.length >= 0.65) out.dominancia = "BANKER";
  else out.dominancia = "BALANCEADO";

  // ── TIE ANALYSIS ──
  const last15 = last(ST.H, 15);
  const ties15 = last15.filter(x=>x.r==="T").length;
  out.tie.mp = ties15/15 >= 0.10;
  let dt = 0;
  for(let i=ST.H.length-1;i>=0;i--){ if(ST.H[i].r==="T"){dt = ST.H.length-1-i; break;} dt++; }
  out.tie.dt = dt;
  const avg6 = avgSum(last(col,6));
  const sumExt = avg6 <= 5.5 || avg6 >= 10.5;
  out.tie.active = out.tie.mp && (dt >= 8 || sumExt);
  out.tie.probs = {
    "88x_2_12": Math.min(8, ties15*1.5),
    "25x_3_11": Math.min(15, ties15*2),
    "10x_4_10": Math.min(18, ties15*2.5),
    "6x_5_9": Math.min(22, ties15*3),
    "4x_6_8": Math.min(30, ties15*4)
  };
  if(avg6 <= 5.5) out.tie.payout = avg6 <= 3.5 ? "88x" : "10x";
  else if(avg6 >= 10.5) out.tie.payout = avg6 >= 11.5 ? "88x" : "10x";
  else if(avg6 >= 8 && avg6 <= 9) out.tie.payout = "6x";
  else out.tie.payout = "4x";

  // ── PADRÕES ──
  const c4 = last(col, 4);
  const c5 = last(col, 5);
  const c8 = last(col, 8);
  const stab = out.sumDelta < 1.5;
  const high = out.sumAvg >= 9.5;
  const boostS = stab ? W.boost_est : 0;
  const boostH = high ? W.boost_hi : 0;
  const boostM = out.tie.mp ? W.boost_mp : 0;
  const boostD = out.dominancia !== "BALANCEADO" ? W.boost_dom : 0;
  const totalBoost = boostS + boostH + boostM + boostD;

  const patterns = [];
  function add(name, sig, base, reason, hi=false){
    let conf = Math.min(0.95, (base * fatorAprendido(name) * fatorModo(name)) + totalBoost);
    if(sig === "P") conf += W.bias_P;
    if(sig === "B") conf += W.bias_B;
    conf = Math.max(0, Math.min(0.95, conf));
    patterns.push({name, sig, conf, reason, hi});
  }

  // PING_PONG_5 — 5 alternadas estritas
  if(c5.length === 5){
    let pp5 = true;
    for(let i=1;i<5;i++) if(c5[i].r === c5[i-1].r){pp5=false;break;}
    if(pp5) add("PP5", opos(c5[4].r), W.PP5, "Ping-pong 5 ciclos · alternância pura", true);
  }

  // PING_PONG_4
  if(c4.length === 4 && !patterns.find(p=>p.name==="PP5")){
    let pp4 = true;
    for(let i=1;i<4;i++) if(c4[i].r === c4[i-1].r){pp4=false;break;}
    if(pp4) add("PP4", opos(c4[3].r), W.PP4, "Ping-pong 4 ciclos");
  }

  // BLOCO_2x2_TROCA · [A,A,B,B]
  if(c4.length === 4){
    if(c4[0].r === c4[1].r && c4[2].r === c4[3].r && c4[0].r !== c4[2].r){
      add("B22T", opos(c4[3].r), W.B22T, "Bloco 2×2 troca · próximo par muda", true);
    }
    // BLOCO_2x2_CONT · [X,A,A,?] — par formado, próxima é A novamente? regra: continuar o par
    // Aqui interpreto como últimas 3 = [X,A,A] e prevê A novamente para formar bloco
    if(c4.length >= 3){
      const c3 = last(col,3);
      if(c3[1].r === c3[2].r && c3[0].r !== c3[1].r){
        add("B22C", c3[2].r, W.B22C, "Bloco 2×2 continuação · par incompleto");
      }
    }
    // BLOCO_3_1 · bloco REAL de 3 + isolado de 1 → volta da cor do bloco de 3
    // Validado: por bloco real = 100% (11/11); por janela de 4 era só 51%.
    // Usa blocos reais (não as últimas 4 jogadas) pra identificar com precisão.
    (function(){
      const _bl=[];
      if(col.length){let cs=col[0].r,cl=1;for(let z=1;z<col.length;z++){if(col[z].r===cs)cl++;else{_bl.push({s:cs,l:cl});cs=col[z].r;cl=1;}}_bl.push({s:cs,l:cl});}
      if(_bl.length>=2){
        const _u=_bl[_bl.length-1], _a=_bl[_bl.length-2];
        // bloco anterior exatamente 3, atual isolado de 1 da cor oposta → volta cor do 3
        if(_a.l===3 && _u.l===1 && _u.s!==_a.s){
          add("B31", _a.s, W.B31+0.04, "Bloco 3-1 · isolado após trinca → volta "+_a.s, true);
        }
      }
    })();
  }

  // ════════════════════════════════════════════════════════════════════════
  // CICLO 2-1 (DOIS-UM) · padrão XXY XXY repetido (ex.: B B P B B P B B P ...)
  // O motor antes confundia isso com Zigzag e entrava na quebra. Agora segue o ciclo.
  // Detecta o ciclo nas últimas 6-9 jogadas e prevê a próxima conforme a posição.
  // ════════════════════════════════════════════════════════════════════════
  const c9 = last(col, 9);
  function detecta21(seq){
    if(seq.length < 7) return null; // precisa de margem pra confirmar 2 ciclos
    const r = seq.map(x=>x.r);
    const n = r.length;
    // Testa as 3 fases de um ciclo de período 3 do tipo XXY (par + ímpar).
    // Para cada fase, verifica se TODA a sequência (de trás pra frente) bate
    // com o molde XXY repetido, e então prevê a próxima posição.
    for(let fase=0; fase<3; fase++){
      let ok=true, lado=null, casados=0;
      // posição dentro do ciclo: (índice - fase) mod 3 → 0,1 = par(X) · 2 = ímpar(Y)
      for(let i=n-1; i>=0; i--){
        const posCiclo = (((i - fase) % 3) + 3) % 3;
        const ehPar = (posCiclo === 0 || posCiclo === 1); // deve ser X
        if(lado===null){
          // estabelece o lado X a partir de uma posição de par
          if(ehPar) lado = r[i];
          else { /* posição ímpar: lado Y = oposto, definimos depois */ }
        }
        if(lado!==null){
          const esperado = ehPar ? lado : opos(lado);
          if(r[i] === esperado){ casados++; }
          else { ok = (n-1-i) >= 6; break; } // tolera divergência só bem no começo (≥6 casados)
        }
      }
      if(ok && lado && casados >= 6){
        // prevê a próxima: posição n no ciclo
        const posProx = (((n - fase) % 3) + 3) % 3;
        const ehParProx = (posProx === 0 || posProx === 1);
        const prox = ehParProx ? lado : opos(lado);
        return {sig:prox, ciclos:Math.floor(casados/3), lado};
      }
    }
    return null;
  }
  const ciclo21 = detecta21(c9);
  if(ciclo21){
    // Detectado de forma INDEPENDENTE, como qualquer outro padrão.
    // Peso inicial neutro · o aprendizado (fatorAprendido) ajusta sozinho ao longo das sessões.
    // NÃO remove o zigzag nem nenhum outro — todos concorrem em pé de igualdade.
    add("C21", ciclo21.sig, W.C21 || 0.68, `Ciclo 2-1 (dois-um) · ${ciclo21.ciclos} ciclos`);
  }

  // ════════════════════════════════════════════════════════════════════════
  // STREAK · com PERFIL HISTÓRICO (anti-armadilha)
  // ════════════════════════════════════════════════════════════════════════
  const st = streak(col);
  const prof = streakProfile(col);
  out.streakLen = st.len;
  out.streakSide = st.side;
  out.profile = prof;

  // Zona estatística de quebra: quando a mesa COSTUMA quebrar
  let breakZone = null, breakProb = 0.5, premature = false, danger = false;
  if(prof && st.len >= 2){
    breakProb = prof.breakProbAt(st.len);
    // Zona de quebra amarrada ao MÁXIMO histórico, não ao p75.
    // Se a mesa estica até 8, uma streak de 3-4 é CONTINUAÇÃO, não quebra.
    // Segue continuação enquanto < 70% do máximo; só vira quebra perto do teto.
    const teto = prof.max || prof.p90 || 6;
    const zonaQuebra = Math.max(prof.p75, Math.ceil(teto * 0.7));
    premature = st.len < zonaQuebra;
    breakZone = st.len >= zonaQuebra && st.len < teto;
    danger = st.len >= prof.p90;
  }

  if(st.len === 4){
    const v4 = volSoma(last(col,4));
    if(prof && premature){
      // mesa costuma esticar mais → NÃO bater quebra ainda; favorece continuação
      add("SK4C", st.side, W.SK4C * 0.92, `Streak 4 ${st.side} · mesa estica até ~${prof.p75} → continuar`);
    } else if(prof && breakZone){
      // zona de quebra confirmada pelo histórico
      const conf = v4 >= 3 ? W.SK4Q + 0.04 : W.SK4Q;
      add("SK4Q", opos(st.side), conf, `Streak 4 ${st.side} · zona de quebra (hist p75=${prof.p75}) vol${v4}`, true);
    } else {
      // neutro
      if(v4 >= 3) add("SK4Q", opos(st.side), W.SK4Q, `Streak 4 ${st.side} + volatilidade ${v4}`, true);
      else add("SK4C", st.side, W.SK4C, `Streak 4 ${st.side} estável → continuar`);
    }
  } else if(st.len === 3){
    const v3 = volSoma(last(col,3));
    if(prof && premature){
      add("SK3C", st.side, W.SK3C, `Streak 3 ${st.side} · ainda curto p/ mesa → continuar`);
    } else if(prof && breakZone){
      add("SK3Q", opos(st.side), W.SK3Q + 0.03, `Streak 3 ${st.side} · zona de quebra (hist) vol${v3}`);
    } else {
      if(v3 >= 3) add("SK3Q", opos(st.side), W.SK3Q, `Streak 3 ${st.side} + volatilidade ${v3}`);
      else add("SK3C", st.side, W.SK3C, `Streak 3 ${st.side} estável → continuar`);
    }
  } else if(st.len >= 5){
    const teto = prof ? (prof.max || prof.p90 || 7) : 7;
    const zonaPerigo = prof ? prof.p90 : 6;
    if(prof && st.len < Math.ceil(teto * 0.75) && st.len < zonaPerigo){
      // Streak forte ainda na zona SAUDÁVEL (longe do máximo) → SEGUE a continuação.
      // É o "padrão super forte no meio" que o operador quer pegar.
      add("SK5C", st.side, Math.min(0.88, W.SK4C + 0.05), `Streak ${st.len} ${st.side} forte · mesa estica até ${teto} → continuar`, true);
    } else if(prof && st.len < prof.max && st.len < zonaPerigo){
      // chegando perto mas ainda não no perigo → continua mas sem reforço
      add("SK5C", st.side, W.SK4C, `Streak ${st.len} ${st.side} · ainda dentro do range → continuar`);
    } else {
      // zona de perigo / no máximo → PARAR (não perseguir continuação nem quebra)
      out.exaustao = true;
      out.exaustaoMotivo = `Streak ${st.len} ${st.side} · zona de perigo (hist máx ${prof?prof.max:'?'}) · PARAR`;
    }
  }

  // ── LEITURA DE TENDÊNCIA DA MESA (usada pelos padrões aproximados e pelo FLX) ──
  (function(){
    const u12 = col.slice(-12);
    out.tendenciaTrocas = null;
    out.emTendencia = false;
    out.nBlocos12 = null;
    out.mesaLimpa = false;     // 1-4 blocos = padrão real / tendência clara
    out.mesaPicotada = false;  // 5-7 blocos = picote (padrão vale menos)
    if(u12.length >= 10){
      let trocas = 0;
      for(let z=1; z<u12.length; z++) if(u12[z].r !== u12[z-1].r) trocas++;
      out.tendenciaTrocas = trocas;
      out.emTendencia = trocas <= 4;
      // nº de blocos = trocas + 1
      const nb = trocas + 1;
      out.nBlocos12 = nb;
      out.mesaLimpa = nb <= 4;
      out.mesaPicotada = nb >= 5 && nb <= 7;
    }
  })();

  // ══════════════════════════════════════════════════════════════════════
  // PADRÕES DE BLOCO — cada um com assinatura distinta (não se atropelam)
  // Validados estatisticamente nos históricos acumulados.
  // ══════════════════════════════════════════════════════════════════════
  (function(){
    // monta blocos reais (comprimento de cada coluna, sem teto)
    const bl = [];
    if(col.length){
      let cs = col[0].r, cl = 1;
      for(let i=1;i<col.length;i++){ if(col[i].r===cs) cl++; else { bl.push({side:cs,len:cl}); cs=col[i].r; cl=1; } }
      bl.push({side:cs,len:cl});
    }
    if(bl.length < 2) return;
    const ult = bl[bl.length-1];   // bloco em formação
    const ant = bl[bl.length-2];   // bloco anterior fechado

    // dominância nas últimas 12 jogadas (filtro de segurança)
    function domDe(side){ return col.slice(-13,-1).filter(x=>x.r===side).length; }

    // ── 1) ESCADA DECRESCENTE ALTERNADA · 5B1P 4B1P 3B1P 2B1P (ou 4P3B2P1B) ──
    // Blocos da cor dominante DIMINUINDO, separados por isolados de 1 da outra cor.
    // Entrada: quando o isolado sai, a dominante volta (controle mantido enquanto decresce).
    if(bl.length >= 5 && ult.len === 1){
      const d = [bl[bl.length-2], bl[bl.length-4], bl[bl.length-6]].filter(Boolean);
      if(d.length === 3 && d[0].side===d[1].side && d[1].side===d[2].side){
        // d[0] mais recente, d[2] mais antigo → decrescente significa d[2]>d[1]>d[0]
        // estrita OU aproximada (1 degrau igual) quando a mesa está em tendência
        const decrEstrita = d[2].len > d[1].len && d[1].len > d[0].len;
        const decrAprox = out.emTendencia && (d[2].len >= d[1].len && d[1].len >= d[0].len && d[2].len > d[0].len);
        const decr = decrEstrita || decrAprox;
        const isolados = bl[bl.length-3].len===1 && bl[bl.length-5].len===1;
        if(decr && isolados && ult.side!==d[0].side){
          add("ESCD", d[0].side, 0.87, `Escada decrescente · ${d[2].side}${d[2].len}→${d[1].len}→${d[0].len} alternada → volta ${d[0].side}`, true);
          return; // padrão forte e específico identificado, não mistura com outros
        }
      }
    }

    // ── 1b) ESCADA CRESCENTE · blocos da dominante CRESCENDO entre isolados → continua ──
    // Validado: 60% (15/25). Ex: 2B 1P 3B 1P 4B... a banca cresce e mantém controle.
    // Dispara quando o bloco atual da dominante é MAIOR que o anterior da mesma cor.
    if(bl.length >= 3){
      const _b2=bl[bl.length-3], _iso=bl[bl.length-2], _atual=bl[bl.length-1];
      const _cresceOk = _atual.l>_b2.l || (out.emTendencia && _atual.l===_b2.l && _atual.l>=2);
      if(_b2.s===_atual.s && _iso.l===1 && _iso.s!==_atual.s && _cresceOk && _atual.l>=2){
        add("ESCC", _atual.s, 0.80, `Escada crescente · ${_atual.s}${_b2.l}→${_atual.l} entre isolados → continua ${_atual.s}`, true);
        return;
      }
    }

    // ── 2) ESCADA SIMPLES · bloco + isolado + DOMINÂNCIA forte → volta dominante (88%) ──
    if(ult.len === 1 && ant.side !== ult.side && ant.len >= 2){
      const nDom = domDe(ant.side);
      if(nDom >= 8){
        const conf = ant.len === 2 ? 0.86 : 0.82;
        add("ESC", ant.side, conf, `Volta dominante · ${ant.side}${ant.len} + isolado · dom ${nDom}/12 → ${ant.side}`, true);
        return;
      }
    }

    // ── 3) PADRÃO 2-2 · após dois blocos de 2 alternados, o 2º tende a ESTICAR ──
    // Validado: depois de 2-2 (ex BB PP), a próxima carta CONTINUA a cor do 2º bloco
    // em 78% (vira PPP). NÃO volta pro 1º (isso dava só 22%).
    // Gatilho no momento certo: os dois blocos de 2 fecharam e o 2º bloco acabou de
    // virar o atual em formação — aposta que ele estica.
    if(bl.length >= 2){
      const b1 = bl[bl.length-2], b2 = bl[bl.length-1];
      // b1 foi bloco de 2 fechado; b2 é o bloco atual que começou com 1 ou 2 da cor oposta
      if(b1.len===2 && b2.len<=2 && b1.side!==b2.side){
        // procurar o bloco antes de b1 pra confirmar o ritmo 2-2
        const b0 = bl.length>=3 ? bl[bl.length-3] : null;
        if(b0 && b0.len===2 && b0.side!==b1.side){
          // ritmo 2-2-... confirmado (b0=2, b1=2) → aposta continuação do bloco atual (b2)
          add("P22", b2.side, 0.82, `Padrão 2-2 · ${b0.side}2 ${b1.side}2 → ${b2.side} estica`, true);
          return;
        }
      }
    }

    // ── 4) PADRÃO 2-1-2-1 · blocos alternando 2 e 1 → mantém o ritmo ──
    // Validado: depois de 2,1,2,1 o próximo quebra o bloco de 2 (vira 1). Aposta na alternância.
    if(bl.length >= 4){
      const q = bl.slice(-4); // [2,1,2,1] esperado
      if(q[0].len===2 && q[1].len===1 && q[2].len===2 && q[3].len===1){
        // ritmo 2-1 confirmado → próximo bloco começa cor de q[2] (oposta a q[3])
        add("P21", q[2].side, 0.82, `Padrão 2-1-2-1 · ritmo alternado → ${q[2].side}`, true);
        return;
      }
    }
  })();

  // ── FLUXO DE TENDÊNCIA (denominador comum · validado na base completa) ──
  // Mesa em TENDÊNCIA = <=4 trocas de cor nas últimas 12 jogadas coloridas.
  // Tendência + já repetindo (streak>=2) → SEGUIR o fluxo: 58.4% (n=197, ±7.1) na
  // base de 1158 rodadas. Com streak>=3: 58.9% (n=129). É a essência comum de
  // surf/escada/dominante — pega o padrão mesmo quando o formato exato não fecha.
  (function(){
    if(!out.emTendencia) return;
    const stx = streak(col);
    // ANÁLISE SÊNIOR (base 1308): em tendência, streak 2-3 segue (56-60%), 5+ forte (69%),
    // mas streak 4 é ZONA DE QUEBRA (39%) → o fluxo PULA o streak 4.
    // FLX DESLIGADO · deu 38% na operação real (73 sessões). O backtest enganou:
    // otimizado pro passado, falhou ao vivo. Removido pra não sangrar.
    // (mantém o cálculo de emTendencia/mesaLimpa que outros padrões usam)
    if(false && stx.len >= 2){
      const conf = stx.len >= 5 ? 0.84 : (stx.len === 3 ? 0.81 : 0.78);
      add("FLX", stx.side, conf, `Fluxo · ${stx.len} ${stx.side}`, stx.len>=3);
    }
  })();

  // ── 5) SURF SEGURO · streak >=5 (ANÁLISE SÊNIOR · base 1308 rodadas) ──
  // CORREÇÃO baseada em toda a base: streak 5+ continua 61% (SEGUE de verdade);
  // streak 4 continua só 42% (QUEBRA — não vale entrar). Por isso exige 5+.
  (function(){
    const stx = streak(col);
    // ANÁLISE (base 1308+71): surf no streak 5 sangra (líq -7); a partir de 6 vira
    // positivo (líq +6) e 7+ é ouro (líq +25). Por isso só entra de 6 em diante.
    // SURF conservador · só streak longo (6+) E somas bem convergindo (vol<=3).
    // Surf reformado deu 31% real; volto ao critério estrito que não sangra.
    if(stx.len >= 6){
      const janela = last(col, stx.len).map(x=>x.s||0).filter(x=>x>0);
      if(janela.length >= 4){
        const vol = Math.max(...janela) - Math.min(...janela);
        if(vol <= 3){
          add("SURF", stx.side, vol<=2 ? 0.86 : 0.83, `Surf · ${stx.len} ${stx.side} seguidas → seguir`, true);
          out.exaustao = false; out.exaustaoMotivo = null;
        }
      }
    }
  })();;

  // ── PADRÃO PAGANTE MADURO · fadiga de regime ──
  const fatigue = patternFatigue(col);
  out.fatigue = fatigue;
  if(fatigue.fatigued){
    // regime pagante repetiu demais → prestes a quebrar → bloquear novas entradas
    out.regimeFatigado = true;
    out.regimeMotivo = `${fatigue.regime} repetiu ${fatigue.repeats}× · padrão maduro, risco de quebra`;
  }

  // REEQUILÍBRIO 6/7/8 de 8
  if(c8.length === 8){
    const P8 = c8.filter(x=>x.r==="P").length;
    const B8 = 8 - P8;
    if(P8 >= 8) add("RE8", "B", W.RE8, "Reequilíbrio máximo · P=8/8", true);
    else if(P8 >= 7) add("RE7", "B", W.RE7, `Reequilíbrio forte · P=${P8}/8`);
    else if(P8 >= 6) add("RE6", "B", W.RE6, `Reequilíbrio · P=${P8}/8`);
    if(B8 >= 8) add("RE8", "P", W.RE8, "Reequilíbrio máximo · B=8/8", true);
    else if(B8 >= 7) add("RE7", "P", W.RE7, `Reequilíbrio forte · B=${B8}/8`);
    else if(B8 >= 6) add("RE6", "P", W.RE6, `Reequilíbrio · B=${B8}/8`);
  }

  // DOMINÂNCIA 12 — se últimos 12 mostram >=70% de um lado, continuar
  const c12 = last(col,12);
  if(c12.length === 12){
    const P12 = c12.filter(x=>x.r==="P").length;
    if(P12/12 >= 0.70) add("DOM12", "P", W.DOM12, `Dominância P ${P12}/12 últimas`);
    else if((12-P12)/12 >= 0.70) add("DOM12", "B", W.DOM12, `Dominância B ${12-P12}/12 últimas`);
  }

  // ZIGZAG 3 — micro-variação tipo [A,B,A] = zigzag curto, próximo = B
  // COM TETO DE ALTERNÂNCIA: igual à proteção de streak de cor, o xadrez é seguido
  // enquanto está abaixo da zona de quebra histórica. Perto do teto (onde a alternância
  // costuma quebrar nesta mesa), NÃO entra — é onde vinha o red da quebra do xadrez.
  if(col.length >= 3){
    const c3 = last(col,3);
    if(c3[0].r !== c3[1].r && c3[1].r !== c3[2].r && c3[0].r === c3[2].r){
      // mede há quantas rodadas o xadrez está rolando
      let altRun = 1;
      for(let i=col.length-1;i>0;i--){ if(col[i].r !== col[i-1].r) altRun++; else break; }
      const ap = altProfile(col);
      // zona de perigo: onde a alternância costuma quebrar (p75 ou 70% do máximo histórico)
      const tetoAlt = ap ? (ap.max || ap.p90 || 7) : 7;
      const zonaQuebraAlt = ap ? Math.max(ap.p75, Math.ceil(tetoAlt*0.7)) : 6;
      const pertoDoTeto = ap && altRun >= zonaQuebraAlt;
      if(pertoDoTeto){
        // xadrez esticado perto do limite histórico → não seguir, alerta de quebra
        out.exaustao = true;
        out.exaustaoMotivo = `Alternância ${altRun} (xadrez) na zona de quebra (hist. quebra ~${zonaQuebraAlt}, máx ${tetoAlt}) · PARAR de seguir`;
      } else {
        add("ZZ3", opos(c3[2].r), W.ZZ3, `Zigzag detectado · alternância ${altRun}${ap?` (mesa estica até ${tetoAlt})`:''}`);
      }
    }
  }

  // TIE_GATILHO
  if(out.tie.active){
    add("TIE", "T", W.TIE, `Mesa pagadora · ${ties15}/15 Ties · ${out.tie.payout}`);
  }

  out.patterns = patterns;

  // ── DERIVED ROADS · convergência ──
  const big = bigRoad(ST.H);
  const beb = derivedRoad(big, 1);
  const sm = derivedRoad(big, 2);
  const cp = derivedRoad(big, 3);
  const tBeb = trendRoad(beb);
  const tSm = trendRoad(sm);
  const tCp = trendRoad(cp);
  out.roads = {beb, sm, cp, tBeb, tSm, tCp, big};

  // Alinhamento das estradas derivadas
  const trends = [tBeb.trend, tSm.trend, tCp.trend];
  const stableCt = trends.filter(t=>t==="STABLE").length;
  const volatileCt = trends.filter(t=>t==="VOLATILE").length;
  let roadHint = null;
  if(stableCt >= 2){
    // padrão atual continua
    roadHint = "CONT";
    out.derivedAlign = stableCt;
  } else if(volatileCt >= 2){
    roadHint = "MUDA";
    out.derivedAlign = -volatileCt;
  }

  // ── CONVERGÊNCIA ──
  // Agrupa por lado e soma boost se 2+ padrões apontam o mesmo.
  // IMPORTANTE: o sinal de ENTRADA só pode ser P ou B. NUNCA "T".
  // Empate não é entrada — o farejador de empate (TIE) serve só como cobertura
  // complementar de uma entrada de cor, nunca como jogada principal.
  const byBet = {P:[], B:[], T:[]};
  patterns.forEach(p=>{ if(byBet[p.sig]) byBet[p.sig].push(p); });
  let bestSide = null, bestConf = 0, bestReason = "";
  for(const side of ["P","B"]){
    if(byBet[side].length === 0) continue;
    let conf = Math.max(...byBet[side].map(p=>p.conf));
    if(byBet[side].length >= 3) conf += W.boost_conv3;
    else if(byBet[side].length >= 2) conf += W.boost_conv2;
    // Alinhamento road
    if(roadHint && side !== "T"){
      const lastSide = col.length ? col[col.length-1].r : null;
      if(roadHint === "CONT" && side === lastSide) conf += W.boost_road_align;
      if(roadHint === "MUDA" && side !== lastSide) conf += W.boost_road_align;
    }
    conf = Math.min(0.95, conf);
    if(conf > bestConf){
      bestConf = conf;
      bestSide = side;
      const top = byBet[side].sort((a,b)=>b.conf-a.conf)[0];
      const others = byBet[side].length > 1 ? ` (+${byBet[side].length-1} padrões)` : "";
      bestReason = top.reason + others;
    }
  }
  out.convergence = bestSide ? byBet[bestSide].length : 0;

  // Contradição: padrões apontando para P E B ao mesmo tempo
  // Contradição real: lados opostos com padrões DIFERENTES de bloco.
  // O par B22T/B22C aponta lados opostos por natureza (mesma leitura de bloco vista
  // de dois ângulos) → não é contradição real; resolve pelo de maior confiança.
  const nomesP = byBet.P.map(p=>p.name);
  const nomesB = byBet.B.map(p=>p.name);
  const soBlocoP = nomesP.length && nomesP.every(n=>n==="B22T"||n==="B22C");
  const soBlocoB = nomesB.length && nomesB.every(n=>n==="B22T"||n==="B22C");
  const falsaContradicaoBloco = soBlocoP && soBlocoB;
  out.contradiction = byBet.P.length > 0 && byBet.B.length > 0 && !falsaContradicaoBloco;

  // ════════════════════════════════════════════════════════════════════════
  // ── TABLE HEAT · momento da mesa ──
  // ════════════════════════════════════════════════════════════════════════
  let heat = 50;
  const heatReasons = [];

  // [1] Estabilidade das somas
  if(out.sumDelta > 0 && out.sumDelta < 1.0){ heat += 10; heatReasons.push("somas muito estáveis"); }
  else if(out.sumDelta < 1.5){ heat += 6; heatReasons.push("somas estáveis"); }
  else if(out.sumDelta > 3.5){ heat -= 12; heatReasons.push("somas muito voláteis"); }
  else if(out.sumDelta > 2.5){ heat -= 6; heatReasons.push("somas voláteis"); }

  // [2] Estradas derivadas (5 gráficos: Bead, Big, BigEye, Small, Cockroach)
  const trends2 = [tBeb.trend, tSm.trend, tCp.trend];
  const stableCt2 = trends2.filter(t=>t==="STABLE").length;
  const volatileCt2 = trends2.filter(t=>t==="VOLATILE").length;
  if(stableCt2 === 3){ heat += 18; heatReasons.push("3 estradas estáveis"); }
  else if(stableCt2 === 2){ heat += 10; heatReasons.push("2 estradas estáveis"); }
  if(volatileCt2 === 3){ heat -= 18; heatReasons.push("3 estradas voláteis"); }
  else if(volatileCt2 === 2){ heat -= 10; heatReasons.push("2 estradas voláteis"); }

  // [3] Convergência de padrões
  if(out.convergence >= 3){ heat += 15; heatReasons.push("3+ padrões convergem"); }
  else if(out.convergence === 2){ heat += 8; heatReasons.push("2 padrões convergem"); }

  // [4] Contradição entre padrões
  if(out.contradiction){ heat -= 12; heatReasons.push("padrões contraditórios"); }

  // [5] Dominância
  if(out.dominancia !== "BALANCEADO"){ heat += 5; heatReasons.push(`dom. ${out.dominancia}`); }

  // [6] Cluster de Tie (ruim · mesa caótica)
  if(ties15 >= 3){ heat -= 10; heatReasons.push("cluster Tie"); }

  // [7] Exaustão
  if(out.exaustao){ heat -= 20; heatReasons.push("streak exaustão"); }

  // [7b] Regime pagante maduro/fatigado
  if(out.regimeFatigado){ heat -= 16; heatReasons.push(`${out.fatigue.regime} maduro`); }

  // [7c] Zona de perigo de quebra (streak no p90 histórico)
  if(out.profile && out.streakLen >= out.profile.p90 && out.streakLen >= 4){
    heat -= 12; heatReasons.push("streak na zona de perigo");
  }

  // [8] Big Road clean signals
  if(big.length >= 3){
    // colunas longas e consistentes = bom momento
    const lastCols = big.slice(-4);
    const avgColLen = lastCols.reduce((s,c)=>s+(c?c.length:0),0)/lastCols.length;
    if(avgColLen >= 2.5 && avgColLen <= 3.5){ heat += 6; heatReasons.push("colunas regulares"); }
    if(avgColLen > 4.5){ heat -= 4; heatReasons.push("colunas longas (instável)"); }
  }

  // [9] Alternância pura PP (excelente)
  if(patterns.some(p=>p.name==="PP5")){ heat += 10; heatReasons.push("PP5 ativo"); }

  // [10] Bead Road · zigzag caótico de somas
  const last8s = last(col,8).map(x=>x.s||0).filter(x=>x>0);
  if(last8s.length >= 6){
    let crossings = 0;
    for(let i=1;i<last8s.length;i++){
      if((last8s[i]>=8 && last8s[i-1]<8) || (last8s[i]<8 && last8s[i-1]>=8)) crossings++;
    }
    if(crossings >= 5){ heat -= 6; heatReasons.push("somas caóticas"); }
  }

  heat = Math.max(0, Math.min(100, heat));

  // Determinar estado da mesa e threshold dinâmico
  let tableState, dynThreshold, requireConvergence;
  // ════════════════════════════════════════════════════════════════════════
  // THRESHOLDS · mais entradas mantendo qualidade (cada red = 3 greens · win efetivo c/ gale ~89%)
  // ════════════════════════════════════════════════════════════════════════
  if(heat >= 72){
    tableState = "QUENTE";
    dynThreshold = 0.68;
    requireConvergence = false;
  } else if(heat >= 54){
    tableState = "FAVORÁVEL";
    dynThreshold = 0.71;
    requireConvergence = false;
  } else if(heat >= 40){
    tableState = "NEUTRA";
    dynThreshold = 0.74;
    requireConvergence = false;
  } else if(heat >= 26){
    tableState = "FRIA";
    dynThreshold = 0.80;
    requireConvergence = true;
  } else {
    tableState = "CONGELADA";
    dynThreshold = 0.99;
    requireConvergence = true;
  }

  // Padrões mínimos por estado · padrão único forte vale em QUENTE/FAV/NEUTRA
  let minPatterns = (tableState === "FRIA" || tableState === "CONGELADA") ? 2 : 1;
  let strongSingleOK = false;
  let STRONG_SINGLE = 0.84;
  if(tableState === "QUENTE"){ strongSingleOK = true; STRONG_SINGLE = 0.72; }
  else if(tableState === "FAVORÁVEL"){ strongSingleOK = true; STRONG_SINGLE = 0.75; }
  else if(tableState === "NEUTRA"){ strongSingleOK = true; STRONG_SINGLE = 0.78; }

  // ── FAREJADOR DE EMPATES (usa o heat já calculado) ──
  const hunter = tieHunter(ST.H, heat);
  // Aplica o aprendizado do farejador: ajusta a confiança do cenário conforme
  // o histórico real de acerto daquele cenário (eco/quente/aberta). Não vira entrada.
  if(hunter && ["ECO","QUENTE","ABERTA"].includes(hunter.status)){
    hunter.conf = Math.min(0.95, (hunter.conf || 0) * fatorEmpate(hunter.status));
    hunter.fatorAprendido = fatorEmpate(hunter.status);
  }
  out.hunter = hunter;
  // Atualiza o tie.active com base no farejador (mais inteligente)
  out.tie.active = (hunter.status === "ABERTA" || hunter.status === "QUENTE" || hunter.status === "ECO");
  out.tie.hunterStatus = hunter.status;
  out.tie.hunterConf = hunter.conf;

  // EV gate: cada red vale 3 greens. Piso 0.68 (com gale, win efetivo ~89%)
  const EV_FLOOR = 0.68;

  out.heat = { score: heat, state: tableState, threshold: dynThreshold, reasons: heatReasons, requireConvergence, minPatterns };

  // ── BOA OPORTUNIDADE · sinal direcional forte em mesa limpa (padrão real, não picote) ──
  out.boaOportunidade = false;

  // ── CONVERGÊNCIA DE SINAIS DIRECIONAIS FORTES ──
  // Conta quantos padrões VALIDADOS (direção comprovada) apontam a mesma cor do melhor sinal.
  // Dados sugerem 2+ convergindo ~62% vs 52% sozinho. Boost leve + indicador visual.
  // NÃO muda quem entra — só reforça e destaca quando há convergência real.
  const _direcionais = ["SURF","P22","ESC","ESCD","ESCC","B31","PP5","DOM12","P21","FLX"];
  if(bestSide && bestSide !== "T"){
    const _conv = (patterns||[]).filter(p => p.sig===bestSide && _direcionais.includes(p.name));
    out.convergencia = _conv.length;
    out.convergePadroes = _conv.map(p=>p.name);
    if(_conv.length >= 2){
      bestConf = Math.min(0.95, bestConf + (_conv.length>=3 ? 0.05 : 0.03));
    }
    // boa oportunidade: mesa limpa + pelo menos 1 padrão direcional forte a favor
    if(out.mesaLimpa && _conv.length >= 1) out.boaOportunidade = true;
  } else {
    out.convergencia = 0;
    out.convergePadroes = [];
  }

  // ── CRITÉRIO EQUILIBRADO · nem trava, nem solto (validado base 1608) ──
  // Padrão FORTE → entra sempre (lê e entra, sem segurar).
  // Padrão FRACO → entra se tiver QUALQUER respaldo: 2+ sinais convergindo OU mesa limpa.
  //   Só segura no caso ruim de verdade: fraco + totalmente sozinho + mesa picotada.
  // Resultado: 84% · líquido 121 · seqMax 3 · segura só ~30 entradas ruins (não 182).
  // Isso resolve "mesa com padrão e motor sem entrar": agora só não entra no fraco solto.
  if(bestSide && bestSide !== "T"){
    const _FRACOS = ["C21","SK4C","SK3C","B31","ESCD","P21","RE7","RE8","SURF"];
    const _gatilho = (patterns||[])
      .filter(p => p.sig === bestSide)
      .sort((a,b)=>b.conf-a.conf)
      .map(p => p.name)[0];
    if(_FRACOS.includes(_gatilho)){
      const _temRespaldo = (out.convergencia >= 2) || out.mesaLimpa;
      if(!_temRespaldo){
        out.criterioBloqueou = _gatilho;
        out.aguardandoConfirma = `Lendo ${_gatilho} (${lbl(bestSide)}) · aguardando 2º sinal confirmar`;
        bestSide = null;
        bestConf = 0;
      }
    }
  }

  // ── DECISÃO FINAL · COM HEAT + ANTI-ARMADILHA + EV GATE ──
  const effThreshold = Math.max(dynThreshold, EV_FLOOR);
  // CRITÉRIO DE MESA (opção B): entrada normal só em QUENTE/FAVORÁVEL/NEUTRA.
  // Em FRIA/CONGELADA aguarda — a entrada defensiva (mais abaixo) ainda cobre
  // o caso de a mesa esfriar no MEIO de uma sessão já ativa.
  // ── ENTRADA DIRETA · PADRÕES VERIFICADOS (SURF/ESC/P22) ──
  // Validados estatisticamente nos históricos. Entram direto, sem depender de
  // temperatura da mesa — MAS só se nenhum padrão FORTE (>=0.80) apostar contra.
  const _verifList = patterns
    .filter(p => (p.name==="SURF"||p.name==="ESC"||p.name==="ESCD"||p.name==="ESCC"||p.name==="P22"||p.name==="P21"||p.name==="FLX") && p.hi && p.conf>=0.80)
    .sort((a,b)=>b.conf-a.conf);
  const _verif = _verifList[0];
  if(_verif){
    // Só bloqueia se um padrão NÃO-verificado forte apostar contra.
    // Entre padrões verificados, o de maior confiança vence (não se anulam).
    // Só bloqueia se o padrão contrário for MAIS forte que o verificado.
    // Padrão verificado (validado nos dados) vence empate/contras mais fracos.
    // CONVERGÊNCIA MANDA: se 2+ direcionais apontam a mesma cor do verificado
    // (validado 62% na base), um padrão neutro contrário sozinho NÃO veta.
    const _dirNames = ["SURF","ESC","ESCD","ESCC","P22","P21","FLX","B31","PP5","DOM12"];
    const _dirAFavor = patterns.filter(p => p.sig===_verif.sig && _dirNames.includes(p.name)).length;
    const _contra = patterns.some(p =>
      p.sig===opos(_verif.sig) && p.conf >= _verif.conf &&
      !(p.name==="SURF"||p.name==="ESC"||p.name==="ESCD"||p.name==="ESCC"||p.name==="P22"||p.name==="P21"||p.name==="FLX")) &&
      _dirAFavor < 2;
    if(!_contra){
      out.signal = _verif.sig;
      out.conf = _verif.conf;
      out.reason = _verif.reason;
      out.patterns = patterns;
      if(!out.tie) out.tie = {active:false};
      return out;
    }
  }

  const mesaPermiteEntrada = (tableState === "QUENTE" || tableState === "FAVORÁVEL" || tableState === "NEUTRA");
  if(!mesaPermiteEntrada && !out.exaustao){
    out.signal = "W";
    out.reason = `Mesa ${tableState} · fora do critério de entrada · AGUARDA`;
    out.conf = bestConf;
  } else if(out.exaustao){
    out.signal = "W";
    out.reason = out.exaustaoMotivo || `Exaustão · streak ${st.len}+ ${st.side} · AGUARDA`;
    out.conf = 0;
  } else if(out.regimeFatigado && !(stableCt >= 2 && bestSide && bestSide !== "T")){
    // padrão maduro repetiu demais → bloqueia SÓ se as estradas NÃO confirmam continuação.
    // Se 2+ estradas derivadas estão STABLE (padrão sendo respeitado), deixa a entrada passar.
    out.signal = "W";
    out.reason = `🛑 ${out.regimeMotivo} · pare antes da quebra`;
    out.conf = bestConf;
  } else if((()=>{ const sp=saudePadrao(); out._saude=sp.saude; return sp.saude==="ENFRAQUECENDO"; })() && !(stableCt >= 2 && bestSide && bestSide !== "T")){
    // SAÚDE DO PADRÃO · somas vêm caindo forte = padrão dominante perdendo força.
    // Recua antes da quebra, salvo se as estradas ainda confirmam (2+ STABLE).
    out.signal = "W";
    out.reason = `📉 Padrão enfraquecendo · ${saudePadrao().motivo} · aguarda novo momento`;
    out.conf = bestConf;
  } else if((()=>{ const mm=modoMesa(); out._modoMesa=mm.modo; return mm.virouAgora && mm.modo!=="SURF"; })()){
    // VIRADA DE MOMENTO · a mesa trocou de modo (exceto para SURF, onde queremos
    // entrar surfando na hora). Fica calado 1 leitura para o novo modo confirmar.
    out.signal = "W";
    out.reason = `🔄 Mesa mudou de momento (agora ${out._modoMesa}) · re-identificando · AGUARDA`;
    out.conf = 0;
  } else if(out.profile && out.streakLen >= out.profile.p90 && out.streakLen >= 4){
    // streak na zona de perigo histórica → não perseguir quebra nem continuação
    out.signal = "W";
    out.reason = `⚠️ Streak ${out.streakLen} ${out.streakSide} na zona de perigo (hist máx ${out.profile.max}) · aguardar quebra confirmar`;
    out.conf = bestConf;
  } else if(out.contradiction && !(stableCt >= 2 && roadHint === "CONT")){
    // contradição entre padrões P e B → aguarda, EXCETO quando as estradas derivadas
    // estão alinhadas em continuação (2+ STABLE): aí a continuação desempata, segue o fluxo.
    out.signal = "W";
    out.reason = `Padrões contraditórios · risco alto · AGUARDA`;
    out.conf = bestConf;
  } else if(out.contradiction && stableCt >= 2 && roadHint === "CONT"){
    // desempate por estradas: continuação → segue o último lado
    const lastSide = col.length ? col[col.length-1].r : null;
    if(lastSide && lastSide !== "T"){
      out.signal = lastSide;
      out.conf = Math.min(0.9, bestConf);
      out.reason = `Contradição resolvida pelas estradas (3 STABLE) · continuação ${lbl(lastSide)}`;
    } else {
      out.signal = "W";
      out.reason = `Padrões contraditórios · AGUARDA`;
      out.conf = bestConf;
    }
  } else if(bestSide && bestSide !== "T" && roadHint === "MUDA" &&
            col.length && bestSide === col[col.length-1].r){
    // estradas derivadas dizem MUDA mas o sinal aposta em continuar → conflito → aguarda
    out.signal = "W";
    out.reason = `Gráficos derivados indicam mudança, sinal apostaria continuação · AGUARDA`;
    out.conf = bestConf;
  } else if(bestSide && bestSide !== "T" && roadHint === "CONT" &&
            col.length && bestSide !== col[col.length-1].r &&
            byBet[bestSide].length < 2){
    // estradas dizem CONTINUAR mas padrão ÚNICO aposta na quebra → sem confirmação → aguarda
    out.signal = "W";
    out.reason = `Gráficos derivados indicam continuação, padrão único apostaria quebra · sem confirmação cruzada · AGUARDA`;
    out.conf = bestConf;
  } else if(bestSide && byBet[bestSide].length >= 2 && bestConf >= effThreshold){
    // ── CRUZAMENTO FORTE: 2+ padrões concordam e estradas não contrariam → melhor entrada
    out.signal = bestSide;
    out.conf = bestConf;
    out.reason = bestReason;
    if(roadHint){ out.reason += ` · roads:${roadHint}`; }
  } else if(bestSide && byBet[bestSide].length < minPatterns &&
            strongSingleOK && bestConf >= STRONG_SINGLE){
    // ── PADRÃO ÚNICO FORTE
    const lastSide = col.length ? col[col.length-1].r : null;
    const continua = bestSide === lastSide;
    const estradaContraria = (roadHint === "MUDA" && continua) || (roadHint === "CONT" && !continua);
    // Veto cruzado SÓ em mesa fria/congelada · em quente/favorável/neutra a confiança forte basta
    const vetoAtivo = (tableState === "FRIA" || tableState === "CONGELADA");
    if(estradaContraria && vetoAtivo){
      out.signal = "W";
      out.reason = `Mesa ${tableState} + gráficos derivados contrariam padrão único · AGUARDA`;
      out.conf = bestConf;
    } else {
      out.signal = bestSide;
      out.conf = bestConf;
      out.reason = bestReason + " · padrão único forte (estradas " + (roadHint||"neutras") + ")";
    }
  } else if(bestSide && bestConf >= effThreshold && byBet[bestSide].length >= minPatterns){
    out.signal = bestSide;
    out.conf = bestConf;
    out.reason = bestReason;
    if(roadHint){ out.reason += ` · roads:${roadHint}`; }
  } else {
    out.signal = "W";
    if(bestSide && byBet[bestSide].length < minPatterns){
      out.reason = `Mesa ${tableState} exige ${minPatterns}+ padrões · só ${byBet[bestSide].length} detectado · AGUARDA`;
    } else if(bestSide){
      out.reason = `Conf ${(bestConf*100).toFixed(0)}% < mín ${(effThreshold*100).toFixed(0)}% (mesa ${tableState}) · AGUARDA`;
    } else {
      out.reason = `Mesa ${tableState} · sem padrão forte · AGUARDA`;
    }
    out.conf = bestConf;
  }

  // ════════════════════════════════════════════════════════════════════════
  // FILTRO DE CONVERGÊNCIA ESCALONADO · critério presente em TODOS os estados,
  // mais rígido conforme a mesa piora. Os gráficos derivados convergem de forma
  // matemática nos bons momentos; exigir mais convergência em mesa ruim corta
  // as entradas fracas. Mesa boa tem critério leve (aproveita), mesa ruim só premium.
