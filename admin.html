// ════════════════════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════════════════════
const coloridas = arr => arr.filter(x=>x.r!=="T");
const last = (arr,n) => arr.slice(-n);
const opos = c => c==="P"?"B":"P";
const lbl = c => c==="P"?"AZUL":c==="B"?"VERMELHO":c==="T"?"EMPATE":"AGUARDA";

function streak(arr){
  if(arr.length===0) return {len:0,side:null};
  let s = arr[arr.length-1].r, c = 1;
  for(let i=arr.length-2;i>=0;i--){
    if(arr[i].r===s) c++;
    else break;
  }
  return {len:c, side:s};
}

function volSoma(arr){
  if(arr.length<2) return 0;
  const ss = arr.map(x=>x.s||0).filter(x=>x>0);
  if(ss.length<2) return 0;
  return Math.max(...ss) - Math.min(...ss);
}

function avgSum(arr){
  const ss = arr.map(x=>x.s||0).filter(x=>x>0);
  if(ss.length===0) return 0;
  return ss.reduce((a,b)=>a+b,0)/ss.length;
}

function deltaSum(arr){
  if(arr.length<2) return 0;
  const ss = arr.map(x=>x.s||0).filter(x=>x>0);
  let d = 0;
  for(let i=1;i<ss.length;i++) d += Math.abs(ss[i]-ss[i-1]);
  return d/(ss.length-1);
}

// ════════════════════════════════════════════════════════════════════════════
// BIG ROAD · derivação de colunas
// ════════════════════════════════════════════════════════════════════════════
function bigRoad(hist){
  const col = [], cur = coloridas(hist);
  let c = -1, r = -1, lastR = null;
  for(const x of cur){
    if(x.r !== lastR){
      c++; r = 0;
      col[c] = [];
    } else {
      if(r < 5){ r++; }
      else { c++; r=0; col[c]=[]; } // dragão > 6 vira coluna nova
    }
    if(!col[c]) col[c] = [];
    col[c][r] = x.r;
    lastR = x.r;
  }
  return col;
}

// BIG EYE BOY · compara coluna atual com 1 anterior
// SMALL ROAD · compara com 2 anteriores
// COCKROACH PIG · compara com 3 anteriores
function derivedRoad(big, offset){
  if(big.length < offset+1) return [];
  const res = [];
  for(let i=offset+1;i<big.length;i++){
    const cur = big[i];
    if(!cur || cur.length===0) continue;
    const prev = big[i-offset];
    if(!prev) continue;
    for(let j=0;j<cur.length;j++){
      // R (red) = padrão estável; B (blue) = padrão muda
      if(j===0){
        // primeira bola da coluna: comparar comprimento da coluna anterior com a coluna-offset anterior
        const colPrev = big[i-1];
        const colPrevOff = big[i-1-offset];
        if(!colPrev || !colPrevOff) continue;
        res.push(colPrev.length === colPrevOff.length ? "R" : "B");
      } else {
        // próximas bolas: tem bola na coluna comparada?
        res.push((prev[j] !== undefined) ? "R" : "B");
      }
    }
  }
  return res;
}

function trendRoad(rd){
  if(rd.length < 3) return {trend:"N", strength:0};
  const last5 = rd.slice(-5);
  const R = last5.filter(x=>x==="R").length;
  const B = last5.length - R;
  if(R >= 4) return {trend:"STABLE", strength:R/last5.length};
  if(B >= 4) return {trend:"VOLATILE", strength:B/last5.length};
  return {trend:"MIX", strength:0.5};
}

// ════════════════════════════════════════════════════════════════════════════
// PERFIS HISTÓRICOS · anti-armadilha (medem QUANDO a mesa costuma quebrar)
// ════════════════════════════════════════════════════════════════════════════
// Mede o histórico de ALTERNÂNCIAS (xadrez P-B-P-B) para saber QUANDO costuma quebrar
// — análogo ao streakProfile, mas para o regime de alternância em vez de repetição.
function altProfile(col){
  if(col.length < 8) return null;
  // mede comprimento de cada sequência de alternância (quantas trocas seguidas)
  const altRuns = [];
  let cur = 1;
  for(let i=1;i<col.length;i++){
    if(col[i].r !== col[i-1].r) cur++;         // alternou → estende a corrente de xadrez
    else { altRuns.push(cur); cur = 1; }        // repetiu → quebrou o xadrez
  }
  altRuns.push(cur);
  const closed = altRuns.slice(0,-1).filter(r=>r>=2); // só correntes de alternância reais
  if(closed.length < 4) return null;
  const sorted=[...closed].sort((a,b)=>a-b);
  const max=Math.max(...closed);
  const avg=closed.reduce((a,b)=>a+b,0)/closed.length;
  const p=q=>sorted[Math.min(sorted.length-1,Math.floor(sorted.length*q))];
  function breakProbAt(L){
    const reached=closed.filter(r=>r>=L).length;
    const broke=closed.filter(r=>r===L).length;
    if(reached===0)return 0.5;
    return broke/reached;
  }
  return { runs:closed, avg, max, p50:p(0.50), p75:p(0.75), p90:p(0.90), count:closed.length, breakProbAt };
}

function streakProfile(col){
  if(col.length < 8) return null;
  const runs = [];
  let cur = 1;
  for(let i=1;i<col.length;i++){
    if(col[i].r === col[i-1].r) cur++;
    else { runs.push(cur); cur = 1; }
  }
  runs.push(cur); // último run em aberto
  const closed = runs.slice(0, -1); // runs finalizados (sabemos onde quebraram)
  if(closed.length < 4) return null;
  const sorted = [...closed].sort((a,b)=>a-b);
  const avg = closed.reduce((a,b)=>a+b,0)/closed.length;
  const max = Math.max(...closed);
  const p = q => sorted[Math.min(sorted.length-1, Math.floor(sorted.length*q))];
  // Distribuição de sobrevivência: dado streak chegou a L, qual % continuou?
  // P(quebra | comprimento atual = L) = (runs que terminaram em L) / (runs que chegaram a L)
  function breakProbAt(L){
    const reached = closed.filter(r=>r>=L).length;
    const broke = closed.filter(r=>r===L).length;
    if(reached === 0) return 0.5;
    return broke / reached;
  }
  return {
    runs: closed, avg, max,
    p50: p(0.50), p75: p(0.75), p90: p(0.90),
    count: closed.length, breakProbAt
  };
}

// Fadiga de padrão: conta quantas vezes seguidas o MESMO regime se repetiu
// (ex.: alternância pura prolongada, ou blocos 2x2 repetidos)
function patternFatigue(col){
  if(col.length < 6) return {regime:"N", repeats:0, fatigued:false};
  const lastN = last(col, 12).map(x=>x.r);
  // detectar regime de alternância
  let altRun = 1;
  for(let i=lastN.length-1;i>0;i--){
    if(lastN[i] !== lastN[i-1]) altRun++;
    else break;
  }
  // detectar regime de blocos 2x2
  let blockRun = 0;
  const r = lastN;
  for(let i=r.length-1;i>=3;i-=2){
    if(r[i]===r[i-1] && r[i-2]===r[i-3] && r[i]!==r[i-2]) blockRun++;
    else break;
  }
  if(altRun >= 8) return {regime:"ALTERNANCIA", repeats:altRun, fatigued:altRun >= 11};
  if(blockRun >= 4) return {regime:"BLOCOS_2x2", repeats:blockRun, fatigued:blockRun >= 6};
  return {regime:"MISTO", repeats:0, fatigued:false};
}

// ════════════════════════════════════════════════════════════════════════════
// FAREJADOR DE EMPATES · estuda TODO o histórico de ties
// Detecta janela de empate ABERTA / QUENTE / FECHADA / PASSOU
// ════════════════════════════════════════════════════════════════════════════
function payoutDaSoma(s){
  if(s===2||s===12) return "88x";
  if(s===3||s===11) return "25x";
  if(s===4||s===10) return "10x";
  if(s===5||s===9) return "6x";
  return "4x"; // 6,7,8
}

function tieHunter(H, heatScore){
  const res = {
    status:"DADOS", conf:0, msg:"Coletando histórico...",
    dist:0, avgGap:0, maxGap:0, ties15:0, ties30:0,
    payoutProvavel:null, ultimosPay:[], cluster:false, atrasado:false,
    echo:false, echoRate:0, echoMsg:""
  };
  if(H.length < 12) return res;

  // índices de todos os empates
  const tieIdx = [];
  H.forEach((x,i)=>{ if(x.r==="T") tieIdx.push(i); });

  // gaps entre empates
  const gaps = [];
  for(let i=1;i<tieIdx.length;i++) gaps.push(tieIdx[i]-tieIdx[i-1]);
  res.avgGap = gaps.length ? gaps.reduce((a,b)=>a+b,0)/gaps.length : 12;
  res.maxGap = gaps.length ? Math.max(...gaps) : 0;

  // ── PADRÃO DE ECO · empates que vêm na quina um do outro ──
  // Quantos % dos empates vieram a ≤3 rodadas do empate anterior?
  // Classificações: DUPLO (gap=1) · SANDWICH (gap=2) · QUINA (gap=3)
  res.echoTipos = { duplo:0, sandwich:0, quina:0 };
  if(gaps.length >= 2){
    res.echoTipos.duplo = gaps.filter(g=>g===1).length;
    res.echoTipos.sandwich = gaps.filter(g=>g===2).length;
    res.echoTipos.quina = gaps.filter(g=>g===3).length;
    const echoGaps = res.echoTipos.duplo + res.echoTipos.sandwich + res.echoTipos.quina;
    res.echoRate = echoGaps / gaps.length;
    res.echo = res.echoRate >= 0.30;
    // tipo predominante
    const tipos = res.echoTipos;
    res.echoTipoPredom = tipos.duplo >= tipos.sandwich && tipos.duplo >= tipos.quina ? "DUPLO"
                       : tipos.sandwich >= tipos.quina ? "SANDWICH" : "QUINA";
  }

  // distância desde o último empate
  const lastTie = tieIdx.length ? tieIdx[tieIdx.length-1] : -1;
  res.dist = lastTie >= 0 ? (H.length - 1 - lastTie) : H.length;

  // densidades
  res.ties15 = last(H,15).filter(x=>x.r==="T").length;
  res.ties30 = last(H,30).filter(x=>x.r==="T").length;
  const ties5 = last(H,5).filter(x=>x.r==="T").length;
  const ties8 = last(H,8).filter(x=>x.r==="T").length;

  // payouts dos últimos empates
  res.ultimosPay = tieIdx.slice(-5).map(i=>({s:H[i].s, pay:payoutDaSoma(H[i].s)}));

  // ── Previsão de payout pela soma recente ──
  const col = H.filter(x=>x.r!=="T");
  const last6sum = last(col,6).map(x=>x.s||0).filter(x=>x>0);
  const avg6 = last6sum.length ? last6sum.reduce((a,b)=>a+b,0)/last6sum.length : 7;
  const extremos = last6sum.filter(s=>s<=4 || s>=10).length;
  if(extremos >= 3){
    res.payoutProvavel = avg6 <= 4.5 || avg6 >= 10.5 ? "25x-88x" : "10x";
  } else if(avg6 <= 5.5 || avg6 >= 9.5){
    res.payoutProvavel = "6x-10x";
  } else {
    res.payoutProvavel = "4x";
  }

  res.cluster = ties5 >= 2 || ties8 >= 3;
  res.atrasado = res.dist >= res.avgGap;
  const mesaFria = heatScore !== undefined && heatScore < 48;

  // ── ECO ATIVO: empate há 1-3 rodadas + mesa que ecoa → outro empate na quina ──
  if(res.echo && res.dist >= 1 && res.dist <= 3 && ties5 < 3){
    res.status = "ECO";
    const tipo = res.echoTipoPredom || "QUINA";
    res.echoMsg = `Mesa de eco · ${(res.echoRate*100).toFixed(0)}% dos empates vêm coladinhos · padrão predominante: ${tipo}`;
    const ondePos = res.dist === 1 ? "DUPLO (back-to-back)" : res.dist === 2 ? "SANDWICH (cor entre dois empates)" : "na QUINA (próximo)";
    res.msg = `Empate há ${res.dist} rodada(s) · outro pode vir ${ondePos}`;
    res.conf = Math.min(0.85, 0.55 + res.echoRate*0.4 + (res.dist === 1 ? 0.05 : 0));
    return res;
  }

  // ── Estados normais ──
  // REFINAMENTO (baseado em medição real): o farejador só acende onde há edge
  // de verdade — ECO (acima) e CLUSTER recente (~13-14% de acerto vs 10% do acaso).
  // Estados por ATRASO (antes QUENTE/ABERTA) previam 8-11% — igual ou abaixo do
  // acaso — então NÃO acendem mais: viram FECHADA. Empate é quase puro acaso;
  // prometer "iminente" por atraso seria enganar. Melhor ficar quieto.
  if(res.cluster){
    // cluster recente é o único "atrasado" com leve edge → acende como ABERTA leve
    res.status = "ABERTA";
    res.msg = `Cluster de empates (${ties8}/8 rodadas) · mesa ecoando empate · leve tendência`;
    res.conf = 0.55;
  } else if(mesaFria && res.ties15 >= 3){
    // mesa muito fria com vários empates recentes → leve zona de eco
    res.status = "ABERTA";
    res.msg = `Mesa fria + ${res.ties15} empates/15 · zona de eco`;
    res.conf = 0.52;
  } else {
    // todo o resto (inclusive atraso) → FECHADA. Sem edge real, não acende.
    res.status = "FECHADA";
    res.msg = `Sem padrão de empate confiável agora · ${res.dist} rodada(s) desde o último`;
    res.conf = 0;
  }

  return res;
}

// ════════════════════════════════════════════════════════════════════════════
// MOTOR NEURAL · análise completa
// ════════════════════════════════════════════════════════════════════════════
function analyze(){
  const W = ST.weights;
  const col = coloridas(ST.H);
  const out = {
    signal:null, conf:0, reason:"Aguardando dados", patterns:[],
    convergence:0, derivedAlign:0, tie:{active:false,payout:null,dt:null,mp:false,probs:{}},
    distrib:{P:0,B:0,T:0}, sumAvg:0, sumDelta:0, dominancia:"N", padrao:""
  };

  if(ST.H.length < 4){ return out; }

  // Distribuição
  const tot = ST.H.length;
  ST.H.forEach(x=>{out.distrib[x.r]++;});
  out.distrib.P = Math.round(100*out.distrib.P/tot);
  out.distrib.B = Math.round(100*out.distrib.B/tot);
  out.distrib.T = Math.round(100*out.distrib.T/tot);

  // Soma stats
  const last15c = last(col, 15);
  out.sumAvg = avgSum(last15c);
  out.sumDelta = deltaSum(last(col,6));

  // Dominância
  const last20 = last(col,20);
  const P20 = last20.filter(x=>x.r==="P").length;
  const B20 = last20.filter(x=>x.r==="B").length;
  if(P20/last20.length >= 0.65) out.dominancia = "PLAYER";
  else if(B20/last20.length >= 0.65) out.dominancia = "BANKER";
  else out.dominancia = "BALANCEADO";

  // ── TIE ANALYSIS ──
  const last15 = last(ST.H, 15);
  const ties15 = last15.filter(x=>x.r==="T").length;
  out.tie.mp = ties15/15 >= 0.10;
  let dt = 0;
  for(let i=ST.H.length-1;i>=0;i--){ if(ST.H[i].r==="T"){dt = ST.H.length-1-i; break;} dt++; }
  out.tie.dt = dt;
  const avg6 = avgSum(last(col,6));
  const sumExt = avg6 <= 5.5 || avg6 >= 10.5;
  out.tie.active = out.tie.mp && (dt >= 8 || sumExt);
  out.tie.probs = {
    "88x_2_12": Math.min(8, ties15*1.5),
    "25x_3_11": Math.min(15, ties15*2),
    "10x_4_10": Math.min(18, ties15*2.5),
    "6x_5_9": Math.min(22, ties15*3),
    "4x_6_8": Math.min(30, ties15*4)
  };
  if(avg6 <= 5.5) out.tie.payout = avg6 <= 3.5 ? "88x" : "10x";
  else if(avg6 >= 10.5) out.tie.payout = avg6 >= 11.5 ? "88x" : "10x";
  else if(avg6 >= 8 && avg6 <= 9) out.tie.payout = "6x";
  else out.tie.payout = "4x";

  // ── PADRÕES ──
  const c4 = last(col, 4);
  const c5 = last(col, 5);
  const c8 = last(col, 8);
  const stab = out.sumDelta < 1.5;
  const high = out.sumAvg >= 9.5;
  const boostS = stab ? W.boost_est : 0;
  const boostH = high ? W.boost_hi : 0;
  const boostM = out.tie.mp ? W.boost_mp : 0;
  const boostD = out.dominancia !== "BALANCEADO" ? W.boost_dom : 0;
  const totalBoost = boostS + boostH + boostM + boostD;

  const patterns = [];
  function add(name, sig, base, reason, hi=false){
    let conf = Math.min(0.95, (base * fatorAprendido(name)) + totalBoost);
    if(sig === "P") conf += W.bias_P;
    if(sig === "B") conf += W.bias_B;
    conf = Math.max(0, Math.min(0.95, conf));
    patterns.push({name, sig, conf, reason, hi});
  }

  // PING_PONG_5 — 5 alternadas estritas
  if(c5.length === 5){
    let pp5 = true;
    for(let i=1;i<5;i++) if(c5[i].r === c5[i-1].r){pp5=false;break;}
    if(pp5) add("PP5", opos(c5[4].r), W.PP5, "Ping-pong 5 ciclos · alternância pura", true);
  }

  // PING_PONG_4
  if(c4.length === 4 && !patterns.find(p=>p.name==="PP5")){
    let pp4 = true;
    for(let i=1;i<4;i++) if(c4[i].r === c4[i-1].r){pp4=false;break;}
    if(pp4) add("PP4", opos(c4[3].r), W.PP4, "Ping-pong 4 ciclos");
  }

  // BLOCO_2x2_TROCA · [A,A,B,B]
  if(c4.length === 4){
    if(c4[0].r === c4[1].r && c4[2].r === c4[3].r && c4[0].r !== c4[2].r){
      add("B22T", opos(c4[3].r), W.B22T, "Bloco 2×2 troca · próximo par muda", true);
    }
    // BLOCO_2x2_CONT · [X,A,A,?] — par formado, próxima é A novamente? regra: continuar o par
    // Aqui interpreto como últimas 3 = [X,A,A] e prevê A novamente para formar bloco
    if(c4.length >= 3){
      const c3 = last(col,3);
      if(c3[1].r === c3[2].r && c3[0].r !== c3[1].r){
        add("B22C", c3[2].r, W.B22C, "Bloco 2×2 continuação · par incompleto");
      }
    }
    // BLOCO_3_1 · [A,A,A,B] após 3 do mesmo lado quebra
    if(c4[0].r === c4[1].r && c4[1].r === c4[2].r && c4[3].r !== c4[2].r){
      add("B31", opos(c4[3].r), W.B31, "Bloco 3-1 · quebra esperada para anterior");
    }
  }

  // ════════════════════════════════════════════════════════════════════════
  // CICLO 2-1 (DOIS-UM) · padrão XXY XXY repetido (ex.: B B P B B P B B P ...)
  // O motor antes confundia isso com Zigzag e entrava na quebra. Agora segue o ciclo.
  // Detecta o ciclo nas últimas 6-9 jogadas e prevê a próxima conforme a posição.
  // ════════════════════════════════════════════════════════════════════════
  const c9 = last(col, 9);
  function detecta21(seq){
    if(seq.length < 7) return null; // precisa de margem pra confirmar 2 ciclos
    const r = seq.map(x=>x.r);
    const n = r.length;
    // Testa as 3 fases de um ciclo de período 3 do tipo XXY (par + ímpar).
    // Para cada fase, verifica se TODA a sequência (de trás pra frente) bate
    // com o molde XXY repetido, e então prevê a próxima posição.
    for(let fase=0; fase<3; fase++){
      let ok=true, lado=null, casados=0;
      // posição dentro do ciclo: (índice - fase) mod 3 → 0,1 = par(X) · 2 = ímpar(Y)
      for(let i=n-1; i>=0; i--){
        const posCiclo = (((i - fase) % 3) + 3) % 3;
        const ehPar = (posCiclo === 0 || posCiclo === 1); // deve ser X
        if(lado===null){
          // estabelece o lado X a partir de uma posição de par
          if(ehPar) lado = r[i];
          else { /* posição ímpar: lado Y = oposto, definimos depois */ }
        }
        if(lado!==null){
          const esperado = ehPar ? lado : opos(lado);
          if(r[i] === esperado){ casados++; }
          else { ok = (n-1-i) >= 6; break; } // tolera divergência só bem no começo (≥6 casados)
        }
      }
      if(ok && lado && casados >= 6){
        // prevê a próxima: posição n no ciclo
        const posProx = (((n - fase) % 3) + 3) % 3;
        const ehParProx = (posProx === 0 || posProx === 1);
        const prox = ehParProx ? lado : opos(lado);
        return {sig:prox, ciclos:Math.floor(casados/3), lado};
      }
    }
    return null;
  }
  const ciclo21 = detecta21(c9);
  if(ciclo21){
    // Detectado de forma INDEPENDENTE, como qualquer outro padrão.
    // Peso inicial neutro · o aprendizado (fatorAprendido) ajusta sozinho ao longo das sessões.
    // NÃO remove o zigzag nem nenhum outro — todos concorrem em pé de igualdade.
    add("C21", ciclo21.sig, W.C21 || 0.78, `Ciclo 2-1 (dois-um) · ${ciclo21.ciclos} ciclos`);
  }

  // ════════════════════════════════════════════════════════════════════════
  // STREAK · com PERFIL HISTÓRICO (anti-armadilha)
  // ════════════════════════════════════════════════════════════════════════
  const st = streak(col);
  const prof = streakProfile(col);
  out.streakLen = st.len;
  out.streakSide = st.side;
  out.profile = prof;

  // Zona estatística de quebra: quando a mesa COSTUMA quebrar
  let breakZone = null, breakProb = 0.5, premature = false, danger = false;
  if(prof && st.len >= 2){
    breakProb = prof.breakProbAt(st.len);
    // Zona de quebra amarrada ao MÁXIMO histórico, não ao p75.
    // Se a mesa estica até 8, uma streak de 3-4 é CONTINUAÇÃO, não quebra.
    // Segue continuação enquanto < 70% do máximo; só vira quebra perto do teto.
    const teto = prof.max || prof.p90 || 6;
    const zonaQuebra = Math.max(prof.p75, Math.ceil(teto * 0.7));
    premature = st.len < zonaQuebra;
    breakZone = st.len >= zonaQuebra && st.len < teto;
    danger = st.len >= prof.p90;
  }

  if(st.len === 4){
    const v4 = volSoma(last(col,4));
    if(prof && premature){
      // mesa costuma esticar mais → NÃO bater quebra ainda; favorece continuação
      add("SK4C", st.side, W.SK4C, `Streak 4 ${st.side} · mesa estica até ~${prof.p75} → continuar`);
    } else if(prof && breakZone){
      // zona de quebra confirmada pelo histórico
      const conf = v4 >= 3 ? W.SK4Q + 0.04 : W.SK4Q;
      add("SK4Q", opos(st.side), conf, `Streak 4 ${st.side} · zona de quebra (hist p75=${prof.p75}) vol${v4}`, true);
    } else {
      // neutro
      if(v4 >= 3) add("SK4Q", opos(st.side), W.SK4Q, `Streak 4 ${st.side} + volatilidade ${v4}`, true);
      else add("SK4C", st.side, W.SK4C, `Streak 4 ${st.side} estável → continuar`);
    }
  } else if(st.len === 3){
    const v3 = volSoma(last(col,3));
    if(prof && premature){
      add("SK3C", st.side, W.SK3C, `Streak 3 ${st.side} · ainda curto p/ mesa → continuar`);
    } else if(prof && breakZone){
      add("SK3Q", opos(st.side), W.SK3Q + 0.03, `Streak 3 ${st.side} · zona de quebra (hist) vol${v3}`);
    } else {
      if(v3 >= 3) add("SK3Q", opos(st.side), W.SK3Q, `Streak 3 ${st.side} + volatilidade ${v3}`);
      else add("SK3C", st.side, W.SK3C, `Streak 3 ${st.side} estável → continuar`);
    }
  } else if(st.len >= 5){
    const teto = prof ? (prof.max || prof.p90 || 7) : 7;
    const zonaPerigo = prof ? prof.p90 : 6;
    if(prof && st.len < Math.ceil(teto * 0.75) && st.len < zonaPerigo){
      // Streak forte ainda na zona SAUDÁVEL (longe do máximo) → SEGUE a continuação.
      // É o "padrão super forte no meio" que o operador quer pegar.
      add("SK5C", st.side, Math.min(0.88, W.SK4C + 0.05), `Streak ${st.len} ${st.side} forte · mesa estica até ${teto} → continuar`, true);
    } else if(prof && st.len < prof.max && st.len < zonaPerigo){
      // chegando perto mas ainda não no perigo → continua mas sem reforço
      add("SK5C", st.side, W.SK4C, `Streak ${st.len} ${st.side} · ainda dentro do range → continuar`);
    } else {
      // zona de perigo / no máximo → PARAR (não perseguir continuação nem quebra)
      out.exaustao = true;
      out.exaustaoMotivo = `Streak ${st.len} ${st.side} · zona de perigo (hist máx ${prof?prof.max:'?'}) · PARAR`;
    }
  }

  // ── PADRÃO PAGANTE MADURO · fadiga de regime ──
  const fatigue = patternFatigue(col);
  out.fatigue = fatigue;
  if(fatigue.fatigued){
    // regime pagante repetiu demais → prestes a quebrar → bloquear novas entradas
    out.regimeFatigado = true;
    out.regimeMotivo = `${fatigue.regime} repetiu ${fatigue.repeats}× · padrão maduro, risco de quebra`;
  }

  // REEQUILÍBRIO 6/7/8 de 8
  if(c8.length === 8){
    const P8 = c8.filter(x=>x.r==="P").length;
    const B8 = 8 - P8;
    if(P8 >= 8) add("RE8", "B", W.RE8, "Reequilíbrio máximo · P=8/8", true);
    else if(P8 >= 7) add("RE7", "B", W.RE7, `Reequilíbrio forte · P=${P8}/8`);
    else if(P8 >= 6) add("RE6", "B", W.RE6, `Reequilíbrio · P=${P8}/8`);
    if(B8 >= 8) add("RE8", "P", W.RE8, "Reequilíbrio máximo · B=8/8", true);
    else if(B8 >= 7) add("RE7", "P", W.RE7, `Reequilíbrio forte · B=${B8}/8`);
    else if(B8 >= 6) add("RE6", "P", W.RE6, `Reequilíbrio · B=${B8}/8`);
  }

  // DOMINÂNCIA 12 — se últimos 12 mostram >=70% de um lado, continuar
  const c12 = last(col,12);
  if(c12.length === 12){
    const P12 = c12.filter(x=>x.r==="P").length;
    if(P12/12 >= 0.70) add("DOM12", "P", W.DOM12, `Dominância P ${P12}/12 últimas`);
    else if((12-P12)/12 >= 0.70) add("DOM12", "B", W.DOM12, `Dominância B ${12-P12}/12 últimas`);
  }

  // ZIGZAG 3 — micro-variação tipo [A,B,A] = zigzag curto, próximo = B
  // COM TETO DE ALTERNÂNCIA: igual à proteção de streak de cor, o xadrez é seguido
  // enquanto está abaixo da zona de quebra histórica. Perto do teto (onde a alternância
  // costuma quebrar nesta mesa), NÃO entra — é onde vinha o red da quebra do xadrez.
  if(col.length >= 3){
    const c3 = last(col,3);
    if(c3[0].r !== c3[1].r && c3[1].r !== c3[2].r && c3[0].r === c3[2].r){
      // mede há quantas rodadas o xadrez está rolando
      let altRun = 1;
      for(let i=col.length-1;i>0;i--){ if(col[i].r !== col[i-1].r) altRun++; else break; }
      const ap = altProfile(col);
      // zona de perigo: onde a alternância costuma quebrar (p75 ou 70% do máximo histórico)
      const tetoAlt = ap ? (ap.max || ap.p90 || 7) : 7;
      const zonaQuebraAlt = ap ? Math.max(ap.p75, Math.ceil(tetoAlt*0.7)) : 6;
      const pertoDoTeto = ap && altRun >= zonaQuebraAlt;
      if(pertoDoTeto){
        // xadrez esticado perto do limite histórico → não seguir, alerta de quebra
        out.exaustao = true;
        out.exaustaoMotivo = `Alternância ${altRun} (xadrez) na zona de quebra (hist. quebra ~${zonaQuebraAlt}, máx ${tetoAlt}) · PARAR de seguir`;
      } else {
        add("ZZ3", opos(c3[2].r), W.ZZ3, `Zigzag detectado · alternância ${altRun}${ap?` (mesa estica até ${tetoAlt})`:''}`);
      }
    }
  }

  // TIE_GATILHO
  if(out.tie.active){
    add("TIE", "T", W.TIE, `Mesa pagadora · ${ties15}/15 Ties · ${out.tie.payout}`);
  }

  out.patterns = patterns;

  // ── DERIVED ROADS · convergência ──
  const big = bigRoad(ST.H);
  const beb = derivedRoad(big, 1);
  const sm = derivedRoad(big, 2);
  const cp = derivedRoad(big, 3);
  const tBeb = trendRoad(beb);
  const tSm = trendRoad(sm);
  const tCp = trendRoad(cp);
  out.roads = {beb, sm, cp, tBeb, tSm, tCp, big};

  // Alinhamento das estradas derivadas
  const trends = [tBeb.trend, tSm.trend, tCp.trend];
  const stableCt = trends.filter(t=>t==="STABLE").length;
  const volatileCt = trends.filter(t=>t==="VOLATILE").length;
  let roadHint = null;
  if(stableCt >= 2){
    // padrão atual continua
    roadHint = "CONT";
    out.derivedAlign = stableCt;
  } else if(volatileCt >= 2){
    roadHint = "MUDA";
    out.derivedAlign = -volatileCt;
  }

  // ── CONVERGÊNCIA ──
  // Agrupa por lado e soma boost se 2+ padrões apontam o mesmo.
  // IMPORTANTE: o sinal de ENTRADA só pode ser P ou B. NUNCA "T".
  // Empate não é entrada — o farejador de empate (TIE) serve só como cobertura
  // complementar de uma entrada de cor, nunca como jogada principal.
  const byBet = {P:[], B:[], T:[]};
  patterns.forEach(p=>{ if(byBet[p.sig]) byBet[p.sig].push(p); });
  let bestSide = null, bestConf = 0, bestReason = "";
  for(const side of ["P","B"]){
    if(byBet[side].length === 0) continue;
    let conf = Math.max(...byBet[side].map(p=>p.conf));
    if(byBet[side].length >= 3) conf += W.boost_conv3;
    else if(byBet[side].length >= 2) conf += W.boost_conv2;
    // Alinhamento road
    if(roadHint && side !== "T"){
      const lastSide = col.length ? col[col.length-1].r : null;
      if(roadHint === "CONT" && side === lastSide) conf += W.boost_road_align;
      if(roadHint === "MUDA" && side !== lastSide) conf += W.boost_road_align;
    }
    conf = Math.min(0.95, conf);
    if(conf > bestConf){
      bestConf = conf;
      bestSide = side;
      const top = byBet[side].sort((a,b)=>b.conf-a.conf)[0];
      const others = byBet[side].length > 1 ? ` (+${byBet[side].length-1} padrões)` : "";
      bestReason = top.reason + others;
    }
  }
  out.convergence = bestSide ? byBet[bestSide].length : 0;

  // Contradição: padrões apontando para P E B ao mesmo tempo
  // Contradição real: lados opostos com padrões DIFERENTES de bloco.
  // O par B22T/B22C aponta lados opostos por natureza (mesma leitura de bloco vista
  // de dois ângulos) → não é contradição real; resolve pelo de maior confiança.
  const nomesP = byBet.P.map(p=>p.name);
  const nomesB = byBet.B.map(p=>p.name);
  const soBlocoP = nomesP.length && nomesP.every(n=>n==="B22T"||n==="B22C");
  const soBlocoB = nomesB.length && nomesB.every(n=>n==="B22T"||n==="B22C");
  const falsaContradicaoBloco = soBlocoP && soBlocoB;
  out.contradiction = byBet.P.length > 0 && byBet.B.length > 0 && !falsaContradicaoBloco;

  // ════════════════════════════════════════════════════════════════════════
  // ── TABLE HEAT · momento da mesa ──
  // ════════════════════════════════════════════════════════════════════════
  let heat = 50;
  const heatReasons = [];

  // [1] Estabilidade das somas
  if(out.sumDelta > 0 && out.sumDelta < 1.0){ heat += 10; heatReasons.push("somas muito estáveis"); }
  else if(out.sumDelta < 1.5){ heat += 6; heatReasons.push("somas estáveis"); }
  else if(out.sumDelta > 3.5){ heat -= 12; heatReasons.push("somas muito voláteis"); }
  else if(out.sumDelta > 2.5){ heat -= 6; heatReasons.push("somas voláteis"); }

  // [2] Estradas derivadas (5 gráficos: Bead, Big, BigEye, Small, Cockroach)
  const trends2 = [tBeb.trend, tSm.trend, tCp.trend];
  const stableCt2 = trends2.filter(t=>t==="STABLE").length;
  const volatileCt2 = trends2.filter(t=>t==="VOLATILE").length;
  if(stableCt2 === 3){ heat += 18; heatReasons.push("3 estradas estáveis"); }
  else if(stableCt2 === 2){ heat += 10; heatReasons.push("2 estradas estáveis"); }
  if(volatileCt2 === 3){ heat -= 18; heatReasons.push("3 estradas voláteis"); }
  else if(volatileCt2 === 2){ heat -= 10; heatReasons.push("2 estradas voláteis"); }

  // [3] Convergência de padrões
  if(out.convergence >= 3){ heat += 15; heatReasons.push("3+ padrões convergem"); }
  else if(out.convergence === 2){ heat += 8; heatReasons.push("2 padrões convergem"); }

  // [4] Contradição entre padrões
  if(out.contradiction){ heat -= 12; heatReasons.push("padrões contraditórios"); }

  // [5] Dominância
  if(out.dominancia !== "BALANCEADO"){ heat += 5; heatReasons.push(`dom. ${out.dominancia}`); }

  // [6] Cluster de Tie (ruim · mesa caótica)
  if(ties15 >= 3){ heat -= 10; heatReasons.push("cluster Tie"); }

  // [7] Exaustão
  if(out.exaustao){ heat -= 20; heatReasons.push("streak exaustão"); }

  // [7b] Regime pagante maduro/fatigado
  if(out.regimeFatigado){ heat -= 16; heatReasons.push(`${out.fatigue.regime} maduro`); }

  // [7c] Zona de perigo de quebra (streak no p90 histórico)
  if(out.profile && out.streakLen >= out.profile.p90 && out.streakLen >= 4){
    heat -= 12; heatReasons.push("streak na zona de perigo");
  }

  // [8] Big Road clean signals
  if(big.length >= 3){
    // colunas longas e consistentes = bom momento
    const lastCols = big.slice(-4);
    const avgColLen = lastCols.reduce((s,c)=>s+(c?c.length:0),0)/lastCols.length;
    if(avgColLen >= 2.5 && avgColLen <= 3.5){ heat += 6; heatReasons.push("colunas regulares"); }
    if(avgColLen > 4.5){ heat -= 4; heatReasons.push("colunas longas (instável)"); }
  }

  // [9] Alternância pura PP (excelente)
  if(patterns.some(p=>p.name==="PP5")){ heat += 10; heatReasons.push("PP5 ativo"); }

  // [10] Bead Road · zigzag caótico de somas
  const last8s = last(col,8).map(x=>x.s||0).filter(x=>x>0);
  if(last8s.length >= 6){
    let crossings = 0;
    for(let i=1;i<last8s.length;i++){
      if((last8s[i]>=8 && last8s[i-1]<8) || (last8s[i]<8 && last8s[i-1]>=8)) crossings++;
    }
    if(crossings >= 5){ heat -= 6; heatReasons.push("somas caóticas"); }
  }

  heat = Math.max(0, Math.min(100, heat));

  // Determinar estado da mesa e threshold dinâmico
  let tableState, dynThreshold, requireConvergence;
  // ════════════════════════════════════════════════════════════════════════
  // THRESHOLDS · mais entradas mantendo qualidade (cada red = 3 greens · win efetivo c/ gale ~89%)
  // ════════════════════════════════════════════════════════════════════════
  if(heat >= 72){
    tableState = "QUENTE";
    dynThreshold = 0.68;
    requireConvergence = false;
  } else if(heat >= 54){
    tableState = "FAVORÁVEL";
    dynThreshold = 0.71;
    requireConvergence = false;
  } else if(heat >= 40){
    tableState = "NEUTRA";
    dynThreshold = 0.74;
    requireConvergence = false;
  } else if(heat >= 26){
    tableState = "FRIA";
    dynThreshold = 0.80;
    requireConvergence = true;
  } else {
    tableState = "CONGELADA";
    dynThreshold = 0.99;
    requireConvergence = true;
  }

  // Padrões mínimos por estado · padrão único forte vale em QUENTE/FAV/NEUTRA
  let minPatterns = (tableState === "FRIA" || tableState === "CONGELADA") ? 2 : 1;
  let strongSingleOK = false;
  let STRONG_SINGLE = 0.84;
  if(tableState === "QUENTE"){ strongSingleOK = true; STRONG_SINGLE = 0.72; }
  else if(tableState === "FAVORÁVEL"){ strongSingleOK = true; STRONG_SINGLE = 0.75; }
  else if(tableState === "NEUTRA"){ strongSingleOK = true; STRONG_SINGLE = 0.78; }

  // ── FAREJADOR DE EMPATES (usa o heat já calculado) ──
  const hunter = tieHunter(ST.H, heat);
  // Aplica o aprendizado do farejador: ajusta a confiança do cenário conforme
  // o histórico real de acerto daquele cenário (eco/quente/aberta). Não vira entrada.
  if(hunter && ["ECO","QUENTE","ABERTA"].includes(hunter.status)){
    hunter.conf = Math.min(0.95, (hunter.conf || 0) * fatorEmpate(hunter.status));
    hunter.fatorAprendido = fatorEmpate(hunter.status);
  }
  out.hunter = hunter;
  // Atualiza o tie.active com base no farejador (mais inteligente)
  out.tie.active = (hunter.status === "ABERTA" || hunter.status === "QUENTE" || hunter.status === "ECO");
  out.tie.hunterStatus = hunter.status;
  out.tie.hunterConf = hunter.conf;

  // EV gate: cada red vale 3 greens. Piso 0.68 (com gale, win efetivo ~89%)
  const EV_FLOOR = 0.68;

  out.heat = { score: heat, state: tableState, threshold: dynThreshold, reasons: heatReasons, requireConvergence, minPatterns };

  // ── DECISÃO FINAL · COM HEAT + ANTI-ARMADILHA + EV GATE ──
  const effThreshold = Math.max(dynThreshold, EV_FLOOR);
  // CRITÉRIO DE MESA (opção B): entrada normal só em QUENTE/FAVORÁVEL/NEUTRA.
  // Em FRIA/CONGELADA aguarda — a entrada defensiva (mais abaixo) ainda cobre
  // o caso de a mesa esfriar no MEIO de uma sessão já ativa.
  const mesaPermiteEntrada = (tableState === "QUENTE" || tableState === "FAVORÁVEL" || tableState === "NEUTRA");
  if(!mesaPermiteEntrada && !out.exaustao){
    out.signal = "W";
    out.reason = `Mesa ${tableState} · fora do critério de entrada · AGUARDA`;
    out.conf = bestConf;
  } else if(out.exaustao){
    out.signal = "W";
    out.reason = out.exaustaoMotivo || `Exaustão · streak ${st.len}+ ${st.side} · AGUARDA`;
    out.conf = 0;
  } else if(out.regimeFatigado && !(stableCt >= 2 && bestSide && bestSide !== "T")){
    // padrão maduro repetiu demais → bloqueia SÓ se as estradas NÃO confirmam continuação.
    // Se 2+ estradas derivadas estão STABLE (padrão sendo respeitado), deixa a entrada passar.
    out.signal = "W";
    out.reason = `🛑 ${out.regimeMotivo} · pare antes da quebra`;
    out.conf = bestConf;
  } else if(out.profile && out.streakLen >= out.profile.p90 && out.streakLen >= 4){
    // streak na zona de perigo histórica → não perseguir quebra nem continuação
    out.signal = "W";
    out.reason = `⚠️ Streak ${out.streakLen} ${out.streakSide} na zona de perigo (hist máx ${out.profile.max}) · aguardar quebra confirmar`;
    out.conf = bestConf;
  } else if(out.contradiction && !(stableCt >= 2 && roadHint === "CONT")){
    // contradição entre padrões P e B → aguarda, EXCETO quando as estradas derivadas
    // estão alinhadas em continuação (2+ STABLE): aí a continuação desempata, segue o fluxo.
    out.signal = "W";
    out.reason = `Padrões contraditórios · risco alto · AGUARDA`;
    out.conf = bestConf;
  } else if(out.contradiction && stableCt >= 2 && roadHint === "CONT"){
    // desempate por estradas: continuação → segue o último lado
    const lastSide = col.length ? col[col.length-1].r : null;
    if(lastSide && lastSide !== "T"){
      out.signal = lastSide;
      out.conf = Math.min(0.9, bestConf);
      out.reason = `Contradição resolvida pelas estradas (3 STABLE) · continuação ${lbl(lastSide)}`;
    } else {
      out.signal = "W";
      out.reason = `Padrões contraditórios · AGUARDA`;
      out.conf = bestConf;
    }
  } else if(bestSide && bestSide !== "T" && roadHint === "MUDA" &&
            col.length && bestSide === col[col.length-1].r){
    // estradas derivadas dizem MUDA mas o sinal aposta em continuar → conflito → aguarda
    out.signal = "W";
    out.reason = `Gráficos derivados indicam mudança, sinal apostaria continuação · AGUARDA`;
    out.conf = bestConf;
  } else if(bestSide && bestSide !== "T" && roadHint === "CONT" &&
            col.length && bestSide !== col[col.length-1].r &&
            byBet[bestSide].length < 2){
    // estradas dizem CONTINUAR mas padrão ÚNICO aposta na quebra → sem confirmação → aguarda
    out.signal = "W";
    out.reason = `Gráficos derivados indicam continuação, padrão único apostaria quebra · sem confirmação cruzada · AGUARDA`;
    out.conf = bestConf;
  } else if(bestSide && byBet[bestSide].length >= 2 && bestConf >= effThreshold){
    // ── CRUZAMENTO FORTE: 2+ padrões concordam e estradas não contrariam → melhor entrada
    out.signal = bestSide;
    out.conf = bestConf;
    out.reason = bestReason;
    if(roadHint){ out.reason += ` · roads:${roadHint}`; }
  } else if(bestSide && byBet[bestSide].length < minPatterns &&
            strongSingleOK && bestConf >= STRONG_SINGLE){
    // ── PADRÃO ÚNICO FORTE
    const lastSide = col.length ? col[col.length-1].r : null;
    const continua = bestSide === lastSide;
    const estradaContraria = (roadHint === "MUDA" && continua) || (roadHint === "CONT" && !continua);
    // Veto cruzado SÓ em mesa fria/congelada · em quente/favorável/neutra a confiança forte basta
    const vetoAtivo = (tableState === "FRIA" || tableState === "CONGELADA");
    if(estradaContraria && vetoAtivo){
      out.signal = "W";
      out.reason = `Mesa ${tableState} + gráficos derivados contrariam padrão único · AGUARDA`;
      out.conf = bestConf;
    } else {
      out.signal = bestSide;
      out.conf = bestConf;
      out.reason = bestReason + " · padrão único forte (estradas " + (roadHint||"neutras") + ")";
    }
  } else if(bestSide && bestConf >= effThreshold && byBet[bestSide].length >= minPatterns){
    out.signal = bestSide;
    out.conf = bestConf;
    out.reason = bestReason;
    if(roadHint){ out.reason += ` · roads:${roadHint}`; }
  } else {
    out.signal = "W";
    if(bestSide && byBet[bestSide].length < minPatterns){
      out.reason = `Mesa ${tableState} exige ${minPatterns}+ padrões · só ${byBet[bestSide].length} detectado · AGUARDA`;
    } else if(bestSide){
      out.reason = `Conf ${(bestConf*100).toFixed(0)}% < mín ${(effThreshold*100).toFixed(0)}% (mesa ${tableState}) · AGUARDA`;
    } else {
      out.reason = `Mesa ${tableState} · sem padrão forte · AGUARDA`;
    }
    out.conf = bestConf;
  }

  // ════════════════════════════════════════════════════════════════════════
  // FILTRO DE CONVERGÊNCIA ESCALONADO · critério presente em TODOS os estados,
  // mais rígido conforme a mesa piora. Os gráficos derivados convergem de forma
  // matemática nos bons momentos; exigir mais convergência em mesa ruim corta
  // as entradas fracas. Mesa boa tem critério leve (aproveita), mesa ruim só premium.
  // derivedAlign: +n = n estradas derivadas STABLE concordando (0 a 3).
  // ════════════════════════════════════════════════════════════════════════
  if(out.signal === "P" || out.signal === "B"){
    const align = out.derivedAlign || 0;
    const nPad = byBet[out.signal] ? byBet[out.signal].length : 0;
    const boa = (tableState === "QUENTE" || tableState === "FAVORÁVEL");
    const ruim = (tableState === "FRIA" || tableState === "CONGELADA");
    let passa;
    if(boa){
      // mesa boa: critério leve — pelo menos 1 gráfico convergindo OU confiança alta OU 2+ padrões
      passa = (align >= 1) || (out.conf >= 0.80) || (nPad >= 2);
    } else if(ruim){
      // mesa ruim: só PREMIUM — convergência total dos 3 gráficos derivados
      passa = (align >= 3);
    } else {
      // neutra: convergência parcial (2 gráficos) E confiança boa, OU padrão muito forte
      passa = (align >= 2 && out.conf >= 0.78) || (out.conf >= 0.85 && nPad >= 2);
    }
    if(!passa){
      out.signal = "W";
      out.reason = `Mesa ${tableState} · convergência insuficiente (${align}/3 gráficos) para o critério · AGUARDA`;
      out.filtradoConvergencia = true;
    } else if(ruim){
      out.reason = `⭐ PREMIUM · 3 gráficos convergindo em mesa ${tableState} · ${out.reason}`;
    }
  }

  // ════════════════════════════════════════════════════════════════════════
  // ENTRADA DEFENSIVA · se a sessão está ATIVA e o motor já aguardou demais,
  // libera a entrada de MENOR RISCO em vez de deixar o operador parado.
  // Teto de espera ESCALONADO por estado:
  //   · mesa FRIA/NEUTRA/boa: 4 rodadas
  //   · mesa CONGELADA (a pior): 6 rodadas (espera mais, dá tempo da mesa melhorar)
  // Marca para encerrar no próximo green. Nunca fica 100% parada.
  // ════════════════════════════════════════════════════════════════════════
  const TETO_ESPERA = (tableState === "CONGELADA") ? 6 : 4;
  out.defensiva = false;
  if(out.signal === "W" && ST.sessaoAtiva && ST.ciclo === "idle"
     && (ST.esperaSessao || 0) >= TETO_ESPERA
     && bestSide && bestSide !== "T" && !out.contradiction && !out.exaustao){
    out.signal = bestSide;
    out.conf = bestConf;
    out.defensiva = true;
    const ex = (tableState === "CONGELADA") ? " (mesa congelada · entrada de menor risco)" : "";
    out.reason = `🛡️ DEFENSIVA · aguardou ${ST.esperaSessao} rodadas${ex} · menor risco: ${lbl(bestSide)} · ENCERRE no próximo green`;
  }

  // Padrão narrativo
  if(out.dominancia !== "BALANCEADO"){
    out.padrao = `Dominância ${out.dominancia} · P=${out.distrib.P}% B=${out.distrib.B}% T=${out.distrib.T}%`;
  } else {
    out.padrao = `Equilíbrio · P=${out.distrib.P}% B=${out.distrib.B}% T=${out.distrib.T}%`;
  }

  // ── TRAVA FINAL DE SEGURANÇA ──
  // O sinal de entrada JAMAIS pode ser "T" (empate). Empate não é entrada.
  // Se por qualquer caminho o signal virou "T", força AGUARDA.
  if(out.signal === "T") out.signal = "W";

  return out;
}

// ════════════════════════════════════════════════════════════════════════════
// CICLO · entrada / gale / placar
// ════════════════════════════════════════════════════════════════════════════
// ════════════════════════════════════════════════════════════════════════════
// APRENDIZADO · cada padrão que apontou o lado é creditado (acerto) ou debitado (erro)
// acertou = a cor saiu igual ao sinal · errou = saiu o contrário · empate = neutro
// ════════════════════════════════════════════════════════════════════════════
function aprendePadroes(acertou){
  const pats = ST.ciclo_patterns || [];
  if(!pats.length) return;
  if(!ST.deltaAcum) ST.deltaAcum = {};
  if(!ST.countAcum) ST.countAcum = {};
  pats.forEach(name => {
    ST.countAcum[name] = (ST.countAcum[name] || 0) + 1;
    ST.deltaAcum[name] = (ST.deltaAcum[name] || 0) + (acertou ? 1 : -1);
  });
}

// APRENDIZADO POR RODADA · avalia cada padrão de cor detectado contra o resultado real.
// Para cada padrão com sinal P ou B, credita se previu certo, debita se errou.
// Roda em TODA rodada (em sessão ou não), dando amostras rápidas e estatística real.
function aprendeRodada(patterns, resultadoReal){
  if(!patterns || !patterns.length) return;
  if(!ST.deltaAcum) ST.deltaAcum = {};
  if(!ST.countAcum) ST.countAcum = {};
  patterns.forEach(p => {
    if(p.sig !== "P" && p.sig !== "B") return; // só padrões de cor; TIE não entra
    ST.countAcum[p.name] = (ST.countAcum[p.name] || 0) + 1;
    ST.deltaAcum[p.name] = (ST.deltaAcum[p.name] || 0) + (p.sig === resultadoReal ? 1 : -1);
  });
}

// APRENDIZADO DO FAREJADOR DE EMPATE · separado do aprendizado de cor.
// Registra se a previsão do farejador ("vem empate" quando status ECO/QUENTE/ABERTA)
// se confirmou na rodada seguinte. Acumula em tieAcum (≠ deltaAcum dos padrões de cor).
// IMPORTANTE: isto NUNCA gera entrada — empate não é entrada. Serve só para calibrar
// a confiança do aviso de empate e quais cenários (eco/atraso/mesa fria) realmente pagam.
// Aprende em TODA rodada, como os padrões de cor, mas em acumulador próprio.
function aprendeEmpate(tieAntes, resultadoReal){
  if(!tieAntes) return;
  if(!ST.tieAcum) ST.tieAcum = {};
  // status do farejador fica em hunterStatus (ECO/QUENTE/ABERTA/PASSOU/FECHADA)
  const status = tieAntes.hunterStatus || tieAntes.status;
  const ativo = ["ECO","QUENTE","ABERTA"].includes(status);
  if(!ativo) return;
  const cen = status;
  if(!ST.tieAcum[cen]) ST.tieAcum[cen] = {c:0, d:0};
  ST.tieAcum[cen].c += 1;
  ST.tieAcum[cen].d += (resultadoReal === "T" ? 1 : -1);
}

// Fator aprendido do farejador de empate por cenário (mesma curva dos padrões).
function fatorEmpate(cenario){
  const o = ST.tieAcum && ST.tieAcum[cenario];
  if(!o || o.c < 8) return 1;
  const taxa = (o.d / o.c + 1) / 2;
  // Consistente com fatorAprendido: só reforça, nunca derruba (piso 1.0).
  if(taxa >= 0.5) return Math.min(1.15, 1 + (taxa - 0.5) * 0.6);
  return 1.0;
}
// Precisa de pelo menos 8 amostras para começar a influenciar (antes disso = neutro).
function fatorAprendido(name){
  const n = (ST.countAcum && ST.countAcum[name]) || 0;
  if(n < 8) return 1;
  const d = (ST.deltaAcum && ST.deltaAcum[name]) || 0;
  const taxa = (d / n + 1) / 2; // saldo -1..1 → taxa 0..1 (0.5 = neutro)
  // POLÍTICA: só dá empurrãozinho pros bons, NUNCA derruba ninguém.
  // Piso travado em 1.0 — nenhum padrão é penalizado pelo desempenho.
  // taxa ≥ 0.5 → reforça (até 1.15) · taxa < 0.5 → mantém neutro (1.0).
  // O aprendizado continua acumulando em TODOS os padrões (estatística viva),
  // mas o peso nunca cai abaixo do normal.
  if(taxa >= 0.5) return Math.min(1.15, 1 + (taxa - 0.5) * 0.6);
  return 1.0;
}

function confirmEntry(){
  const a = analyze();
  if(!a.signal || a.signal === "W") return;
  ST.ciclo = "entrada";
  ST.ciclo_sinal = a.signal;
  ST.ciclo_conf = a.conf;
  ST.ciclo_razao = a.reason;
  // Guarda os padrões que apontaram o lado escolhido (para o aprendizado)
  ST.ciclo_patterns = (a.patterns||[])
    .filter(p => p.sig === a.signal)
    .map(p => p.name);
  ST.ciclo_tie = a.tie.active ? (a.hunter && a.hunter.payoutProvavel || a.tie.payout) : null;
  ST.ciclo_gale_sinal = null;
  ST.ciclo_gale_dec = null;
  ST.ciclo_gale_tie = null;
  ST.ciclo_aguarda_count = 0;
  // SESSÃO INICIA AQUI · só termina ao clicar finalizar
  ST.sessaoAtiva = true;
  ST.esperaSessao = 0;
  ST.ofereceParada3 = false;
  ST.metaAviso = null;
  let msg = `▶ ENTRADA: ${lbl(a.signal)} · ${(a.conf*100).toFixed(0)}%`;
  if(a.tie.active) msg += ` + EMPATE ${ST.ciclo_tie}`;
  toast(msg, 2800);
  save(); renderRouter();
}

function abortCiclo(){
  ST.ciclo = "idle";
  ST.ciclo_sinal = null;
  ST.ciclo_conf = 0;
  ST.ciclo_razao = "";
  ST.ciclo_patterns = [];
  ST.ciclo_tie = null;
  ST.ciclo_gale_sinal = null;
  ST.ciclo_gale_dec = null;
  ST.ciclo_gale_tie = null;
  ST.ciclo_aguarda_count = 0;
  const estadoMesa = (function(){ try{ return analyze().heat.state; }catch(e){ return null; } })();
  checarMetaStop(estadoMesa);
  save(); renderRouter();
}

// ════════════════════════════════════════════════════════════════════════
// GESTÃO DE RISCO · Meta 5-0 líquido · 2 loss finalizam a sessão
// Empate é bônus (não conta pra meta), EXCETO 88x que conta como ponto extra
// ════════════════════════════════════════════════════════════════════════
const META_LIQUIDO = 5;   // greens líquidos ponderados para bater a meta
const STOP_LOSS = 2;      // reds para avaliar stop
const PESO_RED = 3;       // cada red consome 3 greens
function checarMetaStop(estadoMesa){
  if(!ST.sessaoAtiva) return;
  // Líquido PONDERADO: cada red vale -3 greens.
  const liquido = ST.greens - (ST.reds * PESO_RED);
  // STOP · 2 loss e líquido ainda negativo (greens não recuperaram os reds) → encerra
  if(ST.reds >= STOP_LOSS && liquido < 0){
    ST.metaAviso = { tipo:"stop", msg:`🛑 STOP · ${ST.reds} loss · saldo ponderado ${liquido} (cada red = -3 greens) · sessão encerrada para proteger a banca` };
    ST.metaAvisoVisto = false;
    ST.sessaoAtiva = false;
    return;
  }
  // META · 5 greens líquidos ponderados (já descontados os reds)
  if(liquido >= META_LIQUIDO){
    ST.metaAviso = { tipo:"meta", msg:`🎯 META BATIDA · ${liquido} greens líquidos · pare no lucro!` };
    ST.metaAvisoVisto = false;
    ST.sessaoAtiva = false;
    return;
  }
  // PARADA OPCIONAL · +3 líquido → SÓ oferece quando a MESA está RUIM (fria/congelada).
  // Em mesa boa segue direto até os 5, sem poluir com popup.
  const mesaRuim = (estadoMesa === "FRIA" || estadoMesa === "CONGELADA");
  if(liquido >= 3 && liquido < META_LIQUIDO && mesaRuim && !ST.ofereceParada3){
    ST.ofereceParada3 = true;
    ST.metaAviso = { tipo:"opcional", msg:`✅ +${liquido} líquidos garantidos e a mesa está ruim agora. Pode parar aqui no lucro — ou seguir até os 5. Você decide.` };
    ST.metaAvisoVisto = false;
    // sessão continua ativa de propósito
  }
}

function hunterAtivo(a){
  return a && a.hunter && (a.hunter.status === "ABERTA" || a.hunter.status === "QUENTE" || a.hunter.status === "ECO");
}

function addRound(r, sNum){
  const s = parseInt(sNum) || 0;
  // SNAPSHOT para o desfazer: guarda estado completo ANTES de processar a rodada
  // (assim o desfazer reverte green/red e o ciclo, não só o histórico)
  if(!ST.undoStack) ST.undoStack = [];
  ST.undoStack.push({
    greens: ST.greens, reds: ST.reds, bonus: ST.bonus,
    ciclo: ST.ciclo, ciclo_sinal: ST.ciclo_sinal, ciclo_conf: ST.ciclo_conf,
    ciclo_razao: ST.ciclo_razao, ciclo_tie: ST.ciclo_tie,
    ciclo_gale_sinal: ST.ciclo_gale_sinal, ciclo_gale_dec: ST.ciclo_gale_dec,
    ciclo_gale_tie: ST.ciclo_gale_tie, ciclo_aguarda_count: ST.ciclo_aguarda_count,
    sessaoAtiva: ST.sessaoAtiva
  });
  if(ST.undoStack.length > 50) ST.undoStack.shift();

  // ANALISAR ANTES de adicionar — para saber estado do farejador no momento da rodada
  // (se eu analiso depois, o dist vira 0 e o farejador muda de estado, perdendo o "ativo")
  const aBefore = analyze();
  const hunterAntes = hunterAtivo(aBefore);
  ST.H.push({r, s});

  // ════════════════════════════════════════════════════════════════════════
  // APRENDIZADO POR RODADA · cada padrão detectado ANTES desta rodada é avaliado
  // contra o resultado REAL que acabou de cair (r), em TODA rodada registrada,
  // esteja em sessão ou não. Assim cada padrão acumula amostras de verdade e o
  // fatorAprendido ajusta o peso rápido conforme o desempenho real na mesa.
  // Empates (r==="T") não avaliam padrões de cor (P/B), pois não confirmam nem negam.
  if(r === "P" || r === "B"){
    aprendeRodada(aBefore.patterns || [], r);
  }
  // Aprendizado do farejador de empate · roda em TODA rodada (T conta como acerto da
  // previsão de empate; P/B contam como erro). Separado, NUNCA vira entrada.
  aprendeEmpate(aBefore.tie, r);

  // ════════════════════════════════════════════════════════════════════════
  // APARADOR DE HISTÓRICO · mantém o arquivo pequeno SEM perder aprendizado.
  // A rodada que acabou de cair JÁ ensinou os padrões e o farejador acima
  // (deltaAcum/countAcum/tieAcum guardam o conhecimento de TODAS as rodadas
  // para sempre). Então as rodadas mais antigas podem sair do histórico bruto:
  // o motor só precisa das últimas ~150 para ler qualquer padrão.
  // Resultado: aprendizado infinito e sólido, arquivo de tamanho fixo.
  const MAX_HIST = 150;
  if(ST.H.length > MAX_HIST){
    ST.H = ST.H.slice(-MAX_HIST);
  }

  // ════════════════════════════════════════════════════════════════════════
  // EMPATE · regras definitivas:
  // 1) Com aposta na mesa (entrada/gale) → GREEN, encerra ciclo (push)
  // 2) aguarda_gale → alto+farejador=GREEN(cobre) · baixo+farejador=BÔNUS · sem farejador=neutro (gale segue)
  // 3) Fora de aposta, farejador ATIVO → alto=GREEN · baixo=BÔNUS
  // 4) Fora de aposta, sem farejador → neutro
  // BÔNUS só existe com farejador ATIVO. Empate NUNCA gera gale, NUNCA é loss, NUNCA é entrada.
  // ════════════════════════════════════════════════════════════════════════
  if(r === "T"){
    const pay = payoutDaSoma(s);
    const isHighPay = ["10x","25x","88x"].includes(pay);

    // ── BOTÃO COBRIR EMPATE (admin) ──
    // Se o admin ligou a cobertura de empate, QUALQUER empate (alto ou baixo)
    // conta GREEN imediatamente. A cobertura é consumida (desliga) após pagar.
    // Não interfere no farejador nem nas demais regras quando está desligada.
    if(ST.coberturaEmpate){
      ST.greens++;
      if(isHighPay) celebraPaga(pay);
      flashResultado('GREEN', `✅ GREEN · empate coberto · ${pay}`);
      ST.coberturaEmpate = false; // cobertura usada
      if(ST.ciclo === "entrada" || ST.ciclo === "gale" || ST.ciclo === "aguarda_gale") abortCiclo();
      else { save(); renderRouter(); }
      return;
    }

    // CASO ESPECIAL · aguarda_gale (perdeu a entrada, gale ainda não saiu):
    //  · empate ALTO + farejador ATIVO  → GREEN (cobre a entrada, cancela o gale)
    //  · empate BAIXO + farejador ATIVO → BÔNUS (gale segue)
    //  · empate sem farejador ativo (alto ou baixo) → NEUTRO (gale segue, não conta bônus)
    // BÔNUS só existe quando o farejador está ATIVO. Sem farejador, empate é neutro.
    if(ST.ciclo === "aguarda_gale"){
      if(hunterAntes && isHighPay){
        ST.greens++;
        celebraPaga(pay);
        toast(`🔥 ${pay} cobriu a entrada perdida (farejador ativo) · GALE CANCELADO`, 4000);
        abortCiclo();
      } else if(hunterAntes && !isHighPay){
        ST.bonus = (ST.bonus || 0) + 1;
        toast(`✨ BÔNUS · empate ${pay} (farejador ativo) · GALE SEGUE`, 3500);
        save(); renderRouter();
      } else {
        // sem farejador ativo → neutro, gale segue
        toast(`↻ Empate ${pay} · GALE SEGUE`, 2800);
        save(); renderRouter();
      }
      return;
    }

    const temAposta = (ST.ciclo === "entrada" || ST.ciclo === "gale");

    if(temAposta){
      // Estava com aposta na mesa (entrada ou gale já lançado) → push, green, encerra
      ST.greens++;
      if(isHighPay) celebraPaga(pay);
      else flashResultado('GREEN', `✅ GREEN · empate na entrada · ${pay}`);
      abortCiclo();
    } else if(hunterAntes && isHighPay){
      // Farejador ativo + empate alto → GREEN
      ST.greens++;
      celebraPaga(pay);
      save(); renderRouter();
    } else if(hunterAntes && !isHighPay){
      // Farejador ativo + empate baixo → BÔNUS
      ST.bonus = (ST.bonus || 0) + 1;
      toast(`✨ BÔNUS · empate ${pay}`, 2800);
      save(); renderRouter();
    } else {
      // Sem farejador, sem aposta → neutro
      toast(`↻ Empate ${pay}`, 2200);
      save(); renderRouter();
    }
    return;
  }

  // ════════════════════════════════════════════════════════════════════════
  // COR (P ou B) · CICLO STATE MACHINE: idle | entrada | aguarda_gale | gale
  // aguarda_gale tem TETO de 2 rodadas. Depois disso o gale entra forçado
  // para não passar mais de 2 rodadas sem agir após a entrada perdida.
  // ════════════════════════════════════════════════════════════════════════
  if(ST.ciclo === "entrada"){
    const sig = ST.ciclo_sinal;
    if(r === sig){
      ST.greens++;
      // (aprendizado agora é por rodada · aprendeRodada já creditou os padrões acima)
      flashResultado('GREEN', `✅ GREEN · ${lbl(r)}`);
      abortCiclo();
    } else {
      // (aprendizado por rodada · aprendeRodada já debitou os padrões acima)
      // Cor errada → decidir gale
      const a2 = analyze();
      if(a2.signal === "P" || a2.signal === "B"){
        // Motor tem sinal claro → gale imediato
        ST.ciclo = "gale";
        ST.ciclo_gale_sinal = a2.signal;
        ST.ciclo_gale_dec = (a2.signal === sig) ? "MANTER" : "INVERTER";
        ST.ciclo_gale_tie = a2.tie.active ? (a2.hunter && a2.hunter.payoutProvavel) : null;
        let gmsg = `⚡ GALE ${lbl(a2.signal)} · ${ST.ciclo_gale_dec}`;
        if(a2.tie.active) gmsg += ` + EMPATE ${ST.ciclo_gale_tie}`;
        toast(gmsg, 3500);
      } else {
        // Motor incerto → aguarda gale com TETO de 2 rodadas
        ST.ciclo = "aguarda_gale";
        ST.ciclo_aguarda_count = 0;
        ST.ciclo_gale_sinal = null;
        ST.ciclo_gale_dec = "AGUARDAR";
        ST.ciclo_gale_tie = null;
        toast(`⏳ AGUARDAR · motor analisando · máximo 2 rodadas`, 3500);
      }
      save(); renderRouter();
    }
  } else if(ST.ciclo === "aguarda_gale"){
    // Nova rodada registrada · re-analisa e decide
    ST.ciclo_aguarda_count = (ST.ciclo_aguarda_count || 0) + 1;
    const MAX_AGUARDA = 3;
    const a2 = analyze();
    if(a2.signal === "P" || a2.signal === "B"){
      // Motor agora tem sinal claro → gale com esse sinal
      ST.ciclo = "gale";
      ST.ciclo_gale_sinal = a2.signal;
      ST.ciclo_gale_dec = (a2.signal === ST.ciclo_sinal) ? "MANTER" : "INVERTER";
      ST.ciclo_gale_tie = a2.tie.active ? (a2.hunter && a2.hunter.payoutProvavel) : null;
      let gmsg = `⚡ ENTRAR no GALE · ${lbl(a2.signal)} · ${ST.ciclo_gale_dec}`;
      if(a2.tie.active) gmsg += ` + EMPATE ${ST.ciclo_gale_tie}`;
      toast(gmsg, 3800);
    } else if(ST.ciclo_aguarda_count >= MAX_AGUARDA){
      // ════════════════════════════════════════════════════════════════
      // Teto atingido · SEMPRE FAZ O GALE com a melhor leitura disponível
      // Direção determinada AUTOMATICAMENTE pela tendência das últimas 8:
      // - Lado dominante (mesmo que pouco): vai com ele
      // - 4/4 verdadeiro (raríssimo): INVERTER por segurança
      // Decisão MANTER ou INVERTER sai automaticamente da análise
      // ════════════════════════════════════════════════════════════════
      const recent = ST.H.filter(x=>x.r!=='T').slice(-8);
      const pCount = recent.filter(x=>x.r==='P').length;
      const bCount = recent.filter(x=>x.r==='B').length;
      let galeSide, motivo;
      if(pCount > bCount){
        galeSide = 'P';
        motivo = `tendência P (${pCount}/${recent.length})`;
      } else if(bCount > pCount){
        galeSide = 'B';
        motivo = `tendência B (${bCount}/${recent.length})`;
      } else {
        galeSide = opos(ST.ciclo_sinal);
        motivo = 'equilíbrio · INVERTER';
      }
      const dec = galeSide === ST.ciclo_sinal ? "MANTER" : "INVERTER";
      ST.ciclo = "gale";
      ST.ciclo_gale_sinal = galeSide;
      ST.ciclo_gale_dec = `${dec} (limite · ${motivo})`;
      ST.ciclo_gale_tie = a2.tie.active ? (a2.hunter && a2.hunter.payoutProvavel) : null;
      let gmsg = `⚡ GALE ${lbl(galeSide)} · ${dec} · ${motivo}`;
      if(a2.tie.active) gmsg += ` + EMPATE ${ST.ciclo_gale_tie}`;
      toast(gmsg, 4500);
    } else {
      // Continua aguardando (ainda dentro do teto)
      toast(`⏳ Aguardando gale · ${ST.ciclo_aguarda_count}/${MAX_AGUARDA} rodadas`, 2500);
    }
    save(); renderRouter();
  } else if(ST.ciclo === "gale"){
    const galeSide = ST.ciclo_gale_sinal || opos(ST.ciclo_sinal);
    if(r === galeSide){
      ST.greens++;
      flashResultado('GREEN', `✅ GREEN GALE · ${lbl(r)}`);
      abortCiclo();
    } else {
      ST.reds++;
      flashResultado('RED', `❌ RED · entrada e gale falharam`);
      abortCiclo();
    }
  } else {
    // idle · cor sem entrada confirmada → só registra
    // Conta espera de sessão: se sessão ativa e motor não deu sinal de cor, soma 1.
    // Isso alimenta a ENTRADA DEFENSIVA quando o caos persiste (teto de 4 rodadas).
    if(ST.sessaoAtiva){
      const aNow = analyze();
      if(aNow.signal === "P" || aNow.signal === "B"){
        ST.esperaSessao = 0; // motor voltou a ter sinal → zera espera
      } else {
        ST.esperaSessao = (ST.esperaSessao || 0) + 1;
      }
    }
    save(); renderRouter();
  }
}

// Recálculo retroativo: descobre empates que estavam com farejador ativo no histórico
// e oferece adicionar esses greens perdidos (útil quando o app rodou com bug antes)
window.recalcularEmpates = function(){
  if(!ST.H || ST.H.length < 12){ toast("Histórico curto demais para recalcular", 2500); return; }
  let greensDeEmpate = 0;
  let detalhes = [];
  ST.H.forEach((x,i)=>{
    if(x.r !== "T") return;
    // estado do farejador no momento ANTES deste empate
    const histAntes = ST.H.slice(0, i);
    if(histAntes.length < 12) return;
    // simular o tieHunter com o histórico parcial
    const heat = 40; // assumir mesa fria/neutra como média
    const h = tieHunter(histAntes, heat);
    if(h && (h.status === "ABERTA" || h.status === "QUENTE" || h.status === "ECO")){
      greensDeEmpate++;
      detalhes.push(`rodada ${i}: T s=${x.s} · ${h.status}`);
    }
  });
  const diff = greensDeEmpate - ST.greens;
  if(greensDeEmpate === 0){
    toast(`Nenhum empate com farejador ativo encontrado`, 3000);
    return;
  }
  const msg = `Histórico analisado:\n\n• ${greensDeEmpate} empates aconteceram com farejador ATIVO\n• Você tem ${ST.greens} green(s) registrados\n\nQuer SOBRESCREVER o placar para ${greensDeEmpate} greens? (Reds atuais: ${ST.reds} ficam)\n\nOu CANCELAR para não mexer.`;
  if(confirm(msg)){
    ST.greens = greensDeEmpate;
    save();
    toast(`✓ Placar ajustado · ${greensDeEmpate} greens de empate computados`, 4000);
    renderRouter();
  }
};

function undo(){
  if(ST.H.length === 0){ toast("Nada para desfazer", 1800); return; }
  ST.H.pop();
  // Restaura o estado completo de ANTES da última rodada (reverte green/red e ciclo)
  if(ST.undoStack && ST.undoStack.length){
    const snap = ST.undoStack.pop();
    const g0 = ST.greens, r0 = ST.reds;
    ST.greens = snap.greens;
    ST.reds = snap.reds;
    ST.bonus = snap.bonus;
    ST.ciclo = snap.ciclo;
    ST.ciclo_sinal = snap.ciclo_sinal;
    ST.ciclo_conf = snap.ciclo_conf;
    ST.ciclo_razao = snap.ciclo_razao;
    ST.ciclo_tie = snap.ciclo_tie;
    ST.ciclo_gale_sinal = snap.ciclo_gale_sinal;
    ST.ciclo_gale_dec = snap.ciclo_gale_dec;
    ST.ciclo_gale_tie = snap.ciclo_gale_tie;
    ST.ciclo_aguarda_count = snap.ciclo_aguarda_count;
    ST.sessaoAtiva = snap.sessaoAtiva;
    let msg = "↩ Rodada desfeita";
    if(g0 > snap.greens) msg += " · green removido";
    if(r0 > snap.reds) msg += " · red removido";
    toast(msg, 2500);
    save(); renderRouter();
  } else {
    // sem snapshot (rodada antiga) → só remove do histórico
    abortCiclo();
  }
}

function reset(){
  if(!confirm("Zerar tudo? (histórico, placar)")) return;
  ST.H = []; ST.greens = 0; ST.reds = 0; ST.bonus = 0; ST.coberturaEmpate = false;
  ST.deltaAcum = {}; ST.countAcum = {}; ST.tieAcum = {};
  ST.metaAviso = null; ST.sessaoAtiva = false; ST.esperaSessao = 0;
  abortCiclo();
}

function finalizarSessao(){
  const total = ST.greens + ST.reds;
  const rate = total > 0 ? Math.round(100 * ST.greens / total) : 0;
  if(!confirm(`Finalizar sessão?\n\n✅ ${ST.greens} GREEN · ❌ ${ST.reds} RED · ${rate}% rate\n\n• Placar será zerado\n• Aprendizado, histórico e pesos serão mantidos\n• Sessão #${ST.sessoes + 1} iniciada`)) return;
  copyJSON();
  ST.greens = 0;
  ST.reds = 0;
  ST.bonus = 0;
  ST.coberturaEmpate = false;
  ST.sessoes++;
  ST.ofereceParada3 = false;
  ST.sessaoAtiva = false;
  ST.esperaSessao = 0;
  ST.metaAviso = null;
  abortCiclo();
  toast(`✓ Sessão finalizada · ${rate}% rate · JSON copiado`, 3500);
  save();
}

function injectJSON(){
  try{
    const d = JSON.parse(ST.injTxt);
    // O aprendizado (deltaAcum/countAcum/tieAcum) já vem destilado no JSON, então
    // não precisamos do histórico inteiro. Mantemos só as últimas 150 rodadas para
    // o motor ler padrões — o conhecimento das antigas já está nos contadores abaixo.
    if(d.history && Array.isArray(d.history)){
      ST.H = d.history.length > 150 ? d.history.slice(-150) : d.history;
    }
    if(typeof d.greens === "number") ST.greens = d.greens;
    if(typeof d.reds === "number") ST.reds = d.reds;
    if(d.weights){
      // Aceita formato novo (números diretos) ou antigo (objeto base/ceil)
      for(const k of Object.keys(d.weights)){
        const v = d.weights[k];
        if(typeof v === "number"){
          ST.weights[k] = v;
        } else if(v && typeof v.base === "number"){
          // mapear nomes antigos para novos
          const map = {
            "PING_PONG_4P":"PP4","PING_PONG_23":"PP4",
            "BLOCO_2x2_TROCA":"B22T","BLOCO_2x2_CONT":"B22C",
            "STREAK_QUEBRA":"SK4Q","STREAK_CONT":"SK4C",
            "REEQUIL_B":"RE7","REEQUIL_P":"RE7",
            "TIE_GATILHO":"TIE"
          };
          if(map[k]) ST.weights[map[k]] = v.base;
          else if(ST.weights[k] !== undefined) ST.weights[k] = v.base;
        }
      }
    }
    if(d.deltaAcum) ST.deltaAcum = d.deltaAcum;
    if(d.countAcum) ST.countAcum = d.countAcum;
    if(d.tieAcum) ST.tieAcum = d.tieAcum;
    if(typeof d.sessoes === "number") ST.sessoes = d.sessoes + 1;
    save();
    toast(`✓ ${ST.H.length} rodadas carregadas · ${ST.greens}/${ST.reds}`);
    ST.injTxt = "";
    ST.jsonOpen = false;
    renderRouter();
  }catch(e){
    toast("❌ JSON inválido");
  }
}

function exportJSON(){
  const total = ST.greens + ST.reds;
  const rate = total > 0 ? Math.round(100 * ST.greens / total) : 0;
  return JSON.stringify({
    history: ST.H,
    greens: ST.greens,
    reds: ST.reds,
    rate,
    weights: ST.weights,
    sessoes: ST.sessoes,
    deltaAcum: ST.deltaAcum,
    countAcum: ST.countAcum,
    tieAcum: ST.tieAcum || {},
    timestamp: new Date().toISOString()
  }, null, 2);
}

function copyJSON(){
  const txt = exportJSON();
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(()=>{toast("📋 JSON copiado!");}).catch(()=>{fallbackCopy(txt);});
  } else {
    fallbackCopy(txt);
  }
}
function fallbackCopy(t){
  const ta = document.createElement("textarea");
  ta.value = t;
  document.body.appendChild(ta);
  ta.select();
  try{document.execCommand("copy");toast("📋 JSON copiado!");}catch(e){}
  document.body.removeChild(ta);
}

      ${tieInfo?`<div style="margin-top:8px;display:inline-block;padding:5px 12px;background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.4);border-radius:8px;font-size:12px;color:var(--gold2);font-family:var(--mono);font-weight:700">🔥 + EMPATE ${tieInfo}</div>`:''}
      <div style="margin-top:12px;padding:10px 12px;background:rgba(34,211,238,.06);border:1px solid rgba(34,211,238,.2);border-radius:10px;text-align:left;${mostrarDica?'':'display:none'}">

      // ADMIN: vê o botão de confirmar a entrada.
      // ASSINANTE: NÃO vê a entrada antes da confirmação do admin — vê tela de espera.
      // (a entrada confirmada aparece pra ele quando o ciclo vira "entrada", sincronizado via Firebase)

        : `<div class="wait-card" style="margin-top:10px;padding:14px"><div class="wait-act" style="font-size:12px">⏳ SESSÃO ATIVA · analisando a mesa · aguarde o próximo sinal</div></div>`;
    } else if(!ST.sessaoAtiva && !bomMomento){
      return `<div style="margin-top:10px;padding:16px;background:linear-gradient(135deg,rgba(245,158,11,.08),rgba(0,0,0,.3));border:1px solid rgba(245,158,11,.3);border-radius:12px">

          👇 No rodapé tem o horário da <strong style="color:var(--cyan)">próxima sessão ao vivo</strong>. Avisamos com <strong style="color:var(--txt)">30 minutos de antecedência</strong>.

    const cnt = ST.ciclo_aguarda_count || 0;
    return `<div style="margin-top:10px;padding:16px;background:linear-gradient(135deg,rgba(148,163,184,.08),rgba(0,0,0,.3));border:2px dashed rgba(148,163,184,.35);border-radius:14px;text-align:center">
      <div style="font-size:10px;color:var(--txt3);font-family:var(--mono);letter-spacing:3px;margin-bottom:6px">⏳ AGUARDANDO GALE</div>
      <div style="font-size:22px;font-weight:900;color:var(--gold2);font-family:var(--mono);margin:4px 0">${cnt}/3 rodadas</div>
      <div style="font-size:11px;color:var(--txt2);font-family:var(--mono);line-height:1.6">
        Motor refinando para evitar red.<br/>
        ${cnt < 3 ? `Após <strong style="color:var(--txt)">${3-cnt}</strong> rodada(s) sem sinal, o gale entra automaticamente.` : 'Próxima rodada: gale forçado'}<br/>
        Entrada anterior: <strong>${lbl(ST.ciclo_sinal)}</strong>
      </div>
    </div>`;
  } else if(ST.ciclo === "gale"){
    const gSide = ST.ciclo_gale_sinal || opos(ST.ciclo_sinal);
    const gDec = ST.ciclo_gale_dec || "INVERTER";
    const sub = `Decisão: ${gDec} · entrada anterior foi ${lbl(ST.ciclo_sinal)}${forAdmin?' · registre resultado':''}`;
    return cardSinalGrande(`⚡ GALE · ENTRAR AGORA`, gSide, sub, ST.ciclo_gale_tie);
  }
  return "";
}

function renderApp(){
  const a = analyze();
  const total = ST.greens + ST.reds;
  const rate = total > 0 ? Math.round(100*ST.greens/total) : 0;
  const root = document.getElementById("root");

  // Bead road render — últimas 90 rodadas (15 colunas de 6), mais novas à direita
  const beadCells = [];
  const BEAD_MAX = 90;
  const beadH = ST.H.slice(-BEAD_MAX);
  const colCount = Math.ceil(beadH.length / 6);
  for(let c=0;c<colCount;c++){
    for(let r=0;r<6;r++){
      const idx = c*6+r;
      if(idx < beadH.length){
        const x = beadH[idx];
        beadCells.push(`<div class="bead ${x.r.toLowerCase()}">${x.s||""}</div>`);
      } else {
        beadCells.push(`<div></div>`);
      }
    }
  }

  // Big Road render
  let bigCells = "";
  if(a.roads && a.roads.big){
    const big = a.roads.big;
    const maxRows = 6;
    for(let c=0;c<big.length;c++){
      for(let r=0;r<maxRows;r++){
        if(big[c] && big[c][r]){
          bigCells += `<div class="cell ${big[c][r].toLowerCase()}"></div>`;
        } else {
          bigCells += `<div class="cell-empty"></div>`;
        }
      }
    }
  }

  // Derived render
  function renderDR(rd){
    let s = "";
    const rows = 6;
    const cols = Math.ceil(rd.length / rows);
    for(let c=0;c<cols;c++){
      for(let r=0;r<rows;r++){
        const idx = c*rows+r;
        if(idx < rd.length){
          s += `<div class="cell-${rd[idx]==="R"?"r":"b"}"></div>`;
        } else {
          s += `<div class="cell-empty"></div>`;
        }
      }
    }
    return s;
  }

  // Patterns breakdown
  let patHtml = "";
  if(a.patterns.length === 0){
    patHtml = `<div class="pat-row"><div class="pat-name">Nenhum padrão detectado</div><div class="pat-conf">—</div></div>`;
  } else {
    a.patterns.sort((x,y)=>y.conf-x.conf).slice(0,6).forEach(p=>{
      const cls = p.hi ? "high" : (p.conf >= ST.weights.min_conf ? "act" : "");
      patHtml += `<div class="pat-row ${cls}">
        <div class="pat-name ${cls}">${p.name} → ${lbl(p.sig)}</div>
        <div class="pat-conf">${(p.conf*100).toFixed(0)}%</div>
      </div>`;
    });
  }

  // Tie pays
  const tieHi = a.tie.payout;
  const hunterOpen = a.hunter && (a.hunter.status==='ABERTA' || a.hunter.status==='QUENTE' || a.hunter.status==='ECO');
  const provavel = a.hunter ? a.hunter.payoutProvavel : null;
  const tieRows = [
    ["88x","2,12",a.tie.probs["88x_2_12"]],
    ["25x","3,11",a.tie.probs["25x_3_11"]],
    ["10x","4,10",a.tie.probs["10x_4_10"]],
    ["6x","5,9",a.tie.probs["6x_5_9"]],
    ["4x","6,7,8",a.tie.probs["4x_6_8"]]
  ];
  const tiePays = tieRows.map(([n,t,p])=>{
    // destaca a faixa provável do farejador quando a janela está aberta
    const isHi = hunterOpen && provavel && provavel.includes(n);
    return `<div class="pay-cell ${isHi?'hot':''}">
      <div class="pay-num">${n}</div>
      <div class="pay-pct">${t}</div>
    </div>`;
  }).join("");

  // Signal main
  // A COR só pode ser revelada quando: é admin, OU o ciclo já foi confirmado pelo
  // admin (entrada/gale/aguarda_gale). Para o assinante em idle, NUNCA mostra a cor —
  // mesmo que o motor já tenha um sinal, ele só aparece após a CONFIRMAÇÃO do admin.
  const cicloConfirmado = (ST.ciclo === "entrada" || ST.ciclo === "gale" || ST.ciclo === "aguarda_gale");
  const podeRevelarCor = isAdmin() || cicloConfirmado;
  let sigClass = "w", sigText = "AGUARDA", confColor = "#475569";
  if(podeRevelarCor){
    if(a.signal === "P"){sigClass="p";sigText="AZUL";confColor="#3b82f6";}
    else if(a.signal === "B"){sigClass="b";sigText="VERMELHO";confColor="#ef4444";}
    else if(a.signal === "T"){sigClass="t";sigText="EMPATE";confColor="#f59e0b";}
  } else {
    // assinante, sinal existe mas não confirmado → mostra ANALISANDO, sem cor
    if(a.signal === "P" || a.signal === "B" || a.signal === "T"){
      sigClass = "w"; sigText = "ANALISANDO"; confColor = "#475569";
    }
  }

  // Tie badge junto da entrada — dirigido pelo farejador
  let tieBadge = "";
  if(a.hunter && (a.hunter.status==='ABERTA' || a.hunter.status==='QUENTE' || a.hunter.status==='ECO')){
    const lbl2 = a.hunter.status==='QUENTE'?'IMINENTE':a.hunter.status==='ECO'?'NA QUINA':'PRÓXIMO';
    tieBadge = `<div style="display:inline-block;margin-top:8px;padding:6px 12px;background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(245,158,11,.05));border:1px solid rgba(245,158,11,.4);border-radius:9px;font-size:13px;color:var(--gold2);font-family:var(--mono);font-weight:700">
        🐕 FAREJADOR: EMPATE ${lbl2} · ${a.hunter.payoutProvavel||'4x'}
      </div>`;
  } else if(a.hunter && a.hunter.status==='PASSOU'){
    tieBadge = `<div style="display:inline-block;margin-top:8px;padding:6px 12px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:9px;font-size:11px;color:var(--red2);font-family:var(--mono)">
        🛑 Empate já passou · não apostar no tie agora
      </div>`;
  }

// AUTENTICAÇÃO · ASSINATURA + ADMIN
// ════════════════════════════════════════════════════════════════════════════
const AUTH = {
  view: "loading", // loading | lock | admin | app
  key: localStorage.getItem("bacbru_key") || "",
  nome: localStorage.getItem("bacbru_nome") || "",
  adminToken: localStorage.getItem("bacbru_admin") || "",
  keys: {},          // keys carregadas do firebase
  config: { sessoes: [], adminHash: null, admins: {} },
  msg: "",
  keyInput: "",
  pwInput: "",
  newKeyName: "",
  newKeyTipo: "mensal",
  newSessao: "",
  newAdminNome: "",
  newAdminPw: "",
  secretCount: 0,
  secretTimer: null
};

// hash simples (não-criptográfico, suficiente p/ gate de acesso)
function simpleHash(s){
  let h = 5381;
  for(let i=0;i<s.length;i++){ h = ((h<<5)+h) + s.charCodeAt(i); h = h & h; }
  return "h" + (h>>>0).toString(36);
}

function genKey(tipo){
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let k = "";
  for(let i=0;i<6;i++) k += chars[Math.floor(Math.random()*chars.length)];
  const prefix = tipo === "vitalicia" ? "BRU-V-" : tipo === "teste" ? "BRU-T-" : "BRU-M-";
  return prefix + k;
}

function keyIsValid(rec){
  if(!rec || !rec.ativo) return false;
  if(rec.tipo === "vitalicia") return true;
  if(rec.expiraEm && Date.now() > rec.expiraEm) return false;
  return true;
}

function initAuth(){
  // Carrega config (sessões + admins) e chaves
  db.ref("config").on("value", s => {
    const c = s.val() || {};
    AUTH.config.sessoes = c.sessoes || [];
    AUTH.config.adminHash = c.adminHash || null; // master (compatibilidade)
    AUTH.config.admins = c.admins || {};         // { hash: {nome, master} }
    routeAuth();
  });
  db.ref("keys").on("value", s => {
    AUTH.keys = s.val() || {};
    routeAuth();
  });
}

// verifica se um hash é admin (master antigo OU lista de admins)
function hashIsAdmin(hash){
  if(!hash) return false;
  if(AUTH.config.adminHash && hash === AUTH.config.adminHash) return true;
  if(AUTH.config.admins && AUTH.config.admins[hash]) return true;
  return false;
}

function routeAuth(){
  // Admin reconhecido pelo dispositivo?
  if(AUTH.adminToken && hashIsAdmin(AUTH.adminToken)){
    if(AUTH.view === "loading" || AUTH.view === "lock") AUTH.view = "app";
  } else if(AUTH.key && keyIsValid(AUTH.keys[AUTH.key])){
    // recupera o nome do assinante da chave (caso o localStorage do nome esteja vazio)
    if(!AUTH.nome){
      const rec = AUTH.keys[AUTH.key];
      AUTH.nome = (rec && rec.nome && rec.nome !== "sem nome") ? rec.nome : "";
      if(AUTH.nome) localStorage.setItem("bacbru_nome", AUTH.nome);
    }
    if(AUTH.view === "loading" || AUTH.view === "lock") AUTH.view = "app";
  } else {
    if(AUTH.view === "loading" || AUTH.view === "app") AUTH.view = "lock";
  }
  renderRouter();
}

function isAdmin(){
  return AUTH.adminToken && hashIsAdmin(AUTH.adminToken);
}

// ── Ações de acesso ──
window.tentarChave = function(){
  const k = (AUTH.keyInput||"").trim().toUpperCase();
  if(!k){ AUTH.msg = "Digite sua chave"; renderRouter(); return; }
  const rec = AUTH.keys[k];
  if(keyIsValid(rec)){
    AUTH.key = k;
    AUTH.nome = (rec && rec.nome && rec.nome !== "sem nome") ? rec.nome : "";
    localStorage.setItem("bacbru_key", k);
    localStorage.setItem("bacbru_nome", AUTH.nome || "");
    AUTH.msg = "";
    AUTH.view = "app";
    renderRouter();
  } else if(rec && !keyIsValid(rec)){
    AUTH.msg = "Chave expirada ou desativada";
    renderRouter();
  } else {
    AUTH.msg = "Chave inválida";
    renderRouter();
  }
};

window.abrirAdmin = function(){
  if(isAdmin()){ AUTH.view = "admin"; renderRouter(); return; }
  AUTH.view = "adminLogin";
  renderRouter();
};

// Toque secreto: 5 toques na logo/dadinhos abre o admin (escondido dos assinantes)
window.secretAdmin = function(){
  AUTH.secretCount++;
  clearTimeout(AUTH.secretTimer);
  AUTH.secretTimer = setTimeout(()=>{ AUTH.secretCount = 0; renderRouter(); }, 1500);
  if(AUTH.secretCount >= 5){
    AUTH.secretCount = 0;
    clearTimeout(AUTH.secretTimer);
    abrirAdmin();
  } else {
    renderRouter();
  }
};

window.loginAdmin = function(){
  const pw = (AUTH.pwInput||"").trim();
  if(!pw){ AUTH.msg = "Digite a senha-mestra"; renderRouter(); return; }
  const hash = simpleHash(pw);
  const semAdmins = !AUTH.config.adminHash && (!AUTH.config.admins || Object.keys(AUTH.config.admins).length === 0);
  if(semAdmins){
    // primeira configuração — define o admin-mestre
    db.ref("config/adminHash").set(hash);
    db.ref("config/admins/" + hash).set({ nome: "Admin Master", master: true, criadoEm: Date.now() });
    AUTH.adminToken = hash;
    localStorage.setItem("bacbru_admin", hash);
    AUTH.msg = ""; AUTH.pwInput = ""; AUTH.view = "admin";
    renderRouter();
  } else if(hashIsAdmin(hash)){
    AUTH.adminToken = hash;
    localStorage.setItem("bacbru_admin", hash);
    AUTH.msg = ""; AUTH.pwInput = ""; AUTH.view = "admin";
    renderRouter();
  } else {
    AUTH.msg = "Senha incorreta";
    renderRouter();
  }
};

// Criar/remover admins adicionais
window.criarAdmin = function(){
  const nome = (AUTH.newAdminNome||"").trim() || "Admin";
  const pw = (AUTH.newAdminPw||"").trim();
  if(pw.length < 4){ AUTH.msg = "Senha do admin precisa de 4+ caracteres"; renderRouter(); return; }
  const hash = simpleHash(pw);
  db.ref("config/admins/" + hash).set({ nome, master: false, criadoEm: Date.now() });
  AUTH.newAdminNome = ""; AUTH.newAdminPw = "";
  AUTH.msg = "✓ Admin criada: " + nome;
  renderRouter();
};

window.removerAdmin = function(hash){
  const rec = AUTH.config.admins[hash];
  if(rec && rec.master){ alert("Não é possível remover o admin master."); return; }
  if(!confirm("Remover este admin?")) return;
  db.ref("config/admins/" + hash).remove();
};

window.criarChave = function(){
  const nome = (AUTH.newKeyName||"").trim() || "sem nome";
  const tipo = AUTH.newKeyTipo;
  const k = genKey(tipo);
  const dur = tipo === "teste" ? 3*24*60*60*1000 : 30*24*60*60*1000;
  const rec = {
    ativo: true,
    tipo,
    nome,
    criadoEm: Date.now(),
    expiraEm: tipo === "vitalicia" ? null : Date.now() + dur
  };
  db.ref("keys/" + k).set(rec);
  AUTH.newKeyName = "";
  AUTH.msg = "✓ Chave criada: " + k;
  renderRouter();
};

// Autoatendimento: teste grátis de 3 dias (1 por dispositivo, controlado no Firebase)
function getDeviceId(){
  let id = localStorage.getItem("bacbru_dev");
  if(!id){ id = "dev_" + Math.random().toString(36).slice(2) + Date.now().toString(36); localStorage.setItem("bacbru_dev", id); }
  return id;
}
window.iniciarTeste = function(){
  const devId = getDeviceId();
  db.ref("trials/" + devId).once("value").then(snap => {
    if(snap.val()){
      AUTH.msg = "Teste grátis já utilizado neste dispositivo";
      renderRouter();
      return;
    }
    const k = genKey("teste");
    const rec = { ativo:true, tipo:"teste", nome:"Teste 3 dias", criadoEm:Date.now(), expiraEm: Date.now() + 3*24*60*60*1000 };
    db.ref("keys/" + k).set(rec);
    db.ref("trials/" + devId).set({ key:k, criadoEm:Date.now() });
    AUTH.key = k;
    localStorage.setItem("bacbru_key", k);
    AUTH.msg = "";
    AUTH.view = "app";
    renderRouter();
  }).catch(()=>{ AUTH.msg = "Erro ao iniciar teste · tente novamente"; renderRouter(); });
};

window.toggleChave = function(k){
  const rec = AUTH.keys[k];
  if(!rec) return;
  db.ref("keys/" + k + "/ativo").set(!rec.ativo);
};

window.renovarChave = function(k){
  const rec = AUTH.keys[k];
  if(!rec) return;
  const base = (rec.expiraEm && rec.expiraEm > Date.now()) ? rec.expiraEm : Date.now();
  db.ref("keys/" + k + "/expiraEm").set(base + 30*24*60*60*1000);
  db.ref("keys/" + k + "/ativo").set(true);
};

window.removerChave = function(k){
  if(!confirm("Remover a chave " + k + "?")) return;
  db.ref("keys/" + k).remove();
};
