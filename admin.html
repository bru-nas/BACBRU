  // derivedAlign: +n = n estradas derivadas STABLE concordando (0 a 3).
  // ════════════════════════════════════════════════════════════════════════
  if((out.signal === "P" || out.signal === "B") && !out.viaRegime){
    const align = out.derivedAlign || 0;
    const nPad = byBet[out.signal] ? byBet[out.signal].length : 0;
    const boa = (tableState === "QUENTE" || tableState === "FAVORÁVEL");
    const ruim = (tableState === "FRIA" || tableState === "CONGELADA");
    let passa;
    if(boa){
      // mesa boa: critério leve — pelo menos 1 gráfico convergindo OU confiança alta OU 2+ padrões
      passa = (align >= 1) || (out.conf >= 0.80) || (nPad >= 2);
    } else if(ruim){
      // mesa ruim: só PREMIUM — convergência total dos 3 gráficos derivados
      passa = (align >= 3);
    } else {
      // neutra: convergência parcial (2 gráficos) E confiança boa, OU padrão muito forte
      passa = (align >= 2 && out.conf >= 0.78) || (out.conf >= 0.85 && nPad >= 2);
    }
    if(!passa){
      out.signal = "W";
      out.reason = `Mesa ${tableState} · convergência insuficiente (${align}/3 gráficos) para o critério · AGUARDA`;
      out.filtradoConvergencia = true;
    } else if(ruim){
      out.reason = `⭐ PREMIUM · 3 gráficos convergindo em mesa ${tableState} · ${out.reason}`;
    }
  }

  // ════════════════════════════════════════════════════════════════════════
  // ENTRADA DEFENSIVA · se a sessão está ATIVA e o motor já aguardou demais,
  // libera a entrada de MENOR RISCO em vez de deixar o operador parado.
  // Teto de espera ESCALONADO por estado:
  //   · mesa FRIA/NEUTRA/boa: 4 rodadas
  //   · mesa CONGELADA (a pior): 6 rodadas (espera mais, dá tempo da mesa melhorar)
  // Marca para encerrar no próximo green. Nunca fica 100% parada.
  // ════════════════════════════════════════════════════════════════════════
  const TETO_ESPERA = (tableState === "CONGELADA") ? 6 : 4;
  out.defensiva = false;
  if(out.signal === "W" && ST.sessaoAtiva && ST.ciclo === "idle"
     && (ST.esperaSessao || 0) >= TETO_ESPERA
     && bestSide && bestSide !== "T" && !out.contradiction && !out.exaustao){
    out.signal = bestSide;
    out.conf = bestConf;
    out.defensiva = true;
    const ex = (tableState === "CONGELADA") ? " (mesa congelada · entrada de menor risco)" : "";
    out.reason = `🛡️ DEFENSIVA · aguardou ${ST.esperaSessao} rodadas${ex} · menor risco: ${lbl(bestSide)} · ENCERRE no próximo green`;
  }

  // Padrão narrativo
  if(out.dominancia !== "BALANCEADO"){
    out.padrao = `Dominância ${out.dominancia} · P=${out.distrib.P}% B=${out.distrib.B}% T=${out.distrib.T}%`;
  } else {
    out.padrao = `Equilíbrio · P=${out.distrib.P}% B=${out.distrib.B}% T=${out.distrib.T}%`;
  }

  // ── LEITURA POR REGIME · se o motor ficou CALADO, lê o regime do momento ──
  // A mesa muda de comportamento (surf, alternância, bloco); aqui o motor identifica
  // o regime ATUAL e, se houver um padrão que funciona nesse regime, dá a entrada
  // em vez de ficar calado. Validado leave-one-out: entradas extras ~83% green.
  if(out.signal === "W" && mesaPermiteEntrada){
    const _reg = regimeAtual();
    const _forte = padraoForteNoRegime(patterns, _reg);
    if(_forte){
      out.signal = _forte.sig;
      out.conf = Math.min(0.88, _forte.taxa/100);
      out.reason = `🎯 REGIME ${_reg} · ${_forte.name} acerta ${_forte.taxa}% neste momento`;
      out.viaRegime = true;
      out.regimeMesa = _reg;
    }
  }

  // ── TRAVA FINAL DE SEGURANÇA ──
  // O sinal de entrada JAMAIS pode ser "T" (empate). Empate não é entrada.
  // Se por qualquer caminho o signal virou "T", força AGUARDA.
  if(out.signal === "T") out.signal = "W";

  return out;
}

// ════════════════════════════════════════════════════════════════════════════
// CICLO · entrada / gale / placar
// ════════════════════════════════════════════════════════════════════════════
// ════════════════════════════════════════════════════════════════════════════
// APRENDIZADO · cada padrão que apontou o lado é creditado (acerto) ou debitado (erro)
// acertou = a cor saiu igual ao sinal · errou = saiu o contrário · empate = neutro
// ════════════════════════════════════════════════════════════════════════════
function aprendePadroes(acertou){
  const pats = ST.ciclo_patterns || [];
  if(!pats.length) return;
  if(!ST.deltaAcum) ST.deltaAcum = {};
  if(!ST.countAcum) ST.countAcum = {};
  pats.forEach(name => {
    ST.countAcum[name] = (ST.countAcum[name] || 0) + 1;
    ST.deltaAcum[name] = (ST.deltaAcum[name] || 0) + (acertou ? 1 : -1);
  });
}

// APRENDIZADO POR RODADA · avalia cada padrão de cor detectado contra o resultado real.
// Para cada padrão com sinal P ou B, credita se previu certo, debita se errou.
// Roda em TODA rodada (em sessão ou não), dando amostras rápidas e estatística real.
function aprendeRodada(patterns, resultadoReal){
  if(!patterns || !patterns.length) return;
  if(!ST.deltaAcum) ST.deltaAcum = {};
  if(!ST.countAcum) ST.countAcum = {};
  // momento da mesa ANTES desta rodada (para carimbar o aprendizado por modo)
  const modo = (modoMesa() || {}).modo || "BAGUNCA";
  if(!ST.modoAcum) ST.modoAcum = {};
  if(!ST.modoAcum[modo]) ST.modoAcum[modo] = {};
  patterns.forEach(p => {
    if(p.sig !== "P" && p.sig !== "B") return; // só padrões de cor; TIE não entra
    // (1) aprendizado GERAL — preservado, nunca para de acumular
    ST.countAcum[p.name] = (ST.countAcum[p.name] || 0) + 1;
    ST.deltaAcum[p.name] = (ST.deltaAcum[p.name] || 0) + (p.sig === resultadoReal ? 1 : -1);
    // (2) aprendizado POR MOMENTO — camada nova, soma por cima sem mexer no geral
    const m = ST.modoAcum[modo];
    if(!m[p.name]) m[p.name] = {c:0, d:0};
    m[p.name].c += 1;
    m[p.name].d += (p.sig === resultadoReal ? 1 : -1);
  });
}

// APRENDIZADO DO FAREJADOR DE EMPATE · separado do aprendizado de cor.
// Registra se a previsão do farejador ("vem empate" quando status ECO/QUENTE/ABERTA)
// se confirmou na rodada seguinte. Acumula em tieAcum (≠ deltaAcum dos padrões de cor).
// IMPORTANTE: isto NUNCA gera entrada — empate não é entrada. Serve só para calibrar
// a confiança do aviso de empate e quais cenários (eco/atraso/mesa fria) realmente pagam.
// Aprende em TODA rodada, como os padrões de cor, mas em acumulador próprio.
function aprendeEmpate(tieAntes, resultadoReal){
  if(!tieAntes) return;
  if(!ST.tieAcum) ST.tieAcum = {};
  // status do farejador fica em hunterStatus (ECO/QUENTE/ABERTA/PASSOU/FECHADA)
  const status = tieAntes.hunterStatus || tieAntes.status;
  const ativo = ["ECO","QUENTE","ABERTA"].includes(status);
  if(!ativo) return;
  const cen = status;
  if(!ST.tieAcum[cen]) ST.tieAcum[cen] = {c:0, d:0};
  ST.tieAcum[cen].c += 1;
  ST.tieAcum[cen].d += (resultadoReal === "T" ? 1 : -1);
}

// Fator aprendido do farejador de empate por cenário (mesma curva dos padrões).
function fatorEmpate(cenario){
  const o = ST.tieAcum && ST.tieAcum[cenario];
  if(!o || o.c < 8) return 1;
  const taxa = (o.d / o.c + 1) / 2;
  // Consistente com fatorAprendido: só reforça, nunca derruba (piso 1.0).
  if(taxa >= 0.5) return Math.min(1.15, 1 + (taxa - 0.5) * 0.6);
  return 1.0;
}
// Precisa de pelo menos 8 amostras para começar a influenciar (antes disso = neutro).
function fatorAprendido(name){
  const n = (ST.countAcum && ST.countAcum[name]) || 0;
  if(n < 8) return 1;
  const d = (ST.deltaAcum && ST.deltaAcum[name]) || 0;
  const taxa = (d / n + 1) / 2; // saldo -1..1 → taxa 0..1 (0.5 = neutro)
  // LEITOR SEGURO (v3) · aprende dos DOIS lados e age mais cedo, mas com proteção
  // estatística proporcional à amostra (1 erro-padrão), pra não punir por azar.
  //  · taxa ≥ 0.5 → reforça (até 1.15).
  //  · taxa < 0.5 E a fraqueza passa de 1 erro-padrão → reduz (piso varia com amostra):
  //      - amostra pequena (8-30): redução leve (piso 0.95) — cautela, pode ser azar.
  //      - amostra média (30-80): redução média (piso 0.90).
  //      - amostra grande (80+): redução firme (piso 0.85) — fraqueza comprovada.
  //  · Auto-regulável: melhora → recupera sozinho. Amostra minúscula fica neutra.
  if(taxa >= 0.5) return Math.min(1.15, 1 + (taxa - 0.5) * 0.6);
  const ep = 0.5 / Math.sqrt(n);          // 1 erro-padrão da proporção
  if((0.5 - taxa) > ep){                   // fraqueza estatisticamente real
    let piso;
    if(n >= 80) piso = 0.85;
    else if(n >= 30) piso = 0.90;
    else piso = 0.95;                       // amostra pequena: redução só leve
    return Math.max(piso, 1 - (0.5 - taxa) * 0.7);
  }
  return 1.0;
}

// FATOR POR MOMENTO · empurrão extra para padrões que vão bem no modo ATUAL da mesa.
// Trabalha JUNTO do fatorAprendido (geral), não no lugar dele. PRIORIZA, não EXCLUI:
//  · padrão forte no momento → reforça (até +12%).
//  · padrão fraco no momento → leve recuo (piso 0.92), mas NUNCA zera — o padrão
//    continua disponível; só perde preferência para os que combinam com o momento.
//  · precisa de 6+ amostras NAQUELE modo; abaixo disso fica neutro (1.0).
function fatorModo(name){
  const mm = modoMesa() || {};
  const modo = mm.modo;
  const continuacao = ["RE6","RE7","RE8","SK4C","SK3C","SK5C","DOM12"]; // seguem a coluna/dominância
  const quebra = ["B22T","B22C","PP5","PP4","ZZ3","SK4Q","SK3Q","C21","P21","P22"]; // apostam na virada
  // CRITÉRIO DO GRÁFICO (altura das colunas) · concreto, mede o presente:
  //  · ALTO  (colunas longas, mesa repete) → reforça CONTINUAÇÃO, freia QUEBRA.
  //  · BAIXO (colunas curtas, mesa pica)   → reforça QUEBRA/ALTERNÂNCIA, freia CONTINUAÇÃO.
  const g = graficoMesa();
  if(g.nivel === "ALTO"){
    if(continuacao.includes(name)) return 1.12;
    if(quebra.includes(name)) return 0.84;
  } else if(g.nivel === "BAIXO"){
    if(quebra.includes(name)) return 1.12;
    if(continuacao.includes(name)) return 0.84;
  }
  // SURF (streak 4+) reforça ainda mais a continuação — sobrepõe ao gráfico
  if(modo === "SURF" && (mm.streak||0) >= 4){
    if(continuacao.includes(name)) return 1.15;
    if(quebra.includes(name)) return 0.80;
    return 1;
  }
  if(!modo || modo === "DADOS" || modo === "BAGUNCA") return 1;
  const m = ST.modoAcum && ST.modoAcum[modo] && ST.modoAcum[modo][name];
  if(!m || m.c < 6) return 1;
  const taxa = (m.d / m.c + 1) / 2;
  if(taxa >= 0.5) return Math.min(1.12, 1 + (taxa - 0.5) * 0.5);
  return Math.max(0.92, 1 - (0.5 - taxa) * 0.4);
}

function regLog(padrao, cor, conf, res, via){
  if(!ST.logEntradas) ST.logEntradas = [];
  ST.logEntradas.push({
    n: ST.logEntradas.length + 1,
    padrao: padrao || "?",
    cor: cor,
    conf: Math.round((conf||0)*100),
    res: res,   // "G" ou "R"
    via: via    // "seco", "gale", "empate", "empate-gale"
  });
}
function regEmpMult(pay){
  if(!ST.pEmpDetalhe) ST.pEmpDetalhe = {};
  ST.pEmpDetalhe[pay] = (ST.pEmpDetalhe[pay]||0) + 1;
}
function confirmEntry(){
  const a = analyze();
  if(!a.signal || a.signal === "W") return;
  ST.ciclo = "entrada";
  ST.ciclo_sinal = a.signal;
  ST.ciclo_conf = a.conf;
  ST.ciclo_razao = a.reason;
  // Guarda os padrões que apontaram o lado escolhido (para o aprendizado)
  ST.ciclo_patterns = (a.patterns||[])
    .filter(p => p.sig === a.signal)
    .map(p => p.name);
  // padrão principal (maior confiança) que disparou a entrada · para o log
  ST.ciclo_padraoPrincipal = (a.patterns||[])
    .filter(p => p.sig === a.signal)
    .sort((x,y)=>y.conf-x.conf)
    .map(p => p.name)[0] || "?";
  ST.ciclo_tie = a.tie.active ? (a.hunter && a.hunter.payoutProvavel || a.tie.payout) : null;
  ST.ciclo_gale_sinal = null;
  ST.ciclo_gale_dec = null;
  ST.ciclo_gale_tie = null;
  ST.ciclo_aguarda_count = 0;
  // SESSÃO INICIA AQUI · só termina ao clicar finalizar
  ST.sessaoAtiva = true;
  ST.esperaSessao = 0;
  ST.ofereceParada3 = false;
  ST.metaAviso = null;
  let msg = `▶ ENTRADA: ${lbl(a.signal)} · ${(a.conf*100).toFixed(0)}%`;
  if(a.tie.active) msg += ` + EMPATE ${ST.ciclo_tie}`;
  toast(msg, 2800);
  save(); renderNow();
}

function abortCiclo(){
  ST.ciclo = "idle";
  ST.ciclo_sinal = null;
  ST.ciclo_conf = 0;
  ST.ciclo_razao = "";
  ST.ciclo_patterns = [];
  ST.ciclo_tie = null;
  ST.ciclo_gale_sinal = null;
  ST.ciclo_gale_dec = null;
  ST.ciclo_gale_tie = null;
  ST.ciclo_aguarda_count = 0;
  const estadoMesa = (function(){ try{ return analyze().heat.state; }catch(e){ return null; } })();
  checarMetaStop(estadoMesa);
  save(); renderRouter();
}

// ════════════════════════════════════════════════════════════════════════
// GESTÃO DE RISCO · Meta 5-0 líquido · 2 loss finalizam a sessão
// Empate é bônus (não conta pra meta), EXCETO 88x que conta como ponto extra
// ════════════════════════════════════════════════════════════════════════
const META_LIQUIDO = 5;   // greens líquidos ponderados para bater a meta
const STOP_LOSS = 2;      // reds para avaliar stop
const PESO_RED = 3;       // cada red consome 3 greens
function checarMetaStop(estadoMesa){
  if(!ST.sessaoAtiva) return;
  // LÍQUIDO PONDERADO · regra da operadora: cada RED vale -3 greens. Meta = 5 líquidos.
  const saldoSessao = ST.greens - (ST.reds * PESO_RED);
  // STOP LOSS (regra original): só dispara se houver 2º red E o saldo já estiver NEGATIVO.
  //  · o 1º red sozinho não para (ainda dá pra recuperar)
  //  · 2 reds mas saldo ainda positivo → segue (a meta ainda é possível)
  //  · 2º red COM saldo negativo → AVISA forte (proteção). App não trava, só alerta.
  if(ST.reds >= 2 && saldoSessao < 0){
    ST.metaAviso = { tipo:"stop", msg:`🛑 STOP LOSS · ${ST.reds} reds · saldo ${saldoSessao} líquidos (negativo) · recomendado ENCERRAR para proteger a banca. Você decide.` };
    ST.metaAvisoVisto = false;
    return;
  }
  // STOP WIN: 5 líquidos (greens - 3×reds) → AVISA que bateu a meta. NÃO encerra sozinho.
  if(saldoSessao >= META_LIQUIDO){
    ST.metaAviso = { tipo:"meta", msg:`🏆 STOP WIN · ${saldoSessao} líquidos batidos! Você pode parar no lucro ou continuar. Você decide.` };
    ST.metaAvisoVisto = false;
    return;
  }
  // PARADA OPCIONAL · +3 líquido → SÓ oferece quando a MESA está RUIM (fria/congelada).
  // Em mesa boa segue direto até os 5, sem poluir com popup.
  const mesaRuim = (estadoMesa === "FRIA" || estadoMesa === "CONGELADA");
  if(saldoSessao >= 3 && saldoSessao < META_LIQUIDO && mesaRuim && !ST.ofereceParada3){
    ST.ofereceParada3 = true;
    ST.metaAviso = { tipo:"opcional", msg:`✅ +${saldoSessao} líquidos garantidos e a mesa está ruim agora. Pode parar aqui no lucro — ou seguir até os 5. Você decide.` };
    ST.metaAvisoVisto = false;
    // sessão continua ativa de propósito
  }
}

function hunterAtivo(a){
  return a && a.hunter && (a.hunter.status === "ABERTA" || a.hunter.status === "QUENTE" || a.hunter.status === "ECO");
}

function addRound(r, sNum){
  const s = parseInt(sNum) || 0;
  // SNAPSHOT para o desfazer: guarda estado completo ANTES de processar a rodada
  // (assim o desfazer reverte green/red e o ciclo, não só o histórico)
  if(!ST.undoStack) ST.undoStack = [];
  ST.undoStack.push({
    greens: ST.greens, reds: ST.reds, bonus: ST.bonus,
    pSG: ST.pSG||0, pG1: ST.pG1||0, pEmp: ST.pEmp||0, pEmpG1: ST.pEmpG1||0,
    pEmpDetalhe: JSON.parse(JSON.stringify(ST.pEmpDetalhe||{})),
    logEntradas: (ST.logEntradas||[]).slice(),
    ciclo: ST.ciclo, ciclo_sinal: ST.ciclo_sinal, ciclo_conf: ST.ciclo_conf,
    ciclo_razao: ST.ciclo_razao, ciclo_tie: ST.ciclo_tie,
    ciclo_gale_sinal: ST.ciclo_gale_sinal, ciclo_gale_dec: ST.ciclo_gale_dec,
    ciclo_gale_tie: ST.ciclo_gale_tie, ciclo_aguarda_count: ST.ciclo_aguarda_count,
    sessaoAtiva: ST.sessaoAtiva
  });
  if(ST.undoStack.length > 50) ST.undoStack.shift();

  // ANALISAR ANTES de adicionar — para saber estado do farejador no momento da rodada
  // (se eu analiso depois, o dist vira 0 e o farejador muda de estado, perdendo o "ativo")
  const aBefore = analyze();
  const hunterAntes = hunterAtivo(aBefore);
  ST.H.push({r, s});

  // ════════════════════════════════════════════════════════════════════════
  // APRENDIZADO POR RODADA · cada padrão detectado ANTES desta rodada é avaliado
  // contra o resultado REAL que acabou de cair (r), em TODA rodada registrada,
  // esteja em sessão ou não. Assim cada padrão acumula amostras de verdade e o
  // fatorAprendido ajusta o peso rápido conforme o desempenho real na mesa.
  // Empates (r==="T") não avaliam padrões de cor (P/B), pois não confirmam nem negam.
  if(r === "P" || r === "B"){
    aprendeRodada(aBefore.patterns || [], r);
  }
  // Aprendizado do farejador de empate · roda em TODA rodada (T conta como acerto da
  // previsão de empate; P/B contam como erro). Separado, NUNCA vira entrada.
  aprendeEmpate(aBefore.tie, r);

  // ════════════════════════════════════════════════════════════════════════
  // APARADOR DE HISTÓRICO · mantém o arquivo pequeno SEM perder aprendizado.
  // A rodada que acabou de cair JÁ ensinou os padrões e o farejador acima
  // (deltaAcum/countAcum/tieAcum guardam o conhecimento de TODAS as rodadas
  // para sempre). Então as rodadas mais antigas podem sair do histórico bruto:
  // o motor só precisa das últimas ~150 para ler qualquer padrão.
  // Resultado: aprendizado infinito e sólido, arquivo de tamanho fixo.
  const MAX_HIST = 150;
  if(ST.H.length > MAX_HIST){
    ST.H = ST.H.slice(-MAX_HIST);
  }

  // ════════════════════════════════════════════════════════════════════════
  // EMPATE · regras definitivas:
  // 1) Com aposta na mesa (entrada/gale) → GREEN, encerra ciclo (push)
  // 2) aguarda_gale → alto+farejador=GREEN(cobre) · baixo+farejador=BÔNUS · sem farejador=neutro (gale segue)
  // 3) Fora de aposta, farejador ATIVO → alto=GREEN · baixo=BÔNUS
  // 4) Fora de aposta, sem farejador → neutro
  // BÔNUS só existe com farejador ATIVO. Empate NUNCA gera gale, NUNCA é loss, NUNCA é entrada.
  // ════════════════════════════════════════════════════════════════════════
  if(r === "T"){
    const pay = payoutDaSoma(s);
    const isHighPay = ["10x","25x","88x"].includes(pay);

    // ── BOTÃO COBRIR EMPATE (admin) ──
    // Se o admin ligou a cobertura de empate, QUALQUER empate (alto ou baixo)
    // conta GREEN imediatamente. A cobertura é consumida (desliga) após pagar.
    // Não interfere no farejador nem nas demais regras quando está desligada.
    if(ST.coberturaEmpate){
      // Botão COBRIR EMPATE apertado = GREEN para QUALQUER empate (você cobriu de propósito).
      //  · empate ALTO → GREEN + celebração
      //  · empate BAIXO → GREEN
      ST.coberturaEmpate = false; // cobertura usada
      ST.greens++; ST.pEmp = (ST.pEmp||0)+1; regEmpMult(pay); regLog(ST.ciclo_padraoPrincipal, ST.ciclo_sinal, ST.ciclo_conf, "G", "empate "+pay);
      if(isHighPay){
        celebraPaga(pay);
        toast(`🔥 GREEN · empate coberto ${pay}!`, 3800);
      } else {
        flashResultado('GREEN', `✅ GREEN · empate coberto · ${pay}`);
      }
      if(ST.ciclo === "entrada" || ST.ciclo === "gale" || ST.ciclo === "aguarda_gale") abortCiclo();
      else { save(); renderRouter(); }
      return;
    }

    // CASO ESPECIAL · aguarda_gale (perdeu a entrada, gale ainda não saiu):
    //  · empate ALTO + farejador ATIVO  → GREEN (cobre a entrada, cancela o gale)
    //  · empate BAIXO + farejador ATIVO → BÔNUS (gale segue)
    //  · empate sem farejador ativo (alto ou baixo) → NEUTRO (gale segue, não conta bônus)
    // BÔNUS só existe quando o farejador está ATIVO. Sem farejador, empate é neutro.
    if(ST.ciclo === "aguarda_gale"){
      // Entre entrada e gale (o BOTÃO de cobrir já foi tratado acima · aqui é o FAREJADOR):
      //  · empate ALTO + farejador  → GREEN (cobre o gale, cancela, celebra)
      //  · empate BAIXO + farejador → BÔNUS (o GALE SEGUE)
      //  · sem farejador → neutro (gale segue, não conta)
      if(hunterAntes && isHighPay){
        ST.greens++; ST.pEmpG1 = (ST.pEmpG1||0)+1; regEmpMult(pay); regLog(ST.ciclo_padraoPrincipal, ST.ciclo_sinal, ST.ciclo_conf, "G", "empate-gale "+pay);
        celebraPaga(pay);
        toast(`🔥 ${pay} cobriu o gale · GALE CANCELADO`, 4000);
        abortCiclo();
      } else if(hunterAntes && !isHighPay){
        ST.bonus = (ST.bonus || 0) + 1;
        toast(`✨ BÔNUS · empate ${pay} · GALE SEGUE`, 3500);
        save(); renderRouter();
      } else {
        toast(`↻ Empate ${pay} · GALE SEGUE`, 2800);
        save(); renderRouter();
      }
      return;
    }

    // GALE já lançado: aposta na mesa → empate green/push, encerra
    if(ST.ciclo === "gale"){
      ST.greens++; ST.pEmp = (ST.pEmp||0)+1; regEmpMult(pay); regLog(ST.ciclo_padraoPrincipal, ST.ciclo_sinal, ST.ciclo_conf, "G", "empate-gale "+pay);
      if(isHighPay) celebraPaga(pay);
      else flashResultado('GREEN', `✅ GREEN · empate no gale · ${pay}`);
      abortCiclo();
      return;
    }
    // ENTRADA (antes do gale): empate baixo NÃO é green. Mantém o ciclo pro gale.
    //  · farejador ativo + alto  → GREEN (encerra)
    //  · farejador ativo + baixo → BÔNUS (ciclo SEGUE pro gale)
    //  · sem farejador           → nada (ciclo SEGUE pro gale)
    if(ST.ciclo === "entrada"){
      // Empate na ENTRADA (cor) = GREEN sempre. A entrada cobre o empate junto.
      //  · empate ALTO (10x/25x/88x) → GREEN + celebração
      //  · empate BAIXO (4x/6x)      → GREEN normal
      ST.greens++; ST.pEmp = (ST.pEmp||0)+1; regEmpMult(pay); regLog(ST.ciclo_padraoPrincipal, ST.ciclo_sinal, ST.ciclo_conf, "G", "empate-entrada "+pay);
      if(isHighPay){
        celebraPaga(pay);
        toast(`🔥 GREEN · empate alto ${pay}!`, 3800);
      } else {
        flashResultado('GREEN', `✅ GREEN · empate ${pay}`);
      }
      abortCiclo();
      return;
    }
    if(hunterAntes && isHighPay){
      // Farejador ativo + empate alto → GREEN
      ST.greens++; ST.pEmp = (ST.pEmp||0)+1; regEmpMult(pay); regLog("FAREJADOR", null, (a.hunter&&a.hunter.conf)||0, "G", "empate "+pay);
      celebraPaga(pay);
      save(); renderRouter();
    } else if(hunterAntes && !isHighPay){
      // Farejador ativo + empate baixo → BÔNUS
      ST.bonus = (ST.bonus || 0) + 1;
      toast(`✨ BÔNUS · empate ${pay}`, 2800);
      save(); renderRouter();
    } else {
      // Sem farejador, sem aposta → neutro
      toast(`↻ Empate ${pay}`, 2200);
      save(); renderRouter();
    }
    return;
  }

  // ════════════════════════════════════════════════════════════════════════
  // COR (P ou B) · CICLO STATE MACHINE: idle | entrada | aguarda_gale | gale
  // aguarda_gale tem TETO de 2 rodadas. Depois disso o gale entra forçado
  // para não passar mais de 2 rodadas sem agir após a entrada perdida.
  // ════════════════════════════════════════════════════════════════════════
  if(ST.ciclo === "entrada"){
    const sig = ST.ciclo_sinal;
    if(r === sig){
      ST.greens++; ST.pSG = (ST.pSG||0)+1;
      regLog(ST.ciclo_padraoPrincipal, sig, ST.ciclo_conf, "G", "seco");
      // (aprendizado agora é por rodada · aprendeRodada já creditou os padrões acima)
      flashResultado('GREEN', `✅ GREEN SECO · ${lbl(r)}`);
      abortCiclo();
    } else {
      // (aprendizado por rodada · aprendeRodada já debitou os padrões acima)
      // Cor errada → decidir gale
      const a2 = analyze();
      if(a2.signal === "P" || a2.signal === "B"){
        // Motor tem sinal claro → gale imediato
        ST.ciclo = "gale";
        ST.ciclo_gale_sinal = a2.signal;
        ST.ciclo_gale_dec = (a2.signal === sig) ? "MANTER" : "INVERTER";
        ST.ciclo_gale_tie = a2.tie.active ? (a2.hunter && a2.hunter.payoutProvavel) : null;
        let gmsg = `⚡ GALE ${lbl(a2.signal)} · ${ST.ciclo_gale_dec}`;
        if(a2.tie.active) gmsg += ` + EMPATE ${ST.ciclo_gale_tie}`;
        toast(gmsg, 3500);
        save();
      } else {
        // Motor incerto → aguarda gale com TETO de 2 rodadas
        ST.ciclo = "aguarda_gale";
        ST.ciclo_aguarda_count = 0;
        ST.ciclo_gale_sinal = null;
        ST.ciclo_gale_dec = "AGUARDAR";
        ST.ciclo_gale_tie = null;
        toast(`⏳ AGUARDAR · motor analisando · máximo 2 rodadas`, 3500);
      }
      save(); renderRouter();
    }
  } else if(ST.ciclo === "aguarda_gale"){
    // Nova rodada registrada · re-analisa e decide
    ST.ciclo_aguarda_count = (ST.ciclo_aguarda_count || 0) + 1;
    const MAX_AGUARDA = 3;
    const a2 = analyze();
    if(a2.signal === "P" || a2.signal === "B"){
      // Motor agora tem sinal claro → gale com esse sinal
      ST.ciclo = "gale";
      ST.ciclo_gale_sinal = a2.signal;
      ST.ciclo_gale_dec = (a2.signal === ST.ciclo_sinal) ? "MANTER" : "INVERTER";
      ST.ciclo_gale_tie = a2.tie.active ? (a2.hunter && a2.hunter.payoutProvavel) : null;
      let gmsg = `⚡ ENTRAR no GALE · ${lbl(a2.signal)} · ${ST.ciclo_gale_dec}`;
      if(a2.tie.active) gmsg += ` + EMPATE ${ST.ciclo_gale_tie}`;
      toast(gmsg, 3800);
      save();
    } else if(ST.ciclo_aguarda_count >= MAX_AGUARDA){
      // ════════════════════════════════════════════════════════════════
      // Teto atingido · SEMPRE FAZ O GALE com a melhor leitura disponível
      // Direção determinada AUTOMATICAMENTE pela tendência das últimas 8:
      // - Lado dominante (mesmo que pouco): vai com ele
      // - 4/4 verdadeiro (raríssimo): INVERTER por segurança
      // Decisão MANTER ou INVERTER sai automaticamente da análise
      // ════════════════════════════════════════════════════════════════
      const recent = ST.H.filter(x=>x.r!=='T').slice(-8);
      const pCount = recent.filter(x=>x.r==='P').length;
      const bCount = recent.filter(x=>x.r==='B').length;
      let galeSide, motivo;
      if(pCount > bCount){
        galeSide = 'P';
        motivo = `tendência P (${pCount}/${recent.length})`;
      } else if(bCount > pCount){
        galeSide = 'B';
        motivo = `tendência B (${bCount}/${recent.length})`;
      } else {
        galeSide = opos(ST.ciclo_sinal);
        motivo = 'equilíbrio · INVERTER';
      }
      const dec = galeSide === ST.ciclo_sinal ? "MANTER" : "INVERTER";
      ST.ciclo = "gale";
      ST.ciclo_gale_sinal = galeSide;
      ST.ciclo_gale_dec = `${dec} (limite · ${motivo})`;
      ST.ciclo_gale_tie = a2.tie.active ? (a2.hunter && a2.hunter.payoutProvavel) : null;
      let gmsg = `⚡ GALE ${lbl(galeSide)} · ${dec} · ${motivo}`;
      if(a2.tie.active) gmsg += ` + EMPATE ${ST.ciclo_gale_tie}`;
      toast(gmsg, 4500);
      save();
    } else {
      // Continua aguardando (ainda dentro do teto)
      toast(`⏳ Aguardando gale · ${ST.ciclo_aguarda_count}/${MAX_AGUARDA} rodadas`, 2500);
    }
    save(); renderRouter();
  } else if(ST.ciclo === "gale"){
    const galeSide = ST.ciclo_gale_sinal || opos(ST.ciclo_sinal);
    if(r === galeSide){
      ST.greens++; ST.pG1 = (ST.pG1||0)+1;
      regLog(ST.ciclo_padraoPrincipal, galeSide, ST.ciclo_conf, "G", "gale");
      flashResultado('GREEN', `✅ GREEN G1 · ${lbl(r)}`);
      abortCiclo();
    } else {
      ST.reds++;
      regLog(ST.ciclo_padraoPrincipal, ST.ciclo_sinal, ST.ciclo_conf, "R", "red");
      flashResultado('RED', `❌ RED · entrada e gale falharam`);
      abortCiclo();
    }
  } else {
    // idle · cor sem entrada confirmada → só registra
    // Conta espera de sessão: se sessão ativa e motor não deu sinal de cor, soma 1.
    // Isso alimenta a ENTRADA DEFENSIVA quando o caos persiste (teto de 4 rodadas).
    if(ST.sessaoAtiva){
      const aNow = analyze();
      if(aNow.signal === "P" || aNow.signal === "B"){
        ST.esperaSessao = 0; // motor voltou a ter sinal → zera espera
      } else {
        ST.esperaSessao = (ST.esperaSessao || 0) + 1;
      }
    }
    save(); renderRouter();
  }
}

// Recálculo retroativo: descobre empates que estavam com farejador ativo no histórico
// e oferece adicionar esses greens perdidos (útil quando o app rodou com bug antes)
window.recalcularEmpates = function(){
  if(!ST.H || ST.H.length < 12){ toast("Histórico curto demais para recalcular", 2500); return; }
  let greensDeEmpate = 0;
  let detalhes = [];
  ST.H.forEach((x,i)=>{
    if(x.r !== "T") return;
    // estado do farejador no momento ANTES deste empate
    const histAntes = ST.H.slice(0, i);
    if(histAntes.length < 12) return;
    // simular o tieHunter com o histórico parcial
    const heat = 40; // assumir mesa fria/neutra como média
    const h = tieHunter(histAntes, heat);
    if(h && (h.status === "ABERTA" || h.status === "QUENTE" || h.status === "ECO")){
      greensDeEmpate++;
      detalhes.push(`rodada ${i}: T s=${x.s} · ${h.status}`);
    }
  });
  const diff = greensDeEmpate - ST.greens;
  if(greensDeEmpate === 0){
    toast(`Nenhum empate com farejador ativo encontrado`, 3000);
    return;
  }
  const msg = `Histórico analisado:\n\n• ${greensDeEmpate} empates aconteceram com farejador ATIVO\n• Você tem ${ST.greens} green(s) registrados\n\nQuer SOBRESCREVER o placar para ${greensDeEmpate} greens? (Reds atuais: ${ST.reds} ficam)\n\nOu CANCELAR para não mexer.`;
  if(confirm(msg)){
    ST.greens = greensDeEmpate;
    save();
    toast(`✓ Placar ajustado · ${greensDeEmpate} greens de empate computados`, 4000);
    renderRouter();
  }
};

function celebraOverlayHTML(){
  if(!ST.celebra) return '';
  const lvl = ST.celebra==='88x' ? 3 : ST.celebra==='25x' ? 2 : 1;

      <div style="font-size:42px;margin-bottom:10px">${icone}</div>

// Celebração especial para empate de alto pagamento (já conta como green, sem flash extra)
function celebraPaga(pay){
  ST.celebra = pay;
  toast(`🔥 PAGA ${pay} 🔥`, 4500);
  save(); // push para o Firebase → assinante vê a animação também
  setTimeout(()=>{ ST.celebra = null; save(); renderRouter(); }, 4500);
}

function undo(){
  if(ST.H.length === 0){ toast("Nada para desfazer", 1800); return; }
  ST.H.pop();
  // Restaura o estado completo de ANTES da última rodada (reverte green/red e ciclo)
  if(ST.undoStack && ST.undoStack.length){
    const snap = ST.undoStack.pop();
    const g0 = ST.greens, r0 = ST.reds;
    ST.greens = snap.greens;
    ST.reds = snap.reds;
    ST.bonus = snap.bonus;
    // BUG CORRIGIDO: restaurar TAMBÉM o placar detalhado e o log de entradas
    // (eram salvos no snapshot mas o undo não os revertia → entrada errada ficava no placar)
    ST.pSG = snap.pSG||0; ST.pG1 = snap.pG1||0; ST.pEmp = snap.pEmp||0; ST.pEmpG1 = snap.pEmpG1||0;
    ST.pEmpDetalhe = snap.pEmpDetalhe||{};
    ST.logEntradas = snap.logEntradas||[];
    ST.ciclo = snap.ciclo;
    ST.ciclo_sinal = snap.ciclo_sinal;
    ST.ciclo_conf = snap.ciclo_conf;
    ST.ciclo_razao = snap.ciclo_razao;
    ST.ciclo_tie = snap.ciclo_tie;
    ST.ciclo_gale_sinal = snap.ciclo_gale_sinal;
    ST.ciclo_gale_dec = snap.ciclo_gale_dec;
    ST.ciclo_gale_tie = snap.ciclo_gale_tie;
    ST.ciclo_aguarda_count = snap.ciclo_aguarda_count;
    ST.sessaoAtiva = snap.sessaoAtiva;
    let msg = "↩ Rodada desfeita";
    if(g0 > snap.greens) msg += " · green removido";
    if(r0 > snap.reds) msg += " · red removido";
    toast(msg, 2500);
    save(); renderRouter();
  } else {
    // sem snapshot (rodada antiga) → só remove do histórico
    abortCiclo();
  }
}

function reset(){
  if(!confirm("Zerar o HISTÓRICO e o PLACAR desta sessão?\n\n✅ O APRENDIZADO é MANTIDO (pesos das 73+ sessões ficam intactos)\n• Só limpa: rodadas da tela, placar e log de entradas")) return;
  ST.H = []; ST.greens = 0; ST.reds = 0; ST.bonus = 0; ST.pSG = 0; ST.pG1 = 0; ST.pEmp = 0; ST.pEmpG1 = 0; ST.pEmpDetalhe = {}; ST.logEntradas = []; ST.coberturaEmpate = false;
  // APRENDIZADO PRESERVADO · deltaAcum/countAcum/tieAcum NÃO são tocados aqui
  ST.metaAviso = null; ST.sessaoAtiva = false; ST.esperaSessao = 0;
  abortCiclo();
  toast("✓ Histórico e placar zerados · aprendizado preservado", 3000);
}

function resetAprendizado(){
  const totalSessoes = ST.sessoes || 0;
  if(!confirm("⚠️ ATENÇÃO · APAGAR O APRENDIZADO?\n\nIsto vai APAGAR tudo que o motor aprendeu em "+totalSessoes+" sessões:\n• Os pesos ajustados de cada padrão\n• O acumulado de acertos/erros (deltaAcum/countAcum)\n• A memória do farejador de empate\n\nO motor volta a operar do ZERO, como recém-instalado.\nIsso PODE PIORAR as leituras até reaprender tudo de novo.\n\nTem CERTEZA?")) return;
  if(!confirm("Última confirmação.\n\nApagar DEFINITIVAMENTE o aprendizado de "+totalSessoes+" sessões?\n\nNão dá pra desfazer.")) return;
  ST.deltaAcum = {}; ST.countAcum = {}; ST.tieAcum = {};
  save();
  toast("Aprendizado apagado · motor recomeça do zero", 3500);
  renderRouter();
}

function finalizarSessao(){
  const total = ST.greens + ST.reds;
  const rate = total > 0 ? Math.round(100 * ST.greens / total) : 0;
  if(!confirm(`Finalizar sessão?\n\n✅ ${ST.greens} GREEN · ❌ ${ST.reds} RED · ${rate}% rate\n\n• Placar será zerado\n• Aprendizado, histórico e pesos serão mantidos\n• Sessão #${ST.sessoes + 1} iniciada`)) return;
  copyJSON();
  ST.greens = 0;
  ST.reds = 0;
  ST.bonus = 0;
  ST.pSG = 0; ST.pG1 = 0; ST.pEmp = 0; ST.pEmpG1 = 0; ST.pEmpDetalhe = {}; ST.logEntradas = [];
  ST.coberturaEmpate = false;
  ST.sessoes++;
  ST.ofereceParada3 = false;
  ST.sessaoAtiva = false;
  ST.esperaSessao = 0;
  ST.metaAviso = null;
  ST.publicado = false;
  abortCiclo();
  toast(`✓ Sessão finalizada · ${rate}% rate · JSON copiado`, 3500);
  save();
}

function injectJSON(){
  try{
    const el=document.getElementById("injta");
    if(el) ST.injTxt=el.value;
    const d = JSON.parse(ST.injTxt);
    // O aprendizado (deltaAcum/countAcum/tieAcum) já vem destilado no JSON, então
    // não precisamos do histórico inteiro. Mantemos só as últimas 150 rodadas para
    // o motor ler padrões — o conhecimento das antigas já está nos contadores abaixo.
    if(d.history && Array.isArray(d.history)){
      ST.H = d.history.length > 150 ? d.history.slice(-150) : d.history;
    }
    if(typeof d.greens === "number") ST.greens = d.greens;
    if(typeof d.reds === "number") ST.reds = d.reds;
    if(d.weights){
      // Aceita formato novo (números diretos) ou antigo (objeto base/ceil)
      for(const k of Object.keys(d.weights)){
        const v = d.weights[k];
        if(typeof v === "number"){
          ST.weights[k] = v;
        } else if(v && typeof v.base === "number"){
          // mapear nomes antigos para novos
          const map = {
            "PING_PONG_4P":"PP4","PING_PONG_23":"PP4",
            "BLOCO_2x2_TROCA":"B22T","BLOCO_2x2_CONT":"B22C",
            "STREAK_QUEBRA":"SK4Q","STREAK_CONT":"SK4C",
            "REEQUIL_B":"RE7","REEQUIL_P":"RE7",
            "TIE_GATILHO":"TIE"
          };
          if(map[k]) ST.weights[map[k]] = v.base;
          else if(ST.weights[k] !== undefined) ST.weights[k] = v.base;
        }
      }
    }
    if(d.deltaAcum) ST.deltaAcum = d.deltaAcum;
    if(d.countAcum) ST.countAcum = d.countAcum;
    if(d.tieAcum) ST.tieAcum = d.tieAcum;
    if(d.modoAcum) ST.modoAcum = d.modoAcum;
    if(typeof d.sessoes === "number") ST.sessoes = d.sessoes + 1;
    ST.injTxt = "";
    ST.jsonOpen = false;
    save();
    if(_renderTimer){ clearTimeout(_renderTimer); _renderTimer=null; }
    renderApp();
    toast(`✓ ${ST.H.length} rodadas carregadas · pesos atualizados`);
  }catch(e){
    toast("❌ JSON inválido");
  }
}

function exportJSON(){
  const total = ST.greens + ST.reds;
  const rate = total > 0 ? Math.round(100 * ST.greens / total) : 0;
  return JSON.stringify({
    history: ST.H,
    greens: ST.greens,
    reds: ST.reds,
    rate,
    weights: ST.weights,
    sessoes: ST.sessoes,
    deltaAcum: ST.deltaAcum,
    countAcum: ST.countAcum,
    tieAcum: ST.tieAcum || {},
    modoAcum: ST.modoAcum || {},
    timestamp: new Date().toISOString()
  }, null, 2);
}

function copyJSON(){
  const txt = exportJSON();
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(()=>{toast("📋 JSON copiado!");}).catch(()=>{fallbackCopy(txt);});
  } else {
    fallbackCopy(txt);
  }
}
function fallbackCopy(t){
  const ta = document.createElement("textarea");
  ta.value = t;
  document.body.appendChild(ta);
  ta.select();
  try{document.execCommand("copy");toast("📋 JSON copiado!");}catch(e){}
  document.body.removeChild(ta);
}

        : `<div class="wait-card" style="margin-top:10px;padding:14px"><div class="wait-act" style="font-size:12px">⏳ SESSÃO ATIVA · analisando a mesa · aguarde o próximo sinal</div></div>`;
    } else if(!ST.sessaoAtiva && !bomMomento){

function renderApp(){
  const a = analyze();
  ST._lastAnalise = a; // guarda p/ publicar convergência
  // cache heat e hunter no ST pra serem empurrados pro Firebase
  if(a.heat) ST._heat = { state: a.heat.state, score: a.heat.score };
  if(a.hunter) ST._hunter = a.hunter;
  // Publica heat/hunter pro index quando o ESTADO muda (sem loop: só compara string)
  const _heatKey = (ST._heat?ST._heat.state:'') + '|' + (ST._hunter?ST._hunter.status:'');
  if(_heatKey !== ST._lastHeatKey && AUTH.view==='app'){
    ST._lastHeatKey = _heatKey;
    if(typeof _heatPushTimer !== 'undefined' && _heatPushTimer) clearTimeout(_heatPushTimer);
    _heatPushTimer = setTimeout(()=>{ pushToFirebase(); }, 250);
  }
  const total = ST.greens + ST.reds;
  const rate = total > 0 ? Math.round(100*ST.greens/total) : 0;
  const root = document.getElementById("root");

  // Bead road render — últimas 90 rodadas (15 colunas de 6), mais novas à direita
  const beadCells = [];
  const BEAD_MAX = 90;
  const beadH = ST.H.slice(-BEAD_MAX);
  const colCount = Math.ceil(beadH.length / 6);
  for(let c=0;c<colCount;c++){
    for(let r=0;r<6;r++){
      const idx = c*6+r;
      if(idx < beadH.length){
        const x = beadH[idx];
        beadCells.push(`<div class="bead ${x.r.toLowerCase()}">${x.s||""}</div>`);
      } else {
        beadCells.push(`<div></div>`);
      }
    }
  }

  // Big Road render
  let bigCells = "";
  if(a.roads && a.roads.big){
    const big = a.roads.big;
    const maxRows = 6;
    for(let c=0;c<big.length;c++){
      for(let r=0;r<maxRows;r++){
        if(big[c] && big[c][r]){
          bigCells += `<div class="cell ${big[c][r].toLowerCase()}"></div>`;
        } else {
          bigCells += `<div class="cell-empty"></div>`;
        }
      }
    }
  }

  // Derived render
  function renderDR(rd){
    let s = "";
    const rows = 6;
    const cols = Math.ceil(rd.length / rows);
    for(let c=0;c<cols;c++){
      for(let r=0;r<rows;r++){
        const idx = c*rows+r;
        if(idx < rd.length){
          s += `<div class="cell-${rd[idx]==="R"?"r":"b"}"></div>`;
        } else {
          s += `<div class="cell-empty"></div>`;
        }
      }
    }
    return s;
  }

  // Patterns breakdown
  let patHtml = "";
  if(a.patterns.length === 0){
    patHtml = `<div class="pat-row"><div class="pat-name">Nenhum padrão detectado</div><div class="pat-conf">—</div></div>`;
  } else {
    a.patterns.sort((x,y)=>y.conf-x.conf).slice(0,6).forEach(p=>{
      const cls = p.hi ? "high" : (p.conf >= ST.weights.min_conf ? "act" : "");
      patHtml += `<div class="pat-row ${cls}">
        <div class="pat-name ${cls}">${p.name} → ${lbl(p.sig)}</div>
        <div class="pat-conf">${(p.conf*100).toFixed(0)}%</div>
      </div>`;
    });
  }

  // Tie pays
  const tieHi = a.tie.payout;
  const hunterOpen = a.hunter && (a.hunter.status==='ABERTA' || a.hunter.status==='QUENTE' || a.hunter.status==='ECO');
  const provavel = a.hunter ? a.hunter.payoutProvavel : null;
  const tieRows = [
    ["88x","2,12",a.tie.probs["88x_2_12"]],
    ["25x","3,11",a.tie.probs["25x_3_11"]],
    ["10x","4,10",a.tie.probs["10x_4_10"]],
    ["6x","5,9",a.tie.probs["6x_5_9"]],
    ["4x","6,7,8",a.tie.probs["4x_6_8"]]
  ];
  const tiePays = tieRows.map(([n,t,p])=>{
    // destaca a faixa provável do farejador quando a janela está aberta
    const isHi = hunterOpen && provavel && provavel.includes(n);
    return `<div class="pay-cell ${isHi?'hot':''}">
      <div class="pay-num">${n}</div>
      <div class="pay-pct">${t}</div>
    </div>`;
  }).join("");

  // Signal main
  // A COR só pode ser revelada quando: é admin, OU o ciclo já foi confirmado pelo
  // admin (entrada/gale/aguarda_gale). Para o assinante em idle, NUNCA mostra a cor —
  // mesmo que o motor já tenha um sinal, ele só aparece após a CONFIRMAÇÃO do admin.
  const cicloConfirmado = (ST.ciclo === "entrada" || ST.ciclo === "gale" || ST.ciclo === "aguarda_gale");
  const podeRevelarCor = isAdmin() || cicloConfirmado;
  let sigClass = "w", sigText = "AGUARDA", confColor = "#475569";
  if(podeRevelarCor){
    if(a.signal === "P"){sigClass="p";sigText="AZUL";confColor="#3b82f6";}
    else if(a.signal === "B"){sigClass="b";sigText="VERMELHO";confColor="#ef4444";}
    else if(a.signal === "T"){sigClass="t";sigText="EMPATE";confColor="#f59e0b";}
  } else {
    // assinante, sinal existe mas não confirmado → mostra ANALISANDO, sem cor
    if(a.signal === "P" || a.signal === "B" || a.signal === "T"){

      </div>` : `<div style="text-align:center;padding:10px 12px 4px;font-family:var(--mono)">

      </div>`}

        <div class="stat"><div class="stat-v r" style="font-size:24px">${ST.reds}</div><div class="stat-l">RED</div></div>
        <div class="stat" style="flex:1.2"><div class="stat-v y" style="font-size:28px">${rate}%</div><div class="stat-l">RATE</div></div>
        <div class="stat"><div class="stat-v" style="color:var(--gold2);font-size:24px">${ST.bonus||0}</div><div class="stat-l">BÔNUS ✨</div></div>

      ${ST.coberturaEmpate ? `<div style="margin-bottom:10px;padding:12px;background:linear-gradient(135deg,#f59e0b,#d97706);border-radius:12px;text-align:center;font-family:var(--mono);font-weight:800;font-size:14px;color:#1a1a1a;letter-spacing:1px;box-shadow:0 2px 12px rgba(245,158,11,.4)">
        🛡️ COBRIR EMPATE
      </div>` : ''}

      <!-- META · barra de progresso (líquido ponderado: red = -3 greens) -->
      <div class="card" style="padding:12px;margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">
          <div style="font-size:11px;font-family:var(--mono);color:var(--txt2);letter-spacing:1px">🎯 META DA SESSÃO · 5 LÍQUIDOS</div>
          <div style="font-size:13px;font-family:var(--mono);font-weight:800;color:${(ST.greens-ST.reds*3)>=5?'var(--green2)':(ST.greens-ST.reds*3)<0?'var(--red2)':'var(--txt)'}">${(ST.greens-ST.reds*3)>=0?'+':''}${ST.greens-ST.reds*3}</div>
        </div>
        <div style="height:8px;background:rgba(0,0,0,.4);border-radius:4px;overflow:hidden;display:flex;gap:2px">
          ${[1,2,3,4,5].map(n=>`<div style="flex:1;background:${(ST.greens-ST.reds*3)>=n?'var(--green2)':'rgba(148,163,184,.15)'};border-radius:2px"></div>`).join("")}
        </div>
        <div style="margin-top:6px;font-size:9px;font-family:var(--mono);color:var(--txt3)">cada red consome 3 greens · 2 loss sem recuperação encerram · empate alto=green, baixo=bônus</div>
      </div>

        <div style="font-size:17px;font-weight:900;font-family:var(--mono);color:${ST.metaAviso.tipo==='meta'?'var(--green2)':'var(--red2)'};line-height:1.4">${ST.metaAviso.msg}</div>

          const dias = Math.max(0, Math.ceil((rec.expiraEm - Date.now())/(24*60*60*1000)));
          return `<div style="margin-bottom:10px;padding:9px 12px;background:linear-gradient(135deg,rgba(167,139,250,.1),rgba(245,158,11,.05));border:1px solid rgba(167,139,250,.25);border-radius:10px;text-align:center;font-size:11px;color:var(--purple);font-family:var(--mono)">🎁 Período de teste · <strong>${dias} dia(s)</strong> restante(s) · assine para continuar</div>`;
        }
        return "";
      })()}

// AUTENTICAÇÃO · ASSINATURA + ADMIN
// ════════════════════════════════════════════════════════════════════════════
const AUTH = {
  view: "loading", // loading | lock | admin | app
  key: localStorage.getItem("bacbru_key") || "",
  nome: localStorage.getItem("bacbru_nome") || "",
  adminToken: localStorage.getItem("bacbru_admin") || "",
  keys: {},          // keys carregadas do firebase
  config: { sessoes: [], adminHash: null, admins: {} },
  msg: "",
  keyInput: "",
  pwInput: "",
  newKeyName: "",
  newKeyTipo: "mensal",
  newSessao: "",
  newAdminNome: "",
  newAdminPw: "",
  secretCount: 0,
  secretTimer: null
};

// hash simples (não-criptográfico, suficiente p/ gate de acesso)
function simpleHash(s){
  let h = 5381;
  for(let i=0;i<s.length;i++){ h = ((h<<5)+h) + s.charCodeAt(i); h = h & h; }
  return "h" + (h>>>0).toString(36);
}

function genKey(tipo){
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let k = "";
  for(let i=0;i<6;i++) k += chars[Math.floor(Math.random()*chars.length)];
  const prefix = tipo === "vitalicia" ? "BRU-V-" : tipo === "teste" ? "BRU-T-" : "BRU-M-";
  return prefix + k;
}

function keyIsValid(rec){
  if(!rec || !rec.ativo) return false;
  if(rec.tipo === "vitalicia") return true;
  if(rec.expiraEm && Date.now() > rec.expiraEm) return false;
  return true;
}

function initAuth(){
  // Carrega entradas de assinantes
  db.ref("entradas").on("value", s => {
    AUTH.entradas = s.val() || {};
    // não re-renderiza aqui (evita piscar); a lista atualiza no próximo render natural
  });

  // Carrega config (sessões + admins) e chaves
  db.ref("config").on("value", s => {
    const c = s.val() || {};
    AUTH.config.sessoes = c.sessoes || [];
    AUTH.config.adminHash = c.adminHash || null; // master (compatibilidade)
    AUTH.config.admins = c.admins || {};         // { hash: {nome, master} }
    routeAuth();
  });
  db.ref("keys").on("value", s => {
    AUTH.keys = s.val() || {};
    routeAuth();
  });
}

// verifica se um hash é admin (master antigo OU lista de admins)
function hashIsAdmin(hash){
  if(!hash) return false;
  if(AUTH.config.adminHash && hash === AUTH.config.adminHash) return true;
  if(AUTH.config.admins && AUTH.config.admins[hash]) return true;
  return false;
}

function routeAuth(){
  // Admin reconhecido pelo dispositivo?
  if(AUTH.adminToken && hashIsAdmin(AUTH.adminToken)){
    if(AUTH.view === "loading" || AUTH.view === "lock") AUTH.view = "app";
  } else if(AUTH.key && keyIsValid(AUTH.keys[AUTH.key])){
    // recupera o nome do assinante da chave (caso o localStorage do nome esteja vazio)
    if(!AUTH.nome){
      const rec = AUTH.keys[AUTH.key];
      AUTH.nome = (rec && rec.nome && rec.nome !== "sem nome") ? rec.nome : "";
      if(AUTH.nome) localStorage.setItem("bacbru_nome", AUTH.nome);
    }
    if(AUTH.view === "loading" || AUTH.view === "lock") AUTH.view = "app";
  } else {
    if(AUTH.view === "loading" || AUTH.view === "app") AUTH.view = "lock";
  }
  renderRouter();
}

function isAdmin(){
  return AUTH.adminToken && hashIsAdmin(AUTH.adminToken);
}

// ── Ações de acesso ──
window.tentarChave = function(){
  const k = (AUTH.keyInput||"").trim().toUpperCase();
  if(!k){ AUTH.msg = "Digite sua chave"; renderRouter(); return; }
  const rec = AUTH.keys[k];
  if(keyIsValid(rec)){
    AUTH.key = k;
    AUTH.nome = (rec && rec.nome && rec.nome !== "sem nome") ? rec.nome : "";
    localStorage.setItem("bacbru_key", k);
    localStorage.setItem("bacbru_nome", AUTH.nome || "");
    AUTH.msg = "";
    AUTH.view = "app";
    renderRouter();
  } else if(rec && !keyIsValid(rec)){
    AUTH.msg = "Chave expirada ou desativada";
    renderRouter();
  } else {
    AUTH.msg = "Chave inválida";
    renderRouter();
  }
};

window.abrirAdmin = function(){
  if(isAdmin()){ AUTH.view = "admin"; renderRouter(); return; }
  AUTH.view = "adminLogin";
  renderRouter();
};

// Toque secreto: 5 toques na logo/dadinhos abre o admin (escondido dos assinantes)
window.secretAdmin = function(){
  AUTH.secretCount++;
  clearTimeout(AUTH.secretTimer);
  AUTH.secretTimer = setTimeout(()=>{ AUTH.secretCount = 0; renderRouter(); }, 1500);
  if(AUTH.secretCount >= 5){
    AUTH.secretCount = 0;
    clearTimeout(AUTH.secretTimer);
    abrirAdmin();
  } else {
    renderRouter();
  }
};

window.loginAdmin = function(){
  const pw = (AUTH.pwInput||"").trim();
  if(!pw){ AUTH.msg = "Digite a senha-mestra"; renderRouter(); return; }
  const hash = simpleHash(pw);
  const semAdmins = !AUTH.config.adminHash && (!AUTH.config.admins || Object.keys(AUTH.config.admins).length === 0);
  if(semAdmins){
    // primeira configuração — define o admin-mestre
    db.ref("config/adminHash").set(hash);
    db.ref("config/admins/" + hash).set({ nome: "Admin Master", master: true, criadoEm: Date.now() });
    AUTH.adminToken = hash;
    localStorage.setItem("bacbru_admin", hash);
    AUTH.msg = ""; AUTH.pwInput = ""; AUTH.view = "admin";
    renderRouter();
  } else if(hashIsAdmin(hash)){
    AUTH.adminToken = hash;
    localStorage.setItem("bacbru_admin", hash);
    AUTH.msg = ""; AUTH.pwInput = ""; AUTH.view = "admin";
    renderRouter();
  } else {
    AUTH.msg = "Senha incorreta";
    renderRouter();
  }
};

// Criar/remover admins adicionais
window.criarAdmin = function(){
  const nome = (AUTH.newAdminNome||"").trim() || "Admin";
  const pw = (AUTH.newAdminPw||"").trim();
  if(pw.length < 4){ AUTH.msg = "Senha do admin precisa de 4+ caracteres"; renderRouter(); return; }
  const hash = simpleHash(pw);
  db.ref("config/admins/" + hash).set({ nome, master: false, criadoEm: Date.now() });
  AUTH.newAdminNome = ""; AUTH.newAdminPw = "";
  AUTH.msg = "✓ Admin criada: " + nome;
  renderRouter();
};

window.removerAdmin = function(hash){
  const rec = AUTH.config.admins[hash];
  if(rec && rec.master){ alert("Não é possível remover o admin master."); return; }
  if(!confirm("Remover este admin?")) return;
  db.ref("config/admins/" + hash).remove();
};

window.criarChave = function(){
  const nome = (AUTH.newKeyName||"").trim() || "sem nome";
  const tipo = AUTH.newKeyTipo;
  const k = genKey(tipo);
  const dur = tipo === "teste" ? 3*24*60*60*1000 : 30*24*60*60*1000;
  const rec = {
    ativo: true,
    tipo,
    nome,
    criadoEm: Date.now(),
    expiraEm: tipo === "vitalicia" ? null : Date.now() + dur
  };
  db.ref("keys/" + k).set(rec);
  AUTH.newKeyName = "";
  AUTH.msg = "✓ Chave criada: " + k;
  renderRouter();
};

// Autoatendimento: teste grátis de 3 dias (1 por dispositivo, controlado no Firebase)
function getDeviceId(){
  let id = localStorage.getItem("bacbru_dev");
  if(!id){ id = "dev_" + Math.random().toString(36).slice(2) + Date.now().toString(36); localStorage.setItem("bacbru_dev", id); }
  return id;
}
window.iniciarTeste = function(){
  const devId = getDeviceId();
  db.ref("trials/" + devId).once("value").then(snap => {
    if(snap.val()){
      AUTH.msg = "Teste grátis já utilizado neste dispositivo";
      renderRouter();
      return;
    }
    const k = genKey("teste");
    const rec = { ativo:true, tipo:"teste", nome:"Teste 3 dias", criadoEm:Date.now(), expiraEm: Date.now() + 3*24*60*60*1000 };
    db.ref("keys/" + k).set(rec);
    db.ref("trials/" + devId).set({ key:k, criadoEm:Date.now() });
    AUTH.key = k;
    localStorage.setItem("bacbru_key", k);
    AUTH.msg = "";
    AUTH.view = "app";
    renderRouter();
  }).catch(()=>{ AUTH.msg = "Erro ao iniciar teste · tente novamente"; renderRouter(); });
};

window.toggleChave = function(k){
  const rec = AUTH.keys[k];
  if(!rec) return;
  db.ref("keys/" + k + "/ativo").set(!rec.ativo);
};

window.renovarChave = function(k){
  const rec = AUTH.keys[k];
  if(!rec) return;
  const base = (rec.expiraEm && rec.expiraEm > Date.now()) ? rec.expiraEm : Date.now();
  db.ref("keys/" + k + "/expiraEm").set(base + 30*24*60*60*1000);
  db.ref("keys/" + k + "/ativo").set(true);
};

window.mais3dias = function(k){
  const rec = AUTH.keys[k];
  if(!rec) return;
  // soma 3 dias a partir do vencimento atual (se ainda válido) ou de agora (se já expirou)
  const base = (rec.expiraEm && rec.expiraEm > Date.now()) ? rec.expiraEm : Date.now();
  db.ref("keys/" + k + "/expiraEm").set(base + 3*24*60*60*1000);
  db.ref("keys/" + k + "/ativo").set(true);
  toast("✓ +3 dias adicionados", 2500);
};

window.removerChave = function(k){
  if(!confirm("Remover a chave " + k + "?")) return;
  db.ref("keys/" + k).remove();
};

window.addSessao = function(){
  const t = (AUTH.newSessao||"").trim();
  if(!/^\d{1,2}:\d{2}$/.test(t)){ AUTH.msg = "Horário inválido (use HH:MM)"; renderRouter(); return; }
  const arr = [...AUTH.config.sessoes, t].sort();
  db.ref("config/sessoes").set(arr);
  AUTH.newSessao = "";
};

window.removerSessao = function(t){
  const arr = AUTH.config.sessoes.filter(x=>x!==t);
  db.ref("config/sessoes").set(arr);
};

window.sairAdmin = function(){ AUTH.view = "app"; renderRouter(); };
window.voltarLock = function(){ AUTH.view = "lock"; renderRouter(); };

window.logoutAcesso = function(){
  if(!confirm("Sair do acesso neste dispositivo?")) return;
  localStorage.removeItem("bacbru_key");
  localStorage.removeItem("bacbru_nome");
  localStorage.removeItem("bacbru_admin");
  AUTH.key = ""; AUTH.nome = ""; AUTH.adminToken = "";
  AUTH.view = "lock";
  renderRouter();
};

// ── Render do roteador ──
let _rTimer = null;
let _inputActive = false;
document.addEventListener("focusin", e => { if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA") _inputActive=true; });
document.addEventListener("focusout", () => { setTimeout(()=>{ _inputActive=false; }, 200); });
function renderRouter(){
  if(_rTimer) return;
  _rTimer = setTimeout(()=>{ _rTimer=null; _doRender(); }, 30);
}
function renderNow(){
  if(_rTimer){ clearTimeout(_rTimer); _rTimer=null; }
  _doRender();
}
function _doRender(){
  // App: renderiza sempre (nunca descarta — evita lag). JSON aberto é a única exceção.
  if(AUTH.view === "app"){ if(!ST.jsonOpen) renderApp(); return; }
  // Telas de login: não destrói enquanto digita (evita piscar/perder foco)
  const _ae = document.activeElement;
  if(_ae && (_ae.tagName === "INPUT" || _ae.tagName === "TEXTAREA")) return;
  const root = document.getElementById("root");
  if(AUTH.view === "loading"){
    root.innerHTML = `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:var(--txt3);font-family:var(--mono);font-size:12px">carregando...</div>`;
    return;
  }
  if(AUTH.view === "lock"){
    root.innerHTML = renderLock();
    bindAuthInputs();
    return;
  }
  if(AUTH.view === "adminLogin"){
    root.innerHTML = renderAdminLogin();
    bindAuthInputs();
    return;
  }
  if(AUTH.view === "admin"){
    root.innerHTML = renderAdminPanel();
    bindAuthInputs();
    return;
  }
}

function diceSVG(color, pips){
  const c = color === "blue" ? "#3b82f6" : "#ef4444";
  const c2 = color === "blue" ? "#1e40af" : "#991b1b";
  const dotPos = {
    1:[[50,50]],
    2:[[30,30],[70,70]],
    3:[[28,28],[50,50],[72,72]],
    4:[[30,30],[70,30],[30,70],[70,70]],
    5:[[30,30],[70,30],[50,50],[30,70],[70,70]],
    6:[[30,28],[70,28],[30,50],[70,50],[30,72],[70,72]]
  }[pips];
  const dots = dotPos.map(([x,y])=>`<circle cx="${x}" cy="${y}" r="8" fill="#fff"/>`).join("");
  return `<svg width="34" height="34" viewBox="0 0 100 100" style="filter:drop-shadow(0 2px 6px ${c}66)">
    <rect x="6" y="6" width="88" height="88" rx="20" fill="url(#g${color})" stroke="${c2}" stroke-width="2"/>
    <defs><linearGradient id="g${color}" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="${c}"/><stop offset="1" stop-color="${c2}"/>
    </linearGradient></defs>
    ${dots}
  </svg>`;
}

function renderAdminLogin(){
  const first = !AUTH.config.adminHash && (!AUTH.config.admins || Object.keys(AUTH.config.admins).length === 0);
  return `<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;max-width:420px;margin:0 auto">
    <div class="tg" style="font-size:24px;margin-bottom:6px;margin-top:12px">PAINEL ADMIN</div>
    <div style="font-size:10px;color:var(--txt3);font-family:var(--mono);letter-spacing:2px;margin-bottom:24px">${first ? "DEFINA SUA SENHA-MESTRA" : "DIGITE A SENHA-MESTRA"}</div>
    <input id="pwInput" type="password" placeholder="SENHA-MESTRA" autocomplete="off" oninput="AUTH.pwInput=this.value" onkeydown="if(event.key==='Enter')loginAdmin()" style="width:100%;padding:15px;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:12px;color:var(--txt);font-family:var(--mono);font-size:14px;text-align:center;letter-spacing:2px;outline:none"/>
    ${AUTH.msg ? `<div style="margin-top:12px;font-size:11px;color:var(--red2);font-family:var(--mono)">${AUTH.msg}</div>` : ""}
    ${first ? `<div style="margin-top:12px;font-size:10px;color:var(--gold2);font-family:var(--mono);line-height:1.5;text-align:center">⚠️ Esta será a senha-mestra do sistema. Guarde-a bem. Este dispositivo será reconhecido como admin automaticamente.</div>` : ""}

}

function renderAdminPanel(){
  const keys = Object.entries(AUTH.keys).sort((a,b)=>(b[1].criadoEm||0)-(a[1].criadoEm||0));
  const ativas = keys.filter(([k,r])=>keyIsValid(r)).length;
  const a = analyze();
  const total = ST.greens + ST.reds;
  const rate = total > 0 ? Math.round(100*ST.greens/total) : 0;
  const sigInfo = a.signal === "P" ? {txt:"AZUL · P", color:"var(--blue2)", bg:"rgba(59,130,246,.12)"}
                : a.signal === "B" ? {txt:"VERMELHO · B", color:"var(--red2)", bg:"rgba(239,68,68,.12)"}
                : a.signal === "T" ? {txt:"EMPATE", color:"var(--gold2)", bg:"rgba(245,158,11,.12)"}
                : {txt:"AGUARDA", color:"var(--txt3)", bg:"rgba(148,163,184,.06)"};
  const cicloLabel = ST.ciclo === "entrada" ? `ENTRADA · ${lbl(ST.ciclo_sinal)}`
                   : ST.ciclo === "gale" ? `GALE · ${lbl(ST.ciclo_gale_sinal||opos(ST.ciclo_sinal))} (${ST.ciclo_gale_dec||'INVERTER'})`
                   : ST.ciclo === "aguarda_gale" ? `⏳ AGUARDANDO GALE · ${ST.ciclo_aguarda_count||0}/3 rodadas`
                   : "—";
  const hunterTxt = a.hunter ? (
    a.hunter.status === "QUENTE" ? "🔥 QUENTE" :
    a.hunter.status === "ECO" ? "🔁 ECO" :
    a.hunter.status === "ABERTA" ? "🟢 ABERTA" :
    a.hunter.status === "PASSOU" ? "🛑 PASSOU" :
    a.hunter.status === "FECHADA" ? "⏳ FECHADA" : "○ analisando"
  ) : "—";
  const keyRows = keys.length ? keys.map(([k,r])=>{
    const valid = keyIsValid(r);
    const exp = r.tipo === "vitalicia" ? "vitalícia" :
      (r.expiraEm ? new Date(r.expiraEm).toLocaleDateString("pt-BR") : "—");
    const dias = (r.tipo === "mensal" || r.tipo === "teste") && r.expiraEm ? Math.ceil((r.expiraEm-Date.now())/(24*60*60*1000)) : null;
    const tipoLabel = r.tipo==='vitalicia'?'♾ VITALÍCIA':r.tipo==='teste'?'🎁 TESTE 3D':'📅 MENSAL';
    return `<div style="padding:11px;background:rgba(0,0,0,.3);border:1px solid ${valid?'rgba(34,197,94,.2)':'rgba(239,68,68,.2)'};border-radius:10px;margin-bottom:7px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-family:var(--mono);font-size:13px;font-weight:700;color:${valid?'var(--green2)':'var(--red2)'}">${k}</div>
        <div style="font-size:9px;font-family:var(--mono);color:var(--txt3)">${tipoLabel}</div>
      </div>
      <div style="font-size:10px;color:var(--txt2);font-family:var(--mono);margin-top:4px">${r.nome||'sem nome'} · ${valid?'ativa':'inativa'} · exp: ${exp}${dias!==null?` (${dias}d)`:''}</div>
      <div style="font-size:9px;color:${r.deviceId?'var(--cyan)':'var(--txt3)'};font-family:var(--mono);margin-top:2px">${r.deviceId?'🔒 em uso · 1 aparelho':'🔓 livre'}</div>
      <div style="display:flex;gap:5px;margin-top:8px">
        <button onclick="toggleChave('${k}')" style="flex:1;padding:7px 0;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:7px;color:var(--gold2);font-family:var(--mono);font-size:9px;letter-spacing:1px;cursor:pointer">${r.ativo?'DESATIVAR':'ATIVAR'}</button>
        ${(r.tipo==='mensal'||r.tipo==='teste')?`<button onclick="renovarChave('${k}')" style="flex:1;padding:7px 0;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:7px;color:var(--green2);font-family:var(--mono);font-size:9px;letter-spacing:1px;cursor:pointer">+30 DIAS</button>`:''}
        ${r.tipo==='teste'?`<button onclick="mais3dias('${k}')" style="flex:1;padding:7px 0;background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.25);border-radius:7px;color:var(--purple);font-family:var(--mono);font-size:9px;letter-spacing:1px;cursor:pointer">+3 DIAS</button>`:''}
        <button onclick="removerChave('${k}')" style="flex:1;padding:7px 0;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:7px;color:var(--red2);font-family:var(--mono);font-size:9px;letter-spacing:1px;cursor:pointer">REMOVER</button>
      </div>
    </div>`;
  }).join("") : `<div style="color:var(--txt3);font-size:11px;font-family:var(--mono);text-align:center;padding:14px">nenhuma chave criada</div>`;

  const sessoesRows = AUTH.config.sessoes.length ? AUTH.config.sessoes.map(t=>
    `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 11px;background:rgba(0,0,0,.3);border-radius:8px;margin-bottom:5px">
      <span style="font-family:var(--mono);font-size:13px;color:var(--cyan)">🕐 ${t}</span>
      <button onclick="removerSessao('${t}')" style="padding:4px 10px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:6px;color:var(--red2);font-family:var(--mono);font-size:9px;cursor:pointer">×</button>
    </div>`).join("") : `<div style="color:var(--txt3);font-size:10px;font-family:var(--mono);padding:8px">nenhum horário definido</div>`;

  const adminsList = Object.entries(AUTH.config.admins || {});
  const adminRows = adminsList.length ? adminsList.map(([hash,r])=>
    `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 11px;background:rgba(0,0,0,.3);border-radius:8px;margin-bottom:5px">
      <span style="font-family:var(--mono);font-size:12px;color:${r.master?'var(--gold2)':'var(--purple)'}">${r.master?'👑':'🛡'} ${r.nome||'Admin'}</span>
      ${r.master?`<span style="font-size:9px;color:var(--txt3);font-family:var(--mono)">MASTER</span>`:`<button onclick="removerAdmin('${hash}')" style="padding:4px 10px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:6px;color:var(--red2);font-family:var(--mono);font-size:9px;cursor:pointer">remover</button>`}
    </div>`).join("") : `<div style="color:var(--txt3);font-size:10px;font-family:var(--mono);padding:8px">nenhuma admin além de você</div>`;

  return `<div class="app" style="padding:18px 14px 60px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="tg" style="font-size:18px">ADMIN</div>
      </div>
      <button onclick="sairAdmin()" style="padding:8px 14px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:9px;color:var(--green2);font-family:var(--mono);font-size:10px;letter-spacing:1px;cursor:pointer">▶ ABRIR APP</button>
    </div>

    <div class="stats-bar">
      <div class="stat"><div class="stat-v g">${ativas}</div><div class="stat-l">ATIVAS</div></div>
      <div class="stat"><div class="stat-v" style="color:var(--purple)">${keys.length}</div><div class="stat-l">TOTAL</div></div>
      <div class="stat"><div class="stat-v y">${AUTH.config.sessoes.length}</div><div class="stat-l">SESSÕES</div></div>
    </div>

    <!-- ════════ OPERAÇÃO: SINAL + REGISTRO + CONTROLES ════════ -->
    <div class="sec-lbl">OPERAÇÃO · SINAL AO VIVO</div>
    <div class="card" style="padding:14px;background:linear-gradient(135deg,${sigInfo.bg},rgba(0,0,0,.2))">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:9px;color:var(--txt3);font-family:var(--mono);letter-spacing:2px">SINAL</div>
          <div style="font-size:24px;font-weight:900;font-family:var(--mono);color:${sigInfo.color};letter-spacing:2px">${sigInfo.txt}</div>
          <div style="font-size:11px;color:var(--txt2);font-family:var(--mono);margin-top:3px">${(a.conf*100).toFixed(0)}% confiança</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:9px;color:var(--txt3);font-family:var(--mono);letter-spacing:2px">MESA</div>
          <div style="font-size:14px;font-weight:800;font-family:var(--mono);color:${
            a.heat&&a.heat.state==='QUENTE'?'var(--green2)':
            a.heat&&a.heat.state==='FAVORÁVEL'?'var(--cyan)':
            a.heat&&a.heat.state==='NEUTRA'?'var(--txt)':
            a.heat&&a.heat.state==='FRIA'?'var(--gold2)':
            a.heat?'var(--red2)':'var(--txt3)'
          }">${a.heat?a.heat.state:'—'}</div>
          <div style="font-size:11px;color:var(--txt2);font-family:var(--mono);margin-top:3px">${hunterTxt}</div>
        </div>
      </div>
      <div style="margin-top:10px;padding:8px 10px;background:rgba(0,0,0,.3);border-radius:8px;font-size:11px;color:var(--txt2);font-family:var(--mono);line-height:1.5">
        ${a.reason || 'aguardando dados'}
      </div>
    </div>

    <!-- CARD QUE O ASSINANTE ESTÁ VENDO (idêntico) -->
    <div class="sec-lbl">👁 O QUE O ASSINANTE VÊ</div>
    <div class="card" style="padding:12px">
      ${buildEntryCard(a, true)}
    </div>

    <!-- PLACAR PRINCIPAL · saldo líquido (meta 5), rate, greens, empates -->
    <div class="stats-bar" style="padding:14px 12px">
      <div class="stat"><div class="stat-v" style="font-size:24px;color:${(ST.greens-ST.reds*3)>=0?'var(--green2)':'var(--red2)'}">${(ST.greens-ST.reds*3)>=0?'+':''}${ST.greens-ST.reds*3}</div><div class="stat-l">LÍQUIDO /5</div></div>
      <div class="stat"><div class="stat-v y" style="font-size:24px">${rate}%</div><div class="stat-l">RATE</div></div>
      <div class="stat"><div class="stat-v g" style="font-size:24px">${ST.greens}</div><div class="stat-l">GREEN</div></div>
      <div class="stat"><div class="stat-v" style="color:var(--gold2);font-size:24px">${(ST.pEmp||0)+(ST.pEmpG1||0)}</div><div class="stat-l">EMPATE</div></div>
    </div>
    <div class="card" style="padding:10px;text-align:center;margin-bottom:12px;background:linear-gradient(135deg,${(ST.greens-ST.reds*3)>=5?'rgba(34,197,94,.12)':(ST.reds>=2&&(ST.greens-ST.reds*3)<0)?'rgba(239,68,68,.1)':'rgba(0,0,0,.2)'},rgba(0,0,0,.1))">
      <span style="font-size:12px;font-family:var(--mono);color:var(--txt2)">🎯 Meta 5 líquidos (red = -3) · saldo: </span>
      <span style="font-size:15px;font-family:var(--mono);font-weight:800;color:${(ST.greens-ST.reds*3)>=5?'var(--green2)':(ST.greens-ST.reds*3)<0?'var(--red2)':'var(--txt)'}">${(ST.greens-ST.reds*3)>=0?'+':''}${ST.greens-ST.reds*3}</span>
      <span style="font-size:10px;font-family:var(--mono);color:var(--txt3)"> · stop em ${ST.reds}/2 loss</span>
      ${ST.metaAviso?`<div style="margin-top:6px;font-size:12px;font-weight:700;font-family:var(--mono);color:${ST.metaAviso.tipo==='meta'?'var(--green2)':'var(--red2)'}">${ST.metaAviso.msg}</div>`:''}
    </div>

    <!-- REGISTRAR RODADA -->
    <div class="sec-lbl">REGISTRAR RODADA</div>
    <div class="card">
      <div class="sum-row">
        <input id="soma" class="sum-inp" type="number" placeholder="SOMA (ex: 8)" value="${ST.somaIn}"/>
        <div class="sum-lbl">DADOS</div>
      </div>
      <div class="input-row" style="margin-top:8px">
        <button class="btn btn-p" onclick="reg('P')">AZUL · P</button>
        <button class="btn btn-t" onclick="reg('T')">EMPATE</button>
        <button class="btn btn-b" onclick="reg('B')">VERM · B</button>
      </div>
      <button onclick="toggleCobertura()" style="width:100%;margin-top:8px;padding:13px 0;font-size:13px;font-family:var(--mono);font-weight:700;border-radius:10px;cursor:pointer;background:${ST.coberturaEmpate?'linear-gradient(135deg,#f59e0b,#d97706)':'rgba(245,158,11,.12)'};color:${ST.coberturaEmpate?'#1a1a1a':'var(--gold2)'};border:1px solid rgba(245,158,11,.4)">
        ${ST.coberturaEmpate ? '🛡️ COBRIR EMPATE · LIGADO · clique p/ desligar' : '🛡️ COBRIR EMPATE'}
      </button>
      <div class="foot-btns" style="margin-top:8px">
        <button class="util-btn" onclick="undo()">↩ DESFAZER</button>
        <button class="util-btn" onclick="reset()">◌ ZERAR PLACAR</button>
        <button class="util-btn" onclick="resetAprendizado()" style="color:var(--red2);border-color:rgba(239,68,68,.3)">⚠ APAGAR APRENDIZADO</button>
      </div>

      ⊡ FINALIZAR SESSÃO · ZERAR PLACAR
    </button>

    <!-- RESULTADO DE CADA ENTRADA -->
    ${(ST.logEntradas && ST.logEntradas.length)?`<div class="card" style="padding:10px;margin-bottom:12px">
      <div style="font-size:10px;font-family:var(--mono);color:var(--txt3);margin-bottom:8px;letter-spacing:1px">📋 RESULTADO DAS ENTRADAS</div>
      <div style="max-height:420px;overflow-y:auto;display:flex;flex-direction:column;gap:3px">
        ${ST.logEntradas.slice().map(e=>{
          const resHex = e.res==="G"?"var(--green2)":"var(--red2)";
          // texto exato do que bateu
          let txt;
          if(e.res==="R") txt="RED";
          else if(e.via==="seco") txt="GREEN SG";
          else if(e.via==="gale") txt="GREEN no gale";
          else if((e.via||"").indexOf("empate-entrada")===0) txt="GREEN · empate na entrada ("+e.via.replace("empate-entrada ","")+")";
          else if((e.via||"").indexOf("empate-gale")===0) txt="GREEN · empate no gale ("+e.via.replace("empate-gale ","")+")";
          else if((e.via||"").indexOf("empate")===0) txt="GREEN · empate seco ("+e.via.replace("empate ","")+")";
          else txt="GREEN";
          return `<div style="display:flex;align-items:center;gap:10px;padding:7px 10px;background:rgba(255,255,255,.02);border-left:3px solid ${resHex};border-radius:6px;font-family:var(--mono);font-size:12px">
            <span style="color:var(--txt3);min-width:74px">Entrada ${e.n}:</span>
            <span style="color:${resHex};font-weight:700">${txt}</span>
          </div>`;

      </div>

    <div class="sec-lbl">CRIAR NOVA CHAVE</div>
    <div class="card">
      <input id="newKeyName" placeholder="Nome do assinante" value="${AUTH.newKeyName}" style="width:100%;padding:11px;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:9px;color:var(--txt);font-family:var(--mono);font-size:12px;outline:none;margin-bottom:8px"/>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px">
        <button onclick="window.setTipo('teste')" style="padding:11px 0;background:${AUTH.newKeyTipo==='teste'?'rgba(245,158,11,.15)':'rgba(0,0,0,.3)'};border:1px solid ${AUTH.newKeyTipo==='teste'?'rgba(245,158,11,.4)':'var(--border)'};border-radius:9px;color:${AUTH.newKeyTipo==='teste'?'var(--gold2)':'var(--txt3)'};font-family:var(--mono);font-size:10px;letter-spacing:1px;cursor:pointer">🎁 3 DIAS</button>
        <button onclick="window.setTipo('mensal')" style="padding:11px 0;background:${AUTH.newKeyTipo==='mensal'?'rgba(59,130,246,.15)':'rgba(0,0,0,.3)'};border:1px solid ${AUTH.newKeyTipo==='mensal'?'rgba(59,130,246,.4)':'var(--border)'};border-radius:9px;color:${AUTH.newKeyTipo==='mensal'?'var(--blue2)':'var(--txt3)'};font-family:var(--mono);font-size:10px;letter-spacing:1px;cursor:pointer">📅 MENSAL</button>
        <button onclick="window.setTipo('vitalicia')" style="padding:11px 0;background:${AUTH.newKeyTipo==='vitalicia'?'rgba(167,139,250,.15)':'rgba(0,0,0,.3)'};border:1px solid ${AUTH.newKeyTipo==='vitalicia'?'rgba(167,139,250,.4)':'var(--border)'};border-radius:9px;color:${AUTH.newKeyTipo==='vitalicia'?'var(--purple)':'var(--txt3)'};font-family:var(--mono);font-size:10px;letter-spacing:1px;cursor:pointer">♾ VITAL.</button>
      </div>

    <div class="card" style="max-height:280px;overflow-y:auto">
      ${Object.entries(AUTH.entradas).length===0?'<div style="font-size:11px;color:var(--txt3);font-family:var(--mono);text-align:center;padding:12px">nenhuma entrada registrada</div>':
        Object.entries(AUTH.entradas).sort((a,b)=>b[1].entradaEm-a[1].entradaEm).map(([devId,e])=>`

          <div style="font-size:10px;color:var(--txt3);font-family:var(--mono);text-align:right">${new Date(e.entradaEm).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</div>

        <div style="display:flex;gap:7px">
          <input id="newAdminPw" type="text" placeholder="Senha da admin" value="${AUTH.newAdminPw}" style="flex:1;padding:11px;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:9px;color:var(--txt);font-family:var(--mono);font-size:12px;outline:none"/>
          <button onclick="criarAdmin()" style="padding:11px 16px;background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.3);border-radius:9px;color:var(--purple);font-family:var(--mono);font-size:11px;font-weight:700;cursor:pointer">+ ADMIN</button>
        </div>
        <div style="margin-top:6px;font-size:9px;color:var(--txt3);font-family:var(--mono);line-height:1.5">A nova admin abre o app, toca 5× na logo e entra com essa senha. O dispositivo dela será reconhecido automaticamente.</div>
      </div>
    </div>

    <div class="sec-lbl">CALIBRAGEM · APLICAR / COPIAR JSON</div>
    <div class="card">
      <div style="font-size:10px;color:var(--txt3);font-family:var(--mono);line-height:1.5;margin-bottom:8px">Cole aqui o JSON exportado da última sessão para retomar o aprendizado, ou copie o JSON atual para guardar.</div>
      <textarea id="injta" class="json-ta" placeholder="Cole o JSON da última sessão aqui..." oninput="ST.injTxt=this.value">${ST.injTxt||""}</textarea>
      <div class="json-btns">
        <button class="json-btn blue" onclick="injectJSON()">↑ APLICAR JSON</button>
        <button class="json-btn" onclick="copyJSON()">↓ COPIAR ATUAL</button>
      </div>
      <button onclick="publicarMesa()" style="width:100%;margin-top:8px;padding:13px 0;font-size:13px;font-family:var(--mono);font-weight:700;border-radius:10px;cursor:pointer;background:${ST.publicado?'linear-gradient(135deg,#22c55e,#16a34a)':'rgba(34,197,94,.15)'};border:1px solid rgba(34,197,94,.4);color:${ST.publicado?'#fff':'var(--green2)'}">${ST.publicado?'✓ MESA PUBLICADA (ao vivo no app)':'📡 PUBLICAR MESA PARA ASSINANTES'}</button>
      <button class="util-btn" style="width:100%;margin-top:7px" onclick="toggleView()">${ST.viewOpen?'▲ Ocultar JSON':'👁 Ver JSON Atual'}</button>
      ${ST.viewOpen ? `<textarea class="json-ta view" readonly onclick="this.select()">${exportJSON()}</textarea>` : ''}
      <button onclick="recalcularEmpates()" style="width:100%;padding:12px;margin-top:8px;background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(167,139,250,.06));border:1px solid rgba(245,158,11,.3);border-radius:9px;color:var(--gold2);font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:2px;cursor:pointer">🔄 RECALCULAR EMPATES DO HISTÓRICO</button>
      <div style="margin-top:6px;font-size:9px;color:var(--txt3);font-family:var(--mono);line-height:1.5">Conta retroativamente quantos empates aconteceram com o farejador ativo. Útil se empates não foram contabilizados em sessões anteriores.</div>
    </div>

    <button onclick="logoutAcesso()" style="width:100%;padding:11px;margin-top:10px;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:9px;color:var(--red2);font-family:var(--mono);font-size:10px;letter-spacing:2px;cursor:pointer">SAIR DO ADMIN NESTE DISPOSITIVO</button>

    <div class="credit">BAC BRU · PAINEL ADMIN · GESTÃO DE ASSINATURAS</div>
    ${celebraOverlayHTML()}${flashOverlayHTML()}
    ${avisoSessaoHTML()}
  </div>`;
}

window.setTipo = function(t){ AUTH.newKeyTipo = t; renderRouter(); };

function bindAuthInputs(){
  const bind = (id, field, upper) => {
    const el = document.getElementById(id);
    if(el) el.addEventListener("input", e => {
      AUTH[field] = upper ? e.target.value.toUpperCase() : e.target.value;
    });
  };
  bind("keyInput", "keyInput", true);
  bind("pwInput", "pwInput", false);
  bind("newKeyName", "newKeyName", false);
  bind("newSessao", "newSessao", false);
  bind("newAdminNome", "newAdminNome", false);
  bind("newAdminPw", "newAdminPw", false);

  // Inputs operacionais do admin (soma + JSON) → gravam em ST, não AUTH
  const si = document.getElementById("soma");
  if(si) si.addEventListener("input", e => { ST.somaIn = e.target.value; });
  const ja = document.getElementById("injta");
  if(ja) ja.addEventListener("input", e => { ST.injTxt = e.target.value; });
}

window.reg = function(r){
  // Lê a soma DIRETO do campo no instante do clique (não depende do listener de input,
  // que pode não ter disparado se houve re-render ou clique rápido).
  const el = document.getElementById("soma");
  const soma = el ? el.value : ST.somaIn;
  ST.somaIn = soma;

  // Empate precisa de soma válida (2 a 12) — é ela que define o pagamento.
  if(r === "T"){
    const n = parseInt(soma);
    if(!n || n < 2 || n > 12){
      toast("⚠ Digite a SOMA do empate (2 a 12) antes de marcar EMPATE", 3200);
      return;
    }
  }

  addRound(r, soma);
  ST.somaIn = "";
};
window.confirmEntry = confirmEntry;
window.toggleCobertura = function(){
  ST.coberturaEmpate = !ST.coberturaEmpate;
  // Cobrir empate ligado = sessão ativa (some o "fora de sessão" no index)
  if(ST.coberturaEmpate) ST.sessaoAtiva = true;
  toast(ST.coberturaEmpate ? "🛡️ COBRIR EMPATE ligado" : "Cobrir empate desligado", 1800);
  save(); renderNow();
};
window.abortCiclo = abortCiclo;
window.undo = undo;
window.reset = reset;
window.injectJSON = injectJSON;
window.copyJSON = copyJSON;
window.finalizarSessao = finalizarSessao;
window.resetAprendizado = resetAprendizado;
window.publicarMesa = function(){
  ST.publicado = !ST.publicado;
  toast(ST.publicado ? "📡 Mesa publicada — assinantes veem agora" : "🔒 Mesa oculta dos assinantes", 2500);
  save(); renderNow();
};
window.toggleJson = function(){ ST.jsonOpen = !ST.jsonOpen; INPUT_FOCUSED=false; renderRouter(); };
window.toggleView = function(){ ST.viewOpen = !ST.viewOpen; renderApp(); };
window.abrirAdminApp = function(){ AUTH.view = "admin"; renderRouter(); };
window.fecharPaga = function(){ ST.celebra = null; renderRouter(); };
window.fecharAviso = function(){ ST.avisoVisto = true; renderRouter(); };
window.fecharAvisoSessao = function(){ ST.metaAvisoVisto = true; renderRouter(); };
window.encerrarNoLucro = function(){
  const liq = ST.greens - (ST.reds * 3);
  ST.metaAviso = { tipo:"meta", msg:`✅ Encerrado no lucro · +${liq} líquidos · decisão inteligente em mesa difícil!` };
  ST.metaAvisoVisto = false;
  ST.sessaoAtiva = false;
  renderRouter();
};

renderRouter();
initFirebaseSync();
initAuth();
</script>
</body>
