<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#030712"/>
<title>BAC BRU · SINAL</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#030712;--bg2:#0a1220;--bg3:#0f1828;
  --txt:#e2e8f0;--txt2:#94a3b8;--txt3:#475569;
  --blue:#3b82f6;--red:#ef4444;--green:#22c55e;
  --gold:#f59e0b;--gold2:#fbbf24;--cyan:#22d3ee;
  --border:rgba(255,255,255,.05);--mono:'JetBrains Mono','Courier New',monospace
}
html,body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overscroll-behavior:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes flashIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes pagaPop{0%{transform:scale(.3);opacity:0}40%{transform:scale(1.15);opacity:1}60%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
@keyframes confFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.wrap{max-width:420px;margin:0 auto;padding:12px 12px 60px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px}
.logo{text-align:center;padding:18px 0 8px;font-family:var(--mono);font-weight:900;font-size:22px;letter-spacing:3px;background:linear-gradient(135deg,#f59e0b,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub-lbl{font-size:9px;font-family:var(--mono);color:var(--txt3);text-align:center;letter-spacing:2px;margin-bottom:14px}
.stats-bar{display:flex;gap:8px;padding:14px 12px}
.stat{flex:1;text-align:center}
.stat-v{font-size:24px;font-weight:900;font-family:var(--mono)}
.stat-l{font-size:9px;color:var(--txt3);font-family:var(--mono);letter-spacing:1px;margin-top:2px}
.g{color:var(--green)}.r{color:var(--red)}.y{color:var(--gold2)}
.signal-card{position:relative;overflow:hidden;text-align:center;padding:20px 14px}
.sig-status{font-size:10px;font-family:var(--mono);color:var(--txt3);letter-spacing:2px;margin-bottom:8px}
.sig-main{font-size:52px;font-weight:900;font-family:var(--mono);letter-spacing:4px}
.sig-main.p{color:var(--blue);text-shadow:0 0 30px rgba(59,130,246,.5)}
.sig-main.b{color:var(--red);text-shadow:0 0 30px rgba(239,68,68,.5)}
.sig-main.w{color:var(--txt3)}
.conf-bar{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:10px}
.conf-fill{height:100%;border-radius:2px;transition:width .4s}
.conf-txt{display:flex;justify-content:space-between;font-size:9px;font-family:var(--mono);color:var(--txt3);margin-top:4px}
.wait-card{text-align:center;padding:14px}
.wait-act{font-size:11px;font-family:var(--mono);color:var(--txt3);letter-spacing:1px;animation:pulse 2s infinite}
.sec-lbl{font-size:9px;font-family:var(--mono);color:var(--txt3);letter-spacing:2px;margin:10px 0 4px;padding-left:2px}
.road{padding:8px;overflow-x:auto}
.bead-grid{display:grid;grid-template-rows:repeat(6,22px);grid-auto-flow:column;grid-auto-columns:22px;gap:2px}
.bead{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;font-family:var(--mono)}
.bead.p{background:rgba(59,130,246,.25);color:#93c5fd;border:1px solid rgba(59,130,246,.4)}
.bead.b{background:rgba(239,68,68,.25);color:#fca5a5;border:1px solid rgba(239,68,68,.4)}
.bead.t{background:rgba(245,158,11,.25);color:#fcd34d;border:1px solid rgba(245,158,11,.4)}
.tie-badge{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:5px 10px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);border-radius:20px;font-size:11px;font-family:var(--mono);color:var(--gold2)}
.heat-bar{padding:10px 12px}
.heat-lbl{font-size:9px;font-family:var(--mono);color:var(--txt3);letter-spacing:2px;margin-bottom:6px}
.heat-state{font-size:14px;font-weight:800;font-family:var(--mono);letter-spacing:2px;margin-bottom:6px}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-family:var(--mono);font-size:14px;font-weight:700;letter-spacing:1px;cursor:pointer}
.btn-lock{background:linear-gradient(135deg,rgba(34,211,238,.15),rgba(34,197,94,.08));border:1px solid rgba(34,211,238,.3);color:var(--cyan)}
.inp{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;color:var(--txt);font-family:var(--mono);font-size:15px;padding:12px;text-align:center;letter-spacing:3px;outline:none}
.msg{font-size:11px;font-family:var(--mono);text-align:center;color:var(--red);margin-top:6px;min-height:16px}
.toast-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 18px;font-family:var(--mono);font-size:12px;color:var(--txt);z-index:9999;max-width:320px;text-align:center;transition:opacity .3s;pointer-events:none}
.credit{text-align:center;font-size:9px;font-family:var(--mono);color:var(--txt3);padding:20px 0 8px;letter-spacing:1px}
.aviso-card{border-radius:16px;padding:16px;text-align:center;margin-bottom:10px}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── Firebase ──
firebase.initializeApp({
  apiKey: "AIzaSyBiyeiTk8Kt1ndNOcNxI4b6mcpenZ3KL6A",
  authDomain: "bac-bru.firebaseapp.com",
  databaseURL: "https://bac-bru-default-rtdb.firebaseio.com",
  projectId: "bac-bru",
  storageBucket: "bac-bru.appspot.com",
  messagingSenderId: "426731828065",
  appId: "1:426731828065:web:f08dae43abc2ebe2ef8cb5"
});
const db = firebase.database();
const ROOM = "bacbru-v50";
const ROOM_REF = db.ref("rooms/" + ROOM);

// ── Estado do assinante ──
const AUTH = { view:"loading", key:"", keys:{}, config:{}, msg:"", keyInput:"", nome:"" };
const ST = {
  H:[], greens:0, reds:0, bonus:0,
  ciclo:"idle", ciclo_sinal:null, ciclo_conf:0, ciclo_tie:null,
  ciclo_gale_sinal:null, ciclo_gale_dec:null, ciclo_gale_tie:null,
  ciclo_aguarda_count:0,
  coberturaEmpate:false, celebra:null, flash:null,
  metaAviso:null, sessaoAtiva:false, esperaSessao:0,
  toast:"", toastT:0
};

// ── Auth helpers ──
function keyIsValid(rec){
  if(!rec) return false;
  if(rec.tipo === "vitalicio") return true;
  if(rec.tipo === "teste" && rec.expira){
    return Date.now() < new Date(rec.expira).getTime();
  }
  if(rec.expira) return Date.now() < new Date(rec.expira).getTime();
  return false;
}
function diasRestantes(rec){
  if(!rec || !rec.expira || rec.tipo === "vitalicio") return null;
  const d = Math.ceil((new Date(rec.expira).getTime() - Date.now())/(1000*86400));
  return d > 0 ? d : 0;
}

// ── Toast ──
function toast(msg, dur=2200){
  ST.toast = msg;
  clearTimeout(ST.toastT);
  ST.toastT = setTimeout(()=>{ ST.toast=""; render(); }, dur);
  render();
}

// ── Firebase sync (read only) ──
function initSync(){
  db.ref("config").on("value", s=>{
    const c = s.val() || {};
    AUTH.config.adminHash = c.adminHash || null;
    AUTH.config.admins = c.admins || {};
    AUTH.config.sessoes = c.sessoes || [];
    checkAuth();
  });
  db.ref("keys").on("value", s=>{
    AUTH.keys = s.val() || {};
    checkAuth();
  });
  ROOM_REF.on("value", snap=>{
    const data = snap.val();
    if(!data) return;
    if(Array.isArray(data.H)) ST.H = data.H;
    if(typeof data.greens === "number") ST.greens = data.greens;
    if(typeof data.reds === "number") ST.reds = data.reds;
    if(typeof data.bonus === "number") ST.bonus = data.bonus;
    ST.coberturaEmpate = !!data.coberturaEmpate;
    if(typeof data.ciclo === "string") ST.ciclo = data.ciclo;
    ST.ciclo_sinal = data.ciclo_sinal || null;
    ST.ciclo_conf = data.ciclo_conf || 0;
    ST.ciclo_tie = data.ciclo_tie || null;
    ST.ciclo_gale_sinal = data.ciclo_gale_sinal || null;
    ST.ciclo_gale_dec = data.ciclo_gale_dec || null;
    ST.ciclo_gale_tie = data.ciclo_gale_tie || null;
    ST.ciclo_aguarda_count = data.ciclo_aguarda_count || 0;
    ST.sessaoAtiva = !!data.sessaoAtiva;
    ST.esperaSessao = data.esperaSessao || 0;
    // celebra
    const novaCelebra = data.celebra || null;
    if(novaCelebra && novaCelebra !== ST.celebra){
      ST.celebra = novaCelebra;
      setTimeout(()=>{ ST.celebra = null; render(); }, 4500);
    } else if(!novaCelebra){ ST.celebra = null; }
    // flash
    const novoFlash = data.flash || null;
    if(novoFlash && (!ST.flash || novoFlash.t !== (ST.flash||{}).t)){
      ST.flash = novoFlash;
      setTimeout(()=>{ ST.flash = null; render(); }, 1100);
    } else if(!novoFlash){ ST.flash = null; }
    // metaAviso
    ST.metaAviso = data.metaAviso || null;
    render();
  }, ()=>{});
}

function checkAuth(){
  if(AUTH.key && keyIsValid(AUTH.keys[AUTH.key])){
    if(AUTH.view === "loading" || AUTH.view === "lock") AUTH.view = "app";
    const rec = AUTH.keys[AUTH.key];
    if(!AUTH.nome){
      AUTH.nome = (rec && rec.nome && rec.nome !== "sem nome") ? rec.nome : "";
      if(AUTH.nome) localStorage.setItem("bacbru_nome", AUTH.nome);
    }
  } else if(AUTH.view === "app"){
    AUTH.view = "lock";
  }
  if(AUTH.view === "loading") AUTH.view = "lock";
  render();
}

// ── Label helpers ──
function lbl(s){ return s==="P"?"AZUL":s==="B"?"VERMELHO":s==="T"?"EMPATE":"AGUARDA"; }

// ── Celebra overlay ──
function celebraHTML(){
  if(!ST.celebra) return "";
  const lvl = ST.celebra==="88x"?3:ST.celebra==="25x"?2:1;
  const cols=["#fbbf24","#f59e0b","#ef4444","#22c55e","#22d3ee","#a78bfa"];
  let conf="";
  const n = lvl===3?60:lvl===2?30:0;
  for(let i=0;i<n;i++){
    const c=cols[i%cols.length];
    conf+=`<div style="position:absolute;left:${Math.random()*100}%;top:-20px;width:8px;height:8px;background:${c};border-radius:${Math.random()>0.5?'50%':'2px'};animation:confFall ${1.5+Math.random()*2}s ${Math.random()*0.5}s ease-in forwards"></div>`;
  }
  const emojis=lvl===3?"🎊🔥💎":lvl===2?"🎉✨":"🎊";
  const txt=lvl===3?"EMPATE 88X!!! MÁXIMO PAGAMENTO":lvl===2?"EMPATE 25X! PAGAMENTO ALTO":"EMPATE 10X! PAGOU BEM";
  return `<div style="position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(3,7,18,.92);overflow:hidden">${conf}
    <div style="font-size:${lvl===3?72:54}px;animation:pagaPop .5s ease;z-index:1">${emojis}</div>
    <div style="font-size:${lvl===3?22:18}px;font-weight:900;font-family:var(--mono);color:var(--gold2);text-align:center;margin-top:10px;z-index:1;letter-spacing:2px">${ST.celebra}</div>
    <div style="font-size:12px;color:rgba(255,255,255,.7);font-family:var(--mono);margin-top:6px;z-index:1">${txt}</div>
  </div>`;
}

// ── Flash overlay ──
function flashHTML(){
  if(!ST.flash) return "";
  const tipo=ST.flash.tipo;
  const bg=tipo==="GREEN"?"rgba(34,197,94,.97)":"rgba(239,68,68,.97)";
  const icon=tipo==="GREEN"?"✅":"❌";
  return `<div style="position:fixed;left:50%;top:42%;transform:translate(-50%,-50%);z-index:99998;background:${bg};padding:18px 34px;border-radius:18px;box-shadow:0 10px 40px rgba(0,0,0,.4);display:flex;align-items:center;gap:12px;animation:flashIn .2s ease">
    <span style="font-size:32px;line-height:1">${icon}</span>
    <span style="font-size:30px;font-weight:900;font-family:var(--mono);color:#fff;letter-spacing:2px">${tipo}</span>
  </div>`;
}

// ── Render functions ──
function render(){
  const root = document.getElementById("root");
  if(AUTH.view === "loading"){ root.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:var(--mono);color:var(--txt3)">conectando...</div>`; return; }
  if(AUTH.view === "lock"){ renderLock(); return; }
  renderApp();
}

function renderApp(){
  const root = document.getElementById("root");
  const total = ST.greens + ST.reds;
  const rate = total>0 ? Math.round(100*ST.greens/total) : 0;

  // bead road
  const beadCells=[];
  const beadH=ST.H.slice(-90);
  const colCount=Math.ceil(beadH.length/6);
  for(let c=0;c<colCount;c++){
    for(let r=0;r<6;r++){
      const idx=c*6+r;
      if(idx<beadH.length){ const x=beadH[idx]; beadCells.push(`<div class="bead ${x.r.toLowerCase()}">${x.s||""}</div>`); }
      else beadCells.push(`<div></div>`);
    }
  }

  // sinal
  const cicloConf = ST.ciclo==="entrada"||ST.ciclo==="gale"||ST.ciclo==="aguarda_gale";
  let sigClass="w", sigText="AGUARDA", confColor="#475569";
  if(cicloConf && ST.ciclo_sinal){
    if(ST.ciclo_sinal==="P"){sigClass="p";sigText="AZUL";confColor="#3b82f6";}
    else if(ST.ciclo_sinal==="B"){sigClass="b";sigText="VERMELHO";confColor="#ef4444";}
  }

  // tie badge
  let tieBadge="";
  const tie = cicloConf ? (ST.ciclo_gale_tie||ST.ciclo_tie) : null;
  if(tie) tieBadge=`<div class="tie-badge">🎯 ${tie}</div>`;

  // entry state text
  let entryTxt="";
  if(ST.ciclo==="entrada") entryTxt=`<div style="margin-top:10px;font-size:11px;font-family:var(--mono);color:var(--cyan);text-align:center;letter-spacing:1px">ENTRADA CONFIRMADA · aguarde resultado</div>`;
  else if(ST.ciclo==="aguarda_gale") entryTxt=`<div style="margin-top:10px;font-size:11px;font-family:var(--mono);color:var(--gold2);text-align:center;letter-spacing:1px">ENTRADA PERDIDA · GALÉ a caminho</div>`;
  else if(ST.ciclo==="gale") entryTxt=`<div style="margin-top:10px;font-size:11px;font-family:var(--mono);color:var(--gold2);text-align:center;letter-spacing:1px">GALÉ NA MESA · aguarde resultado</div>`;
  else if(!cicloConf && ST.ciclo_sinal) entryTxt=`<div style="margin-top:10px;font-size:11px;font-family:var(--mono);color:var(--txt3);text-align:center;letter-spacing:1px">ANALISANDO A MESA · aguarde o sinal confirmado</div>`;

  // conf bar (only if ciclo confirmed)
  const confBar = cicloConf ? `
    <div class="conf-bar"><div class="conf-fill" style="width:${(ST.ciclo_conf*100).toFixed(0)}%;background:${confColor}"></div></div>
    <div class="conf-txt"><span>CONFIANÇA</span><span>${(ST.ciclo_conf*100).toFixed(0)}%</span></div>` : "";

  // meta/stop aviso
  let avisoHtml="";
  if(ST.metaAviso){
    const av=ST.metaAviso;
    const bg=av.tipo==="META"?"linear-gradient(135deg,rgba(34,197,94,.2),rgba(34,197,94,.05))":"linear-gradient(135deg,rgba(239,68,68,.2),rgba(239,68,68,.05))";
    const brd=av.tipo==="META"?"rgba(34,197,94,.4)":"rgba(239,68,68,.4)";
    const cor=av.tipo==="META"?"var(--green)":"var(--red)";
    avisoHtml=`<div class="aviso-card" style="background:${bg};border:1px solid ${brd}"><div style="font-size:28px;font-weight:900;font-family:var(--mono);color:${cor};letter-spacing:3px">${av.tipo}</div><div style="font-size:12px;color:${cor};font-family:var(--mono);margin-top:4px;opacity:.8">${av.msg||""}</div></div>`;
  }

  // sessão aguardando
  let sessaoHtml="";
  if(!ST.sessaoAtiva && ST.esperaSessao>0){
    sessaoHtml=`<div class="card" style="text-align:center"><div style="font-size:11px;font-family:var(--mono);color:var(--txt3);letter-spacing:1px">Próxima sessão às</div><div style="font-size:22px;font-weight:800;font-family:var(--mono);color:var(--cyan);margin-top:4px">${new Date(ST.esperaSessao).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}</div></div>`;
  }

  // bem-vindo
  const rec = AUTH.key && AUTH.keys[AUTH.key];
  const dias = diasRestantes(rec);
  const bvHtml = AUTH.nome ? `<div style="text-align:center;padding:10px 12px 4px;font-family:var(--mono)">
    <span style="font-size:15px;font-weight:800;color:var(--cyan);letter-spacing:.5px">Bem-vindo, ${AUTH.nome}!</span>
    ${dias!==null?`<div style="font-size:10px;color:var(--gold2);margin-top:3px">⏳ ${dias} dia(s) de teste restantes</div>`:""}
  </div>` : "";

  root.innerHTML=`
  ${celebraHTML()}

// ── Window functions ──
window.entrar = function(){
  const k = (AUTH.keyInput||"").trim().toUpperCase();
  if(!k){ AUTH.msg="Digite sua chave"; render(); return; }
  const rec = AUTH.keys[k];
  if(keyIsValid(rec)){
    AUTH.key = k;
    const nome = (rec && rec.nome && rec.nome!=="sem nome") ? rec.nome : "";
    AUTH.nome = nome;
    if(nome) localStorage.setItem("bacbru_nome", nome);
    localStorage.setItem("bacbru_key", k);
    AUTH.msg="";
    AUTH.view="app";
    render();
  } else if(rec && !keyIsValid(rec)){
    AUTH.msg="Chave expirada.";
  } else {
    AUTH.msg="Chave inválida.";
  }
  render();
};

// ── Init ──
const savedKey = localStorage.getItem("bacbru_key");
if(savedKey){ AUTH.key=savedKey; AUTH.keyInput=savedKey; }
AUTH.nome = localStorage.getItem("bacbru_nome")||"";
initSync();
render();

document.addEventListener("DOMContentLoaded", ()=>{});
