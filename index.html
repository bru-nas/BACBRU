<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#030712;--bg2:#0a1220;--bg3:#0f1828;
  --txt:#e2e8f0;--txt2:#94a3b8;--txt3:#475569;--txt4:#1e293b;

  --gold:#f59e0b;--gold2:#fbbf24;--gold3:rgba(245,158,11,.08);
  --cyan:#22d3ee;--purple:#a78bfa;

::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1a2540;border-radius:2px}

@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(34,197,94,.3)}50%{box-shadow:0 0 16px rgba(34,197,94,.6)}}

.paga-overlay{position:fixed;inset:0;background:radial-gradient(circle at center,rgba(245,158,11,.25),rgba(0,0,0,.92));z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:slideIn .2s}
.paga-big{font-size:64px;font-weight:900;font-family:var(--mono);color:#fbbf24;animation:pagaPop .5s ease,fireGlow 1.2s ease infinite;letter-spacing:4px}
.paga-x{font-size:88px;font-weight:900;font-family:var(--mono);background:linear-gradient(135deg,#fbbf24,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:pagaPop .6s ease;margin-top:8px}
.paga-sub{font-size:14px;color:#fbbf24;font-family:var(--mono);letter-spacing:3px;margin-top:14px;animation:slideIn .8s}
.tg{background:linear-gradient(270deg,#22c55e,#22d3ee,#a78bfa,#22c55e);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 6s ease infinite;font-weight:800;letter-spacing:3px}
.app{max-width:520px;margin:0 auto;padding:14px 12px 80px;min-height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:0 4px}
.hdr-l{font-size:16px;font-family:var(--mono)}
.hdr-r{font-size:9px;color:var(--txt3);font-family:var(--mono);letter-spacing:2px}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;margin-right:5px;vertical-align:middle}
.card{background:linear-gradient(135deg,var(--bg2) 0%,var(--bg3) 100%);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;animation:slideIn .3s ease}
.sec-lbl{font-size:9px;color:var(--txt3);letter-spacing:3px;font-family:var(--mono);margin-bottom:8px;padding:0 2px}
.input-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:8px}
.btn{padding:13px 0;border:1px solid var(--border);border-radius:10px;font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .15s;color:var(--txt);background:transparent}
.btn:active{transform:scale(.97)}
.btn-p{background:linear-gradient(135deg,rgba(59,130,246,.15),rgba(59,130,246,.05));border-color:rgba(59,130,246,.3);color:var(--blue2)}
.btn-b{background:linear-gradient(135deg,rgba(239,68,68,.15),rgba(239,68,68,.05));border-color:rgba(239,68,68,.3);color:var(--red2)}

.sum-row{display:flex;gap:7px;margin-top:6px}
.sum-inp{flex:1;padding:11px 13px;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:10px;color:var(--txt);font-family:var(--mono);font-size:13px;outline:none}

/* SIGNAL */
.signal-card{position:relative;overflow:hidden}

/* BEAD ROAD NUMÉRICO */
.bead-grid{display:grid;grid-template-rows:repeat(6,22px);grid-auto-flow:column;grid-auto-columns:22px;gap:2px;min-width:max-content}

.bead.b{background:radial-gradient(circle at 30% 30%,#f87171,#991b1b)}
.bead.t{background:radial-gradient(circle at 30% 30%,#fcd34d,#92400e)}
/* PATTERNS BREAKDOWN */
.pat-list{display:grid;gap:6px}
.pat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 11px;background:rgba(0,0,0,.3);border-radius:8px;border-left:3px solid var(--txt4)}
.pat-row.act{border-left-color:var(--green);background:rgba(34,197,94,.05)}
.pat-row.high{border-left-color:var(--cyan);background:rgba(34,211,238,.05)}

.pat-name.act{color:var(--green2)}

/* TIE */

.pay-cell{padding:6px 0;text-align:center;background:rgba(0,0,0,.3);border-radius:6px;font-family:var(--mono)}
.pay-num{font-size:10px;color:var(--txt2);font-weight:700}

/* JSON */
.json-panel{margin-top:10px}
.json-hdr{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:6px 4px}

.json-ta.view{height:160px;color:#3a9060;cursor:pointer}
.json-btns{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}
.json-btn{padding:11px 0;background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.2);border-radius:9px;color:var(--green2);font-family:var(--mono);font-size:11px;letter-spacing:2px;cursor:pointer;font-weight:700}
.json-btn:active{transform:scale(.97)}
.json-btn.blue{background:rgba(59,130,246,.06);border-color:rgba(59,130,246,.2);color:var(--blue2)}
/* FOOTER */
.foot-btns{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px}
.util-btn{padding:11px 0;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:9px;color:var(--txt3);font-family:var(--mono);font-size:11px;letter-spacing:2px;cursor:pointer}
.util-btn:active{transform:scale(.97)}
.credit{text-align:center;font-size:9px;color:#0a1828;letter-spacing:4px;margin-top:14px;font-family:var(--mono)}
/* CONVERGENCE BADGE */
.conv-badge{display:inline-block;padding:3px 8px;background:linear-gradient(135deg,rgba(167,139,250,.15),rgba(34,211,238,.15));border:1px solid rgba(167,139,250,.3);border-radius:6px;font-size:9px;color:var(--purple);font-family:var(--mono);letter-spacing:1px;margin-left:6px}
/* ENTRY ACTION */
.entry-card{margin-top:8px;padding:11px 13px;background:linear-gradient(135deg,rgba(34,197,94,.08),rgba(34,211,238,.04));border:1px solid rgba(34,197,94,.3);border-radius:10px}
.entry-ttl{font-size:9px;color:var(--green);letter-spacing:2px;font-family:var(--mono);margin-bottom:4px}
.entry-act{font-size:13px;color:var(--txt);font-family:var(--mono);font-weight:700}
.wait-card{margin-top:8px;padding:11px 13px;background:rgba(0,0,0,.3);border:1px dashed var(--border);border-radius:10px;text-align:center}
.wait-act{font-size:11px;color:var(--txt3);font-family:var(--mono);letter-spacing:2px}
/* STATS BAR */
.stats-bar{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:9px;margin-bottom:10px}
.stat{text-align:center;flex:1}
.stat-v{font-size:14px;font-weight:800;font-family:var(--mono)}

.stat-v.g{color:var(--green2)}
.stat-v.r{color:var(--red2)}
.stat-v.y{color:var(--cyan)}
</style>

<body>
<div id="root"></div>
<script>
"use strict";

// ════════════════════════════════════════════════════════════════════════════
// FIREBASE · SINCRONIZAÇÃO MULTI-DISPOSITIVO
// ════════════════════════════════════════════════════════════════════════════
firebase.initializeApp({
  apiKey: "AIzaSyBiyeiTk8Kt1ndNOcNxI4b6mcpenZ3KL6A",
  authDomain: "bac-bru.firebaseapp.com",
  databaseURL: "https://bac-bru-default-rtdb.firebaseio.com",
  projectId: "bac-bru",
  storageBucket: "bac-bru.firebasestorage.app",
  messagingSenderId: "469841612189",
  appId: "1:469841612189:web:0b2ba85cde45a7d17c3374"
});
const db = firebase.database();
const ROOM = "bac-bru-sala-1";
const ROOM_REF = db.ref("rooms/" + ROOM);
let SYNC_STATUS = "OFFLINE"; // OFFLINE | CONNECTING | LIVE
let SUPPRESS_PUSH = false;

// ════════════════════════════════════════════════════════════════════════════
// CONFIG · PESOS APRENDIDOS DA SESSÃO ANTERIOR (rate 84%)
// ════════════════════════════════════════════════════════════════════════════
const DEFAULT_WEIGHTS = {
  PP5: 0.87, PP4: 0.79,
  B22T: 0.81, B22C: 0.76, B31: 0.75,
  SK4Q: 0.81, SK4C: 0.73, SK3Q: 0.80, SK3C: 0.71,
  RE8: 0.87, RE7: 0.82, RE6: 0.78,
  DOM12: 0.85, ZZ3: 0.75, TIE: 0.70,
  boost_est: 0.07, boost_hi: 0.05, boost_mp: 0.06, boost_dom: 0.04,
  boost_conv2: 0.06, boost_conv3: 0.10, boost_road_align: 0.05,
  min_conf: 0.65, min_conf_cautela: 0.80,
  bias_P: 0, bias_B: 0, stability: 0.92
};

// ════════════════════════════════════════════════════════════════════════════
// ESTADO
// ════════════════════════════════════════════════════════════════════════════
const ST = {
  H: [],
  greens: 0, reds: 0,
  weights: {...DEFAULT_WEIGHTS},
  deltaAcum: {}, countAcum: {},
  sessoes: 0,
  somaIn: "",
  ciclo: "idle", // idle | entrada | gale | recup
  ciclo_lado: null,
  ciclo_sinal: null,
  ciclo_conf: 0,
  ciclo_razao: "",
  jsonOpen: false, viewOpen: false, injTxt: "",
  toast: "",
  toastT: 0
};

// load from localStorage as fallback first
try{
  const sv = localStorage.getItem("bacbru_v6");
  if(sv){
    const d = JSON.parse(sv);
    Object.assign(ST, d);
  }
}catch(e){}

function save(){
  try{
    const {toast,toastT,jsonOpen,viewOpen,injTxt,somaIn,...keep} = ST;
    localStorage.setItem("bacbru_v6", JSON.stringify(keep));
  }catch(e){}
  // push to Firebase
  pushToFirebase();
}

function pushToFirebase(){
  if(SUPPRESS_PUSH) return;
  const payload = {
    H: ST.H,
    greens: ST.greens,
    reds: ST.reds,
    weights: ST.weights,
    deltaAcum: ST.deltaAcum,
    countAcum: ST.countAcum,
    sessoes: ST.sessoes,
    ciclo: ST.ciclo,
    ciclo_sinal: ST.ciclo_sinal,
    ciclo_conf: ST.ciclo_conf,
    ciclo_razao: ST.ciclo_razao,
    ciclo_tie: ST.ciclo_tie || null,
    ciclo_gale_sinal: ST.ciclo_gale_sinal || null,
    ciclo_gale_dec: ST.ciclo_gale_dec || null,
    ciclo_gale_tie: ST.ciclo_gale_tie || null,
    sessaoAtiva: !!ST.sessaoAtiva,
    updatedAt: Date.now()
  };
  ROOM_REF.set(payload).catch(e=>{
    SYNC_STATUS = "OFFLINE";
    renderRouter();
  });
}

function initFirebaseSync(){
  SYNC_STATUS = "CONNECTING";
  // Connection state monitor
  db.ref(".info/connected").on("value", snap => {
    if(snap.val() === true){
      SYNC_STATUS = "LIVE";
    } else {
      SYNC_STATUS = "OFFLINE";
    }
    renderRouter();
  });
  // Real-time listener
  ROOM_REF.on("value", snap => {
    const data = snap.val();
    if(!data) return;
    SUPPRESS_PUSH = true;
    if(Array.isArray(data.H)) ST.H = data.H;
    if(typeof data.greens === "number") ST.greens = data.greens;
    if(typeof data.reds === "number") ST.reds = data.reds;
    if(data.weights) ST.weights = {...DEFAULT_WEIGHTS, ...data.weights};
    if(data.deltaAcum) ST.deltaAcum = data.deltaAcum;
    if(data.countAcum) ST.countAcum = data.countAcum;
    if(typeof data.sessoes === "number") ST.sessoes = data.sessoes;
    if(typeof data.ciclo === "string") ST.ciclo = data.ciclo;
    ST.ciclo_sinal = data.ciclo_sinal || null;
    ST.ciclo_conf = data.ciclo_conf || 0;
    ST.ciclo_razao = data.ciclo_razao || "";
    ST.ciclo_tie = data.ciclo_tie || null;
    ST.ciclo_gale_sinal = data.ciclo_gale_sinal || null;
    ST.ciclo_gale_dec = data.ciclo_gale_dec || null;
    ST.ciclo_gale_tie = data.ciclo_gale_tie || null;
    ST.sessaoAtiva = !!data.sessaoAtiva;
    SUPPRESS_PUSH = false;
    renderRouter();
  }, err => {
    SYNC_STATUS = "OFFLINE";
    renderRouter();
  });
}

function toast(msg, dur=2200){
  ST.toast = msg;
  clearTimeout(ST.toastT);
  ST.toastT = setTimeout(()=>{ST.toast="";renderRouter();}, dur);
  renderRouter();
}

// ════════════════════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════════════════════
const coloridas = arr => arr.filter(x=>x.r!=="T");
const last = (arr,n) => arr.slice(-n);
const opos = c => c==="P"?"B":"P";
const lbl = c => c==="P"?"AZUL":c==="B"?"VERMELHO":c==="T"?"EMPATE":"AGUARDA";

function streak(arr){
  if(arr.length===0) return {len:0,side:null};
  let s = arr[arr.length-1].r, c = 1;
  for(let i=arr.length-2;i>=0;i--){
    if(arr[i].r===s) c++;
    else break;
  }
  return {len:c, side:s};
}

function volSoma(arr){
  if(arr.length<2) return 0;
  const ss = arr.map(x=>x.s||0).filter(x=>x>0);
  if(ss.length<2) return 0;
  return Math.max(...ss) - Math.min(...ss);
}

function avgSum(arr){
  const ss = arr.map(x=>x.s||0).filter(x=>x>0);
  if(ss.length===0) return 0;
  return ss.reduce((a,b)=>a+b,0)/ss.length;
}

function deltaSum(arr){
  if(arr.length<2) return 0;
  const ss = arr.map(x=>x.s||0).filter(x=>x>0);
  let d = 0;
  for(let i=1;i<ss.length;i++) d += Math.abs(ss[i]-ss[i-1]);
  return d/(ss.length-1);
}

// ════════════════════════════════════════════════════════════════════════════
// BIG ROAD · derivação de colunas
// ════════════════════════════════════════════════════════════════════════════
function bigRoad(hist){
  const col = [], cur = coloridas(hist);
  let c = -1, r = -1, lastR = null;
  for(const x of cur){
    if(x.r !== lastR){
      c++; r = 0;
      col[c] = [];
    } else {
      if(r < 5){ r++; }
      else { c++; r=0; col[c]=[]; } // dragão > 6 vira coluna nova
    }
    if(!col[c]) col[c] = [];
    col[c][r] = x.r;
    lastR = x.r;
  }
  return col;
}

// BIG EYE BOY · compara coluna atual com 1 anterior
// SMALL ROAD · compara com 2 anteriores
// COCKROACH PIG · compara com 3 anteriores
function derivedRoad(big, offset){
  if(big.length < offset+1) return [];
  const res = [];
  for(let i=offset+1;i<big.length;i++){
    const cur = big[i];
    if(!cur || cur.length===0) continue;
    const prev = big[i-offset];
    if(!prev) continue;
    for(let j=0;j<cur.length;j++){
      // R (red) = padrão estável; B (blue) = padrão muda
      if(j===0){
        // primeira bola da coluna: comparar comprimento da coluna anterior com a coluna-offset anterior
        const colPrev = big[i-1];
        const colPrevOff = big[i-1-offset];
        if(!colPrev || !colPrevOff) continue;
        res.push(colPrev.length === colPrevOff.length ? "R" : "B");
      } else {
        // próximas bolas: tem bola na coluna comparada?
        res.push((prev[j] !== undefined) ? "R" : "B");
      }
    }
  }
  return res;
}

function trendRoad(rd){
  if(rd.length < 3) return {trend:"N", strength:0};
  const last5 = rd.slice(-5);
  const R = last5.filter(x=>x==="R").length;
  const B = last5.length - R;
  if(R >= 4) return {trend:"STABLE", strength:R/last5.length};
  if(B >= 4) return {trend:"VOLATILE", strength:B/last5.length};
  return {trend:"MIX", strength:0.5};
}

// ════════════════════════════════════════════════════════════════════════════
// PERFIL HISTÓRICO DE STREAKS · anti-armadilha
// Analisa todos os streaks do histórico para saber QUANDO a mesa costuma quebrar
// ════════════════════════════════════════════════════════════════════════════
function streakProfile(col){
  if(col.length < 8) return null;
  const runs = [];
  let cur = 1;
  for(let i=1;i<col.length;i++){
    if(col[i].r === col[i-1].r) cur++;
    else { runs.push(cur); cur = 1; }
  }
  runs.push(cur); // último run em aberto
  const closed = runs.slice(0, -1); // runs finalizados (sabemos onde quebraram)
  if(closed.length < 4) return null;
  const sorted = [...closed].sort((a,b)=>a-b);
  const avg = closed.reduce((a,b)=>a+b,0)/closed.length;
  const max = Math.max(...closed);
  const p = q => sorted[Math.min(sorted.length-1, Math.floor(sorted.length*q))];
  // Distribuição de sobrevivência: dado streak chegou a L, qual % continuou?
  // P(quebra | comprimento atual = L) = (runs que terminaram em L) / (runs que chegaram a L)
  function breakProbAt(L){
    const reached = closed.filter(r=>r>=L).length;
    const broke = closed.filter(r=>r===L).length;
    if(reached === 0) return 0.5;
    return broke / reached;
  }
  return {
    runs: closed, avg, max,
    p50: p(0.50), p75: p(0.75), p90: p(0.90),
    count: closed.length, breakProbAt
  };
}

// Fadiga de padrão: conta quantas vezes seguidas o MESMO regime se repetiu
// (ex.: alternância pura prolongada, ou blocos 2x2 repetidos)
function patternFatigue(col){
  if(col.length < 6) return {regime:"N", repeats:0, fatigued:false};
  const lastN = last(col, 12).map(x=>x.r);
  // detectar regime de alternância
  let altRun = 1;
  for(let i=lastN.length-1;i>0;i--){
    if(lastN[i] !== lastN[i-1]) altRun++;
    else break;
  }
  // detectar regime de blocos 2x2
  let blockRun = 0;
  const r = lastN;
  for(let i=r.length-1;i>=3;i-=2){
    if(r[i]===r[i-1] && r[i-2]===r[i-3] && r[i]!==r[i-2]) blockRun++;
    else break;
  }
  if(altRun >= 6) return {regime:"ALTERNANCIA", repeats:altRun, fatigued:altRun >= 8};
  if(blockRun >= 3) return {regime:"BLOCOS_2x2", repeats:blockRun, fatigued:blockRun >= 4};
  return {regime:"MISTO", repeats:0, fatigued:false};
}

// ════════════════════════════════════════════════════════════════════════════
// FAREJADOR DE EMPATES · estuda TODO o histórico de ties
// Detecta janela de empate ABERTA / QUENTE / FECHADA / PASSOU
// ════════════════════════════════════════════════════════════════════════════
function payoutDaSoma(s){
  if(s===2||s===12) return "88x";
  if(s===3||s===11) return "25x";
  if(s===4||s===10) return "10x";
  if(s===5||s===9) return "6x";
  return "4x"; // 6,7,8
}

function tieHunter(H, heatScore){
  const res = {
    status:"DADOS", conf:0, msg:"Coletando histórico...",
    dist:0, avgGap:0, maxGap:0, ties15:0, ties30:0,
    payoutProvavel:null, ultimosPay:[], cluster:false, atrasado:false,
    echo:false, echoRate:0, echoMsg:""
  };
  if(H.length < 12) return res;

  // índices de todos os empates
  const tieIdx = [];
  H.forEach((x,i)=>{ if(x.r==="T") tieIdx.push(i); });

  // gaps entre empates
  const gaps = [];
  for(let i=1;i<tieIdx.length;i++) gaps.push(tieIdx[i]-tieIdx[i-1]);
  res.avgGap = gaps.length ? gaps.reduce((a,b)=>a+b,0)/gaps.length : 12;
  res.maxGap = gaps.length ? Math.max(...gaps) : 0;

  // ── PADRÃO DE ECO · empates que vêm na quina um do outro ──
  // Quantos % dos empates vieram a ≤3 rodadas do empate anterior?
  // Classificações: DUPLO (gap=1) · SANDWICH (gap=2) · QUINA (gap=3)
  res.echoTipos = { duplo:0, sandwich:0, quina:0 };
  if(gaps.length >= 2){
    res.echoTipos.duplo = gaps.filter(g=>g===1).length;
    res.echoTipos.sandwich = gaps.filter(g=>g===2).length;
    res.echoTipos.quina = gaps.filter(g=>g===3).length;
    const echoGaps = res.echoTipos.duplo + res.echoTipos.sandwich + res.echoTipos.quina;
    res.echoRate = echoGaps / gaps.length;
    res.echo = res.echoRate >= 0.30;
    // tipo predominante
    const tipos = res.echoTipos;
    res.echoTipoPredom = tipos.duplo >= tipos.sandwich && tipos.duplo >= tipos.quina ? "DUPLO"
                       : tipos.sandwich >= tipos.quina ? "SANDWICH" : "QUINA";
  }

  // distância desde o último empate
  const lastTie = tieIdx.length ? tieIdx[tieIdx.length-1] : -1;
  res.dist = lastTie >= 0 ? (H.length - 1 - lastTie) : H.length;

  // densidades
  res.ties15 = last(H,15).filter(x=>x.r==="T").length;
  res.ties30 = last(H,30).filter(x=>x.r==="T").length;
  const ties5 = last(H,5).filter(x=>x.r==="T").length;
  const ties8 = last(H,8).filter(x=>x.r==="T").length;

  // payouts dos últimos empates
  res.ultimosPay = tieIdx.slice(-5).map(i=>({s:H[i].s, pay:payoutDaSoma(H[i].s)}));

  // ── Previsão de payout pela soma recente ──
  const col = H.filter(x=>x.r!=="T");
  const last6sum = last(col,6).map(x=>x.s||0).filter(x=>x>0);
  const avg6 = last6sum.length ? last6sum.reduce((a,b)=>a+b,0)/last6sum.length : 7;
  const extremos = last6sum.filter(s=>s<=4 || s>=10).length;
  if(extremos >= 3){
    res.payoutProvavel = avg6 <= 4.5 || avg6 >= 10.5 ? "25x-88x" : "10x";
  } else if(avg6 <= 5.5 || avg6 >= 9.5){
    res.payoutProvavel = "6x-10x";
  } else {
    res.payoutProvavel = "4x";
  }

  res.cluster = ties5 >= 2 || ties8 >= 3;
  res.atrasado = res.dist >= res.avgGap;
  const mesaFria = heatScore !== undefined && heatScore < 48;

  // ── ECO ATIVO: empate há 1-3 rodadas + mesa que ecoa → outro empate na quina ──
  if(res.echo && res.dist >= 1 && res.dist <= 3 && ties5 < 3){
    res.status = "ECO";
    const tipo = res.echoTipoPredom || "QUINA";
    res.echoMsg = `Mesa de eco · ${(res.echoRate*100).toFixed(0)}% dos empates vêm coladinhos · padrão predominante: ${tipo}`;
    const ondePos = res.dist === 1 ? "DUPLO (back-to-back)" : res.dist === 2 ? "SANDWICH (cor entre dois empates)" : "na QUINA (próximo)";
    res.msg = `Empate há ${res.dist} rodada(s) · outro pode vir ${ondePos}`;
    res.conf = Math.min(0.85, 0.55 + res.echoRate*0.4 + (res.dist === 1 ? 0.05 : 0));
    return res;
  }

  // ── Estados normais ──
  if(res.cluster){
    res.status = "PASSOU";
    res.msg = `Cluster recente (${ties8} empates/8 rodadas) · janela se esgotou · NÃO perseguir`;
    res.conf = 0;
  } else if(res.dist >= res.avgGap*1.4 && res.ties30 >= 1){
    res.status = "QUENTE";
    res.msg = `Empate MUITO atrasado (${res.dist} rodadas · média ${res.avgGap.toFixed(0)}) · iminente`;
    res.conf = Math.min(0.85, 0.6 + (res.dist/res.avgGap - 1.4)*0.3);
    if(mesaFria){ res.conf = Math.min(0.9, res.conf + 0.08); res.msg += " · mesa fria reforça"; }
  } else if(res.atrasado && res.ties30 >= 1){
    res.status = "ABERTA";
    res.msg = `Empate atrasado (${res.dist}/${res.avgGap.toFixed(0)} rodadas) · janela aberta`;
    res.conf = Math.min(0.75, 0.45 + (res.dist/res.avgGap - 1)*0.4);
    if(mesaFria){ res.conf = Math.min(0.85, res.conf + 0.08); res.msg += " · mesa fria reforça"; }
  } else if(mesaFria && res.ties15 >= 2){
    res.status = "ABERTA";
    res.msg = `Mesa fria + ${res.ties15} empates/15 · zona de empate ativa`;
    res.conf = 0.55;
  } else {
    res.status = "FECHADA";
    res.msg = `Cedo para empate · ${res.dist}/${res.avgGap.toFixed(0)} rodadas desde o último`;
    res.conf = Math.max(0.1, res.dist/res.avgGap * 0.3);
  }

  return res;
}

// ════════════════════════════════════════════════════════════════════════════
// MOTOR NEURAL · análise completa
// ════════════════════════════════════════════════════════════════════════════
function analyze(){
  const W = ST.weights;
  const col = coloridas(ST.H);
  const out = {
    signal:null, conf:0, reason:"Aguardando dados", patterns:[],
    convergence:0, derivedAlign:0, tie:{active:false,payout:null,dt:null,mp:false,probs:{}},
    distrib:{P:0,B:0,T:0}, sumAvg:0, sumDelta:0, dominancia:"N", padrao:""
  };

  if(ST.H.length < 4){ return out; }

  // Distribuição
  const tot = ST.H.length;
  ST.H.forEach(x=>{out.distrib[x.r]++;});
  out.distrib.P = Math.round(100*out.distrib.P/tot);
  out.distrib.B = Math.round(100*out.distrib.B/tot);
  out.distrib.T = Math.round(100*out.distrib.T/tot);

  // Soma stats
  const last15c = last(col, 15);
  out.sumAvg = avgSum(last15c);
  out.sumDelta = deltaSum(last(col,6));

  // Dominância
  const last20 = last(col,20);
  const P20 = last20.filter(x=>x.r==="P").length;
  const B20 = last20.filter(x=>x.r==="B").length;
  if(P20/last20.length >= 0.65) out.dominancia = "PLAYER";
  else if(B20/last20.length >= 0.65) out.dominancia = "BANKER";
  else out.dominancia = "BALANCEADO";

  // ── TIE ANALYSIS ──
  const last15 = last(ST.H, 15);
  const ties15 = last15.filter(x=>x.r==="T").length;
  out.tie.mp = ties15/15 >= 0.10;
  let dt = 0;
  for(let i=ST.H.length-1;i>=0;i--){ if(ST.H[i].r==="T"){dt = ST.H.length-1-i; break;} dt++; }
  out.tie.dt = dt;
  const avg6 = avgSum(last(col,6));
  const sumExt = avg6 <= 5.5 || avg6 >= 10.5;
  out.tie.active = out.tie.mp && (dt >= 8 || sumExt);
  out.tie.probs = {
    "88x_2_12": Math.min(8, ties15*1.5),
    "25x_3_11": Math.min(15, ties15*2),
    "10x_4_10": Math.min(18, ties15*2.5),
    "6x_5_9": Math.min(22, ties15*3),
    "4x_6_8": Math.min(30, ties15*4)
  };
  if(avg6 <= 5.5) out.tie.payout = avg6 <= 3.5 ? "88x" : "10x";
  else if(avg6 >= 10.5) out.tie.payout = avg6 >= 11.5 ? "88x" : "10x";
  else if(avg6 >= 8 && avg6 <= 9) out.tie.payout = "6x";
  else out.tie.payout = "4x";

  // ── PADRÕES ──
  const c4 = last(col, 4);
  const c5 = last(col, 5);
  const c8 = last(col, 8);
  const stab = out.sumDelta < 1.5;
  const high = out.sumAvg >= 9.5;
  const boostS = stab ? W.boost_est : 0;
  const boostH = high ? W.boost_hi : 0;
  const boostM = out.tie.mp ? W.boost_mp : 0;
  const boostD = out.dominancia !== "BALANCEADO" ? W.boost_dom : 0;
  const totalBoost = boostS + boostH + boostM + boostD;

  const patterns = [];
  function add(name, sig, base, reason, hi=false){
    let conf = Math.min(0.95, base + totalBoost);
    if(sig === "P") conf += W.bias_P;
    if(sig === "B") conf += W.bias_B;
    conf = Math.max(0, Math.min(0.95, conf));
    patterns.push({name, sig, conf, reason, hi});
  }

  // PING_PONG_5 — 5 alternadas estritas
  if(c5.length === 5){
    let pp5 = true;
    for(let i=1;i<5;i++) if(c5[i].r === c5[i-1].r){pp5=false;break;}
    if(pp5) add("PP5", opos(c5[4].r), W.PP5, "Ping-pong 5 ciclos · alternância pura", true);
  }

  // PING_PONG_4
  if(c4.length === 4 && !patterns.find(p=>p.name==="PP5")){
    let pp4 = true;
    for(let i=1;i<4;i++) if(c4[i].r === c4[i-1].r){pp4=false;break;}
    if(pp4) add("PP4", opos(c4[3].r), W.PP4, "Ping-pong 4 ciclos");
  }

  // BLOCO_2x2_TROCA · [A,A,B,B]
  if(c4.length === 4){
    if(c4[0].r === c4[1].r && c4[2].r === c4[3].r && c4[0].r !== c4[2].r){
      add("B22T", opos(c4[3].r), W.B22T, "Bloco 2×2 troca · próximo par muda", true);
    }
    // BLOCO_2x2_CONT · [X,A,A,?] — par formado, próxima é A novamente? regra: continuar o par
    // Aqui interpreto como últimas 3 = [X,A,A] e prevê A novamente para formar bloco
    if(c4.length >= 3){
      const c3 = last(col,3);
      if(c3[1].r === c3[2].r && c3[0].r !== c3[1].r){
        add("B22C", c3[2].r, W.B22C, "Bloco 2×2 continuação · par incompleto");
      }
    }
    // BLOCO_3_1 · [A,A,A,B] após 3 do mesmo lado quebra
    if(c4[0].r === c4[1].r && c4[1].r === c4[2].r && c4[3].r !== c4[2].r){
      add("B31", opos(c4[3].r), W.B31, "Bloco 3-1 · quebra esperada para anterior");
    }
  }

  // ════════════════════════════════════════════════════════════════════════
  // STREAK · com PERFIL HISTÓRICO (anti-armadilha)
  // ════════════════════════════════════════════════════════════════════════
  const st = streak(col);
  const prof = streakProfile(col);
  out.streakLen = st.len;
  out.streakSide = st.side;
  out.profile = prof;

  // Zona estatística de quebra: quando a mesa COSTUMA quebrar
  let breakZone = null, breakProb = 0.5, premature = false, danger = false;
  if(prof && st.len >= 2){
    breakProb = prof.breakProbAt(st.len);
    // streak ainda curto (abaixo da mediana histórica) → quebra é PREMATURA
    premature = st.len < prof.p50;
    // streak na zona onde a mesa historicamente quebra → break é seguro
    breakZone = st.len >= prof.p75;
    // streak perto/no máximo histórico → zona de PERIGO (pode quebrar a qualquer momento)
    danger = st.len >= prof.p90;
  }

  if(st.len === 4){
    const v4 = volSoma(last(col,4));
    if(prof && premature){
      // mesa costuma esticar mais → NÃO bater quebra ainda; favorece continuação
      add("SK4C", st.side, W.SK4C, `Streak 4 ${st.side} · mesa estica até ~${prof.p75} → continuar`);
    } else if(prof && breakZone){
      // zona de quebra confirmada pelo histórico
      const conf = v4 >= 3 ? W.SK4Q + 0.04 : W.SK4Q;
      add("SK4Q", opos(st.side), conf, `Streak 4 ${st.side} · zona de quebra (hist p75=${prof.p75}) vol${v4}`, true);
    } else {
      // neutro
      if(v4 >= 3) add("SK4Q", opos(st.side), W.SK4Q, `Streak 4 ${st.side} + volatilidade ${v4}`, true);
      else add("SK4C", st.side, W.SK4C, `Streak 4 ${st.side} estável → continuar`);
    }
  } else if(st.len === 3){
    const v3 = volSoma(last(col,3));
    if(prof && premature){
      add("SK3C", st.side, W.SK3C, `Streak 3 ${st.side} · ainda curto p/ mesa → continuar`);
    } else if(prof && breakZone){
      add("SK3Q", opos(st.side), W.SK3Q + 0.03, `Streak 3 ${st.side} · zona de quebra (hist) vol${v3}`);
    } else {
      if(v3 >= 3) add("SK3Q", opos(st.side), W.SK3Q, `Streak 3 ${st.side} + volatilidade ${v3}`);
      else add("SK3C", st.side, W.SK3C, `Streak 3 ${st.side} estável → continuar`);
    }
  } else if(st.len >= 5){
    // EXAUSTÃO — streak longo
    if(prof && st.len < prof.p90 && st.len < prof.max){
      // ainda dentro do range histórico desta mesa → pode continuar, mas NÃO entrar
      out.exaustao = true;
      out.exaustaoMotivo = `Streak ${st.len} ${st.side} · mesa já fez até ${prof.max} · NÃO perseguir quebra ainda`;
    } else {
      out.exaustao = true;
      out.exaustaoMotivo = `Streak ${st.len} ${st.side} · exaustão${prof?` (hist máx ${prof.max})`:''}`;
    }
  }

  // ── PADRÃO PAGANTE MADURO · fadiga de regime ──
  const fatigue = patternFatigue(col);
  out.fatigue = fatigue;
  if(fatigue.fatigued){
    // regime pagante repetiu demais → prestes a quebrar → bloquear novas entradas
    out.regimeFatigado = true;
    out.regimeMotivo = `${fatigue.regime} repetiu ${fatigue.repeats}× · padrão maduro, risco de quebra`;
  }

  // REEQUILÍBRIO 6/7/8 de 8
  if(c8.length === 8){
    const P8 = c8.filter(x=>x.r==="P").length;
    const B8 = 8 - P8;
    if(P8 >= 8) add("RE8", "B", W.RE8, "Reequilíbrio máximo · P=8/8", true);
    else if(P8 >= 7) add("RE7", "B", W.RE7, `Reequilíbrio forte · P=${P8}/8`);
    else if(P8 >= 6) add("RE6", "B", W.RE6, `Reequilíbrio · P=${P8}/8`);
    if(B8 >= 8) add("RE8", "P", W.RE8, "Reequilíbrio máximo · B=8/8", true);
    else if(B8 >= 7) add("RE7", "P", W.RE7, `Reequilíbrio forte · B=${B8}/8`);
    else if(B8 >= 6) add("RE6", "P", W.RE6, `Reequilíbrio · B=${B8}/8`);
  }

  // DOMINÂNCIA 12 — se últimos 12 mostram >=70% de um lado, continuar
  const c12 = last(col,12);
  if(c12.length === 12){
    const P12 = c12.filter(x=>x.r==="P").length;
    if(P12/12 >= 0.70) add("DOM12", "P", W.DOM12, `Dominância P ${P12}/12 últimas`);
    else if((12-P12)/12 >= 0.70) add("DOM12", "B", W.DOM12, `Dominância B ${12-P12}/12 últimas`);
  }

  // ZIGZAG 3 — micro-variação tipo [A,B,A] = zigzag curto, próximo = B
  if(col.length >= 3){
    const c3 = last(col,3);
    if(c3[0].r !== c3[1].r && c3[1].r !== c3[2].r && c3[0].r === c3[2].r){
      add("ZZ3", opos(c3[2].r), W.ZZ3, "Zigzag 3 detectado");
    }
  }

  // TIE_GATILHO
  if(out.tie.active){
    add("TIE", "T", W.TIE, `Mesa pagadora · ${ties15}/15 Ties · ${out.tie.payout}`);
  }

  out.patterns = patterns;

  // ── DERIVED ROADS · convergência ──
  const big = bigRoad(ST.H);
  const beb = derivedRoad(big, 1);
  const sm = derivedRoad(big, 2);
  const cp = derivedRoad(big, 3);
  const tBeb = trendRoad(beb);
  const tSm = trendRoad(sm);
  const tCp = trendRoad(cp);
  out.roads = {beb, sm, cp, tBeb, tSm, tCp, big};

  // Alinhamento das estradas derivadas
  const trends = [tBeb.trend, tSm.trend, tCp.trend];
  const stableCt = trends.filter(t=>t==="STABLE").length;
  const volatileCt = trends.filter(t=>t==="VOLATILE").length;
  let roadHint = null;
  if(stableCt >= 2){
    // padrão atual continua
    roadHint = "CONT";
    out.derivedAlign = stableCt;
  } else if(volatileCt >= 2){
    roadHint = "MUDA";
    out.derivedAlign = -volatileCt;
  }

  // ── CONVERGÊNCIA ──
  // Agrupa por lado e soma boost se 2+ padrões apontam o mesmo
  const byBet = {P:[], B:[], T:[]};
  patterns.forEach(p=>{ if(byBet[p.sig]) byBet[p.sig].push(p); });
  let bestSide = null, bestConf = 0, bestReason = "";
  for(const side of ["P","B","T"]){
    if(byBet[side].length === 0) continue;
    let conf = Math.max(...byBet[side].map(p=>p.conf));
    if(byBet[side].length >= 3) conf += W.boost_conv3;
    else if(byBet[side].length >= 2) conf += W.boost_conv2;
    // Alinhamento road
    if(roadHint && side !== "T"){
      const lastSide = col.length ? col[col.length-1].r : null;
      if(roadHint === "CONT" && side === lastSide) conf += W.boost_road_align;
      if(roadHint === "MUDA" && side !== lastSide) conf += W.boost_road_align;
    }
    conf = Math.min(0.95, conf);
    if(conf > bestConf){
      bestConf = conf;
      bestSide = side;
      const top = byBet[side].sort((a,b)=>b.conf-a.conf)[0];
      const others = byBet[side].length > 1 ? ` (+${byBet[side].length-1} padrões)` : "";
      bestReason = top.reason + others;
    }
  }
  out.convergence = bestSide ? byBet[bestSide].length : 0;

  // Contradição: padrões apontando para P E B ao mesmo tempo
  out.contradiction = byBet.P.length > 0 && byBet.B.length > 0;

  // ════════════════════════════════════════════════════════════════════════
  // ── TABLE HEAT · momento da mesa ──
  // ════════════════════════════════════════════════════════════════════════
  let heat = 50;
  const heatReasons = [];

  // [1] Estabilidade das somas
  if(out.sumDelta > 0 && out.sumDelta < 1.0){ heat += 10; heatReasons.push("somas muito estáveis"); }
  else if(out.sumDelta < 1.5){ heat += 6; heatReasons.push("somas estáveis"); }
  else if(out.sumDelta > 3.5){ heat -= 12; heatReasons.push("somas muito voláteis"); }
  else if(out.sumDelta > 2.5){ heat -= 6; heatReasons.push("somas voláteis"); }

  // [2] Estradas derivadas (5 gráficos: Bead, Big, BigEye, Small, Cockroach)
  const trends2 = [tBeb.trend, tSm.trend, tCp.trend];
  const stableCt2 = trends2.filter(t=>t==="STABLE").length;
  const volatileCt2 = trends2.filter(t=>t==="VOLATILE").length;
  if(stableCt2 === 3){ heat += 18; heatReasons.push("3 estradas estáveis"); }
  else if(stableCt2 === 2){ heat += 10; heatReasons.push("2 estradas estáveis"); }
  if(volatileCt2 === 3){ heat -= 18; heatReasons.push("3 estradas voláteis"); }
  else if(volatileCt2 === 2){ heat -= 10; heatReasons.push("2 estradas voláteis"); }

  // [3] Convergência de padrões
  if(out.convergence >= 3){ heat += 15; heatReasons.push("3+ padrões convergem"); }
  else if(out.convergence === 2){ heat += 8; heatReasons.push("2 padrões convergem"); }

  // [4] Contradição entre padrões
  if(out.contradiction){ heat -= 12; heatReasons.push("padrões contraditórios"); }

  // [5] Dominância
  if(out.dominancia !== "BALANCEADO"){ heat += 5; heatReasons.push(`dom. ${out.dominancia}`); }

  // [6] Cluster de Tie (ruim · mesa caótica)
  if(ties15 >= 3){ heat -= 10; heatReasons.push("cluster Tie"); }

  // [7] Exaustão
  if(out.exaustao){ heat -= 20; heatReasons.push("streak exaustão"); }

  // [7b] Regime pagante maduro/fatigado
  if(out.regimeFatigado){ heat -= 16; heatReasons.push(`${out.fatigue.regime} maduro`); }

  // [7c] Zona de perigo de quebra (streak no p90 histórico)
  if(out.profile && out.streakLen >= out.profile.p90 && out.streakLen >= 4){
    heat -= 12; heatReasons.push("streak na zona de perigo");
  }

  // [8] Big Road clean signals
  if(big.length >= 3){
    // colunas longas e consistentes = bom momento
    const lastCols = big.slice(-4);
    const avgColLen = lastCols.reduce((s,c)=>s+(c?c.length:0),0)/lastCols.length;
    if(avgColLen >= 2.5 && avgColLen <= 3.5){ heat += 6; heatReasons.push("colunas regulares"); }
    if(avgColLen > 4.5){ heat -= 4; heatReasons.push("colunas longas (instável)"); }
  }

  // [9] Alternância pura PP (excelente)
  if(patterns.some(p=>p.name==="PP5")){ heat += 10; heatReasons.push("PP5 ativo"); }

  // [10] Bead Road · zigzag caótico de somas
  const last8s = last(col,8).map(x=>x.s||0).filter(x=>x>0);
  if(last8s.length >= 6){
    let crossings = 0;
    for(let i=1;i<last8s.length;i++){
      if((last8s[i]>=8 && last8s[i-1]<8) || (last8s[i]<8 && last8s[i-1]>=8)) crossings++;
    }
    if(crossings >= 5){ heat -= 6; heatReasons.push("somas caóticas"); }
  }

  heat = Math.max(0, Math.min(100, heat));

  // Determinar estado da mesa e threshold dinâmico
  let tableState, dynThreshold, requireConvergence;
  // ════════════════════════════════════════════════════════════════════════
  // THRESHOLDS · mais entradas mantendo qualidade (cada red = 3 greens · win efetivo c/ gale ~89%)
  // ════════════════════════════════════════════════════════════════════════
  if(heat >= 75){
    tableState = "QUENTE";
    dynThreshold = 0.70;
    requireConvergence = false;
  } else if(heat >= 58){
    tableState = "FAVORÁVEL";
    dynThreshold = 0.74;
    requireConvergence = false;
  } else if(heat >= 42){
    tableState = "NEUTRA";
    dynThreshold = 0.79;
    requireConvergence = true;
  } else if(heat >= 28){
    tableState = "FRIA";
    dynThreshold = 0.85;
    requireConvergence = true;
  } else {
    tableState = "CONGELADA";
    dynThreshold = 0.99;
    requireConvergence = true;
  }

  // Padrões mínimos por estado · padrão único forte agora vale em HOT/FAV/NEUTRA
  let minPatterns = (tableState === "FRIA" || tableState === "CONGELADA") ? 3 : 2;
  let strongSingleOK = false;
  let STRONG_SINGLE = 0.84;
  if(tableState === "QUENTE"){ strongSingleOK = true; STRONG_SINGLE = 0.77; }
  else if(tableState === "FAVORÁVEL"){ strongSingleOK = true; STRONG_SINGLE = 0.80; }
  else if(tableState === "NEUTRA"){ strongSingleOK = true; STRONG_SINGLE = 0.84; }

  // ── FAREJADOR DE EMPATES (usa o heat já calculado) ──
  const hunter = tieHunter(ST.H, heat);
  out.hunter = hunter;
  // Atualiza o tie.active com base no farejador (mais inteligente)
  out.tie.active = (hunter.status === "ABERTA" || hunter.status === "QUENTE" || hunter.status === "ECO");
  out.tie.hunterStatus = hunter.status;
  out.tie.hunterConf = hunter.conf;

  // EV gate: cada red vale 3 greens. Piso 0.68 (com gale, win efetivo ~89%)
  const EV_FLOOR = 0.68;

  out.heat = { score: heat, state: tableState, threshold: dynThreshold, reasons: heatReasons, requireConvergence, minPatterns };

  // ── DECISÃO FINAL · COM HEAT + ANTI-ARMADILHA + EV GATE ──
  const effThreshold = Math.max(dynThreshold, EV_FLOOR);
  if(out.exaustao){
    out.signal = "W";
    out.reason = out.exaustaoMotivo || `Exaustão · streak ${st.len}+ ${st.side} · AGUARDA`;
    out.conf = 0;
  } else if(out.regimeFatigado){
    // padrão pagante maduro repetiu demais → parar de entrar (vai quebrar)
    out.signal = "W";
    out.reason = `🛑 ${out.regimeMotivo} · pare antes da quebra`;
    out.conf = bestConf;
  } else if(out.profile && out.streakLen >= out.profile.p90 && out.streakLen >= 4){
    // streak na zona de perigo histórica → não perseguir quebra nem continuação
    out.signal = "W";
    out.reason = `⚠️ Streak ${out.streakLen} ${out.streakSide} na zona de perigo (hist máx ${out.profile.max}) · aguardar quebra confirmar`;
    out.conf = bestConf;
  } else if(out.contradiction){
    // contradição entre padrões P e B → sempre aguarda (cada red custa 3 greens)
    out.signal = "W";
    out.reason = `Padrões contraditórios · risco alto · AGUARDA`;
    out.conf = bestConf;
  } else if(bestSide && bestSide !== "T" && roadHint === "MUDA" &&
            col.length && bestSide === col[col.length-1].r){
    // estradas derivadas dizem MUDA mas o sinal aposta em continuar → conflito → aguarda
    out.signal = "W";
    out.reason = `Gráficos derivados indicam mudança, sinal apostaria continuação · AGUARDA`;
    out.conf = bestConf;
  } else if(bestSide && bestConf >= effThreshold &&
            (byBet[bestSide].length >= minPatterns ||
             (strongSingleOK && bestConf >= STRONG_SINGLE))){
    out.signal = bestSide;
    out.conf = bestConf;
    out.reason = bestReason;
    if(byBet[bestSide].length < minPatterns) out.reason += " · padrão único forte";
    if(roadHint){ out.reason += ` · roads:${roadHint}`; }
  } else {
    out.signal = "W";
    if(bestSide && byBet[bestSide].length < minPatterns){
      out.reason = `Mesa ${tableState} exige ${minPatterns}+ padrões · só ${byBet[bestSide].length} detectado · AGUARDA`;
    } else if(bestSide){
      out.reason = `Conf ${(bestConf*100).toFixed(0)}% < mín ${(effThreshold*100).toFixed(0)}% (mesa ${tableState}) · AGUARDA`;
    } else {
      out.reason = `Mesa ${tableState} · sem padrão forte · AGUARDA`;
    }
    out.conf = bestConf;
  }

  // Padrão narrativo
  if(out.dominancia !== "BALANCEADO"){
    out.padrao = `Dominância ${out.dominancia} · P=${out.distrib.P}% B=${out.distrib.B}% T=${out.distrib.T}%`;
  } else {
    out.padrao = `Equilíbrio · P=${out.distrib.P}% B=${out.distrib.B}% T=${out.distrib.T}%`;
  }

  return out;
}

// ════════════════════════════════════════════════════════════════════════════
// CICLO · entrada / gale / placar
// ════════════════════════════════════════════════════════════════════════════
function confirmEntry(){
  const a = analyze();
  if(!a.signal || a.signal === "W") return;
  ST.ciclo = "entrada";
  ST.ciclo_sinal = a.signal;
  ST.ciclo_conf = a.conf;
  ST.ciclo_razao = a.reason;
  ST.ciclo_tie = a.tie.active ? (a.hunter && a.hunter.payoutProvavel || a.tie.payout) : null;
  ST.ciclo_gale_sinal = null;
  ST.ciclo_gale_dec = null;
  ST.ciclo_gale_tie = null;
  // SESSÃO INICIA AQUI · só termina ao clicar finalizar
  ST.sessaoAtiva = true;
  let msg = `▶ ENTRADA: ${lbl(a.signal)} · ${(a.conf*100).toFixed(0)}%`;
  if(a.tie.active) msg += ` + EMPATE ${ST.ciclo_tie}`;
  toast(msg, 2800);
  save(); renderRouter();
}

function abortCiclo(){
  ST.ciclo = "idle";
  ST.ciclo_sinal = null;
  ST.ciclo_conf = 0;
  ST.ciclo_razao = "";
  ST.ciclo_tie = null;
  ST.ciclo_gale_sinal = null;
  ST.ciclo_gale_dec = null;
  ST.ciclo_gale_tie = null;
  save(); renderRouter();
}

function hunterAtivo(a){
  return a && a.hunter && (a.hunter.status === "ABERTA" || a.hunter.status === "QUENTE" || a.hunter.status === "ECO");
}

function addRound(r, sNum){
  const s = parseInt(sNum) || 0;
  // ANALISAR ANTES de adicionar — para saber estado do farejador no momento da rodada
  // (se eu analiso depois, o dist vira 0 e o farejador muda de estado, perdendo o "ativo")
  const aBefore = analyze();
  const hunterAntes = hunterAtivo(aBefore);
  ST.H.push({r, s});

  // ════════════════════════════════════════════════════════════════════════
  // EMPATE · farejador ativo = GREEN sempre (aposta independente da cor)
  // ════════════════════════════════════════════════════════════════════════
  if(r === "T"){
    if(hunterAntes){
      const pay = payoutDaSoma(s);
      ST.greens++;
      if(["10x","25x","88x"].includes(pay)){
        celebraPaga(pay);
      } else {
        toast(`✅ GREEN EMPATE · ${pay}`, 2800);
      }
      // Se havia ciclo de cor rolando, ele encerra junto (cor é push, empate green)
      if(ST.ciclo === "entrada" || ST.ciclo === "gale") abortCiclo();
      else { save(); renderRouter(); }
    } else {
      // Farejador inativo → push, vida que segue
      toast(`↻ Empate · farejador estava inativo · sem alteração no placar`, 2800);
      if(ST.ciclo === "entrada" || ST.ciclo === "gale") abortCiclo();
      else { save(); renderRouter(); }
    }
    return;
  }

  // ════════════════════════════════════════════════════════════════════════
  // COR (P ou B) · CICLO STATE MACHINE: idle | entrada | aguarda_gale | gale
  // ════════════════════════════════════════════════════════════════════════
  if(ST.ciclo === "entrada"){
    const sig = ST.ciclo_sinal;
    if(r === sig){
      ST.greens++;
      toast(`✅ GREEN · ${lbl(r)}`);
      abortCiclo();
    } else {
      // Cor errada → decidir gale
      const a2 = analyze();
      if(a2.signal && a2.signal !== "W"){
        ST.ciclo = "gale";
        ST.ciclo_gale_sinal = a2.signal;
        ST.ciclo_gale_dec = (a2.signal === sig) ? "MANTER" : "INVERTER";
        ST.ciclo_gale_tie = a2.tie.active ? (a2.hunter && a2.hunter.payoutProvavel) : null;
        let gmsg = `⚡ GALE ${lbl(a2.signal)} · ${ST.ciclo_gale_dec}`;
        if(a2.tie.active) gmsg += ` + EMPATE ${ST.ciclo_gale_tie}`;
        toast(gmsg, 3500);
      } else {
        ST.ciclo = "aguarda_gale";
        ST.ciclo_gale_sinal = null;
        ST.ciclo_gale_dec = "AGUARDAR";
        ST.ciclo_gale_tie = null;
        toast(`⏳ AGUARDAR · próximo sinal será o GALE`, 3500);
      }
      save(); renderRouter();
    }
  } else if(ST.ciclo === "aguarda_gale"){
    const a2 = analyze();
    if(a2.signal && a2.signal !== "W"){
      ST.ciclo = "gale";
      ST.ciclo_gale_sinal = a2.signal;
      ST.ciclo_gale_dec = (a2.signal === ST.ciclo_sinal) ? "MANTER" : "INVERTER";
      ST.ciclo_gale_tie = a2.tie.active ? (a2.hunter && a2.hunter.payoutProvavel) : null;
      let gmsg = `⚡ ENTRAR no GALE · ${lbl(a2.signal)} · ${ST.ciclo_gale_dec}`;
      if(a2.tie.active) gmsg += ` + EMPATE ${ST.ciclo_gale_tie}`;
      toast(gmsg, 3800);
    } else {
      toast(`⏳ Ainda aguardando · sinal não confirmou`, 2000);
    }
    save(); renderRouter();
  } else if(ST.ciclo === "gale"){
    const galeSide = ST.ciclo_gale_sinal || opos(ST.ciclo_sinal);
    if(r === galeSide){
      ST.greens++;
      toast(`✅ GREEN GALE · ${lbl(r)}`);
      abortCiclo();
    } else {
      ST.reds++;
      toast(`❌ RED · entrada e gale falharam`);
      abortCiclo();
    }
  } else {
    // idle · cor sem entrada confirmada → só registra
    save(); renderRouter();
  }
}

// Recálculo retroativo: descobre empates que estavam com farejador ativo no histórico
// e oferece adicionar esses greens perdidos (útil quando o app rodou com bug antes)
window.recalcularEmpates = function(){
  if(!ST.H || ST.H.length < 12){ toast("Histórico curto demais para recalcular", 2500); return; }
  let greensDeEmpate = 0;
  let detalhes = [];
  ST.H.forEach((x,i)=>{
    if(x.r !== "T") return;
    // estado do farejador no momento ANTES deste empate
    const histAntes = ST.H.slice(0, i);
    if(histAntes.length < 12) return;
    // simular o tieHunter com o histórico parcial
    const heat = 40; // assumir mesa fria/neutra como média
    const h = tieHunter(histAntes, heat);
    if(h && (h.status === "ABERTA" || h.status === "QUENTE" || h.status === "ECO")){
      greensDeEmpate++;
      detalhes.push(`rodada ${i}: T s=${x.s} · ${h.status}`);
    }
  });
  const diff = greensDeEmpate - ST.greens;
  if(greensDeEmpate === 0){
    toast(`Nenhum empate com farejador ativo encontrado`, 3000);
    return;
  }
  const msg = `Histórico analisado:\n\n• ${greensDeEmpate} empates aconteceram com farejador ATIVO\n• Você tem ${ST.greens} green(s) registrados\n\nQuer SOBRESCREVER o placar para ${greensDeEmpate} greens? (Reds atuais: ${ST.reds} ficam)\n\nOu CANCELAR para não mexer.`;
  if(confirm(msg)){
    ST.greens = greensDeEmpate;
    save();
    toast(`✓ Placar ajustado · ${greensDeEmpate} greens de empate computados`, 4000);
    renderRouter();
  }
};

// Celebração especial para empate de alto pagamento
function celebraPaga(pay){
  ST.celebra = pay;
  toast(`🔥 PAGA ${pay} 🔥`, 4500);
  setTimeout(()=>{ ST.celebra = null; renderRouter(); }, 4500);
}

function undo(){
  if(ST.H.length > 0) ST.H.pop();
  abortCiclo();
}

function reset(){
  if(!confirm("Zerar tudo? (histórico, placar)")) return;
  ST.H = []; ST.greens = 0; ST.reds = 0;
  ST.deltaAcum = {}; ST.countAcum = {};
  abortCiclo();
}

function finalizarSessao(){
  const total = ST.greens + ST.reds;
  const rate = total > 0 ? Math.round(100 * ST.greens / total) : 0;
  if(!confirm(`Finalizar sessão?\n\n✅ ${ST.greens} GREEN · ❌ ${ST.reds} RED · ${rate}% rate\n\n• Placar será zerado\n• Aprendizado, histórico e pesos serão mantidos\n• Sessão #${ST.sessoes + 1} iniciada`)) return;
  copyJSON();
  ST.greens = 0;
  ST.reds = 0;
  ST.sessoes++;
  ST.sessaoAtiva = false;
  abortCiclo();
  toast(`✓ Sessão finalizada · ${rate}% rate · JSON copiado`, 3500);
  save();
}

function injectJSON(){
  try{
    const d = JSON.parse(ST.injTxt);
    if(d.history && Array.isArray(d.history)) ST.H = d.history;
    if(typeof d.greens === "number") ST.greens = d.greens;
    if(typeof d.reds === "number") ST.reds = d.reds;
    if(d.weights){
      // Aceita formato novo (números diretos) ou antigo (objeto base/ceil)
      for(const k of Object.keys(d.weights)){
        const v = d.weights[k];
        if(typeof v === "number"){
          ST.weights[k] = v;
        } else if(v && typeof v.base === "number"){
          // mapear nomes antigos para novos
          const map = {
            "PING_PONG_4P":"PP4","PING_PONG_23":"PP4",
            "BLOCO_2x2_TROCA":"B22T","BLOCO_2x2_CONT":"B22C",
            "STREAK_QUEBRA":"SK4Q","STREAK_CONT":"SK4C",
            "REEQUIL_B":"RE7","REEQUIL_P":"RE7",
            "TIE_GATILHO":"TIE"
          };
          if(map[k]) ST.weights[map[k]] = v.base;
          else if(ST.weights[k] !== undefined) ST.weights[k] = v.base;
        }
      }
    }
    if(d.deltaAcum) ST.deltaAcum = d.deltaAcum;
    if(d.countAcum) ST.countAcum = d.countAcum;
    if(typeof d.sessoes === "number") ST.sessoes = d.sessoes + 1;
    save();
    toast(`✓ ${ST.H.length} rodadas carregadas · ${ST.greens}/${ST.reds}`);
    ST.injTxt = "";
    ST.jsonOpen = false;
    renderRouter();
  }catch(e){
    toast("❌ JSON inválido");
  }
}

function exportJSON(){
  const total = ST.greens + ST.reds;
  const rate = total > 0 ? Math.round(100 * ST.greens / total) : 0;
  return JSON.stringify({
    history: ST.H,
    greens: ST.greens,
    reds: ST.reds,
    rate,
    weights: ST.weights,
    sessoes: ST.sessoes,
    deltaAcum: ST.deltaAcum,
    countAcum: ST.countAcum,
    timestamp: new Date().toISOString()
  }, null, 2);
}

function copyJSON(){
  const txt = exportJSON();
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(()=>{toast("📋 JSON copiado!");}).catch(()=>{fallbackCopy(txt);});
  } else {
    fallbackCopy(txt);
  }
}
function fallbackCopy(t){
  const ta = document.createElement("textarea");
  ta.value = t;
  document.body.appendChild(ta);
  ta.select();
  try{document.execCommand("copy");toast("📋 JSON copiado!");}catch(e){}
  document.body.removeChild(ta);
}

// RENDER
// ════════════════════════════════════════════════════════════════════════════
function renderApp(){
  const a = analyze();
  const total = ST.greens + ST.reds;
  const rate = total > 0 ? Math.round(100*ST.greens/total) : 0;
  const root = document.getElementById("root");

  // Bead road render (últimas 6×N)
  const beadCells = [];
  const colCount = Math.ceil(ST.H.length / 6);
  for(let c=0;c<colCount;c++){
    for(let r=0;r<6;r++){
      const idx = c*6+r;
      if(idx < ST.H.length){
        const x = ST.H[idx];
        beadCells.push(`<div class="bead ${x.r.toLowerCase()}">${x.s||""}</div>`);
      } else {
        beadCells.push(`<div></div>`);
      }
    }
  }

  // Big Road render
  let bigCells = "";
  if(a.roads && a.roads.big){
    const big = a.roads.big;
    const maxRows = 6;
    for(let c=0;c<big.length;c++){
      for(let r=0;r<maxRows;r++){
        if(big[c] && big[c][r]){
          bigCells += `<div class="cell ${big[c][r].toLowerCase()}"></div>`;
        } else {
          bigCells += `<div class="cell-empty"></div>`;
        }
      }
    }
  }

  // Derived render
  function renderDR(rd){
    let s = "";
    const rows = 6;
    const cols = Math.ceil(rd.length / rows);
    for(let c=0;c<cols;c++){
      for(let r=0;r<rows;r++){
        const idx = c*rows+r;
        if(idx < rd.length){
          s += `<div class="cell-${rd[idx]==="R"?"r":"b"}"></div>`;
        } else {
          s += `<div class="cell-empty"></div>`;
        }
      }
    }
    return s;
  }

  // Patterns breakdown
  let patHtml = "";
  if(a.patterns.length === 0){
    patHtml = `<div class="pat-row"><div class="pat-name">Nenhum padrão detectado</div><div class="pat-conf">—</div></div>`;
  } else {
    a.patterns.sort((x,y)=>y.conf-x.conf).slice(0,6).forEach(p=>{
      const cls = p.hi ? "high" : (p.conf >= ST.weights.min_conf ? "act" : "");
      patHtml += `<div class="pat-row ${cls}">
        <div class="pat-name ${cls}">${p.name} → ${lbl(p.sig)}</div>
        <div class="pat-conf">${(p.conf*100).toFixed(0)}%</div>
      </div>`;
    });
  }

  // Tie pays
  const tieHi = a.tie.payout;
  const hunterOpen = a.hunter && (a.hunter.status==='ABERTA' || a.hunter.status==='QUENTE' || a.hunter.status==='ECO');
  const provavel = a.hunter ? a.hunter.payoutProvavel : null;
  const tieRows = [
    ["88x","2,12",a.tie.probs["88x_2_12"]],
    ["25x","3,11",a.tie.probs["25x_3_11"]],
    ["10x","4,10",a.tie.probs["10x_4_10"]],
    ["6x","5,9",a.tie.probs["6x_5_9"]],
    ["4x","6,7,8",a.tie.probs["4x_6_8"]]
  ];
  const tiePays = tieRows.map(([n,t,p])=>{
    // destaca a faixa provável do farejador quando a janela está aberta
    const isHi = hunterOpen && provavel && provavel.includes(n);
    return `<div class="pay-cell ${isHi?'hot':''}">
      <div class="pay-num">${n}</div>
      <div class="pay-pct">${t}</div>
    </div>`;
  }).join("");

  // Signal main
  let sigClass = "w", sigText = "AGUARDA", confColor = "#475569";
  if(a.signal === "P"){sigClass="p";sigText="AZUL";confColor="#3b82f6";}
  else if(a.signal === "B"){sigClass="b";sigText="VERMELHO";confColor="#ef4444";}
  else if(a.signal === "T"){sigClass="t";sigText="EMPATE";confColor="#f59e0b";}

  // Tie badge junto da entrada — dirigido pelo farejador
  let tieBadge = "";
  if(a.hunter && (a.hunter.status==='ABERTA' || a.hunter.status==='QUENTE' || a.hunter.status==='ECO')){
    const lbl2 = a.hunter.status==='QUENTE'?'IMINENTE':a.hunter.status==='ECO'?'NA QUINA':'PRÓXIMO';
    tieBadge = `<div style="display:inline-block;margin-top:8px;padding:6px 12px;background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(245,158,11,.05));border:1px solid rgba(245,158,11,.4);border-radius:9px;font-size:13px;color:var(--gold2);font-family:var(--mono);font-weight:700">
        🐕 FAREJADOR: EMPATE ${lbl2} · ${a.hunter.payoutProvavel||'4x'}
      </div>`;
  } else if(a.hunter && a.hunter.status==='PASSOU'){
    tieBadge = `<div style="display:inline-block;margin-top:8px;padding:6px 12px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:9px;font-size:11px;color:var(--red2);font-family:var(--mono)">
        🛑 Empate já passou · não apostar no tie agora
      </div>`;
  }

  // Entry section · redesign explícito para gale
  const bomMomento = a.heat && (a.heat.state === "QUENTE" || a.heat.state === "FAVORÁVEL");
  const proxSessao = (AUTH.config && AUTH.config.sessoes && AUTH.config.sessoes.length) ? AUTH.config.sessoes : [];

  // Helper para card colorido grande no estilo do sinal
  function cardSinalGrande(titulo, lado, sub, tieInfo){
    const bg = lado === "P" ? "rgba(59,130,246,.15),rgba(59,130,246,.04)" :
               lado === "B" ? "rgba(239,68,68,.15),rgba(239,68,68,.04)" :
               "rgba(245,158,11,.12),rgba(245,158,11,.04)";
    const bd = lado === "P" ? "rgba(59,130,246,.45)" : lado === "B" ? "rgba(239,68,68,.45)" : "rgba(245,158,11,.45)";
    const cor = lado === "P" ? "var(--blue2)" : lado === "B" ? "var(--red2)" : "var(--gold2)";
    return `<div style="margin-top:10px;padding:16px;background:linear-gradient(135deg,${bg});border:2px solid ${bd};border-radius:14px;text-align:center">

      <div style="font-size:30px;font-weight:900;color:${cor};font-family:var(--mono);letter-spacing:2px">${lbl(lado)}</div>
      ${sub?`<div style="margin-top:6px;font-size:11px;color:var(--txt2);font-family:var(--mono)">${sub}</div>`:''}
      ${tieInfo?`<div style="margin-top:8px;display:inline-block;padding:5px 12px;background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.4);border-radius:8px;font-size:12px;color:var(--gold2);font-family:var(--mono);font-weight:700">🔥 + EMPATE ${tieInfo}</div>`:''}
    </div>`;
  }

  let entryHtml = "";
  if(ST.ciclo === "idle"){
    if(a.signal && a.signal !== "W"){
      // Há sinal · botão de confirmar entrada
      const tieExtra = a.tie.active ? (a.hunter && a.hunter.payoutProvavel || a.tie.payout) : null;
      entryHtml = isAdmin()
        ? `<button class="btn btn-${a.signal==='P'?'p':a.signal==='B'?'b':'t'}" style="width:100%;margin-top:10px;padding:18px 0;font-size:15px" onclick="confirmEntry()">▶ CONFIRMAR ENTRADA · ${lbl(a.signal)}${tieExtra?` + EMPATE ${tieExtra}`:''}</button>`
        : cardSinalGrande("▶ SINAL CONFIRMADO", a.signal, `${(a.conf*100).toFixed(0)}% de confiança`, tieExtra);
    } else if(!ST.sessaoAtiva && !bomMomento){
      // FORA DE SESSÃO — só antes da primeira entrada
      entryHtml = `<div style="margin-top:10px;padding:16px;background:linear-gradient(135deg,rgba(245,158,11,.08),rgba(0,0,0,.3));border:1px solid rgba(245,158,11,.3);border-radius:12px">
        <div style="font-size:14px;color:var(--gold2);font-family:var(--mono);font-weight:700;margin-bottom:8px">⏸ FORA DE SESSÃO</div>

        a.heat.state==='FRIA'?'rgba(245,158,11,.06),rgba(239,68,68,.03)':
        'rgba(239,68,68,.10),rgba(245,158,11,.04)'
      });border-color:${

        a.heat.state==='FAVORÁVEL'?'rgba(34,211,238,.3)':
        a.heat.state==='NEUTRA'?'rgba(148,163,184,.2)':
        a.heat.state==='FRIA'?'rgba(245,158,11,.3)':
        'rgba(239,68,68,.4)'
      }">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="font-size:9px;color:var(--txt3);letter-spacing:3px;font-family:var(--mono)">STATUS DA MESA</div>
          <div style="font-size:11px;font-family:var(--mono);color:${
            a.heat.state==='QUENTE'?'var(--green2)':
            a.heat.state==='FAVORÁVEL'?'var(--cyan)':
            a.heat.state==='NEUTRA'?'var(--txt2)':
            a.heat.state==='FRIA'?'var(--gold2)':
            'var(--red2)'
          };font-weight:700;letter-spacing:1px">
            ${a.heat.state==='QUENTE'?'🔥':a.heat.state==='FAVORÁVEL'?'⚡':a.heat.state==='NEUTRA'?'○':a.heat.state==='FRIA'?'❄':'🧊'} ${a.heat.state}
          </div>
        </div>
        <div style="font-size:22px;font-weight:900;font-family:var(--mono);color:${
          a.heat.state==='QUENTE'?'var(--green2)':
          a.heat.state==='FAVORÁVEL'?'var(--cyan)':
          a.heat.state==='NEUTRA'?'var(--txt)':
          a.heat.state==='FRIA'?'var(--gold2)':
          'var(--red2)'
        };margin-bottom:6px">${a.heat.score}/100</div>
        <div style="height:6px;background:rgba(0,0,0,.4);border-radius:3px;overflow:hidden">
          <div style="width:${a.heat.score}%;height:100%;background:linear-gradient(90deg,#ef4444 0%,#f59e0b 30%,#94a3b8 50%,#22d3ee 70%,#22c55e 100%);transition:width .4s"></div>
        </div>
      </div>` : ''}

      <!-- SIGNAL CARD -->
      <div class="card signal-card">
        <div class="sig-status">${a.signal === "W" ? "AGUARDA" : "SINAL ATIVO"}</div>
        <div class="sig-main ${sigClass}">${sigText}</div>
        ${tieBadge}
        <div class="conf-bar">
          <div class="conf-fill" style="width:${(a.conf*100).toFixed(0)}%;background:${confColor}"></div>
        </div>
        <div class="conf-txt">
          <span>CONFIANÇA</span>
          <span>${(a.conf*100).toFixed(0)}%</span>
        </div>
        ${entryHtml}
      </div>

      <!-- BEAD ROAD NUMÉRICO -->
      <div class="sec-lbl">BEAD ROAD · NUMÉRICO · ${ST.H.length} RODADAS</div>
      <div class="card road">
        <div class="bead-grid">${beadCells.join("")}</div>
      </div>

      <!-- BIG ROAD · LINHAS DE BOLINHA -->
      <div class="sec-lbl">BIG ROAD · COLORIDAS</div>
      <div class="card road">
        <div class="road-board">${bigCells}</div>
      </div>

      <!-- BIG EYE BOY / SMALL ROAD / COCKROACH -->
      <div class="sec-lbl">DERIVADAS · BIG EYE · SMALL · COCKROACH</div>
      <div class="card" style="display:grid;gap:8px">
        ${a.roads ? `
        <div class="road">
          <div class="road-hdr">
            <div class="road-name">BIG EYE BOY (1)</div>
            <div class="road-trend ${a.roads.tBeb.trend==='STABLE'?'p':a.roads.tBeb.trend==='VOLATILE'?'b':'n'}">
              ${a.roads.tBeb.trend === 'STABLE' ? '● ESTÁVEL' : a.roads.tBeb.trend === 'VOLATILE' ? '○ VOLÁTIL' : '— MIX'}
            </div>
          </div>
          <div class="road-board">${renderDR(a.roads.beb)}</div>
        </div>
        <div class="road">
          <div class="road-hdr">
            <div class="road-name">SMALL ROAD (2)</div>
            <div class="road-trend ${a.roads.tSm.trend==='STABLE'?'p':a.roads.tSm.trend==='VOLATILE'?'b':'n'}">
              ${a.roads.tSm.trend === 'STABLE' ? '● ESTÁVEL' : a.roads.tSm.trend === 'VOLATILE' ? '○ VOLÁTIL' : '— MIX'}
            </div>
          </div>
          <div class="road-board">${renderDR(a.roads.sm)}</div>
        </div>
        <div class="road">
          <div class="road-hdr">
            <div class="road-name">COCKROACH PIG (3)</div>
            <div class="road-trend ${a.roads.tCp.trend==='STABLE'?'p':a.roads.tCp.trend==='VOLATILE'?'b':'n'}">
              ${a.roads.tCp.trend === 'STABLE' ? '● ESTÁVEL' : a.roads.tCp.trend === 'VOLATILE' ? '○ VOLÁTIL' : '— MIX'}
            </div>
          </div>
          <div class="road-board">${renderDR(a.roads.cp)}</div>
        </div>` : '<div style="color:var(--txt3);font-size:11px;text-align:center;padding:14px">Aguardando mais dados...</div>'}
      </div>

      <!-- TIE ANALYSIS -->
      <!-- FAREJADOR DE EMPATES -->
      <div class="sec-lbl">🐕 FAREJADOR DE EMPATES</div>
      <div class="card" style="background:linear-gradient(135deg,${
        a.hunter && a.hunter.status==='QUENTE' ? 'rgba(245,158,11,.12),rgba(239,68,68,.05)' :
        a.hunter && a.hunter.status==='ECO' ? 'rgba(167,139,250,.12),rgba(245,158,11,.05)' :
        a.hunter && a.hunter.status==='ABERTA' ? 'rgba(245,158,11,.08),rgba(34,211,238,.03)' :
        a.hunter && a.hunter.status==='PASSOU' ? 'rgba(239,68,68,.06),rgba(0,0,0,.2)' :
        'rgba(148,163,184,.04),rgba(0,0,0,.2)'
      });border-color:${
        a.hunter && a.hunter.status==='QUENTE' ? 'rgba(245,158,11,.45)' :
        a.hunter && a.hunter.status==='ECO' ? 'rgba(167,139,250,.45)' :
        a.hunter && a.hunter.status==='ABERTA' ? 'rgba(245,158,11,.3)' :
        a.hunter && a.hunter.status==='PASSOU' ? 'rgba(239,68,68,.3)' :
        'var(--border)'
      }">
        ${a.hunter ? `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div style="font-size:18px;font-weight:900;font-family:var(--mono);color:${
            a.hunter.status==='QUENTE' ? 'var(--gold2)' :
            a.hunter.status==='ECO' ? 'var(--purple)' :
            a.hunter.status==='ABERTA' ? 'var(--gold2)' :
            a.hunter.status==='PASSOU' ? 'var(--red2)' :
            'var(--txt2)'
          }">
            ${a.hunter.status==='QUENTE'?'🔥 QUENTE':a.hunter.status==='ECO'?'🔁 ECO · QUINA':a.hunter.status==='ABERTA'?'🟢 JANELA ABERTA':a.hunter.status==='PASSOU'?'🛑 PASSOU':a.hunter.status==='FECHADA'?'⏳ FECHADA':'○ COLETANDO'}
          </div>
          <div style="font-size:12px;font-family:var(--mono);color:var(--txt2)">${(a.hunter.conf*100).toFixed(0)}%</div>
        </div>
        <div style="font-size:11px;color:var(--txt2);font-family:var(--mono);line-height:1.6;margin-bottom:10px">${a.hunter.msg}</div>
        ${a.hunter.echo && a.hunter.status!=='ECO' ? `<div style="font-size:10px;color:var(--purple);font-family:var(--mono);margin-bottom:8px">🔁 Mesa de eco detectada · ${(a.hunter.echoRate*100).toFixed(0)}% dos empates vêm na quina</div>` : ''}
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px">
          <div style="padding:8px;background:rgba(0,0,0,.3);border-radius:8px;text-align:center">
            <div style="font-size:16px;font-weight:800;font-family:var(--mono);color:var(--cyan)">${a.hunter.dist}</div>
            <div style="font-size:8px;color:var(--txt3);font-family:var(--mono);letter-spacing:1px">SEM EMPATE</div>
          </div>
          <div style="padding:8px;background:rgba(0,0,0,.3);border-radius:8px;text-align:center">
            <div style="font-size:16px;font-weight:800;font-family:var(--mono);color:var(--txt)">${a.hunter.avgGap.toFixed(0)}</div>
            <div style="font-size:8px;color:var(--txt3);font-family:var(--mono);letter-spacing:1px">MÉDIA GAP</div>
          </div>
          <div style="padding:8px;background:rgba(0,0,0,.3);border-radius:8px;text-align:center">

            <div style="font-size:8px;color:var(--txt3);font-family:var(--mono);letter-spacing:1px">EM 30</div>

        ${(a.hunter.status==='ABERTA'||a.hunter.status==='QUENTE'||a.hunter.status==='ECO') ? `
        <div style="padding:9px 11px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);border-radius:8px;font-size:11px;color:var(--gold2);font-family:var(--mono);line-height:1.5">
          💰 Payout provável: <strong>${a.hunter.payoutProvavel||'4x'}</strong> · soma média recente: ${a.sumAvg.toFixed(1)}<br/>
          <span style="font-size:10px;color:var(--txt2)">Apostar no empate agora tem valor de bônus</span>

        <div class="tie-pays" style="margin-top:10px">${tiePays}</div>

      <!-- ESTADO DA MESA + HORÁRIOS DAS LIVES · em destaque pro assinante -->
      ${a.heat ? `
      <div class="sec-lbl" style="margin-top:18px;font-size:11px">📊 ESTADO DA MESA AGORA</div>
      <div class="card" style="padding:18px;text-align:center;background:linear-gradient(135deg,${

// ════════════════════════════════════════════════════════════════════════════
const AUTH = {
  view: "loading", // loading | lock | admin | app
  key: localStorage.getItem("bacbru_key") || "",
  adminToken: localStorage.getItem("bacbru_admin") || "",
  keys: {},          // keys carregadas do firebase
  config: { sessoes: [], adminHash: null, admins: {} },
  msg: "",
  keyInput: "",
  pwInput: "",
  newKeyName: "",
  newKeyTipo: "mensal",
  newSessao: "",
  newAdminNome: "",
  newAdminPw: "",
  secretCount: 0,
  secretTimer: null
};

// hash simples (não-criptográfico, suficiente p/ gate de acesso)
function simpleHash(s){
  let h = 5381;
  for(let i=0;i<s.length;i++){ h = ((h<<5)+h) + s.charCodeAt(i); h = h & h; }
  return "h" + (h>>>0).toString(36);
}

function genKey(tipo){
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let k = "";
  for(let i=0;i<6;i++) k += chars[Math.floor(Math.random()*chars.length)];
  const prefix = tipo === "vitalicia" ? "BRU-V-" : tipo === "teste" ? "BRU-T-" : "BRU-M-";
  return prefix + k;
}

function keyIsValid(rec){
  if(!rec || !rec.ativo) return false;
  if(rec.tipo === "vitalicia") return true;
  if(rec.expiraEm && Date.now() > rec.expiraEm) return false;
  return true;
}

function initAuth(){
  // Carrega config (sessões + admins) e chaves
  db.ref("config").on("value", s => {
    const c = s.val() || {};
    AUTH.config.sessoes = c.sessoes || [];
    AUTH.config.adminHash = c.adminHash || null; // master (compatibilidade)
    AUTH.config.admins = c.admins || {};         // { hash: {nome, master} }
    routeAuth();
  });
  db.ref("keys").on("value", s => {
    AUTH.keys = s.val() || {};
    routeAuth();
  });
}

// verifica se um hash é admin (master antigo OU lista de admins)
function hashIsAdmin(hash){
  if(!hash) return false;
  if(AUTH.config.adminHash && hash === AUTH.config.adminHash) return true;
  if(AUTH.config.admins && AUTH.config.admins[hash]) return true;
  return false;
}

function routeAuth(){
  // Admin reconhecido pelo dispositivo?
  if(AUTH.adminToken && hashIsAdmin(AUTH.adminToken)){
    if(AUTH.view === "loading" || AUTH.view === "lock") AUTH.view = "app";
  } else if(AUTH.key && keyIsValid(AUTH.keys[AUTH.key])){
    if(AUTH.view === "loading" || AUTH.view === "lock") AUTH.view = "app";
  } else {
    if(AUTH.view === "loading" || AUTH.view === "app") AUTH.view = "lock";
  }
  renderRouter();
}

function isAdmin(){
  return AUTH.adminToken && hashIsAdmin(AUTH.adminToken);
}

// ── Ações de acesso ──
window.tentarChave = function(){
  const k = (AUTH.keyInput||"").trim().toUpperCase();
  if(!k){ AUTH.msg = "Digite sua chave"; renderRouter(); return; }
  const rec = AUTH.keys[k];
  if(keyIsValid(rec)){
    AUTH.key = k;
    localStorage.setItem("bacbru_key", k);
    AUTH.msg = "";
    AUTH.view = "app";
    renderRouter();
  } else if(rec && !keyIsValid(rec)){
    AUTH.msg = "Chave expirada ou desativada";
    renderRouter();
  } else {
    AUTH.msg = "Chave inválida";
    renderRouter();
  }
};

window.abrirAdmin = function(){
  if(isAdmin()){ AUTH.view = "admin"; renderRouter(); return; }
  AUTH.view = "adminLogin";
  renderRouter();
};

// Toque secreto: 5 toques na logo/dadinhos abre o admin (escondido dos assinantes)
window.secretAdmin = function(){
  AUTH.secretCount++;
  clearTimeout(AUTH.secretTimer);
  AUTH.secretTimer = setTimeout(()=>{ AUTH.secretCount = 0; renderRouter(); }, 1500);
  if(AUTH.secretCount >= 5){
    AUTH.secretCount = 0;
    clearTimeout(AUTH.secretTimer);
    abrirAdmin();
  } else {
    renderRouter();
  }
};

window.loginAdmin = function(){
  const pw = (AUTH.pwInput||"").trim();
  if(!pw){ AUTH.msg = "Digite a senha-mestra"; renderRouter(); return; }
  const hash = simpleHash(pw);
  const semAdmins = !AUTH.config.adminHash && (!AUTH.config.admins || Object.keys(AUTH.config.admins).length === 0);
  if(semAdmins){
    // primeira configuração — define o admin-mestre
    db.ref("config/adminHash").set(hash);
    db.ref("config/admins/" + hash).set({ nome: "Admin Master", master: true, criadoEm: Date.now() });
    AUTH.adminToken = hash;
    localStorage.setItem("bacbru_admin", hash);
    AUTH.msg = ""; AUTH.pwInput = ""; AUTH.view = "admin";
    renderRouter();
  } else if(hashIsAdmin(hash)){
    AUTH.adminToken = hash;
    localStorage.setItem("bacbru_admin", hash);
    AUTH.msg = ""; AUTH.pwInput = ""; AUTH.view = "admin";
    renderRouter();
  } else {
    AUTH.msg = "Senha incorreta";
    renderRouter();
  }
};

// Criar/remover admins adicionais
window.criarAdmin = function(){
  const nome = (AUTH.newAdminNome||"").trim() || "Admin";
  const pw = (AUTH.newAdminPw||"").trim();
  if(pw.length < 4){ AUTH.msg = "Senha do admin precisa de 4+ caracteres"; renderRouter(); return; }
  const hash = simpleHash(pw);
  db.ref("config/admins/" + hash).set({ nome, master: false, criadoEm: Date.now() });
  AUTH.newAdminNome = ""; AUTH.newAdminPw = "";
  AUTH.msg = "✓ Admin criada: " + nome;
  renderRouter();
};

window.removerAdmin = function(hash){
  const rec = AUTH.config.admins[hash];
  if(rec && rec.master){ alert("Não é possível remover o admin master."); return; }
  if(!confirm("Remover este admin?")) return;
  db.ref("config/admins/" + hash).remove();
};

window.criarChave = function(){
  const nome = (AUTH.newKeyName||"").trim() || "sem nome";
  const tipo = AUTH.newKeyTipo;
  const k = genKey(tipo);
  const dur = tipo === "teste" ? 3*24*60*60*1000 : 30*24*60*60*1000;
  const rec = {
    ativo: true,
    tipo,
    nome,
    criadoEm: Date.now(),
    expiraEm: tipo === "vitalicia" ? null : Date.now() + dur
  };
  db.ref("keys/" + k).set(rec);
  AUTH.newKeyName = "";
  AUTH.msg = "✓ Chave criada: " + k;
  renderRouter();
};

// Autoatendimento: teste grátis de 3 dias (1 por dispositivo, controlado no Firebase)
function getDeviceId(){
  let id = localStorage.getItem("bacbru_dev");
  if(!id){ id = "dev_" + Math.random().toString(36).slice(2) + Date.now().toString(36); localStorage.setItem("bacbru_dev", id); }

}
window.iniciarTeste = function(){
  const devId = getDeviceId();
  db.ref("trials/" + devId).once("value").then(snap => {
    if(snap.val()){
      AUTH.msg = "Teste grátis já utilizado neste dispositivo";
      renderRouter();
      return;
    }
    const k = genKey("teste");
    const rec = { ativo:true, tipo:"teste", nome:"Teste 3 dias", criadoEm:Date.now(), expiraEm: Date.now() + 3*24*60*60*1000 };
    db.ref("keys/" + k).set(rec);
    db.ref("trials/" + devId).set({ key:k, criadoEm:Date.now() });
    AUTH.key = k;
    localStorage.setItem("bacbru_key", k);
    AUTH.msg = "";
    AUTH.view = "app";

  }).catch(()=>{ AUTH.msg = "Erro ao iniciar teste · tente novamente"; renderRouter(); });

window.toggleChave = function(k){
  const rec = AUTH.keys[k];

};

window.renovarChave = function(k){

  if(!rec) return;
  const base = (rec.expiraEm && rec.expiraEm > Date.now()) ? rec.expiraEm : Date.now();
  db.ref("keys/" + k + "/expiraEm").set(base + 30*24*60*60*1000);
  db.ref("keys/" + k + "/ativo").set(true);
};

function diceSVG(color, pips){
  const c = color === "blue" ? "#3b82f6" : "#ef4444";
  const c2 = color === "blue" ? "#1e40af" : "#991b1b";
  const dotPos = {
    1:[[50,50]],
    2:[[30,30],[70,70]],
    3:[[28,28],[50,50],[72,72]],
    4:[[30,30],[70,30],[30,70],[70,70]],
    5:[[30,30],[70,30],[50,50],[30,70],[70,70]],
    6:[[30,28],[70,28],[30,50],[70,50],[30,72],[70,72]]
  }[pips];
  const dots = dotPos.map(([x,y])=>`<circle cx="${x}" cy="${y}" r="8" fill="#fff"/>`).join("");
  return `<svg width="34" height="34" viewBox="0 0 100 100" style="filter:drop-shadow(0 2px 6px ${c}66)">
    <rect x="6" y="6" width="88" height="88" rx="20" fill="url(#g${color})" stroke="${c2}" stroke-width="2"/>
    <defs><linearGradient id="g${color}" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="${c}"/><stop offset="1" stop-color="${c2}"/>
    </linearGradient></defs>
    ${dots}
  </svg>`;
}
