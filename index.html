<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>BAC BRU — Motor Neural</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060a12;--bg2:#0c1220;--bg3:#111827;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --txt:#e2e8f0;--txt2:#64748b;--txt3:#334155;
  --blue:#3b82f6;--blue2:#60a5fa;--blue3:rgba(59,130,246,0.15);
  --red:#ef4444;--red2:#f87171;--red3:rgba(239,68,68,0.15);
  --gold:#f59e0b;--gold2:#fcd34d;--gold3:rgba(245,158,11,0.15);
  --green:#22c55e;--green2:#4ade80;--green3:rgba(34,197,94,0.15);
  --purple:#a855f7;--purple2:#c084fc;--purple3:rgba(168,85,247,0.15);
  --r:14px;--r2:10px;--r3:8px;
  --font:'Space Grotesk',sans-serif;--mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:var(--font);min-height:100vh;overflow-x:hidden;
  background-image:
    radial-gradient(ellipse 100% 50% at 50% -10%,rgba(59,130,246,0.06),transparent 60%),
    radial-gradient(ellipse 60% 40% at 100% 100%,rgba(168,85,247,0.04),transparent 60%);
}

/* ANIMATIONS */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px currentColor}50%{box-shadow:0 0 40px currentColor,0 0 60px currentColor}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes barFill{from{width:0}to{width:var(--w)}}
@keyframes countUp{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}

.fade-in{animation:slideUp .3s ease forwards}
.pulse{animation:pulse 1.4s ease-in-out infinite}
.count-anim{animation:countUp .25s ease forwards}

/* LAYOUT */
.wrap{max-width:440px;margin:0 auto;padding:0 0 60px}

/* HEADER */
.header{
  padding:20px 16px 16px;
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,rgba(6,10,18,0.95),transparent);
  position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);
}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{
  font-family:var(--font);font-size:22px;font-weight:700;letter-spacing:-0.5px;
  background:linear-gradient(135deg,var(--gold2),var(--blue2),var(--purple2));
  background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 4s linear infinite;
}
.sync-badge{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;
  background:var(--green3);border:1px solid rgba(34,197,94,0.3);
  font-size:11px;color:var(--green2);font-family:var(--mono);letter-spacing:0.5px;
}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s ease-in-out infinite}

.stats-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.stat-chip{
  padding:3px 10px;border-radius:20px;font-size:11px;font-family:var(--mono);
  border:1px solid var(--border2);background:var(--bg2);
}

/* MESA DETECTOR */
.mesa-card{
  margin:12px 16px 0;padding:10px 14px;border-radius:var(--r);
  border:1px solid;transition:all .3s;
}
.mesa-label{font-size:13px;font-weight:600;margin-bottom:2px}
.mesa-sub{font-size:10px;opacity:0.7;font-family:var(--mono)}

/* FLASH BANNER */
.flash-banner{
  margin:10px 16px 0;padding:14px 16px;border-radius:var(--r);
  font-size:16px;font-weight:700;text-align:center;
  border:1px solid;animation:slideUp .2s ease forwards;
}

/* SIGNAL CARD */
.signal-card{
  margin:10px 16px 0;padding:16px;border-radius:var(--r);
  border:1px solid var(--border2);background:var(--bg2);
  transition:all .3s;
}
.signal-label{font-size:15px;font-weight:700;margin-bottom:3px}
.signal-reason{font-size:11px;color:var(--txt2);font-family:var(--mono)}
.signal-conf{
  display:flex;align-items:center;gap:6px;margin-top:10px;
}
.conf-bar-bg{flex:1;height:4px;border-radius:2px;background:var(--bg3);overflow:hidden}
.conf-bar{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.conf-val{font-size:11px;font-family:var(--mono);font-weight:600;min-width:32px;text-align:right}

/* ACTION BUTTON */
.action-btn{
  display:block;width:calc(100% - 32px);margin:10px 16px 0;
  padding:14px;border-radius:var(--r);border:2px solid;
  font-family:var(--font);font-size:14px;font-weight:700;letter-spacing:0.5px;
  cursor:pointer;transition:all .15s;text-align:center;
  position:relative;overflow:hidden;
}
.action-btn::after{
  content:'';position:absolute;inset:0;
  background:rgba(255,255,255,0);
  transition:background .15s;
}
.action-btn:active::after{background:rgba(255,255,255,0.1)}
.action-btn:active{transform:scale(0.98)}

/* INSTRUCTION BAR */
.instr{
  margin:8px 16px 0;padding:9px 12px;border-radius:var(--r2);
  background:var(--purple3);border:1px solid rgba(168,85,247,0.25);
  font-size:12px;color:var(--purple2);font-weight:600;text-align:center;
}

/* RESULT PANEL */
.result-panel{
  margin:10px 16px 0;padding:14px;border-radius:var(--r);
  background:var(--bg2);border:1px solid var(--border);
}
.panel-label{font-size:10px;letter-spacing:3px;color:var(--txt3);margin-bottom:10px;text-transform:uppercase;font-family:var(--mono)}
.result-row{display:flex;gap:8px;align-items:center}
.soma-wrap{display:flex;flex-direction:column;align-items:center;gap:3px}
.soma-label{font-size:9px;color:var(--txt3);letter-spacing:2px;text-transform:uppercase;font-family:var(--mono)}
.soma-inp{
  width:52px;height:58px;background:var(--bg3);
  border:1px solid var(--border2);border-radius:var(--r2);
  color:var(--txt);font-size:22px;text-align:center;
  font-family:var(--mono);font-weight:600;outline:none;
  transition:border-color .2s;
}
.soma-inp:focus{border-color:var(--blue)}
.result-btns{display:flex;flex:1;gap:7px}
.res-btn{
  flex:1;height:58px;border-radius:var(--r2);border:2px solid;
  font-family:var(--font);font-size:14px;font-weight:700;
  cursor:pointer;transition:all .15s;letter-spacing:0.5px;
  position:relative;overflow:hidden;
}
.res-btn:active{transform:scale(0.96)}
.res-btn.azul{background:linear-gradient(135deg,#1e3a8a,#2563eb);border-color:var(--blue);color:#fff}
.res-btn.verm{background:linear-gradient(135deg,#7f1d1d,#dc2626);border-color:var(--red);color:#fff}
.res-btn.emp{background:linear-gradient(135deg,#451a03,#b45309);border-color:var(--gold);color:#fff}
.res-btn.flash-hit{animation:glow .4s ease}

.fin-btn{
  margin-top:8px;width:100%;padding:10px;
  background:linear-gradient(135deg,#14532d,#16a34a);
  border:1px solid var(--green);border-radius:var(--r2);
  color:#fff;font-family:var(--font);font-size:12px;font-weight:600;
  cursor:pointer;letter-spacing:0.5px;transition:all .15s;
}
.fin-btn:active{transform:scale(0.98)}

/* SCOREBOARD */
.scoreboard{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;
  margin:10px 16px 0;
}
.score-card{
  padding:12px 8px;border-radius:var(--r);text-align:center;
  border:1px solid;background:var(--bg2);
}
.score-lbl{font-size:9px;letter-spacing:3px;color:var(--txt3);margin-bottom:6px;font-family:var(--mono);text-transform:uppercase}
.score-val{font-size:32px;font-weight:700;line-height:1;font-family:var(--font)}
.score-bar{height:3px;border-radius:2px;margin-top:8px;overflow:hidden;background:var(--bg3)}
.score-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}

/* BEAD ROAD */
.section{margin:10px 16px 0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px}
.section-title{font-size:10px;letter-spacing:3px;color:var(--txt3);margin-bottom:8px;font-family:var(--mono);text-transform:uppercase}
.bead-grid{display:grid;grid-template-columns:repeat(20,18px);gap:2px;overflow-x:auto;padding-bottom:2px}
.bead{
  width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:7px;color:#fff;font-weight:700;font-family:var(--mono);
  flex-shrink:0;transition:all .2s;
}

/* LAST ROUNDS */
.last-row{display:flex;gap:4px;flex-wrap:wrap}
.last-pill{
  padding:4px 9px;border-radius:6px;font-size:12px;
  font-family:var(--mono);font-weight:600;border:1px solid;
  transition:all .2s;
}

/* TIE ANALYSIS */
.tie-section{margin:10px 16px 0}
.tie-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px}
.tie-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.tie-label{font-size:11px;color:var(--txt2);font-family:var(--mono)}
.tie-pct{font-size:11px;font-weight:600;font-family:var(--mono)}
.tie-bar-bg{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-bottom:8px}
.tie-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}

/* JSON PANEL */
.json-panel{margin:10px 16px 0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.json-header{
  padding:11px 14px;display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;transition:background .15s;
}
.json-header:hover{background:rgba(255,255,255,0.03)}
.json-header-left{display:flex;align-items:center;gap:10px}
.json-icon{
  width:28px;height:28px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;
}
.json-title{font-size:12px;font-weight:600;margin-bottom:1px}
.json-sub{font-size:10px;color:var(--txt3);font-family:var(--mono)}
.json-arrow{font-size:12px;color:var(--txt3);transition:transform .2s}
.json-body{padding:0 14px 14px}
.json-ta{
  width:100%;height:80px;background:var(--bg3);
  border:1px solid var(--border2);border-radius:var(--r2);
  color:var(--txt2);font-size:10px;font-family:var(--mono);
  padding:8px;resize:none;outline:none;margin-bottom:7px;
  margin-top:8px;line-height:1.5;
  transition:border-color .2s;
}
.json-ta:focus{border-color:var(--blue)}
.apply-btn{
  width:100%;padding:9px 0;background:var(--blue3);
  border:1px solid rgba(59,130,246,0.3);border-radius:var(--r2);
  color:var(--blue2);font-size:12px;letter-spacing:2px;
  cursor:pointer;font-family:var(--mono);font-weight:600;
  transition:all .15s;
}
.apply-btn:hover{background:rgba(59,130,246,0.25)}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent)}
.export-row{display:flex;align-items:center}
.export-btn{
  flex:1;padding:11px 14px;display:flex;align-items:center;gap:9px;
  background:transparent;border:none;cursor:pointer;text-align:left;
  transition:background .15s;
}
.export-btn:hover{background:rgba(255,255,255,0.02)}
.export-icon{
  width:28px;height:28px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;font-size:14px;
  background:var(--green3);border:1px solid rgba(34,197,94,0.2);color:var(--green2);
}
.view-btn{
  padding:0 13px;background:transparent;border:none;
  cursor:pointer;font-size:11px;color:var(--txt3);
  transition:color .15s;
}
.view-btn:hover{color:var(--txt2)}
.view-ta{
  width:100%;height:150px;background:var(--bg3);
  border:1px solid var(--border2);border-radius:var(--r2);
  color:#3a9060;font-size:9px;font-family:var(--mono);
  padding:8px;resize:none;outline:none;line-height:1.4;cursor:text;
}
.view-hint{font-size:9px;color:var(--txt3);margin-top:3px;font-family:var(--mono)}

/* FOOTER BTNS */
.footer-btns{display:flex;gap:8px;margin:10px 16px 0}
.util-btn{
  flex:1;padding:10px 0;background:var(--bg2);
  border:1px solid var(--border);border-radius:var(--r2);
  color:var(--txt3);font-size:11px;letter-spacing:2px;
  cursor:pointer;font-family:var(--mono);transition:all .15s;
}
.util-btn:hover{border-color:var(--border2);color:var(--txt2)}

.credit{text-align:center;font-size:9px;color:var(--txt3);letter-spacing:3px;margin:16px 0 0;font-family:var(--mono)}
</style>
</head>
<body>
<div class="wrap" id="root"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// BAC BRU — MOTOR NEURAL v5.0
// ═══════════════════════════════════════════════════════════════════════════

const TP={2:88,3:25,4:10,5:6,6:4,7:4,8:4,9:6,10:10,11:25,12:88};
const LS="bacbru-v50";

// ── ANÁLISE DE MESA ────────────────────────────────────────────────────────
function mesaStatus(H){
  const ult=H.slice(-20),C=ult.filter(h=>h.r!=="T");
  if(C.length<8)return{cor:"#64748b",label:"⚪ ANALISANDO",sub:"Coletando dados...",cautela:false,tipo:"neutro"};
  let trocas=0,stAtual=1,stMax=1;
  for(let i=1;i<C.length;i++){if(C[i].r!==C[i-1].r){trocas++;stAtual=1;}else{stAtual++;stMax=Math.max(stMax,stAtual);}}
  const txTroca=trocas/(C.length-1);
  const somas=ult.map(h=>h.s).filter(Boolean);
  const avgS=somas.reduce((a,b)=>a+b,0)/somas.length;
  const vol=somas.reduce((a,s)=>a+Math.abs(s-avgS),0)/somas.length;
  const tPct=ult.filter(h=>h.r==="T").length/ult.length;
  // Sinais negativos
  const s1=txTroca>0.80&&vol>2.2; // alternância extrema caótica
  const s2=stMax>=5&&tPct>0.15;   // streak longo + muitos ties = manipulação
  const s3=tPct>0.30;              // muitos ties = coleta
  const s4=vol>2.5&&txTroca>0.60; // alta volatilidade
  const negativos=[s1,s2,s3,s4].filter(Boolean).length;
  if(negativos>=2)return{cor:"#ef4444",label:"🔴 MESA EM COLETA",sub:`T=${Math.round(tPct*100)}% vol=${vol.toFixed(1)} alt=${Math.round(txTroca*100)}% — cautela máxima`,cautela:true,tipo:"coleta"};
  if(negativos===1)return{cor:"#f59e0b",label:"🟡 MESA INSTÁVEL",sub:`vol=${vol.toFixed(1)} alt=${Math.round(txTroca*100)}% — entrar só em padrões fortes`,cautela:true,tipo:"instavel"};
  if(txTroca>=0.55&&txTroca<=0.70&&vol<1.8)return{cor:"#22c55e",label:"🟢 MESA PAGANTE",sub:`Ping-pong alt=${Math.round(txTroca*100)}% vol=${vol.toFixed(1)} — padrão limpo`,cautela:false,tipo:"pagante_pp"};
  if(stMax>=3&&txTroca<0.5&&vol<2.0)return{cor:"#22c55e",label:"🟢 MESA PAGANTE",sub:`Streaks max=${stMax} — seguir tendência`,cautela:false,tipo:"pagante_streak"};
  if(txTroca>=0.4&&txTroca<=0.75&&vol<2.2)return{cor:"#22c55e",label:"🟢 MESA PAGANTE",sub:`alt=${Math.round(txTroca*100)}% vol=${vol.toFixed(1)} — boa janela`,cautela:false,tipo:"pagante"};
  return{cor:"#64748b",label:"⚪ MESA NEUTRA",sub:`alt=${Math.round(txTroca*100)}% vol=${vol.toFixed(1)} — aguardando`,cautela:false,tipo:"neutro"};
}

// ── ANÁLISE DE TIE ─────────────────────────────────────────────────────────
function tieAnalise(H){
  const ri=[...H].reverse().findIndex(h=>h.r==="T");
  const dt=ri===-1?99:ri;
  const tc12=H.slice(-12).filter(h=>h.r==="T").length;
  const td=tc12/12;
  const mp=td>=0.12;
  const ls=H[H.length-1]?.s;
  const tg=(td>=0.12&&dt>=4)||dt>=7||(!!ls&&(ls<=4||ls>=10)&&dt>=3);
  // Calcular probabilidades por bucket baseado em somas recentes
  const somas=H.slice(-30).map(h=>h.s).filter(Boolean);
  const total=somas.length||1;
  const bk={4:0,6:0,10:0,25:0,88:0};
  somas.forEach(s=>{const p=TP[s]||4;bk[p]++;});
  const probs=[
    {label:"4x  (6·7·8)",p:4,v:Math.round(bk[4]/total*100),cor:"#64748b"},
    {label:"6x  (5·9)",  p:6,v:Math.round(bk[6]/total*100),cor:"#3b82f6"},
    {label:"10x (4·10)", p:10,v:Math.round(bk[10]/total*100),cor:"#22c55e"},
    {label:"25x (3·11)", p:25,v:Math.round(bk[25]/total*100),cor:"#f59e0b"},
    {label:"88x (2·12)", p:88,v:Math.round(bk[88]/total*100),cor:"#a855f7"},
  ];
  const dominante=probs.slice().sort((a,b)=>b.v-a.v)[0];
  return{dt,td,mp,tg,tp:dominante.p,probs,dominante};
}

// ── MOTOR PRINCIPAL v5.0 ───────────────────────────────────────────────────
function motor(H,cautela,weights){
  const W=weights||{};
  const C=H.filter(h=>h.r!=="T");
  if(C.length<5)return{sinal:null,conf:0,razao:"Histórico insuficiente",tg:false,tp:4,dt:99};

  const r5=C.slice(-5).map(h=>h.r);
  const r8=C.slice(-8).map(h=>h.r);
  const r12=C.slice(-12).map(h=>h.r);
  const r3=C.slice(-3).map(h=>h.r);
  const s6=H.slice(-6).map(h=>h.s).filter(Boolean);
  const s12=H.slice(-12).map(h=>h.s).filter(Boolean);
  const avg6=s6.length?s6.reduce((a,b)=>a+b,0)/s6.length:8.5;
  const est=s6.length>=4&&s6.reduce((a,s)=>a+Math.abs(s-avg6),0)/s6.length<1.5;
  const hi=avg6>=9.5;

  const tieA=tieAnalise(H);
  const {dt,td,mp,tg,tp}=tieA;
  const mn=cautela?0.78:0.65;

  function score(base,side){
    let v=base;
    if(est)v+=0.07;
    if(hi)v+=0.05;
    if(mp)v+=0.06;
    const pC12=r12.filter(r=>r==="P").length;
    const bC12=r12.filter(r=>r==="B").length;
    if(side==="P"&&pC12>bC12)v+=0.04;
    if(side==="B"&&bC12>pC12)v+=0.04;
    // Aplicar pesos customizados
    const key=side==="P"?"bias_P":"bias_B";
    if(typeof W[key]==="number")v+=W[key];
    return Math.min(v,0.97);
  }

  const pC8=r8.filter(r=>r==="P").length;
  const bC8=r8.filter(r=>r==="B").length;
  const pC12=r12.filter(r=>r==="P").length;
  const bC12=r12.filter(r=>r==="B").length;

  // ① PING-PONG 5 ─────────────────────────────────────────────────────────
  if(r5.length===5&&r5.every((r,i)=>i===0||r!==r5[i-1])){
    const nx=r5[4]==="P"?"B":"P";
    const c=score(0.87,nx);
    if(c>=mn)return{sinal:nx,conf:Math.round(c*100),razao:"🔁 Ping-pong 5 ciclos",tg,tp,dt,prioridade:9};
  }

  // ② PING-PONG 4 ─────────────────────────────────────────────────────────
  if(r5.length>=4){
    const pp4=r5.slice(-4);
    if(pp4.every((r,i)=>i===0||r!==pp4[i-1])){
      const nx=pp4[3]==="P"?"B":"P";
      const c=score(0.79,nx);
      if(c>=mn)return{sinal:nx,conf:Math.round(c*100),razao:"🔁 Ping-pong 4 ciclos",tg,tp,dt,prioridade:8};
    }
  }

  // ③ BLOCO 2×2 TROCA ─────────────────────────────────────────────────────
  if(r5.length>=4){
    const a=r5.slice(-4);
    if(a[0]===a[1]&&a[2]===a[3]&&a[0]!==a[2]){
      const nx=a[3]==="P"?"B":"P";
      const c=score(0.81,nx);
      if(c>=mn)return{sinal:nx,conf:Math.round(c*100),razao:"▪▪ Bloco 2×2 — troca",tg,tp,dt,prioridade:8};
    }
    // ④ BLOCO 2×2 CONTINUAR ──────────────────────────────────────────────
    if(a[2]===a[3]&&a[0]!==a[1]&&a[1]!==a[2]){
      const c=score(0.76,a[3]);
      if(c>=mn)return{sinal:a[3],conf:Math.round(c*100),razao:"▪▪ Bloco 2×2 — continuar",tg,tp,dt,prioridade:7};
    }
    // ⑤ BLOCO 3-1 ────────────────────────────────────────────────────────
    if(a[0]===a[1]&&a[1]===a[2]&&a[2]!==a[3]){
      const c=score(0.75,a[3]);
      if(c>=mn)return{sinal:a[3],conf:Math.round(c*100),razao:"▪▪▪▪ Bloco 3-1 — continuar",tg,tp,dt,prioridade:6};
    }
  }

  // ⑥ STREAK ──────────────────────────────────────────────────────────────
  let stk=1;const ss=C[C.length-1]?.r;
  for(let i=C.length-2;i>=0;i--){if(C[i].r===ss)stk++;else break;}

  if(stk>=7)return{sinal:null,conf:0,razao:`⚠️ Streak ${stk}×${ss} — exaustão total`,tg,tp,dt,prioridade:0};

  if(stk>=4){
    const sv=H.slice(-stk).map(h=>h.s).filter(Boolean);
    const vl=sv.length>=2?Math.max(...sv)-Math.min(...sv):0;
    if(vl>=4){
      const nx=ss==="P"?"B":"P";
      const c=score(0.81,nx);
      if(c>=mn)return{sinal:nx,conf:Math.round(c*100),razao:`📈 Streak ${stk}×${ss} — quebra vol${vl}`,tg,tp,dt,prioridade:7};
    } else {
      const c=score(0.73,ss);
      if(c>=mn)return{sinal:ss,conf:Math.round(c*100),razao:`📈 Streak ${stk}×${ss} — continuar`,tg,tp,dt,prioridade:6};
    }
  }

  if(stk===3){
    const sv=H.slice(-3).map(h=>h.s).filter(Boolean);
    const vl=sv.length>=2?Math.max(...sv)-Math.min(...sv):0;
    if(vl>=3){
      const nx=ss==="P"?"B":"P";
      const c=score(0.80,nx);
      if(c>=mn)return{sinal:nx,conf:Math.round(c*100),razao:`📈 Streak 3×${ss} — quebra`,tg,tp,dt,prioridade:7};
    } else {
      const c=score(0.71,ss);
      if(c>=mn)return{sinal:ss,conf:Math.round(c*100),razao:`📈 Streak 3×${ss} — continuar`,tg,tp,dt,prioridade:5};
    }
  }

  // ⑦ REEQUILÍBRIO FORTE ─────────────────────────────────────────────────
  if(pC8>=7){const c=score(0.87,"B");if(c>=mn)return{sinal:"B",conf:Math.round(c*100),razao:`⚖️ Reequil. B forte (P${pC8}/8)`,tg,tp,dt,prioridade:8};}
  if(bC8>=7){const c=score(0.87,"P");if(c>=mn)return{sinal:"P",conf:Math.round(c*100),razao:`⚖️ Reequil. P forte (B${bC8}/8)`,tg,tp,dt,prioridade:8};}
  if(pC8>=6){const c=score(0.82,"B");if(c>=mn)return{sinal:"B",conf:Math.round(c*100),razao:`⚖️ Reequil. B (P${pC8}/8)`,tg,tp,dt,prioridade:7};}
  if(bC8>=6){const c=score(0.82,"P");if(c>=mn)return{sinal:"P",conf:Math.round(c*100),razao:`⚖️ Reequil. P (B${bC8}/8)`,tg,tp,dt,prioridade:7};}

  // ⑧ DOMINÂNCIA 12 ──────────────────────────────────────────────────────
  if(pC12>=10){const c=score(0.85,"B");if(c>=mn)return{sinal:"B",conf:Math.round(c*100),razao:`⚖️ Dominância P${pC12}/12 — reequil.`,tg,tp,dt,prioridade:8};}
  if(bC12>=10){const c=score(0.85,"P");if(c>=mn)return{sinal:"P",conf:Math.round(c*100),razao:`⚖️ Dominância B${bC12}/12 — reequil.`,tg,tp,dt,prioridade:8};}

  // ⑨ PADRÃO ZIG-ZAG 3 ──────────────────────────────────────────────────
  if(r3.length===3&&r3[0]!==r3[1]&&r3[1]!==r3[2]&&r3[0]===r3[2]){
    const nx=r3[2]==="P"?"B":"P";
    const c=score(0.75,nx);
    if(c>=mn)return{sinal:nx,conf:Math.round(c*100),razao:"〰️ Zig-zag 3 — continua",tg,tp,dt,prioridade:6};
  }

  // ⑩ GATILHO EMPATE ─────────────────────────────────────────────────────
  if(tg){
    const c=Math.min(0.70+(mp?0.08:0)+(dt>=7?0.08:0),0.88);
    if(c>=0.62)return{sinal:"T",conf:Math.round(c*100),razao:`🔥 Gatilho ${dt} rod. s/ Tie · ${tp}x`,tg:true,tp,dt,prioridade:7};
  }

  return{sinal:null,conf:0,razao:"Aguardando padrão...",tg,tp,dt,prioridade:0};
}

// ── DECISÃO DE GALE ────────────────────────────────────────────────────────
// AGUARDAR = registra rodadas sem pontuar até ter padrão
// REPETIR/INVERTER = tem sinal claro
function galeDecide(H,sigOrig,cautela,weights){
  const C=H.filter(h=>h.r!=="T");
  const l2=C.slice(-2).map(h=>h.r);
  const an=motor(H,cautela,weights);
  if(an.razao.includes("exaustão"))return{modo:"AGUARDAR",lado:sigOrig,razao:"Streak exausto"};
  if(!an.sinal||an.conf<(cautela?78:60))return{modo:"AGUARDAR",lado:sigOrig,razao:"Confiança baixa"};
  if(an.sinal==="T")return{modo:"AGUARDAR",lado:sigOrig,razao:"Gatilho empate ativo"};
  if(l2.length===2&&l2[0]!==l2[1]&&an.sinal!==sigOrig)
    return{modo:"INVERTER",lado:an.sinal,razao:an.razao};
  if(an.sinal===sigOrig)return{modo:"REPETIR",lado:sigOrig,razao:an.razao};
  return{modo:"AGUARDAR",lado:sigOrig,razao:"Padrão ambíguo"};
}

// ESTADO
// ═══════════════════════════════════════════════════════════════════════════
let ST={
  H:[],verde:0,verm:0,
  ciclo:"idle",  // idle|entrada|gale|gale_wait
  sig:null,galeInfo:null,tgAtivo:false,
  weights:{},aviso:"",flash:"",
};
let AT=null; // aviso timer
let FT=null; // flash timer
let somaV="";
let injOpen=false,injTxt="",jsnVis=false;

// ── Persistência localStorage ──────────────────────────────────────────────
function salvar(){
  try{localStorage.setItem(LS,JSON.stringify({
    H:ST.H,verde:ST.verde,verm:ST.verm,
    ciclo:ST.ciclo,sig:ST.sig,galeInfo:ST.galeInfo,
    tgAtivo:ST.tgAtivo,weights:ST.weights
  }));}catch(e){}
}
function carregar(){
  try{
    const d=localStorage.getItem(LS);
    if(!d)return;
    const p=JSON.parse(d);
    ST.H=p.H||[];ST.verde=p.verde||0;ST.verm=p.verm||0;
    ST.ciclo=p.ciclo||"idle";ST.sig=p.sig||null;
    ST.galeInfo=p.galeInfo||null;ST.tgAtivo=p.tgAtivo||false;
    ST.weights=p.weights||{};
  }catch(e){}
}

// ── Helpers ────────────────────────────────────────────────────────────────
function av(txt,dur=3000){
  ST.aviso=txt;render();
  if(AT)clearTimeout(AT);
  AT=setTimeout(()=>{ST.aviso="";render();},dur);
}
function flashBtn(r){
  ST.flash=r;render();
  if(FT)clearTimeout(FT);
  FT=setTimeout(()=>{ST.flash="";render();},400);
}
function GREEN(txt){ST.verde++;av("✅ GREEN — "+txt);salvar();}
function RED(){ST.verm++;av("❌ RED — entrada + gale falharam");salvar();}
function resetCiclo(){ST.ciclo="idle";ST.sig=null;ST.galeInfo=null;ST.tgAtivo=false;}

// ── Ações ──────────────────────────────────────────────────────────────────
function confirmar(){
  const m=mesaStatus(ST.H),an=motor(ST.H,m.cautela,ST.weights);
  if(!an.sinal||an.sinal==="T")return;
  ST.sig=an.sinal;ST.tgAtivo=an.tg;ST.ciclo="entrada";
  salvar();av(`${an.sinal==="P"?"🔵":"🔴"} Confirmado — clique o resultado real`);
}

function confirmarGale(){
  if(!ST.galeInfo||ST.galeInfo.modo==="AGUARDAR")return;
  ST.ciclo="gale_wait";salvar();
  av(`${ST.galeInfo.lado==="P"?"🔵":"🔴"} Gale confirmado — clique o resultado real`);
}

function reg(r){
  const s=parseInt(somaV)||(r==="T"?7:8);
  const tp=TP[s]||4;
  ST.H=[...ST.H,{r,s}];
  somaV="";flashBtn(r);
  const m=mesaStatus(ST.H);

  // GALE AGUARDANDO (não pontua, só recalcula)
  if(ST.ciclo==="gale"&&ST.galeInfo?.modo==="AGUARDAR"){
    if(r==="T"&&ST.tgAtivo){GREEN(`Empate ${tp}x durante espera`);resetCiclo();salvar();return;}
    const g=galeDecide(ST.H,ST.sig,m.cautela,ST.weights);
    ST.galeInfo=g;
    if(g.modo!=="AGUARDAR"){
      av(g.modo==="INVERTER"
        ?`🔄 GALE PRONTO — INVERTER: ${g.lado==="P"?"AZUL":"VERMELHO"} · Confirme!`
        :`⚡ GALE PRONTO — REPETIR: ${g.lado==="P"?"AZUL":"VERMELHO"} · Confirme!`);
    } else av("⏳ Aguardando padrão...");
    salvar();return;
  }

  // GALE WAIT (aguardando resultado do gale confirmado)
  if(ST.ciclo==="gale_wait"&&ST.galeInfo){
    if(r==="T"){GREEN(`Empate ${tp}x no Gale`);resetCiclo();salvar();return;}
    if(r===ST.galeInfo.lado){GREEN("Gale acertou!");}else{RED();}
    resetCiclo();salvar();return;
  }

  // ENTRADA ATIVA
  if(ST.ciclo==="entrada"&&ST.sig){
    if(r==="T"){GREEN(`Empate ${tp}x na entrada`);resetCiclo();salvar();return;}
    if(r===ST.sig){GREEN("Acertou de primeira!");resetCiclo();salvar();return;}
    const g=galeDecide(ST.H,ST.sig,m.cautela,ST.weights);
    ST.galeInfo=g;ST.ciclo="gale";salvar();
    if(g.modo==="AGUARDAR")av(`⏳ GALE — AGUARDAR: ${g.razao} · Registre mais rodadas`);
    else av(g.modo==="INVERTER"
      ?`🔄 GALE 1 — INVERTER: ${g.lado==="P"?"AZUL":"VERMELHO"} · Confirme`
      :`⚡ GALE 1 — REPETIR: ${g.lado==="P"?"AZUL":"VERMELHO"} · Confirme`);
    return;
  }

  // IDLE
  if(r==="T"){
    if(ST.tgAtivo){GREEN(`Empate ${tp}x no Gatilho`);ST.tgAtivo=false;}
    else av("○ Empate — neutro");
  } else av("○ Registrado");
  salvar();
}

function aplicarJson(){
  try{
    const d=JSON.parse(injTxt);
    if(Array.isArray(d.history)&&d.history.length>0)
      ST.H=d.history.map(h=>({r:h.r,s:h.s||8}));
    if(typeof d.greens==="number")ST.verde=d.greens;
    if(typeof d.reds==="number")ST.verm=d.reds;
    if(d.weights&&typeof d.weights==="object")ST.weights={...ST.weights,...d.weights};
    resetCiclo();injTxt="";injOpen=false;salvar();av("✅ JSON aplicado com sucesso!");
  }catch{av("❌ JSON inválido");}
}

function copiar(){
  const tot=ST.verde+ST.verm;
  const d=JSON.stringify({
    history:ST.H,greens:ST.verde,reds:ST.verm,
    rate:tot?Math.round(ST.verde/tot*100):0,
    weights:ST.weights,timestamp:new Date().toISOString()
  },null,2);
  if(navigator.clipboard?.writeText)
    navigator.clipboard.writeText(d).then(()=>av("📋 Copiado!")).catch(()=>{jsnVis=true;render();});
  else{
    try{const t=document.createElement("textarea");t.value=d;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);av("📋 Copiado!");}
    catch{jsnVis=true;render();}
  }
}

  } else if(an.sinal==="T"){
    sCor="var(--gold)";sBg="rgba(245,158,11,0.08)";sBrd="rgba(245,158,11,0.3)";
    sTit=`🔥 GATILHO EMPATE · ${an.tp}x · ${an.dt} rod.`;sRaz=an.razao;sConf=an.conf;
  } else if(an.sinal==="P"){

  } else if(an.sinal==="B"){

  const instrucao=ST.ciclo==="entrada"?"🎯 ENTRADA ATIVA — clique o resultado real da mesa"

    ⚡ CONFIRMAR GALE — ${ST.galeInfo?.lado==="P"?"AZUL":"VERMELHO"}
  </button>`:""}

  ${instrucao?`<div class="instr">${instrucao}</div>`:""}

  <div class="result-panel">
    <div class="panel-label">${ST.ciclo==="idle"?"REGISTRAR RODADA":"▼ RESULTADO REAL DA MESA"}</div>
    <div class="result-row">
      <div class="soma-wrap">
        <span class="soma-label">SOMA</span>
        <input id="soma" class="soma-inp" type="number" min="2" max="12" value="${somaV}" oninput="somaV=this.value" placeholder="Σ"/>
      </div>
      <div class="result-btns">
        <button class="res-btn azul ${ST.flash==="P"?"flash-hit":""}" onclick="reg('P')">AZUL</button>
        <button class="res-btn verm ${ST.flash==="B"?"flash-hit":""}" onclick="reg('B')">VERM.</button>
        <button class="res-btn emp ${ST.flash==="T"?"flash-hit":""}" onclick="reg('T')">EMPATE</button>
      </div>
    </div>
    <button class="fin-btn" onclick="ST.verde=0;ST.verm=0;resetCiclo();salvar();av('🏁 Sessão finalizada');render()">🏁 FINALIZAR SESSÃO — zera placar</button>
  </div>

  <div class="scoreboard">
    ${[
      {l:"ACERTOS",v:ST.verde,c:"var(--green)",c2:"rgba(34,197,94,"},
      {l:"TAXA",v:taxa+"%",c:rcor,c2:taxa>=65?"rgba(34,197,94,":taxa>=50?"rgba(245,158,11,":"rgba(239,68,68,"},
      {l:"ERROS",v:ST.verm,c:"var(--red)",c2:"rgba(239,68,68,"}
    ].map(x=>`
    <div class="score-card" style="border-color:${x.c2}0.3);background:${x.c2}0.05)">
      <div class="score-lbl">${x.l}</div>
      <div class="score-val" style="color:${x.c}">${x.v}</div>
      <div class="score-bar"><div class="score-bar-fill" style="width:${x.l==="TAXA"?taxa:x.l==="ACERTOS"&&tot?Math.round(ST.verde/tot*100):0}%;background:${x.c}"></div></div>
    </div>`).join("")}
  </div>

  <div class="section">
    <div class="section-title">BEAD ROAD</div>
    <div class="bead-grid">${beads}</div>
  </div>

  <div class="section">
    <div class="section-title">ÚLTIMAS 10 RODADAS</div>
    <div class="last-row">${last10||"<span style='color:var(--txt3);font-size:11px;font-family:var(--mono)'>Nenhuma rodada ainda</span>"}</div>
  </div>

  <div class="tie-section">
    <div class="tie-card">
      <div class="section-title" style="margin-bottom:10px">PROBABILIDADE EMPATE · ${tieA.dt===99?"∞":tieA.dt} rod. sem Tie${tieA.mp?" · MESA PAGADORA":""}</div>
      ${tieProbs}
      ${tieA.tg?`<div style="margin-top:8px;padding:7px 10px;border-radius:7px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);font-size:11px;color:var(--gold);font-family:var(--mono)">🔥 Gatilho ativo · ${tieA.dominante.label} mais provável</div>`:""}
    </div>
  </div>

  <div class="json-panel">
    <div class="json-header" onclick="injOpen=!injOpen;render()">
      <div class="json-header-left">
        <div class="json-icon" style="background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);color:var(--blue2)">↑</div>
        <div>
          <div class="json-title" style="color:var(--blue2)">INJETAR JSON</div>
          <div class="json-sub">Calibragem · histórico · pesos</div>
        </div>
      </div>
      <div class="json-arrow" style="${injOpen?"transform:rotate(180deg)":""}">▼</div>
    </div>
    ${injOpen?`
    <div class="json-body">
      <textarea id="injta" class="json-ta" oninput="injTxt=this.value" placeholder="Cole o JSON aqui...">${injTxt}</textarea>
      <button class="apply-btn" onclick="aplicarJson()">↑ APLICAR CALIBRAGEM</button>
    </div>`:""}
    <div class="divider"></div>
    <div class="export-row">
      <button class="export-btn" onclick="copiar()">
        <div class="export-icon">↓</div>
        <div>
          <div style="font-size:12px;color:var(--green2);font-weight:600">COPIAR JSON</div>
          <div style="font-size:9px;color:var(--txt3);font-family:var(--mono)">Exportar calibragem completa</div>
        </div>
      </button>
      <button class="view-btn" onclick="jsnVis=!jsnVis;render()">👁 VER</button>
    </div>
    ${jsnVis?`
    <div style="padding:0 14px 14px">
      <textarea class="view-ta" readonly onclick="this.select();try{document.execCommand('copy');av('📋 Copiado!');}catch{}">${jsonOut.replace(/</g,"&lt;")}</textarea>
      <div class="view-hint">Clique para selecionar e copiar</div>
    </div>`:""}
  </div>

  <div class="footer-btns">
    <button class="util-btn" onclick="if(ST.H.length>0)ST.H=ST.H.slice(0,-1);resetCiclo();salvar();render()">↩ DESFAZER</button>
    <button class="util-btn" onclick="ST.H=[];ST.verde=0;ST.verm=0;resetCiclo();salvar();render()">◌ ZERAR TUDO</button>
  </div>

  <div class="credit">BAC BRU · v5.0 · MOTOR NEURAL · ${new Date().getFullYear()}</div>
  `;

  document.addEventListener("input",e=>{
    if(e.target.id==="soma")somaV=e.target.value;
    if(e.target.id==="injta")injTxt=e.target.value;
  },{once:true});
}

// ── BOOT ──────────────────────────────────────────────────────────────────
carregar();render();
</script>
</body>
</html>
